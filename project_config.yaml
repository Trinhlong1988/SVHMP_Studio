# SVHMP project_config baseline (PACK4 doc 15 hop dong).
# "same code, khac project": moi khac biet the loai/thi truong khai o day,
# KHONG hard-code trong engine. Validator: tools/validate_project_config.py.
# 5 field bat buoc, non-empty.
genre: horror

distribution:              # target phan bo xuyen 100 tap (reconcile R210)
  age_child: [0.10, 0.15]  # tre em 10-15%
  age_elder: [0.15, 0.20]  # nguoi gia 15-20%
  region_voice_min: 3      # >= 3 vung giong
  death_kinds: 9           # 9 kieu chet
  chars_per_ep: [5, 8]     # 5-8 nhan vat/tap

dialect: south             # Sai Gon / Nam Bo lam giong chu dao

beat:                      # khung nhip episode (reconcile bible/01)
  - opening
  - rising
  - reveal
  - ending

taxonomy:                  # tro toi bible, KHONG dinh nghia lai
  object: bible/12_object_library.yaml
  setting: bible/13_setting_library.yaml
  regret: bible/11_regret_catalog.yaml
