# Section emotion vectors — per-section emo curve (winner approach per memory v3)
# render_ep01_section_emo.py loads this + dispatches IndexTTS2 + RVC NNG
# Source: bible/01_series_bible.emotion_curve_ngocngan + bible/09 axis_breakdown
sections:
  hook:
    emo_focus: surprised
    emo_vector: {happy: 0.0, angry: 0.0, sad: 0.0, afraid: 0.10, disgusted: 0.0, melancholic: 0.10, surprised: 0.40, calm: 0.30}
    section_role: TÒ MÒ

  setup:
    emo_focus: afraid
    emo_vector: {happy: 0.0, angry: 0.0, sad: 0.10, afraid: 0.30, disgusted: 0.0, melancholic: 0.20, surprised: 0.10, calm: 0.30}
    section_role: BẤT AN

  incident:
    emo_focus: sad
    emo_vector: {happy: 0.0, angry: 0.0, sad: 0.25, afraid: 0.15, disgusted: 0.0, melancholic: 0.20, surprised: 0.0, calm: 0.40}
    section_role: ĐỒNG CẢM

  reveal:
    emo_focus: melancholic
    emo_vector: {happy: 0.0, angry: 0.0, sad: 0.25, afraid: 0.10, disgusted: 0.0, melancholic: 0.40, surprised: 0.05, calm: 0.20}
    section_role: NGHẸN (KEY, peak)

  payoff:
    emo_focus: melancholic
    emo_vector: {happy: 0.05, angry: 0.0, sad: 0.15, afraid: 0.05, disgusted: 0.0, melancholic: 0.35, surprised: 0.0, calm: 0.35}
    section_role: DƯ ÂM (fade)

  cliffhanger:
    emo_focus: melancholic
    emo_vector: {happy: 0.0, angry: 0.0, sad: 0.10, afraid: 0.10, disgusted: 0.0, melancholic: 0.30, surprised: 0.10, calm: 0.35}
    section_role: DƯ ÂM (lingering, ARC mở)

global_settings:
  voice_provider: IndexTTS2 (port 7861)
  voice_model: checkpoints-vi
  rvc_post: NNG_preset_19_06
  rvc_params: {f0up_key: -2, index_rate: 0.85, rms_mix: 0.25, protect: 0.33, f0method: rmvpe}
  apply_watermark: false
  max_text_tokens: 200
  emo_control_method: "Kéo slider 8 cảm xúc"
  silence_p: 0.15
  output_format: wav_48k_24bit_mono
  loudness_normalize: -16_LUFS

bell_sfx:
  count: 1
  location: cliffhanger
  cue: "[chuông ngân một nhịp, 1.0s vang nhẹ]"
  insert_position: "sau dialog 'Chưa tới lúc.'"
  source: Stable_Audio_Open_local

pause_inserts:
  - section: reveal
    after: 'Quang biết.'
    duration_ms: 1200
  - section: reveal
    after: 'Hà mất tại chỗ.'
    duration_ms: 1200
  - section: incident
    after: 'Anh không định kể.'
    duration_ms: 500
    cue_text: 'Nhưng anh kể.'
  - section: incident
    after: 'Một tiếng rè khẽ. Rồi một câu hát cũ vọng ra, nghe không rõ lời.'
    duration_ms: 300
  - section: reveal
    after: 'Tôi nhớ ra rồi.'
    duration_ms: 600
  - section: reveal
    after: 'Mắt anh chạm vào cửa kính phía bác tài.'
    duration_ms: 400
  - section: cliffhanger
    after: 'Cô đưa đồng hồ lên trước mặt.'
    duration_ms: 500
  - section: setup
    after: 'Có lẽ vì cái khác.'
    duration_ms: 300

