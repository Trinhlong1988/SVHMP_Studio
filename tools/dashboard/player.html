<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVHMP Player — Audio Files</title>
<style>
  :root {
    --base: #1e1e2e; --mantle: #181825; --crust: #11111b;
    --surface0: #313244; --surface1: #45475a; --surface2: #585b70;
    --text: #cdd6f4; --subtext1: #bac2de; --subtext0: #a6adc8;
    --overlay0: #6c7086; --overlay1: #7f849c;
    --mauve: #cba6f7; --pink: #f5c2e7; --red: #f38ba8;
    --peach: #fab387; --yellow: #f9e2af; --green: #a6e3a1;
    --teal: #94e2d5; --sky: #89dceb; --blue: #89b4fa; --lavender: #b4befe;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--crust) 0%, var(--base) 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 1px solid var(--surface0);
  }
  .header h1 { font-size: 18px; color: var(--mauve); font-weight: 600; }
  .header .back-link {
    color: var(--blue); text-decoration: none; font-size: 12px;
    padding: 4px 10px; border-radius: 4px; background: var(--surface0);
  }
  .header .back-link:hover { background: var(--surface1); }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 16px;
    padding: 8px; background: var(--mantle); border-radius: 6px;
    align-items: center; font-size: 11px;
  }
  .stats-pill {
    background: var(--surface0); padding: 3px 8px;
    border-radius: 10px; color: var(--subtext1);
  }
  .stats-pill strong { color: var(--peach); font-weight: 600; }

  .file-grid { display: grid; gap: 8px; }

  .file-card {
    background: var(--mantle);
    border-radius: 8px;
    padding: 12px 16px;
    border-left: 3px solid var(--blue);
    transition: all 0.15s;
  }
  .file-card:hover {
    background: var(--surface0);
    border-left-color: var(--mauve);
  }
  .file-card.is-backup { border-left-color: var(--overlay0); opacity: 0.7; }
  .file-card.is-final { border-left-color: var(--green); }

  .fc-row1 {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .fc-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    font-family: 'Consolas', 'Monaco', monospace;
  }
  .fc-meta {
    font-size: 10px; color: var(--overlay0);
    display: flex; gap: 12px;
  }
  .fc-meta span strong { color: var(--subtext1); font-weight: 500; }

  .fc-controls {
    display: flex; gap: 6px; align-items: center; margin-top: 6px;
  }
  .fc-controls audio {
    flex: 1; height: 28px;
    filter: invert(0.92) hue-rotate(180deg);
  }
  .btn {
    padding: 4px 10px;
    border: none; border-radius: 4px;
    font-size: 10px; font-weight: 500;
    cursor: pointer; transition: all 0.1s;
    background: var(--surface1); color: var(--text);
  }
  .btn:hover { background: var(--surface2); }
  .btn.btn-open { background: var(--blue); color: var(--base); }
  .btn.btn-delete { background: var(--red); color: var(--base); }
  .btn.btn-regen { background: var(--peach); color: var(--base); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .badge-tag {
    background: var(--surface1); color: var(--subtext0);
    padding: 1px 5px; border-radius: 3px; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-tag.final { background: var(--green); color: var(--base); }
  .badge-tag.backup { background: var(--overlay0); color: var(--base); }

  .empty {
    text-align: center; padding: 40px;
    color: var(--overlay0); font-style: italic;
  }

  .warn-box {
    background: rgba(243, 139, 168, 0.08);
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 11px;
    color: var(--maroon);
  }
  .warn-box strong { color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎵 SVHMP Audio Player</h1>
    <a href="/" class="back-link">← widget 300×300</a>
  </div>

  <div class="warn-box">
    ⚠️ <strong>TENTATIVE flows — Mr.Long approve trước khi wire actual logic:</strong>
    Delete = move .trash/ (KHÔNG xóa permanent). Regen = POST trigger pipeline (chưa wire — placeholder).
  </div>

  <div class="toolbar">
    <span class="stats-pill"><strong id="t-total">0</strong> files</span>
    <span class="stats-pill"><strong id="t-final">0</strong> finals</span>
    <span class="stats-pill"><strong id="t-backup">0</strong> backups</span>
    <span class="stats-pill"><strong id="t-size">0</strong> MB</span>
    <span style="margin-left: auto; color: var(--overlay0);">last refresh: <span id="t-time">—</span></span>
  </div>

  <div class="file-grid" id="grid"></div>
</div>

<script>
async function loadFiles() {
  try {
    const res = await fetch('/api/files');
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('grid').innerHTML = '<div class="empty">⚠️ Backend offline</div>';
  }
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('vi-VN', { dateStyle: 'short', timeStyle: 'short' });
}

function render(data) {
  const files = data.files || [];
  document.getElementById('t-total').textContent = files.length;
  document.getElementById('t-final').textContent = files.filter(f => !f.is_backup).length;
  document.getElementById('t-backup').textContent = files.filter(f => f.is_backup).length;
  const totalMB = files.reduce((s, f) => s + (f.size_bytes || 0), 0) / 1024 / 1024;
  document.getElementById('t-size').textContent = totalMB.toFixed(1);
  document.getElementById('t-time').textContent = new Date().toLocaleTimeString('vi-VN');

  const grid = document.getElementById('grid');
  if (!files.length) {
    grid.innerHTML = '<div class="empty">Không tìm thấy file audio trong output/</div>';
    return;
  }
  grid.innerHTML = files.map(f => {
    const cls = f.is_backup ? 'is-backup' : 'is-final';
    const badge = f.is_backup
      ? '<span class="badge-tag backup">backup</span>'
      : '<span class="badge-tag final">final</span>';
    return `
      <div class="file-card ${cls}">
        <div class="fc-row1">
          <div class="fc-name">${f.rel_path}</div>
          ${badge}
        </div>
        <div class="fc-meta">
          <span>📦 <strong>${fmtSize(f.size_bytes)}</strong></span>
          <span>⏱ <strong>${f.duration_sec ? f.duration_sec.toFixed(1) + 's' : '—'}</strong></span>
          <span>🕐 <strong>${fmtTime(f.modified)}</strong></span>
        </div>
        <div class="fc-controls">
          <audio controls preload="none" src="/api/audio?path=${encodeURIComponent(f.rel_path)}"></audio>
          <button class="btn btn-open" onclick="openInExplorer('${f.rel_path.replace(/'/g,"\\'")}')" title="Mở trong Explorer">📂</button>
          <button class="btn btn-regen" onclick="regen('${f.rel_path.replace(/'/g,"\\'")}')" ${f.is_backup ? 'disabled' : ''} title="Regen episode">↻</button>
          <button class="btn btn-delete" onclick="del('${f.rel_path.replace(/'/g,"\\'")}')" title="Move to .trash/">🗑</button>
        </div>
      </div>
    `;
  }).join('');
}

async function openInExplorer(path) {
  try {
    const r = await fetch('/api/open?path=' + encodeURIComponent(path));
    const d = await r.json();
    if (d.error) alert('Lỗi: ' + d.error);
  } catch (e) { alert('Backend offline'); }
}

async function del(path) {
  if (!confirm(`Move '${path}' vào .trash/ ?\n(KHÔNG xóa permanent — vẫn restore được)`)) return;
  try {
    const r = await fetch('/api/delete?path=' + encodeURIComponent(path), { method: 'POST' });
    const d = await r.json();
    if (d.ok) { alert('Moved to: ' + d.trash_path); loadFiles(); }
    else alert('Lỗi: ' + (d.error || 'unknown'));
  } catch (e) { alert('Backend offline'); }
}

async function regen(path) {
  if (!confirm(`Trigger REGEN cho '${path}' ?\n(TENTATIVE — chưa wire pipeline, sẽ chỉ log)`)) return;
  try {
    const r = await fetch('/api/regen?path=' + encodeURIComponent(path), { method: 'POST' });
    const d = await r.json();
    alert(d.message || JSON.stringify(d));
  } catch (e) { alert('Backend offline'); }
}

loadFiles();
setInterval(loadFiles, 10000);
</script>
</body>
</html>
