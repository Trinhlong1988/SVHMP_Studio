<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVHMP Dashboard</title>
<style>
  :root {
    --bg-deep: #07070d;
    --bg-mid: #0f0f1c;
    --bg-soft: #15152a;
    --glass: rgba(30, 30, 50, 0.5);
    --glass-bright: rgba(50, 50, 80, 0.4);
    --border-glass: rgba(255, 255, 255, 0.08);
    --border-glow: rgba(203, 166, 247, 0.3);
    --text: #f0f0ff;
    --text-dim: #b8b8d8;
    --text-muted: #7a7a98;
    --accent: #cba6f7;
    --accent-glow: rgba(203, 166, 247, 0.5);
    --blue: #89b4fa;
    --teal: #94e2d5;
    --green: #a6e3a1;
    --peach: #fab387;
    --yellow: #f9e2af;
    --red: #f38ba8;
    --pink: #f5c2e7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(137, 180, 250, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(203, 166, 247, 0.08), transparent 50%),
      linear-gradient(180deg, var(--bg-deep), var(--bg-mid) 50%, var(--bg-deep));
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    overflow-y: auto;
    padding: 40px;
  }

  /* Subtle grid pattern overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 1400px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto auto;
    gap: 24px;
    align-content: start;
  }

  /* GLASS PANEL — base style */
  .panel {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--border-glass);
    border-radius: 24px;
    padding: 28px 32px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      inset 0 -1px 0 rgba(0, 0, 0, 0.3);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .panel:hover {
    transform: translateY(-2px);
    box-shadow:
      0 16px 48px rgba(0, 0, 0, 0.5),
      0 0 24px rgba(203, 166, 247, 0.15),
      inset 0 1px 0 rgba(255, 255, 255, 0.12);
    border-color: var(--border-glow);
  }

  /* HEADER spans full width */
  .header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 32px;
  }
  .brand {
    display: flex; align-items: baseline; gap: 16px;
  }
  .brand h1 {
    font-size: 42px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 60px rgba(203, 166, 247, 0.3);
  }
  .brand .sub {
    font-size: 18px; color: var(--text-muted); font-style: italic;
  }
  .header-pills {
    display: flex; gap: 12px;
  }
  .pill {
    padding: 10px 20px; border-radius: 24px;
    font-size: 14px; font-weight: 600;
    background: var(--glass-bright); color: var(--text-dim);
    border: 1px solid var(--border-glass);
    text-transform: uppercase; letter-spacing: 0.5px;
    backdrop-filter: blur(10px);
  }
  .pill.phase {
    background: linear-gradient(135deg, var(--accent), var(--blue));
    color: var(--bg-deep);
    border: none;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  /* EP HERO panel — left column */
  .ep-hero {
    grid-column: 1;
    grid-row: 2;
  }
  .ep-label {
    font-size: 14px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px;
  }
  .ep-num {
    font-size: 120px; font-weight: 800; line-height: 0.9;
    background: linear-gradient(180deg, var(--peach), var(--red));
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    text-shadow: 0 0 80px rgba(250, 179, 135, 0.3);
    font-variant-numeric: tabular-nums;
    margin-bottom: 16px;
  }
  .ep-num .slash, .ep-num .total {
    background: linear-gradient(180deg, var(--text-muted), var(--text-dim));
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    font-size: 64px; font-weight: 400;
  }
  .progress {
    height: 12px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 20px;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
  }
  .progress-bar {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, var(--green), var(--teal) 50%, var(--blue));
    box-shadow: 0 0 16px rgba(166, 227, 161, 0.4);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 16px; color: var(--text-dim);
    margin-top: 12px;
  }

  /* PIPELINE panel — right column */
  .pipeline-panel {
    grid-column: 2;
    grid-row: 2;
  }
  .pipeline-title {
    font-size: 16px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;
  }
  .pipeline {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .pipe-pill {
    text-align: center;
    padding: 20px 12px;
    border-radius: 16px;
    font-size: 16px; font-weight: 700;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-muted);
    border: 1px solid var(--border-glass);
    text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .pipe-pill::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.05));
    pointer-events: none;
  }
  .pipe-pill.active {
    background: linear-gradient(135deg, var(--blue), var(--accent));
    color: var(--bg-deep);
    border-color: transparent;
    box-shadow: 0 8px 24px rgba(137, 180, 250, 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    transform: scale(1.05);
  }
  .pipe-pill.done {
    background: linear-gradient(135deg, var(--green), var(--teal));
    color: var(--bg-deep);
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(166, 227, 161, 0.3);
  }

  /* STATS panel — full width row */
  .stats-panel {
    grid-column: 1 / -1;
    grid-row: 3;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
  }
  .stat {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 16px;
    padding: 20px 24px;
    border: 1px solid var(--border-glass);
    border-top: 3px solid var(--accent);
    transition: all 0.2s;
  }
  .stat:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.06); }
  .stat-label {
    font-size: 12px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px; font-weight: 600;
  }
  .stat-val {
    font-size: 36px; font-weight: 800; color: var(--text);
    line-height: 1; font-variant-numeric: tabular-nums;
  }
  .stat.arcs { border-top-color: var(--yellow); }
  .stat.arcs .stat-val { color: var(--yellow); }
  .stat.tracked { border-top-color: var(--teal); }
  .stat.tracked .stat-val { color: var(--teal); }
  .stat.bugs { border-top-color: var(--red); }
  .stat.bugs .stat-val { color: var(--red); }
  .stat.cost { border-top-color: var(--green); }
  .stat.cost .stat-val { color: var(--green); }
  .stat.round-s { border-top-color: var(--blue); }
  .stat.round-s .stat-val { color: var(--blue); }
  .stat.tags { border-top-color: var(--pink); }
  .stat.tags .stat-val { color: var(--pink); }

  /* RENDER LIVE panel — full width */
  .render-panel {
    grid-column: 1 / -1;
    grid-row: 4;
    border-color: var(--peach);
    border-width: 2px;
    background:
      linear-gradient(135deg, rgba(250, 179, 135, 0.08), rgba(243, 139, 168, 0.06)),
      var(--glass);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.4),
      0 0 40px rgba(250, 179, 135, 0.15),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  .rl-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .rl-title {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--peach), var(--red));
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    letter-spacing: 1px;
  }
  .rl-stage-badge {
    padding: 8px 16px; border-radius: 12px;
    background: var(--peach); color: var(--bg-deep);
    font-size: 14px; font-weight: 700; text-transform: uppercase;
  }
  .rl-msg {
    font-size: 18px; color: var(--text);
    font-family: 'Consolas', 'JetBrains Mono', monospace;
    margin: 12px 0; padding: 12px 16px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 8px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rl-progress {
    height: 10px; background: rgba(0, 0, 0, 0.4); border-radius: 6px;
    overflow: hidden; margin: 12px 0;
  }
  .rl-bar {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--peach), var(--red));
    box-shadow: 0 0 12px rgba(250, 179, 135, 0.6);
    transition: width 0.5s;
  }
  .rl-meta {
    font-size: 14px; color: var(--text-dim);
    display: flex; justify-content: space-between;
  }

  /* FOOTER */
  .footer {
    grid-column: 1 / -1;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px;
    color: var(--text-muted); font-size: 14px;
    border-top: 1px solid var(--border-glass);
    margin-top: 8px;
  }
  .live-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; background: var(--green);
    animation: pulse 1.8s infinite ease-in-out;
    margin-right: 10px;
    box-shadow: 0 0 12px var(--green);
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  .footer a {
    color: var(--blue); text-decoration: none;
    padding: 8px 20px; border-radius: 12px;
    background: var(--glass-bright); border: 1px solid var(--border-glass);
    font-weight: 600; backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  .footer a:hover {
    background: var(--blue); color: var(--bg-deep);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(137, 180, 250, 0.4);
  }

  /* Responsive */
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .ep-hero, .pipeline-panel { grid-column: 1; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .ep-num { font-size: 80px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="panel header">
      <div class="brand">
        <h1>SVHMP</h1>
        <span class="sub" id="channel">Hắc Dạ Ký — Chuyến xe cuối cùng về đâu</span>
      </div>
      <div class="header-pills">
        <span class="pill phase" id="phase-pill">phase</span>
        <span class="pill" id="round-pill">r—</span>
      </div>
    </div>

    <div class="panel ep-hero">
      <div class="ep-label">Current Episode</div>
      <div class="ep-num"><span id="ep-cur">—</span><span class="slash"> / </span><span class="total" id="ep-total">90</span></div>
      <div class="progress"><div class="progress-bar" id="progress-bar" style="width: 0%"></div></div>
      <div class="progress-meta">
        <span><strong id="progress-pct">0</strong>% complete</span>
        <span><strong id="ep-remaining">90</strong> ep remaining</span>
      </div>
    </div>

    <div class="panel pipeline-panel">
      <div class="pipeline-title">Pipeline State</div>
      <div class="pipeline">
        <div class="pipe-pill" data-state="GENERATED">Generate</div>
        <div class="pipe-pill" data-state="QA_PASS">QA</div>
        <div class="pipe-pill" data-state="TTS_DONE">TTS</div>
        <div class="pipe-pill" data-state="VIDEO_DONE">Video</div>
        <div class="pipe-pill" data-state="PUBLISHED">Publish</div>
        <div class="pipe-pill" data-state="ANALYTICS_LOCKED">Analytics</div>
      </div>
    </div>

    <div class="panel stats-panel">
      <div class="stats">
        <div class="stat arcs">
          <div class="stat-label">Arcs Open</div>
          <div class="stat-val"><span id="arcs-open">—</span>/<span id="arcs-total">—</span></div>
        </div>
        <div class="stat tracked">
          <div class="stat-label">Analytics</div>
          <div class="stat-val" id="analytics-eps">—</div>
        </div>
        <div class="stat bugs">
          <div class="stat-label">Bugs Fixed</div>
          <div class="stat-val" id="bugs">—</div>
        </div>
        <div class="stat cost">
          <div class="stat-label">Cost USD</div>
          <div class="stat-val" id="cost">—</div>
        </div>
        <div class="stat round-s">
          <div class="stat-label">Round</div>
          <div class="stat-val" id="round-stat">—</div>
        </div>
        <div class="stat tags">
          <div class="stat-label">Git Tags</div>
          <div class="stat-val" id="tags">—</div>
        </div>
      </div>
    </div>

    <div id="render-cmds" style="grid-column: 1 / -1;"></div>

    <!-- VNQA Library report panel -->
    <div class="panel" id="vnqa-panel" style="grid-column: 1 / -1; display:none; border-color: var(--teal);">
      <div class="rl-head">
        <div class="rl-title" style="background: linear-gradient(135deg, var(--teal), var(--blue)); -webkit-background-clip:text; background-clip:text; color:transparent;">
          📚 VNQA LIBRARY · EP<span id="vnqa-ep">?</span>
        </div>
        <div class="rl-stage-badge" id="vnqa-verdict-badge">—</div>
      </div>
      <div class="rl-msg" id="vnqa-stats">—</div>
      <div class="rl-meta" id="vnqa-issues">—</div>
    </div>

    <div class="footer">
      <span><span class="live-dot"></span>updated <span id="updated">syncing...</span></span>
      <a href="/player">🎵 Open Audio Player →</a>
    </div>
  </div>

<script>
const PIPELINE_ORDER = ['GENERATED','QA_PASS','TTS_DONE','VIDEO_DONE','PUBLISHED','ANALYTICS_LOCKED'];
let lastRenderActive = false;
let lastEp = null;

async function refresh() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();

    document.getElementById('round-pill').textContent = 'r' + (d.round || '?');
    document.getElementById('channel').textContent = (d.channel || 'SVHMP') + ' — ' + (d.series || '');
    document.getElementById('ep-cur').textContent = d.current_ep || '—';
    document.getElementById('ep-total').textContent = d.target_eps || 90;
    document.getElementById('progress-bar').style.width = (d.progress_pct || 0) + '%';
    document.getElementById('progress-pct').textContent = d.progress_pct || 0;
    document.getElementById('ep-remaining').textContent = (d.target_eps || 90) - (d.last_updated_ep || 0);
    document.getElementById('phase-pill').textContent = (d.phase || '—');

    document.getElementById('arcs-open').textContent = d.arcs_open ?? '—';
    document.getElementById('arcs-total').textContent = d.arcs_total ?? '—';
    document.getElementById('analytics-eps').textContent = d.analytics_eps_tracked ?? 0;
    document.getElementById('bugs').textContent = d.bugs_fixed_count ?? 0;
    document.getElementById('cost').textContent = '$' + (d.cost_total_usd ?? 0).toFixed(2);
    document.getElementById('round-stat').textContent = d.round ?? '—';
    document.getElementById('tags').textContent = d.git_tags_count ?? 0;

    // Auto-reload when ep advances (new gen done)
    if (lastEp !== null && d.last_updated_ep > lastEp) {
      setTimeout(() => window.location.reload(), 1500);
    }
    lastEp = d.last_updated_ep;

    const state = d.latest_ep_state || '';
    document.querySelectorAll('.pipeline .pipe-pill').forEach(p => {
      const pState = p.dataset.state;
      p.classList.remove('active', 'done');
      const stateIdx = PIPELINE_ORDER.indexOf(state);
      const pIdx = PIPELINE_ORDER.indexOf(pState);
      if (pIdx < stateIdx) p.classList.add('done');
      else if (pIdx === stateIdx) p.classList.add('active');
    });

    const now = new Date();
    document.getElementById('updated').textContent = now.toLocaleTimeString('vi-VN');
  } catch (e) {
    document.getElementById('updated').textContent = 'offline';
  }
}

async function refreshRender() {
  try {
    const r = await fetch('/api/render');
    const d = await r.json();
    const container = document.getElementById('render-cmds');

    // Auto-reload when transition active → not active
    if (lastRenderActive && !d.any_active) {
      setTimeout(() => window.location.reload(), 2000);
    }
    lastRenderActive = d.any_active || false;

    if (!d.cmds || d.cmds.length === 0) {
      container.innerHTML = '';
      return;
    }

    container.innerHTML = d.cmds.map(c => {
      const isActive = c.active;
      const lastMsg = (c.log_tail && c.log_tail.length) ? c.log_tail[c.log_tail.length-1] : '—';
      let statusBadge, borderColor, badgeColor;
      if (c.likely_crashed) {
        statusBadge = '⚠ STALE'; borderColor = 'var(--red)'; badgeColor = 'var(--red)';
      } else if (isActive) {
        statusBadge = '⚡ ACTIVE'; borderColor = 'var(--peach)'; badgeColor = 'var(--peach)';
      } else if (c.success) {
        statusBadge = '✓ DONE'; borderColor = 'var(--green)'; badgeColor = 'var(--green)';
      } else {
        statusBadge = '✗ FAIL'; borderColor = 'var(--red)'; badgeColor = 'var(--red)';
      }
      const stage = c.stage || '—';
      const msg = c.likely_crashed ? `⚠ STALE — no update ${c.stale_seconds}s` : lastMsg;
      return `
        <div class="panel render-panel" style="border-color:${borderColor}; margin-bottom:16px;">
          <div class="rl-head">
            <div class="rl-title" style="color:transparent; background:linear-gradient(135deg,${badgeColor},var(--red)); -webkit-background-clip:text; background-clip:text;">
              ${statusBadge} · ${c.cmd} · EP${c.ep}
            </div>
            <div class="rl-stage-badge" style="background:${badgeColor};">${stage}</div>
          </div>
          <div class="rl-msg">${msg}</div>
          <div class="rl-progress"><div class="rl-bar" style="width:${c.progress_pct || 0}%; background:linear-gradient(90deg,${badgeColor},var(--red));"></div></div>
          <div class="rl-meta">
            <span>step <strong>${c.step || 0}</strong>/<strong>${c.total_steps || 0}</strong> · pid ${c.pid || '?'}</span>
            <span><strong>${c.progress_pct || 0}</strong>% · ${isActive ? 'ETA <strong>' + (c.eta_seconds ?? '—') + '</strong>s' : 'elapsed <strong>' + (c.elapsed_seconds ?? '—') + '</strong>s'}</span>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {}
}

async function refreshVNQA() {
  try {
    const r = await fetch('/api/vnqa');
    const d = await r.json();
    const panel = document.getElementById('vnqa-panel');
    if (!d._available) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    document.getElementById('vnqa-ep').textContent = d.ep_number || '?';
    const verdict = d.verdict || '—';
    const badge = document.getElementById('vnqa-verdict-badge');
    badge.textContent = verdict;
    const color = verdict === 'PASS' ? 'var(--green)' : (verdict === 'WARN' ? 'var(--yellow)' : 'var(--red)');
    badge.style.background = color;
    panel.style.borderColor = color;
    const stats = d.stats || {};
    document.getElementById('vnqa-stats').textContent =
      `tokens=${stats.tokens_count} adv_ratio=${(stats.adverbs_ratio*100).toFixed(1)}% sentences=${stats.sentences_approx}`;
    const counts = d.issues_count_by_severity || {};
    document.getElementById('vnqa-issues').innerHTML =
      `<span>critical: <strong>${counts.critical||0}</strong></span>` +
      `<span>warning: <strong>${counts.warning||0}</strong></span>` +
      `<span>minor: <strong>${counts.minor||0}</strong></span>`;
  } catch (e) {}
}

refresh();
refreshRender();
refreshVNQA();
setInterval(refresh, 3000);
setInterval(refreshRender, 1000);   // poll faster — 1s when rendering
setInterval(refreshVNQA, 5000);     // VNQA static — poll 5s
</script>
</body>
</html>
