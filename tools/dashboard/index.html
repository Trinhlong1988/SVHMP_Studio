<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=300, initial-scale=1">
<title>SVHMP Mini</title>
<style>
  /* Catppuccin Mocha */
  :root {
    --base: #1e1e2e;
    --mantle: #181825;
    --crust: #11111b;
    --surface0: #313244;
    --surface1: #45475a;
    --text: #cdd6f4;
    --subtext1: #bac2de;
    --subtext0: #a6adc8;
    --overlay0: #6c7086;
    --mauve: #cba6f7;
    --pink: #f5c2e7;
    --red: #f38ba8;
    --maroon: #eba0ac;
    --peach: #fab387;
    --yellow: #f9e2af;
    --green: #a6e3a1;
    --teal: #94e2d5;
    --sky: #89dceb;
    --blue: #89b4fa;
    --lavender: #b4befe;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 300px; height: 300px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--crust) 0%, var(--base) 60%, var(--mantle) 100%);
    color: var(--text);
    font-size: 11px;
    line-height: 1.3;
    padding: 8px;
    user-select: none;
  }

  /* Header */
  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .hdr .title {
    font-size: 11px;
    font-weight: 600;
    color: var(--mauve);
    letter-spacing: 0.5px;
  }
  .hdr .round {
    font-size: 9px;
    color: var(--overlay0);
    background: var(--surface0);
    padding: 1px 6px;
    border-radius: 8px;
  }

  /* Channel + Series */
  .channel {
    font-size: 9px;
    color: var(--subtext0);
    margin-bottom: 6px;
    text-align: center;
    font-style: italic;
  }

  /* EP Big number */
  .ep-block {
    text-align: center;
    margin: 4px 0 6px;
    padding: 6px 4px;
    background: linear-gradient(180deg, var(--surface0) 0%, transparent 100%);
    border-radius: 6px;
  }
  .ep-label {
    font-size: 8px;
    color: var(--overlay0);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .ep-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--peach);
    line-height: 1;
    margin: 1px 0;
    font-variant-numeric: tabular-nums;
  }
  .ep-num .slash { color: var(--overlay0); font-weight: 400; font-size: 16px; }
  .ep-num .total { color: var(--subtext0); font-size: 16px; }

  /* Progress bar */
  .progress {
    height: 4px;
    background: var(--surface0);
    border-radius: 2px;
    overflow: hidden;
    margin: 4px 0;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--teal) 50%, var(--sky) 100%);
    transition: width 0.5s;
    border-radius: 2px;
  }
  .progress-pct {
    font-size: 9px;
    color: var(--subtext0);
    text-align: right;
  }

  /* Pipeline pills */
  .pipeline {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 2px;
    margin: 8px 0 4px;
  }
  .pill {
    font-size: 7px;
    text-align: center;
    padding: 2px 0;
    border-radius: 3px;
    background: var(--surface0);
    color: var(--overlay0);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .pill.active { background: var(--blue); color: var(--base); font-weight: 600; }
  .pill.done { background: var(--green); color: var(--base); }

  /* Stats grid */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-top: 4px;
  }
  .stat {
    background: var(--surface0);
    border-radius: 4px;
    padding: 4px 6px;
    border-left: 2px solid var(--lavender);
  }
  .stat-label {
    font-size: 7px;
    color: var(--overlay0);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-val {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .stat.arcs { border-left-color: var(--yellow); }
  .stat.arcs .stat-val { color: var(--yellow); }
  .stat.bugs { border-left-color: var(--red); }
  .stat.bugs .stat-val { color: var(--red); }
  .stat.cost { border-left-color: var(--green); }
  .stat.cost .stat-val { color: var(--green); }
  .stat.tracked { border-left-color: var(--teal); }
  .stat.tracked .stat-val { color: var(--teal); }
  .stat.tags { border-left-color: var(--pink); }
  .stat.tags .stat-val { color: var(--pink); }

  /* Footer */
  .ftr {
    position: absolute;
    bottom: 4px;
    left: 8px;
    right: 8px;
    font-size: 7px;
    color: var(--overlay0);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .live-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    margin-right: 3px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .phase-chip {
    background: var(--mauve);
    color: var(--base);
    padding: 1px 5px;
    border-radius: 6px;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 7px;
  }
</style>
</head>
<body>
  <div class="hdr">
    <div class="title">SVHMP <span id="phase-inline" class="phase-chip">—</span></div>
    <div class="round" id="round">r—</div>
  </div>
  <div class="channel" id="channel">Hắc Dạ Ký — Chuyến xe...</div>

  <div class="ep-block">
    <div class="ep-label">Current Episode</div>
    <div class="ep-num"><span id="ep-cur">—</span><span class="slash">/</span><span class="total" id="ep-total">90</span></div>
  </div>

  <div class="progress">
    <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
  </div>
  <div class="progress-pct"><span id="progress-pct">0</span>% of 90 ep</div>

  <div class="pipeline">
    <div class="pill" data-state="GENERATED">GEN</div>
    <div class="pill" data-state="QA_PASS">QA</div>
    <div class="pill" data-state="TTS_DONE">TTS</div>
    <div class="pill" data-state="VIDEO_DONE">VID</div>
    <div class="pill" data-state="PUBLISHED">PUB</div>
    <div class="pill" data-state="ANALYTICS_LOCKED">ANL</div>
  </div>

  <div class="stats">
    <div class="stat arcs">
      <div class="stat-label">Arcs Open</div>
      <div class="stat-val"><span id="arcs-open">—</span>/<span id="arcs-total">—</span></div>
    </div>
    <div class="stat tracked">
      <div class="stat-label">Analytics Eps</div>
      <div class="stat-val" id="analytics-eps">—</div>
    </div>
    <div class="stat bugs">
      <div class="stat-label">Bugs Fixed</div>
      <div class="stat-val" id="bugs">—</div>
    </div>
    <div class="stat cost">
      <div class="stat-label">Cost USD</div>
      <div class="stat-val" id="cost">—</div>
    </div>
  </div>

  <div class="ftr">
    <span><span class="live-dot"></span><span id="updated">syncing...</span></span>
    <span class="stat tags"><span id="tags">—</span> tags</span>
  </div>

<script>
const PIPELINE_ORDER = ['GENERATED','QA_PASS','TTS_DONE','VIDEO_DONE','PUBLISHED','ANALYTICS_LOCKED'];

async function refresh() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();

    document.getElementById('round').textContent = 'r' + (d.round || '?');
    document.getElementById('channel').textContent = d.channel + ' — ' + (d.series || '');
    document.getElementById('ep-cur').textContent = d.current_ep || '—';
    document.getElementById('ep-total').textContent = d.target_eps || 90;
    document.getElementById('progress-bar').style.width = (d.progress_pct || 0) + '%';
    document.getElementById('progress-pct').textContent = d.progress_pct || 0;
    document.getElementById('phase-inline').textContent = (d.phase || '—').substring(0,8);

    document.getElementById('arcs-open').textContent = d.arcs_open ?? '—';
    document.getElementById('arcs-total').textContent = d.arcs_total ?? '—';
    document.getElementById('analytics-eps').textContent = d.analytics_eps_tracked ?? 0;
    document.getElementById('bugs').textContent = d.bugs_fixed_count ?? 0;
    document.getElementById('cost').textContent = '$' + (d.cost_total_usd ?? 0).toFixed(2);
    document.getElementById('tags').textContent = d.git_tags_count ?? 0;

    // Pipeline pills: mark active based on latest_ep_state
    const state = d.latest_ep_state || '';
    document.querySelectorAll('.pipeline .pill').forEach(p => {
      const pState = p.dataset.state;
      p.classList.remove('active', 'done');
      const stateIdx = PIPELINE_ORDER.indexOf(state);
      const pIdx = PIPELINE_ORDER.indexOf(pState);
      if (pIdx < stateIdx) p.classList.add('done');
      else if (pIdx === stateIdx) p.classList.add('active');
    });

    const now = new Date();
    document.getElementById('updated').textContent = now.toTimeString().substring(0,5) + ' • live';
  } catch (e) {
    document.getElementById('updated').textContent = 'offline';
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
