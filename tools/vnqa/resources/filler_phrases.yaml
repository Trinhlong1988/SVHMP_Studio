# VNQA — Vietnamese filler phrases
# Lock date: 2026-06-26

schema_version: 1
description: Vietnamese filler/transition phrases that AI tends to overuse.

always_delete:
  - "Trong khi đó,"
  - "Mặt khác,"
  - "Đáng chú ý,"
  - "Đáng kể,"
  - "Cần lưu ý rằng"
  - "Có một điều đặc biệt là"
  - "Thực ra,"
  - "Nói chung,"
  - "Một cách nào đó,"
  - "Thật vậy,"
  - "Quả thật,"
  - "Phải thừa nhận rằng"

academic_filler_avoid_narrative:
  - "đầu tiên là"
  - "thứ hai là"
  - "cuối cùng là"
  - "tóm lại"
  - "kết luận rằng"
  - "có thể thấy"
  - "rõ ràng là"
  - "không thể phủ nhận"

speech_filler_allowed_podcast_only:
  - "ờm"
  - "à"
  - "ý là"
  - "kiểu"
  - "thì"
  - "đó"
  - "nhỉ"

genre_overrides:
  news_broadcast:
    allowed: ["Mặt khác,", "Trong khi đó,", "Tóm lại"]
  podcast_casual:
    allowed_speech_filler: true
    max_per_ep: 15
  horror_narrative:
    forbidden_all_filler: true   # SVHMP strict
  novel_literary:
    forbidden_academic_filler: true
    allowed_narrative_transition: true
