# VNQA — Horror narrative genre (SVHMP-style)
# Lock date: 2026-06-26

inherits: _base
schema_version: 1
genre_id: horror_narrative
purpose: "Vietnamese ghost story TTS narration (SVHMP Hắc Dạ Ký)"
project_examples: [SVHMP, "future ghost story channels"]

thresholds:
  adverb_ratio_max: 0.15       # horror cần mood adverb (lặng lẽ, khẽ, từ từ)
  idiom_max_per_ep: 2           # idiom 1x OK, 2+ = cliché overuse
  sentence_len_max_words: 40    # mix short tense + long flow OK
  token_repeat_min: 3
  bigram_repeat_per_sentence: 2

required_tone:
  - melancholy
  - subtle_haunting
  - unresolved_emotional

forbidden_tone:
  - jump_scare_explicit         # SVHMP NEVER_7 rule
  - comedic_relief
  - villain_ghost_aggressive    # SVHMP NEVER ma ác
  - gore_explicit               # SVHMP NEVER gore

word_density_overrides:
  # Horror genre lỏng hơn cho mood words
  mood_words_max: 8             # "khẽ", "lặng lẽ", "thoáng" tổng 8x/ep OK
  silence_descriptors: 5        # "im lìm", "tĩnh lặng" OK
  body_sensation: 4             # "tóc gáy", "cổ lạnh" OK

cross_ref:
  - bible/00_constitution.yaml (ALWAYS_5 / NEVER_7 / GHOST_RULES)
  - bible/22_anti_slop_vi.yaml (32 hiến pháp R1-R32 cross-ref)
  - prompts/qa.md PHASE 12.0-12.19

notes:
  - SVHMP đã có bible/22 manual list — VNQA augment, KHÔNG replace
  - Genre profile chỉ override thresholds, KHÔNG override 32 hiến pháp
  - Khi conflict: 32 hiến pháp wins (cross_ref bible/00 immutable)
