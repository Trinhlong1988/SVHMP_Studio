# VNQA — News broadcast genre (tin tức / thời sự)
# Lock date: 2026-06-26 (template — chưa có project user)

inherits: _base
schema_version: 1
genre_id: news_broadcast
purpose: "Vietnamese news/current affairs broadcast script (TTS-ready)"
project_examples: ["VTV-style", "podcast tin tức", "morning news"]

thresholds:
  adverb_ratio_max: 0.08        # news strict — minimal subjective adverb
  passive_voice_max: 0.20       # passive OK formal
  formality_min_score: 0.7      # FORMAL required
  sentence_len_max_words: 35
  token_repeat_min: 4           # news repeat numbers/names OK
  idiom_max_per_ep: 0           # NO idiom — news factual only

required_tone:
  - formal
  - objective
  - factual

forbidden_tone:
  - subjective_emotion          # KHÔNG bias
  - colloquial_slang
  - personal_opinion
  - melancholy                  # KHÔNG narrative mood

word_density_overrides:
  # News allow technical terms + named entities
  named_entities_unlimited: true
  technical_jargon_max: 10
  source_attributions_required: true  # "theo X", "nguồn Y" mandatory

forbidden_words_extra:
  - "tin đồn"                   # avoid speculation
  - "có vẻ"                     # avoid hedging in news (subjective)
  - "có lẽ"
  - "dường như"

cross_ref:
  - Vietnamese journalism style guide (TBD)
  - VLSP shared task news corpus baseline
