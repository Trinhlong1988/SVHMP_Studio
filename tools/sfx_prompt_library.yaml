# ============================================================
# WORKFLOW NOTES
# ============================================================

workflow:
  ab_test_protocol:
    - "Mỗi asset gen 5 seed: [42, 1337, 7777, 20260624, random]"
    - "Mr.Long nghe qua webui port 7867 → pick 1"
    - "Em update entry: status=APPROVED + approved_seed=X + approved_date=YYYY-MM-DD"
    - "Sau approve: sfx_acquire.py có thể reproduce identical"

  hard_lock_rule:
    - "Status=APPROVED → entry IMMUTABLE"
    - "Đổi prompt/seed sau approve = breaking change, phải bump version"
    - "Áp feedback_validated_params_no_drift.md"

  duration_extension:
    - "SAO max 47s native"
    - "Asset >47s (vd bus_engine 60s) → gen 30s seamless + ffmpeg aloop"
    - "Asset 30-47s → gen native"

  vram_protocol:
    - "Trước khi gen: free VRAM ≥ 8GB"
    - "Nếu IndexTTS2 port 7861 đang load → stop trước (taskkill PID hoặc stop service)"
    - "Sau gen batch: có thể restart IndexTTS2"
