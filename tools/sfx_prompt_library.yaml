    target_lufs: -22
    target_sr: 44100
    channels: stereo
    seamless_loop: true
    prompt: "light gentle rain falling on rooftop, soft steady patter, distant ambient, no thunder, no wind gust, mellow continuous texture, intimate cozy night atmosphere"
    negative_prompt: "thunder, heavy storm, wind gust, lightning crack, dog bark, voices, music, melody, drums"
    num_inference_steps: 120
    guidance_scale: 7.0
    seed: -1
    approved_seed: null
    status: draft
    note: "loop seamless quan trọng — ưu tiên seed cho audio không có 'hole' đầu/cuối"

