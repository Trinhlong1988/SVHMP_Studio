# SVHMP — SFX Prompt Library cho Stable Audio Open
# Mapping từ bible/05_audio_bible + bible/17_sfx_acquisition_pipeline → SAO prompts
# Tuân thủ bible/00_constitution: NEVER jump_scare_spam / NEVER gore / GHOST_RULES
#
# Workflow:
#   1. Em pre-fill prompt theo bible/05 spec + forbidden_qualities bible/17
#   2. Mr.Long A/B test 5 seed cho mỗi asset qua webui port 7867
#   3. Mr.Long pick best seed → em update entry này với approved_seed + approved_date
#   4. `sfx_acquire.py` đọc file này khi gen → reproducible
#
# Status legend:
#   draft       — em pre-fill, chưa Mr.Long test
#   testing     — Mr.Long đang A/B
#   APPROVED    — Mr.Long chốt seed, IMMUTABLE
#
# IMPORTANT: SAO native max 47s. Asset >47s phải gen multiple + crossfade loop.

version: 1.0
created: 2026-06-24
engine: stable_audio_open_1.0
sample_rate_native: 44100
channels_native: stereo
defaults:
  num_inference_steps: 100
  guidance_scale: 7.0
  negative_prompt_base: "harsh attack, sudden spike, jump scare, distortion, vocals, drums, percussion, beat, fast tempo, electronic, synth lead"

# ============================================================
# AMBIENCE LOOPS (chạy suốt tập)
# ============================================================

assets:

