name: SVHMP CI Gate

# Server-side CI (deep-audit 2/7, PACK3): dong lo hong "git hook client-side co
# the INERT" (hooksPath rong / MinGit / may chua bootstrap -> commit hong tung lot
# len origin). GitHub cuong che gate BAT KE trang thai hook cua tung may.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (skip LFS — gate khong can audio)
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0   # promotion_guard can lich su de diff before..after

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps (gate + regression; librosa = voice-QA tools R188-R191)
        run: python -m pip install --upgrade pip pyyaml pytest numpy soundfile librosa

      - name: PROMOTION GUARD server-side (chan lock/tag lach --no-verify)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: python tools/promotion_guard.py --base ${{ github.event.before }} --head ${{ github.sha }}

      - name: CI GATE (registry 0/0/0 + regression pytest)
        run: python tools/ci_gate.py
