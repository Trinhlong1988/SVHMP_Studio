# 04_ASSET_BIBLE — visual + audio masters lock. Cross-ep consistency.
# Extract từ SVHMP-RC3.2 asset_bible + asset_registry block.
# Khi gen asset thật → compute sha256 → lock manifest. Hiện placeholder.
