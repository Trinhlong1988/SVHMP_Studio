# ============================================================
# USAGE RULES
# ============================================================

selection_rules:
  - Generator pre-write: load setting_library + state.setting_history (last 6 ep — distance 6)
  - filter: NOT in last 6 ep
  - pair: match pillar + mood_bias + pairable_archetypes
  - apply: setting_library entry → color_palette_shift áp Video V3 + sfx_layer áp TTS M3

variety_constraint:
  - mỗi 10 ep batch phải có ≥4 setting khác category (weather/lighting/seasonal/location)
  - cấm 3 ep liền cùng category
  - mưa_nho (default) max 4/10 ep — phải break bằng setting khác

seasonal_cluster_rule:
  - setting_can_tet + setting_dem_giao_thua: cluster ep 25-30 (S1 Tết arc) + ep 85-90 (S3 Tết arc)
  - setting_ram_thang_bay: cluster ep 55-58 hoặc ep 75-78 (Vu Lan arc)
  - setting_dau_xuan: ep 5-10 (warm intro) hoặc ep 85-90 (closure positive)
  - setting_dong_lanh: ep 25-35 (winter HN) hoặc ep 60-70 (winter aftermath)

cross_module_query:
  generator: pick setting → ghi vào episode.md HOOK + SETUP
  qa_lock: PHASE 12.3 (emotion rotation) cross-check mood_bias khớp aftertaste
  tts_director: M3 silence_model + M4 SFX ducking load setting.sfx_layer
  video_director: V3 camera_timeline.color_grading áp color_palette_shift
  publisher: P1 SEO description có thể mention setting ("đêm mưa Hà Nội" cho keyword)
