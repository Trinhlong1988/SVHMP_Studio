# ============================================================
# EP73 PIVOT (Agent 3 critical — break formula)
# ============================================================

ep_73_pivot:
  type: "PIVOT — break formula"
  length: "22 minutes extended (vs 15 standard)"
  no_passenger: true  # Khải Phong rides alone
  word_count_target: 3500
  structure:
    HOOK: "Khải Phong wake on bus — no passenger boarding"
    SETUP: "Bác tài liếc gương — 'Đêm nay khác.' Khải Phong feel something off"
    INCIDENT: "Bác tài speaks more than 2 lines — first time in 72 EPs"
    REVEAL: |
      M14 + M15 = Khải Phong nhận ra mình đã CHẾT đêm Hạ Vy tai nạn xe máy.
      Bác tài driver = oracle limbo.
      Khải Phong = ghost passenger collecting souls.
      Đã 73 đêm = 73 năm trong cõi giữa?
    PAYOFF: "Khải Phong chọn TIẾP TỤC — vì chưa gặp Hạ Vy"
    CLIFFHANGER: "Bác tài: 'Con đã nhớ ra chưa?' Khải Phong: 'Tôi đã.' Bác tài: 'Vậy nửa hành trình mới bắt đầu.'"
  cross_ref: "Magnus Archives S3 finale pattern"

