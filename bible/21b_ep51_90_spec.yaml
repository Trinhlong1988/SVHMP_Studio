# ============================================================
# EP90 FINALE (Agent 3 critical — full reveal)
# ============================================================

ep_90_finale:
  type: "FINALE — full reveal Hạ Vy"
  length: "25 minutes extended"
  word_count_target: 4000
  structure:
    HOOK: "Đêm thứ chín mươi. Cabin lạnh hơn mọi đêm"
    SETUP: "Bác tài driver — 'Hôm nay là chuyến cuối, hay là chuyến đầu, là ở con.'"
    INCIDENT: "Cô gái lên xe. Tóc cột cao. Áo gió xanh. Khải Phong nhận ra — Hạ Vy."
    REVEAL: |
      M18 — Hạ Vy đã chờ Khải Phong 73 đêm.
      Cô được lựa chọn: lên chuyến xe này (release Khải Phong) hoặc đợi tiếp (Khải Phong forever loop).
      Hạ Vy chọn lên.
    PAYOFF: "Khải Phong + Hạ Vy ngồi cạnh ghế bảy + ghế tám. Bác tài: 'Lần này con đem ai?' Khải Phong: 'Con đem chính con.'"
    CLIFFHANGER_AMBIGUOUS: |
      Chuyến xe đi vào sương.
      Khán giả không biết Khải Phong fade hay xe vẫn chạy.
      Ngạn-style: "đến giờ vẫn chưa ai biết chuyến xe ấy còn chạy hay không."

# ============================================================
# CHAPTER_CONTRACT SCHEMA (kentjuno pattern — per-EP verification)
# ============================================================

chapter_contract_schema:
  description: "Per-EP verification contract — kill plot holes, enforce arc continuity, lock emotion target"

  required_fields:
    required_beats:
      type: list[string]
      example: ["passenger_intro", "ghost_manifest_audio_first", "memory_M9_trigger", "kết_lửng_triết_lý"]
      audit: "fail if missing"

    forbidden_moves:
      type: list[string]
      example: ["resolution_too_early", "2_ghosts_in_1_EP", "Hạ_Vy_direct_voice_before_EP82", "Khải_Phong_aware_of_limbo_before_EP73"]
      audit: "fail if present"

    continuity_checks:
      type: list[string]
      example:
        - "Khải_Phong_object_count_cumulative == cumulative_S1_50 + EP51_to_current"
        - "Hạ_Vy_mentions_per_EP <= 3 (S2A) | <= 5 (S2B)"
        - "Driver_lines_count == 2 OR (milestone AND <= 4)"

    emotion_target:
      type: string
      example: "REVEAL peak melancholic 0.55 + afraid 0.15"

    payoff_points:
      type: list[string]
      example: ["EP50_callback_lakebai_setting", "M9_trigger_via_passenger_grief"]

    hook_goal:
      type: string
      example: "EP52 teaser via radio music shift OR object left on seat OR unresolved Khải Phong reaction"

