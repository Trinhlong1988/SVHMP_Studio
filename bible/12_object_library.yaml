# ============================================================
# USAGE RULES
# ============================================================

selection_rules:
  - Generator pre-write: load object_library + state.object_history (last 15 ep)
  - filter: object NOT in last_used within same_object_distance (10 ep per bible/08)
  - pair: chosen object MUST be in pairable_pillars + pairable_archetypes intersect
  - pick: prefer highest emotional_value × novelty_score
  - update: after ep ship, increment used_count + set last_used_ep + state.object_history

emotional_value_distribution_per_season:
  season_1 (ep 1-30): avg emotional_value 0.65-0.80 (warm establishing)
  season_2 (ep 31-60): avg 0.75-0.90 (depth increase)
  season_3 (ep 61-90): avg 0.85-0.95 (climax — high impact objects)

forbidden_objects:
  - vũ khí (dao, súng, gậy) — soul drift
  - máu / xác / quan tài chi tiết
  - drugs / rượu (chỉ context, không object central)
  - sex toys / lingerie chi tiết
  - tài sản giá trị cao (xe hơi, vàng miếng) — không relatable middle class

video_render_pairing:
  - Mỗi OBJ_ có corresponding render prompt template (V4 asset_registry)
  - Color palette match brand: warm wood / faded fabric / dim metal
  - Lighting: rim light từ lamp_v01 (warm yellow)
  - DOF: f/2.0 background blur

cross_module_query:
  generator: pick object → ghi vào episode.md INCIDENT section
  qa_lock: PHASE 12.4 (regret) + 12.5 (relationship) cross-check pairable
  video_director: V4 asset_registry includes object_one_shot from this library
  publisher: P3 description tease có thể quote object name
  novelty_hash (bible/08 round 13 upgrade): object as 1 of 7 hash dimensions
