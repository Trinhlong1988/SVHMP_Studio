# PHÂN BIỆT với beat_3 baseline (đoạn độc thoại leo thang trong CLIFFHANGER, section 6,
# LUÔN xuất hiện ở cả 40/40 tập, đã được R42/R55 công nhận từ 27/6/2026 — KHÔNG phải cơ chế
# mới, chỉ là chỗ bible/03 chưa trỏ sang).
extra_beat_HOOK:
  eps: [12, 15, 20, 25, 30, 35, 40, 45, 50]
  formula: "PEAK-of-M-block HOẶC lần đầu giới thiệu cơ chế (EP12 — ngoại lệ DUY NHẤT, KHÔNG
    phải PEAK của M3 nhưng là lần đầu cơ chế 'đếm thêm' xuất hiện trong toàn mạch, tự nhận
    trong frontmatter 'driver extra line'). Công thức khớp 9/9 trường hợp đã biết trong dữ
    liệu đã đọc (EP11-50) — KHÔNG có ngoại lệ khác."
  evidence: "output/ep_12/episode.md dòng 57 ('Đêm thứ mười hai — Khải Phong đếm thêm') xác
    nhận EP12 là lần đầu cơ chế đêm-đếm-thêm xuất hiện, khớp ghi chú sẵn có trong
    governance/proposals/bible03_driver_memory_arc_proposal.yaml#bang_arc_40_tap. 8/9 tập còn
    lại (EP15/20/25/30/35/40/45/50) đều đúng PEAK cuối khối M-level tương ứng (xem
    quang_memory_arc.M3..M10 phía trên, field `peak` trong bang_arc_40_tap)."
  vi_tri: "HOOK (section 1) — TRƯỚC khi xe đón khách. KHÁC với beat_3 baseline (CLIFFHANGER,
    section 6) và KHÁC với beat_2 payoff (REVEAL section, passenger trigger)."
  cross_ref: "bible/00_constitution.yaml#R42_driver_foreshadow_line_allowed_cliffhanger
    allowed_format thứ 3 (bổ sung 2026-07-12) + R55_driver_R42_strict_enforce +
    tools/audit_hidden_bugs.py (enforcer driver_extra_overuse, mở rộng 2026-07-12 để nhận
    diện extra_beat_HOOK riêng khỏi baseline CLIFFHANGER)."
  note: "9 tập trong danh sách CÓ 2 câu thoại 'thừa' (1 HOOK + 1 CLIFFHANGER) thay vì 1 —
    ĐÚNG THIẾT KẾ, không phải vi phạm R55 lặp."

