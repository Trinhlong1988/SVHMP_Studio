# 06_LEXICAL_STYLE — từ vựng Ngọc Ngạn lock + diction prefer/forbid.
# Extract từ SVHMP-RC3.2 lexical_style_ngocngan block.
# Quyết định 5s nghe biết Ngọc Ngạn vs GPT/Claude/Gemini generic.

# SIGNATURE PHRASES — bắt buộc ≥7/ep
version: 1.0
lock_date: 2026-06-19

signature_phrases:
  uncertainty:                     # ≥4 câu/ep
    - "Hình như..."
    - "Có lẽ..."
    - "Không hiểu sao..."
    - "Chẳng biết tự bao giờ..."
    - "Hồi đó tôi vẫn nghĩ..."
    - "Tôi cũng không rõ..."
  recall:                          # ≥3 câu/ep
    - "Tôi vẫn còn nhớ..."
    - "Mãi về sau tôi mới biết..."
    - "Đến tận bây giờ..."
    - "Hôm đó..."
    - "Năm ấy..."
    - "Có một đêm..."
    - "Lâu lắm rồi, từ cái dạo..."
  revelation:                      # beat_3/beat_4
    - "Không ai ngờ..."
    - "Trớ trêu thay..."
    - "Lạ một điều..."
    - "Cứ tưởng..."
    - "Thì ra..."
    - "Mãi sau này tôi mới hiểu..."
  closing:                         # beat_5 dư âm
    - "Và rồi..."
    - "Vậy mà..."
    - "Chỉ còn lại..."
    - "Không còn ai..."
    - "Đến giờ, tôi vẫn..."

# DICTION — chọn từ
diction_preferences:
  prefer:
    - {bad: "hồi tưởng", good: "nhớ"}
    - {bad: "u sầu", good: "buồn"}
    - {bad: "luyến tiếc", good: "tiếc"}
    - {bad: "đêm tối", good: "đêm khuya"}
    - {bad: "trầm tư", good: "ngồi im"}
    - {bad: "ký ức", good: "chuyện cũ"}
    - {bad: "thuở ấy", good: "hồi đó"}
    - {bad: "kẻ khác", good: "người ta"}
    - {bad: "vốn dĩ", good: "đáng lẽ"}
    - {bad: "vì lý do gì đó", good: "không hiểu sao"}

  forbidden:                       # 0 hit per ep
    - "tuy nhiên"                  # → dùng "nhưng"
    - "vì vậy"                     # → "thế nên" hoặc bỏ
    - "đồng thời"                  # → "cùng lúc"
    - "thực tế là"                 # → "thật ra"
    - "có thể thấy rằng"           # → xóa
    - "điều đáng nói"              # → xóa
    - "đáng chú ý là"              # → xóa
    - "cụ thể là"                  # → "tức là"
    - "trong khi đó"               # → "còn"
    - "mặc dù vậy"                 # → "thế mà"
    # các từ Hán-Việt nặng: tịch mịch, u uất, ai oán, thê lương, khuya khoắt (đã ở negative_constraints #9)

# SENTENCE OPENERS — ≥30% câu mở
sentence_openers:
  prefer:
    - "Đêm đó..."
    - "Hôm ấy..."
    - "Cụ Tám..."                  # tên + động từ ngay
    - "Ngoài cửa..."
    - "Trên ghế..."
    - "Bác tài..."
  forbidden:
    - "Trong khi..."               # dài, dịch máy
    - "Tuy là..."
    - "Bởi vì..."
    - "Để mà..."
    - "Nói thật là..."
    - "Phải nói rằng..."

# VOICE TICS — quirks định danh
voice_tics:
  pause_word:                      # giữa beat
    - "...và..."
    - "...rồi..."
    - "...thế là..."
    - "...vậy mà..."
  echo_pattern:                    # lặp 1 từ cho dư âm
    - "Rất lâu. Lâu lắm."
    - "Im lặng. Im đến mức..."
    - "Một mình. Một mình thật sự."
  rhetorical_question:             # không trả lời
    - "Ai biết được?"
    - "Có gì lạ đâu?"
    - "Mấy ai còn nhớ?"
    - "Liệu có muộn không?"

# COMPLIANCE MEASURE (per ep — track in ledger)
compliance_targets:
  signature_phrase_total: 7
  uncertainty_min: 4
  recall_min: 3
  revelation_min: 1
  closing_min: 1
  forbidden_hits_max: 0
  preferred_opener_ratio_min: 0.30
  voice_tic_min: 2

# REGEN trigger
regen_on_drift:
  forbidden_hit: rewrite_narration_only       # rewrite chỗ hit
  signature_under_7: add_to_REVEAL_PAYOFF_CLIFFHANGER  # KHÔNG động HOOK
  opener_under_30pct: rewrite_5_to_7_openers
