rule_R_SUPREME_workflow_lock:
  description: |
    Hiến pháp tối thượng cho mọi Tier/Phase trong dự án này (và các dự án tương tự).

    Bệnh PHẢI tránh: "Build -> Build -> Build" (xây thêm công cụ
    nhưng chưa chứng minh công cụ hiện tại đã giải quyết vấn đề thực tế).

    Workflow ĐÚNG cứng:

       Build
        ↓
       Unit Test
        ↓
       Regression Test
        ↓
       Production Validation
        ↓
       Freeze
        ↓
       Git Tag

       (CHỈ sau Tag mới được Build Tier tiếp theo)
  severity: TỐI_THƯỢNG  # Supreme — outranks all other rules
  authority: Mr.Long
  authority_source: docx "New Microsoft Word Document (2).docx" 30/6 21:30
  enforcement_level: ABSOLUTE
  exception_policy: ZERO

  tier_sequencing_lock:
    rule: "Không mở Tier N+1 cho đến khi Tier N hoàn thành chu trình Build->Test->Validate->Freeze->Tag"
    examples:
      - "Tier 2.2 (Vietnamese Language Layer) FROZEN until Tier 2.1 Golden Audio cert + Git Tag v2.1.0"
      - "Tier 2.5 (SSOT migration) FROZEN until Tier 2.1 cert"
      - "Tier 3.x FROZEN until Tier 2.x cert"

  forbidden_patterns:
    - "Build new feature trước khi verify existing feature hoạt động"
    - "Codify rule mới mà chưa có unit test + regression cho rule cũ"
    - "Spawn parallel build streams (multiple tiers in flight)"
    - "Threshold tune trên data chưa cert Golden (xem R195)"
    - "Lift any production lock without explicit Mr.Long approve"

  mandatory_cycle_per_tier:
    1_build: "Implement feature according to spec"
    2_unit_test: "Per-module tests covering invariants + edge cases"
    3_regression_test: "10-round regression with full metrics (PASS/FAIL counts, F1)"
    4_production_validation: "Run on real production input + STRICT PROTOCOL report"
    5_artifact_audit: "Verify all generated files match spec + sha256 lock where applicable"
    6_mr_long_review: "Mr.Long reads report + listens (audio) + approves"
    7_freeze: "Lock thresholds, schemas, sha256 in bible/* files"
    8_git_tag: "git tag -a tierX.Y.Z -m '...' — creates immutable snapshot"

  current_state_30_06:
    active_tier: "Tier 2.1 closeout"
    blocked_until_tier_2_1_freeze:
      - "Tier 2.2 (R193 vn_style_db) — BUILT but FROZEN_FOR_FUTURE"
      - "Tier 2.5 SSOT (R194 build_specs_from_episode) — BUILT but FROZEN_FOR_FUTURE"
    workflow_step_now: "2_unit_test + 3_regression_test for Voice QA tools"
    next_blocked_until_approval:
      - "Render EP01 (Step 4_production_validation requires Mr.Long lift render lock)"
      - "Golden Audio cert (Step 6 awaits successful render + listen)"

  meta_rule:
    statement: "This rule defines how all other rules are added, modified, frozen."
    self_modification_policy: "R_SUPREME itself only changes via Mr.Long explicit re-lock with new docx authority."

  test_process_failure_principle:
    description: |
      Mr.Long lock 30/6 21:45:
      "Mỗi lần Mr.Long đào sâu mà phát hiện bug mới, hãy coi đó là thất bại của
      quy trình kiểm thử, không chỉ là thất bại của module. Sau khi sửa bug,
      hãy đề xuất thay đổi quy trình hoặc bổ sung test để loại bug đó không
      thể lọt qua lần nữa."
    enforce_after_every_user_bug:
      1: "Fix the immediate bug"
      2: "Trace WHY existing QA missed it"
      3: "Propose process change (new test / new rule / new gate / new audit step)"
