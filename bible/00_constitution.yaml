R81_demonstrative_kia_ban_hardlock:
  # round 19+ add 2026-06-29 00:55 (Mr.Long: "chữ kia không nên dùng")
  rule: "CẤM TUYỆT ĐỐI từ 'kia' (demonstrative pointer) trong narration TTS"
  why: |
    "kia" pointer ambiguous trong narration văn nói TTS:
    - "Bóng kia" → "bóng nào?" reader/listener confuse
    - Văn phong Ngọc Ngạn thường specific (vật cụ thể) hoặc temporal ("vừa rồi", "lúc nãy")
  banned_word: 'kia'
  fix_alternatives:
    - 'kia → "vừa rồi" (temporal)'
    - 'kia → "ấy" (mild demonstrative, less pointed)'
    - 'kia → drop entirely + add concrete noun (vd "Bóng kia" → "Hình bóng vừa rồi")'
  precedent: 'EP01 L416 "bóng kia đã không còn" → "hình bóng vừa rồi đã tan biến" ✅'
  enforcement: 'grep "\\bkia\\b" episode.md → must return 0 matches in body content'
  cross_ref: [R44 dictionary_block, R45 context_block]

R84_temporal_anchor_for_events:
  # round 19+ add 2026-06-29 01:50 (Mr.Long: "không có rõ ràng thời gian cho từng sự kiện à?")
  rule: "Mỗi sự kiện trong narrative PHẢI có temporal anchor cụ thể (khi nào / hôm nào / lúc nào)"
  why: |
    Audience nghe văn nói KHÔNG có bookmark → cần temporal anchor để hiểu sequence.
    Vague "Tháng tư Hà Nội. Mưa từ bảy giờ" → "hôm nào? đêm nào? sáng nào?"
  bad:
    - 'Tháng tư Hà Nội. Mưa từ bảy giờ tối, không dứt. → "tháng tư hôm nào?"'
  good:
    - 'Một đêm cuối tháng tư ở Hà Nội. Trời đổ mưa từ bảy giờ tối, đến tận khuya vẫn chưa dứt.'
  protocol:
    - 'Scene/section transition → temporal anchor (Một đêm / Hôm đó / Sáng hôm sau / Vào lúc...)'
    - 'Flashback → temporal marker (Năm tôi 18 / Hồi cấp ba / Tám năm trước...)'
    - 'Event sequence → connective time (Sau đó / Một lúc sau / Vài giờ sau...)'
  precedent: 'EP01 L78 "Tháng tư Hà Nội. Mưa từ bảy giờ tối" → "Một đêm cuối tháng tư ở Hà Nội. Trời đổ mưa từ bảy giờ tối, đến tận khuya vẫn chưa dứt."'
  cross_ref: [R56 story_mode_hồi_tưởng, R65 logic_consistency 1_logic_thoi_gian]

R85_single_word_eol_extend:
  # round 19+ add 2026-06-29 01:55 (Mr.Long flag: "khác / vút / hậu bé/cụt EOL")
  rule: "EXTEND R60 banned EOL words — single-syllable CLOSED-vowel word EOL có volume drop TTS"
  extended_banned_eol:
    - 'khác'   # /xak̚/ stop /-k/ EOL volume drop
    - 'vút'    # /vũt̚/ stop /-t/ EOL volume drop
    - 'hậu'    # mono open vowel cụt
    - 'lúc'    # stop /-k/ EOL
    - 'rồi'    # closed vowel /-i/ — flag interrogative + statement
    # round 19+ 29/6 02:10 add (Mr.Long flag HOOK v5):
    - 'cừ'     # /kɨː/ closed eng vowel — BigVGAN "phù" tail (precedent L84 "Vỏ xà cừ.")
    - 'dứt'    # /zɨt̚/ stop /-t/ + closed vowel — phù tail (L78 "...vẫn chưa dứt")
    - 'tách'   # /tax̚/ — onomatopoeia + stop /-x/
    - 'tích'   # /tic̚/ — similar
    - 'mất'    # /mɤt̚/ stop /-t/ + ɤ vowel — cụt
    - 'mưa'    # /mɨə/ open eng — common phù tail
    # round 19+ 29/6 04:15 add (Mr.Long flag HOOK v15-v16):
    - 'mười'   # /mɨəj/ nasal + diphthong — cụt + sôi
    - 'ngồi'   # /ŋoj/ — TTS đọc thành "ngồ" cụt + sôi
    - 'rõ'     # /zɔ/ open vowel — phù tail
    - 'giờ'    # /ɟəː/ open eng — common
    - 'lâu'    # /ləw/ open diphthong — common
  GENERAL_RULE: 'AVOID single-syllable word at EOL — pattern detected MANY words have BigVGAN cụt/sôi'
  fix_protocol:
    - 'Reposition single-syllable to mid-sentence'
    - 'Pad with following clarifier ("khác cùng ngồi" instead of "khác.")'
    - 'Pair with multi-syllable closer'
  precedent:
    - 'EP01 L96 "Mười một vị khách khác." → "Trên xe còn mười một vị khách khác cùng ngồi." (reposition khác mid-sentence)'
    - 'EP01 L102 "Anh cũng không nhận ra mình lên lúc nào." → "Bản thân anh cũng không nhận ra mình đã bước lên xe từ lúc nào." (smooth end)'
  cross_ref: [R60 short_syllable_eol_hardlock]

R83_subtext_clarity_for_audience:
  # round 19+ add 2026-06-29 01:20 (Mr.Long: "tay sạch / cô y tá đoạn này rất vô ý nghĩa")
  rule: "Subtle horror cues PHẢI có narrative anchor để audience hiểu — KHÔNG để symbol bare orphan"
  why: |
    Văn nói TTS audience nghe 1 lần, KHÔNG đọc lại → subtle metaphor lost.
    Cô y tá "tay sạch / không vết máu" = subtext "trực ca tai nạn nhưng không thực còn ở đó (=ghost)"
    BUT nếu audience KHÔNG biết Hạ-Vy chết tai nạn (chưa reveal) → cue floating without anchor.
  protocol:
    - 'Place subtle cue AFTER context reveal, không trước'
    - 'OR add narrative bridge câu ngắn give context'
    - 'OR pair với object cụ thể (vết máu → object cô y tá từng cứu / khăn thấm máu)'
  example_bad:
    - 'Cô y tá "tay sạch, không một vết máu" (SETUP — trước reveal Hạ-Vy chết)'
  example_good:
    - 'Move "tay sạch" cue to AFTER L388 "Cô ấy mất tại chỗ" (audience đã biết tai nạn + cô y tá liên quan)'
    - 'OR rephrase neutral "Đôi bàn tay trắng tinh, gọn gàng đặt yên" (drop "không vết máu" — vẫn subtle visual)'
  precedent: |
    EP01 L198 "Tay cô đặt trên đùi, trắng tinh, không một vết máu." → reword "Đôi bàn tay trắng tinh, gọn gàng đặt yên — như chưa từng chạm vào điều gì cả." (drop "không vết máu" lost cue → safer subtext)
  cross_ref: [R47 POV, R56 story_mode_hồi_tưởng]

R82_pronoun_subject_explicit_for_non_main_character:
  # round 19+ add 2026-06-29 01:00 (Mr.Long: "không định danh vật thể với người nào à?")
  rule: "Action verbs gắn với NON-MAIN-character PHẢI có proper noun anchor explicit, KHÔNG dùng pronoun ambiguous"
  why: |
    R47 narrator 3rd person Khải-Phong = "anh" (close POV).
    Khi action tied to NON-Khải-Phong character (ông cụ / cô y tá / anh trung niên / cô gái ghế tám)
    và em mass-replace anaphora với "anh" hay "cô" → reader/listener confuse subject.
    EP01 L426: em fix anh trung niên "Anh đọc tờ giấy..." → Mr.Long confuse Khải-Phong làm action với vật KHÔNG phải của mình.
  protocol:
    main_character_action: 'KEEP "anh" pronoun (R47 narrator close POV)'
    non_main_character_action: 'PROPER NOUN explicit ("anh trung niên", "ông cụ", "cô y tá", "cô gái ghế tám", "bác tài") cho FIRST sentence của paragraph + tiếp pronoun OK trong cùng paragraph'
    object_specific_action: 'Subject anchor REQUIRED khi action involves vật riêng nhân vật phụ (giấy gấp tư = anh trung niên / radio = ông cụ / etc)'
  precedent: |
    EP01 L426 (round 19+ 29/6 01:00): "Anh đọc một lần, gấp tờ giấy lại..." (em mass-replace from "Người đàn ông đọc...") →
    Mr.Long confuse Khải-Phong làm action với tờ giấy của anh ghế 12.
    Fix: "Người trung niên đọc nó một lần, rồi lặng lẽ gập tờ giấy lại..."
  enforcement: |
    Manual editorial review post-anaphora-fix.
    Check: every action paragraph với vật/đối tượng → subject must be EXPLICIT proper noun (not "Anh"/"Cô").
  cross_ref: [R47 POV, R75 anaphora hardlock, R48 dialogue hierarchy]

R76_short_hoi_tone_drift_hardlock:
  # round 19+ add 2026-06-28 22:55 (Mr.Long catch TTS R39: "ở cầu" → "ỡ cầu" multiple occurrences)
  # Mr.Long lock: "cấm các chữ ỡ ở đầu đoạn đầu câu, cấm ở để thành ỡ"
  rule: "CẤM TUYỆT ĐỐI single-syllable 'ở' (hỏi tone) standalone — TTS BigVGAN tone drift hỏi → ngã ('ỡ')"
  why: |
    BigVGAN 22kHz vocoder tone instability cho single-syllable function words.
    "ở" /ɔ̌ː/ (hỏi tone) standalone trước danh từ open vowel → tone reads as "ỡ" /ɔ̃ː/ (ngã).
    Specially bad ở positions:
      - Đầu câu / đầu đoạn (prosody reset)
      - Trước proper noun open vowel ("ở cầu", "ở đâu", "ở cổng")
      - Trước stop consonant + open vowel sequence
  banned_patterns:
    - 'Ở đầu câu / đầu đoạn (CẤM TUYỆT ĐỐI)'
    - '"ở" + danh từ open vowel (ở cầu, ở đâu, ở cổng, ở quán...)'
    - '"ở" + động từ position (ở phòng, ở bên, ở cuối...)'
  fix_options:
    - '"ở X" → "tại X" (locative replacement)'
    - '"ở X" → "nơi X" (location synonym)'
    - '"ở X" → "ngay ở X" (pad with closed-vowel syllable trước "ở" để stabilize tone)'
    - '"ở X" → "X" (drop if context clear)'
    - 'Reword sentence entirely'
  examples:
    bad:
      - 'Bạn của chú giờ ở đâu? → "Bạn của chú giờ tại đâu?"'
      - 'Hạ-Vy đang đứng ở cổng B → "Hạ-Vy đang đứng tại cổng B"'
      - 'Anh ngồi ở quán cà phê → "Anh ngồi tại quán cà phê"'
    good_pad:
      - 'Anh nói đứng yên ngay ở cuối con đường (pad "ngay" before "ở")'
  enforcement: |
    Pre-render gate scan: count "ở" + check position.
    Detection: tools/audit_short_hoi_tone.py (BUILD round 19+)
    Auto-fix: tools/auto_fix_hoi_tone.py (BUILD round 19+)
  precedent: |
    EP01 round 19+ 28/6: Mr.Long nghe TTS R39 → 8 occurrences "ở X" rendered "ỡ X" pattern.
    Specific catch: "ở cầu Long Biên" → "ỡ cầu Long Biên" (Mr.Long 22:30).
  cross_ref: [R58 tilde EOL, R74 hyphen proper noun, R69 number reading]
  no_inference: "Pattern strict — check every standalone 'ở' word."

R74_hyphen_proper_noun_phonetic_clash_hardlock:
  # round 19+ add 2026-06-28 (Mr.Long catch TTS bản v3: "Khải Phong → Hải Phòng", "Hạ Vy → Hà Vy")
  # Renamed from R68 (avoid conflict with round 19 R68 triphthong proper noun)
  rule: "Proper noun có phonetic clash với địa danh/từ phổ biến PHẢI dùng HYPHEN khi viết episode.md để IndexTTS2 đọc đúng"
  why: |
    BigVGAN/IndexTTS2 đọc liền 2 syllable proper noun → elide tone/onset → nghe ra từ khác:
    - "Khải Phong" → "Hải Phòng" (thành phố lớn — well-known city)
    - "Hạ Vy" → "Hà Vy" (common name)
    Hyphen prosody break → vocoder pronounce both syllables distinct → đúng.
  banned_unhyphened_proper_nouns:
    - "Khải Phong"   # MUST write "Khải-Phong"
    - "Hạ Vy"        # MUST write "Hạ-Vy"
  enforcement: |
    Pre-render gate: scan episode.md cho banned unhyphened occurrences.
    Bất kỳ chỗ nào → BLOCK render + auto-suggest fix.
    Auto-fix: replace "Khải Phong" → "Khải-Phong", "Hạ Vy" → "Hạ-Vy".
  precedent: |
    EP01 round 18 28/6: Mr.Long nghe bản v3 → "Khải Phong" sound "Hải Phòng",
    "Hạ Vy" sound "Hà Vy". Fix: hyphen 63 + N replacements.
  cross_ref: [R28 TTS pronunciation, R58 tilde EOL, B14 BigVGAN tail]
  no_inference: "Pattern strict — chỉ check banned list."

R75_proper_noun_anaphora_hardlock:
  # round 19+ add 2026-06-28 (Mr.Long: "tuyệt đối không lặp Khải Phong nhiều liền nhau, các trường hợp khác cũng vậy, khóa chặt vào")
  # Renamed from R69 (avoid conflict with round 19 R69 number reading Việt chữ)
  # round 19.5 update (Mr.Long 28/6 22:30 listen R39 18:38): HARD CAP 6 per EP
  rule: "TUYỆT ĐỐI CẤM proper noun (tên nhân vật chính) > 6 occurrences per EP + > 2 câu consecutive. Replace với pronoun ('anh/anh ấy'/'cô/cô ấy') hoặc descriptor."
  hard_cap_per_ep: 6
  spacing_rule: '6 mentions PHẢI distribute đều across EP — KHÔNG cluster đầu/cuối/section. Tối thiểu cách 200 từ giữa 2 mentions.'
  context_rule: |
    Mention proper noun CHỈ khi:
      1. Intro character per scene/section
      2. Emotional anchor moment (peak / dialogue intro)
      3. Cross-EP callback (R36)
    KHÔNG mention proper noun cho:
      - Routine action sentences (use 'anh'/'cô ấy')
      - Recall flashback details (use 'cô ấy')
  pronoun_convention:
    khải_phong:
      full_name: 'Section start / emotional peak / 1st intro per scene (6 anchors)'
      anh: 'Default narrator describing action/feeling — close POV per R47'
      anh_ấy: 'Rare — only when shifting POV to outsider observer'
    hạ_vy:
      full_name: '6 anchors: intro "Tên cô ấy là Hạ-Vy" / emotional peak / Hạ-Vy vision present'
      cô_ấy: 'Default narrator/Khải-Phong recall (distant past)'
      cô: 'Only when Hạ-Vy physically present in scene (flashback vivid)'
  reduction_protocol:
    narrator_lines:
      - 'First 6 occurrences per EP → KEEP proper noun (anchor)'
      - '7th+ occurrence → REPLACE pronoun (anh/cô ấy)'
    dialogue_lines (start with —):
      - 'Passenger speaks về 1 character → reduce 60% via "cô ấy"/"anh ấy"'
      - 'Keep key emotional anchor mentions only (eg "Tên cô ấy là Hạ-Vy" intro)'
  why: |
    Lặp "Khải-Phong" 3+ consecutive sentences → text sound "máy đọc danh sách":
      "Khải-Phong ngồi yên. Khải-Phong nhìn ra cửa. Khải-Phong nuốt nước bọt."
    Real Vietnamese narrator rotate: name → pronoun → descriptor.
    R62 đã codify cho common nouns ("người người người"), R69 extend cho proper nouns.
  max_consecutive: 2
  must_rotate_pattern: 'name → name/pronoun → PRONOUN/descriptor → name → ...'
  applies_to:
    - '"Khải-Phong" (narrator 3rd person — R47 → fallback "anh")'
    - '"Hạ-Vy" (passenger speak → "cô"/"cô ấy")'
    - 'All passenger proper nouns (Bích Trâm / Hải / Linh / etc — fallback "cô/anh/chú/bà")'
  forbidden_patterns:
    - '"{Name} {verb1}. {Name} {verb2}. {Name} {verb3}." (3+ consecutive name-subject)'
    - '"Khải-Phong ngồi. Khải-Phong nhìn. Khải-Phong thấy." (canonical bad)'
  detection_heuristic:
    - 'Scan paragraph: count sentences starting với "{Name}" — flag >2 consecutive'
    - 'Tool: tools/audit_proper_noun_anaphora.py (build phase 2)'
  enforcement: |
    Pre-render gate BLOCK: scan all proper nouns + character names từ bible/03.
    Any 3+ consecutive same-name-subject sentences → BLOCK + report locations.
    Auto-fix: odd-indexed sentence subject "{Name}" → "anh"/"cô" theo gender bible/03.
  precedent: |
    EP01 round 18 28/6: "Khải-Phong" 63 lần / EP — Mr.Long flag "quá nhiều".
    Mr.Long lock R69 hardlock cho tất cả EP02-EP90.
  cross_ref: [R47 narrator 3rd person, R62 anaphora consecutive, R49 template variation, R53 template pattern variety]
  no_inference: "Rule strict — count consecutive sentences. Pronoun fallback per bible/03 gender."

R67_verb_semantic_precision_memory_vs_perception:
  # round 18 add 2026-06-28 (Mr.Long: "từ nhớ và từ nhận ra liên quan đến rule sử dụng đúng QA + fix triệt để")
  rule: "Verb 'nhớ / không nhớ / quên' CHỈ dùng cho event distant past. Action VỪA xảy ra (< 5s narrative) PHẢI dùng 'nhận ra / hiểu / ý thức'"
  semantic_distinction:
    nhớ_quên:
      meaning: "Memory recall của distant past event (≥ minutes/hours/days ago)"
      examples_correct:
        - '"Khải Phong không nhớ rõ Hạ Vy hát bài đó khi nào" — past memory distant ✓'
        - '"Tôi không nhớ tên cô ấy" passenger backstory ✓'
      examples_wrong:
        - '"Anh không nhớ mình lên xe lúc nào" ✗ (vừa lên — KHÔNG phải distant past)'
        - '"Anh không nhớ mình vừa đánh rơi điều gì" ✗ (action 2s trước)'
    nhận_ra:
      meaning: "Awareness/perception gap của current state hoặc recent action"
      examples_correct:
        - '"Anh không nhận ra mình đánh rơi điều gì" ✓ (action vừa xảy ra)'
        - '"Cô không nhận ra mình lên xe lúc nào" ✓ (perception gap)'
    hiểu:
      meaning: "Cognitive reasoning / understanding cause"
      examples_correct:
        - '"Anh không hiểu sao mình lại mang nó theo" ✓ (reasoning cause)'
        - '"Anh không hiểu tại sao" ✓ (question why = reasoning, KHÔNG memory)'
  forbidden_patterns:
    - 'không nhớ + [action vừa xảy ra < 5s narrative]'
    - 'đã quên + [action present/just-now]'
    - 'không nhớ + tại sao/vì sao/sao (reasoning question — phải dùng "không hiểu")'
  detection_heuristic:
    - 'Scan "không nhớ" / "đã quên" → check 2 câu trước có action verb past-tense gần (vừa/mới/đang) không'
    - 'Scan "không nhớ + tại sao/vì sao/sao" → flag (should be "không hiểu")'
  enforcement: 'tools/audit_verb_semantic.py (build phase 2) + manual editorial review pre-render'
  precedent: |
    EP01 round 18 fix 3 chỗ: L94 "không nhớ mình lên" → "không nhận ra"
                              L170 "không nhớ tại sao" → "không hiểu tại sao"
                              L632 "Cô không nhớ mình lên" → "không nhận ra"
    Mr.Long 28/6 catch + codify hardlock.
  cross_ref: [R44 dictionary_block, R45 context_block verb_collocation, R65 logic_consistency 1_logic_thoi_gian]

