R56_story_mode_hoi_tuong_am_anh:
  # round 14 add 2026-06-28 (Mr.Long CORE FEEDBACK)
  rule: "REVEAL phải là HỒI TƯỞNG ÁM ẢNH TÂM LINH — CẤM kể lể chronological year-by-year"
  is_truyen_mode:
    must_be:
      - '"Hồi tưởng" — fragments ký ức không tuyến tính'
      - '"Ám ảnh tâm linh" — chi tiết quay trở (vật/âm/mùi/ánh)'
      - '"Dư âm" — kết để mở, viewer suy nghĩ tiếp'
      - '"Sensory anchor" — mỗi memory có 1 vật/âm/mùi cụ thể neo lại'
    must_NOT_be:
      - 'Kể lể tuyến tính: "Năm tôi X — Năm tôi Y — Năm tôi Z..."'
      - 'Liệt kê đời: học cấp 1, cấp 2, đại học, đi làm, cưới...'
      - 'Recap biography từ A→Z'
      - 'Show resume (lương, vị trí công ty)'
  example_correct: |
    "Tay bà run. Lạnh.
     Em nhớ tay bà ấm. Hồi mười tuổi. Bà chải tóc em.
     Bây giờ tay bà — lạnh — em không chải lại được.
     Khăn tay trong túi áo bà. Em mở. Hai đầu thêu hoa cúc.
     Cùng cúc bà cài tóc — hồi đám tang ông."
  example_wrong: |
    "Em là Bích Trâm. 32 tuổi. Em làm giáo viên.
     Năm em 18 tuổi sinh Linh. Em chia tay bố Linh khi em 2 tuổi.
     Em nuôi Linh một mình 18 năm. Em đi dạy ở trường X..."
  detection_patterns:
    - '"Năm tôi/em [age] tuổi" lặp 5+ lần consecutive = chronological recap'
    - '"Em làm [job]" intro full resume = biography mode'
    - 'Year-by-year breakdown > 60% REVEAL = miên man'
  enforcement: tools/audit_story_mode.py + manual editorial
  cross_ref: [bible/01 series_bible.soul_dna, bible/06 lexical_style]

R66_short_sentence_chain_hardlock:
  # round 18 add 2026-06-28 — Mr.Long: "anh đến đó, anh ngồi xuống, anh đứng dậy — giật cục không mềm mại"
  rule: "1 câu ngắn (4-6 từ) phải đi kèm 1 câu dài (≥10 từ) — CẤM lạm dụng chuỗi câu ngắn liên tiếp"
  why: |
    TTS Vietnamese đọc chuỗi câu ngắn liên tiếp → rhythm chopped, giật cục.
    Nghe giống máy đọc đều đều, không tự nhiên như Ngọc Ngạn cadence.
    Mr.Long flag: "anh đến đó, anh ngồi xuống, anh đứng dậy" = lỗi.
  rule_detail:
    short_sentence: "câu 4-6 từ"
    max_consecutive: 2  # tối đa 2 câu ngắn liền — câu thứ 3 PHẢI dài ≥10 từ
    exception: "Cho phép sử dụng trường hợp đặc biệt nhấn mạnh dramatic — KHÔNG được lạm dụng"
  example:
    bad: |
      Anh đến đó.
      Anh ngồi xuống.
      Anh đứng dậy.
    good: |
      Khải Phong đến đó. Người đàn ông ngồi xuống một lúc, rồi từ từ đứng dậy bước ra ngoài.
  enforcement: tools/audit_short_chain.py (build phase 2)
  cross_ref: [R60 short EOL, R61 short START, R62 anaphora]

R73_lufs_gating_hardlock:
  # round 18 add 2026-06-28 — Agent 2 TTS validation gap fill
  rule: "Audio output PHẢI gate LUFS integrated [-19, -16] cho narration / [-23, -20] cho broadcast"
  why: "Industry standard VN TTS production (VBee, Zalo, Viettel) + Audible spec — under -19 = quiet listener strains, over -16 = compression artifacts"
  enforcement: "tools/audit_audio_mix_qa.py C11 + .githooks/pre-publish"
  cross_ref: [R58 audio mix QA, bible/05 audio_bible]

R72_dialogue_quote_render_separate:
  # round 18 add 2026-06-28 — Agent 2 gap: IndexTTS2 ignores quote boundary, blends voices
  rule: "Dialogue trong dấu \" \" PHẢI render separate + concat với 180ms bridge + slight pitch shift"
  why: "IndexTTS2 + BigVGAN không respect quote boundary — narrator voice + dialogue voice blend → mất character distinction"
  enforcement: "tools/tts_dialogue_segmenter.py + render pipeline"
  format_change: "Convert quote dialogue → separate WAV segment, concat with bridge + pitch shift ±5%"

R71_place_name_canonical_form_hardlock:
  # round 18 add 2026-06-28 — Agent 2 gap: lesser cities fail >30%
  rule: "Place names ngoài Hà Nội/Sài Gòn/Hải Phòng PHẢI có whitelist + phonetic respelling fallback"
  why: "IndexTTS2 mispronounce Buôn Ma Thuột / Pleiku / Quy Nhơn >30% time"
  whitelist_must_verify:
    - Buôn Ma Thuột → "Buôn-Ma-Thuột" (em-dash hint)
    - Pleiku → "Plây-cu" (phonetic respell)
    - Quy Nhơn → "Quy-Nhơn"
    - Đắk Lắk → "Đắc-Lắc"
    - Phước Long → check pronunciation per render
  enforcement: tools/audit_place_name.py + manual whitelist data/place_names.yaml

R70_em_dash_prosody_explicit_pause_hardlock:
  # round 18 add 2026-06-28 — Agent 2 gap: BigVGAN em-dash 0ms pause
  rule: "Em-dash (—) trong narrative PHẢI convert → ', ' + explicit pause 250ms cho horror beats"
  why: |
    BigVGAN không insert pause cho em-dash (comma 120ms, ellipsis 220ms, em-dash 0ms).
    SVHMP horror dùng nhiều em-dash để pause dramatic → bị flat trong audio.
  exception: "Dialogue dash giữa speaker (— Cô ấy đi rồi.) giữ nguyên"
  enforcement: "Pre-render TTS adapter: scan em-dash narrative position → insert [pause:250ms] marker"
  cross_ref: [R75 em-dash không pause TTS memory 26/6]

R69_number_reading_vietnamese_chu_hardlock:
  # round 18 add 2026-06-28 — Agent 2 gap: IndexTTS2 reads "7" as English "seven" ~12%
  rule: "Mọi số <100 + giờ giấc PHẢI viết chữ Việt (không số Ả Rập)"
  why: "IndexTTS2 + BigVGAN có 12% probability đọc số Ả Rập theo English → 'seven', 'twenty'"
  examples:
    bad: ["7 giờ tối", "20 tuổi", "5 năm trước"]
    good: ["bảy giờ tối", "hai mươi tuổi", "năm năm trước"]
  exception: "Năm cụ thể >1000 (1990, 2018) — giữ số nhưng test pronounce"
  enforcement: tools/audit_number_form.py + .githooks/pre-render

R68_triphthong_diphthong_proper_noun_hardlock:
  # round 18 add 2026-06-28 — Agent 2 gap: BigVGAN 22kHz under-resolve triphthongs
  rule: "Triphthongs (uê / uyê / oai / ươi / uây) trong proper nouns PHẢI flag + alternate spelling fallback"
  why: "BigVGAN 22kHz sample rate under-resolve second glide của triphthongs"
  affected_words:
    - '"Huế" → check render, may need "Hu-ế"'
    - '"Quỳnh" → "Quy-nhh"'
    - '"Thuận" → "Thu-ận"'
    - '"Khải" → check'
    - '"Tuyến" → "Tu-yến"'
  enforcement: tools/audit_triphthong.py + whitelist data/triphthong_fallback.yaml

R65_total_consistency_no_invention_hardlock:
  # round 15 add 2026-06-28 — Mr.Long: "kể serri như tiểu thuyết, logic tổng hợp tất cả kiến thức, CẤM SAI, không bịa luyên thuyên"
  rule: "Truyện = TIỂU THUYẾT serri. Mọi chi tiết PHẢI nhất quán tổng thể logic + kiến thức + thời gian + địa lý + khoa học. CẤM bịa chi tiết không kiểm chứng → vô lý thành luyên thuyên."
  level: ABSOLUTE_HARDLOCK
  total_dimensions:
    1_logic_thoi_gian: "Năm tuổi + khoảng thời gian + chronological order consistent (X tuổi 2026 = sinh 2026-X)"
    2_logic_dia_ly: "Hà Nội-Sapa 300km 5-6h / HN-HP 120km 2.5h / tỉnh thành đúng vị trí + khí hậu vùng"
    3_logic_vat_ly: "Trọng lực rơi xuống / vận tốc thời gian / ánh sáng đúng loại đèn / âm thanh có khoảng cách"
    4_logic_hoa_hoc_sinh_hoc: "Kim loại đúng màu / mùi đúng nguồn / lửa đúng phản ứng / thi thể qua giờ chuyển trạng thái"
    5_logic_thoi_tiet: "Tháng/mùa/vùng đúng (tháng tư Bắc Bộ mưa phùn + đêm mát)"
    6_dao_duc_van_hoa_vn: "Xưng hô vai vế / tang chế vùng / lễ 49-100-3 năm / Phật ≠ Công giáo / kiêng kỵ tang"
    7_logic_toan_dem_vat: "Đếm vật N → cuối N hoặc N±1 — không 'có rồi vẫn có' tự nhiên"
    8_logic_kien_thuc_tu_nhien: "Cảnh quan + cây cối + chim cá đúng vùng đúng mùa"
  forbidden_invention:
    - "Bịa địa danh không tồn tại"
    - "Bịa số liệu không thực tế (lương cô giáo tiểu học Phú Thọ 50 triệu)"
    - "Bịa nghi thức tâm linh không có trong VN"
    - "Bịa phản ứng vật lý/hóa học sai"
  precedent_28_6:
    - "EP01 Khải Phong cầm đồng hồ xuống xe → ghế bảy vẫn còn đồng hồ → toán học sai → fixed (đồng hồ trượt rơi khi anh trance)"
  enforcement: tools/audit_logic_total.py (build phase 2)
  cross_ref: [R41 hook, R56 hồi tưởng, R63 + R64 fold-in]

R62_anaphora_word_liên_tiếp_hardlock:
  # round 15 add 2026-06-28 — Mr.Long: "người lặp đi lặp lại liên nhau quá 2 lần nghe nhàm chán"
  rule: "CẤM từ chỉ định danh (người/cô/anh/chị/ông/bà/em) lặp liền tiếp > 2 trong 3 câu liền"
  why: |
    Pattern repetitive "Một người gia. Người y tá. Người đàn ông trung niên..."
    → TTS đọc đều đều như list → nhàm chán + nghe như lỗi prosody
  trigger_words: ['người', 'cô', 'anh', 'chị', 'ông', 'bà', 'em', 'cụ']
  max_consecutive: 2
  detection: tools/audit_anaphora_consecutive.py
  fix_pattern:
    bad: "Một người gia. Người y tá đứng. Người đàn ông trung niên ngồi."
    good: "Một cụ già. Cô y tá đứng cạnh. Bên kia, người đàn ông trung niên ngồi."

R61_short_syllable_start_sentence_hardlock:
  # round 15 add 2026-06-28 — Mr.Long: "Đêm hôm ấy, chữ Đêm nghe như bị cụt / hụt hơi"
  rule: "CẤM mở đầu câu/đoạn bằng từ 1 âm tiết đơn rồi space + content"
  why: |
    TTS prosody accelerates at sentence start — short syllable bị nuốt/cụt.
    Pattern "Đêm đó." / "Hà Nội." / "Khải Phong." mở đầu → "Đêm" cụt mất.
  banned_starts: ['Đêm', 'Hôm', 'Ngày', 'Năm', 'Sáng', 'Chiều', 'Tối']
  fix_pattern:
    bad: "Đêm đó mưa từ bảy giờ."
    good: "Hôm đó, từ bảy giờ tối, mưa đã rơi không ngớt."
  alternatives: ["Vào đêm đó", "Trong đêm hôm ấy", "Hôm ấy đêm"]
  detection: tools/audit_short_syllable_start.py

R60_short_syllable_eol_hardlock:
  # round 15 add 2026-06-28 — Mr.Long: "các từ 2 chữ ở kết thúc câu như 'im' bị cụt âm"
  rule: "CẤM kết thúc câu bằng từ 1 âm tiết đơn (mono-syllable cụt)"
  why: |
    TTS prosody decay tail — single-syllable bị nuốt sound.
    "im." / "lặng." / "rơi." / "đi." kết câu → mất âm cuối.
  banned_words_eol: ['im', 'lặng', 'rơi', 'đi', 'ra', 'qua', 'lui', 'tan', 'nhỏ', 'to']
  fix_pattern:
    bad: "Anh đứng im."
    good: "Anh đứng im lặng một hồi lâu."
  detection: tools/audit_short_eol.py

R105_concat_short_syllable_cụt_hardlock:
  # round 15 add 2026-06-28 — Mr.Long: "ướt một góc nhỏ, chữ nhỏ cũng bị cụt do mix"
  # 2026-06-29 RENUMBERED R59→R91 by CMD LEAD (collision với R59_audio_mix_qa_mandatory_pre_publish line 322)
  # 2026-06-29 RE-RENUMBERED R91→R93 by CMD LEAD (collision với R91 MASTER_PIPELINE_LOCK)
  # 2026-06-29 RE-RENUMBERED R93→R105 by CMD LEAD LẦN 3 (vi phạm chính lesson lần 3 — R93 đã codified bởi CMD #2 full_update_on_new_bug list 1392 trước; em rename không 4-format check)
  rule: "Chuỗi 3+ từ ngắn (1-syl) liền tiếp ở cuối câu → TTS đọc cụt + mix glitch"
  why: |
    Concatenation pipeline + TTS decay → cuối câu chuỗi "ướt một góc nhỏ" cụt.
    Đặc biệt với từ ending tilde hoặc 1-syl.
  pattern_detection: '3+ consecutive single-syllable tokens before [.!?—]'
  fix: "Pad bằng từ 2-syl hoặc thêm cụm bổ nghĩa"
  example:
    bad: "Mưa làm ướt một góc nhỏ."
    good: "Mưa rơi xuống làm ướt một góc nhỏ trên bàn."

R58_no_tilde_ending_sentence_hardlock:
  # round 15 add 2026-06-28 — Mr.Long lệnh sau phát hiện TTS bug "đi Mỹ → đi Mỵ" + "cũ → cụ"
  rule: "CẤM TUYỆT ĐỐI từ kết thúc câu (hoặc clause) bằng nguyên âm dấu NGÃ (~)"
  why: |
    BigVGAN/IndexTTS2 Vietnamese vocoder lỗi prosody at end-of-sentence:
    dấu NGÃ (~) đọc giống dấu NẶNG (.) khi nằm cuối câu.
    Mr.Long phát hiện 28/6: "đi Mỹ" → "đi Mỵ" (Hạ Vy sang du học)
                            "khung cũ" → "khung cụ" (artifact)
  banned_chars_at_eol: ['ã', 'ẵ', 'ẫ', 'ẽ', 'ễ', 'ĩ', 'õ', 'ỗ', 'ỡ', 'ũ', 'ữ', 'ỹ']
  boundary_definition: 'EOL = ngay trước [.!?—"] hoặc \n hoặc [pause:'
  common_violations:
    - '"Mỹ" → "Hoa Kỳ" / "nước Mỹ" / "bên đó" (move mid-sentence)'
    - '"cũ" → "xưa" / "thời xưa" / "lâu năm"'
    - '"ngã" → "té" / "vấp" / "đổ"'
    - '"vỡ" → "tan" / "nứt" / "nát"'
    - '"chỗ" → "nơi" / "địa điểm"'
    - '"lễ" → "buổi lễ" / "ngày lễ"'
    - '"đã" → move mid-sentence (rare EOL)'
    - '"nỗ" → "nỗ lực" full phrase'
    - '"giã" → "biệt" / "chia tay"'
    - '"đỗ" → "đậu" / "dừng lại"'
    - '"bữa" → "ngày" / "lần"'
    - '"cõi" → "thế giới" / move mid-sentence'
    - '"nửa" → "phần" / move mid-sentence'
  exceptions:
    proper_noun_midword: "Mỹ Đức / Mỹ Linh / Mỹ Đình OK (compound — Mỹ không đứng cuối)"
    dialogue_quote_close: 'cuối dialogue trong ngoặc kép vẫn áp dụng rule này'
  enforcement:
    - tools/audit_tilde_eol.py — scan + report violations
    - .githooks/pre-commit — block commit if HIGH violations > 0
    - tools/auto_fix_tilde_eol.py — suggest rewrite (manual approve)
    - prompts/generator.md PHASE 12.99 — pre-write enforcer
  cross_ref: [R28 TTS pronunciation, R41 hook]

R57_reveal_vignette_structure:
  # round 14 add 2026-06-28
  rule: "REVEAL = 3-5 vignettes hồi tưởng (KHÔNG chronological recap)"
  ideal_structure:
    vignette_1: "Memory peak — moment thật đắt (bà run tay / mẹ chia bún chả / vợ đan chăn)"
    vignette_2: "Sensory return — vật/âm/mùi gợi memory lại"
    vignette_3: "Death moment — không kể chi tiết, chỉ một mệnh đề"
    vignette_4: "Regret crystallize — câu cuối hối tiếc"
    vignette_5: "Tonight purpose — vì sao đêm nay đem vật về"
  forbidden:
    - "Câu mở rộng resume: tốt nghiệp đại học X, làm công ty Y, lương Z..."
    - "Năm-tuổi breakdown linear"
    - "Mở rộng quá 2 thế hệ family tree (bố mẹ ông bà cô chú anh chị em)"
  hard_limit:
    max_chronological_year_mentions: 3  # > 3 "năm X tuổi" = miên man
    max_resume_facts: 2  # > 2 facts về lương/vị trí/công ty = show resume
  enforcement: audit_story_mode.py + R41 hook integration
  cross_ref: [R39 word count, R54 REVEAL min 600]

R53_template_pattern_variety_hardlock:
  # round 13 add 2026-06-28 (Mr.Long lệnh nghiêm túc khai thác)
  rule: "Atmospheric template phrases CẤM lặp > 30 EPs với pattern identical"
  banned_overuse:
    - '"Chuông xe ngân. Một tiếng. Tan." identical 32/50 → cần varied 4-5 forms'
    - '"bước lên xe. Đi qua hàng ghế đầu" 39/50 → cần varied entry'
    - '"Khải Phong quan sát từ ghế ba" 40/50 → cần varied observation phrases'
    - '"vuốt vai + Mỉm cười" ghost manifest 25/50 → vary ghost desc'
  approved_bell_variants:
    - "Chuông xe ngân. Một tiếng. Tan."          # max 15/50
    - "Tiếng chuông ngân nhẹ. Một hồi. Lặng."
    - "Chuông xe rung khẽ. Vang một nhịp."
    - "Một tiếng chuông. Ngắn. Tan trong sương."
    - "Chuông xe vọng. Nhịp đơn. Im."
  approved_entry_variants:
    - "bước lên xe. Đi qua hàng ghế đầu"    # max 15
    - "lên xe. Đi xuống lối giữa"
    - "lên bậc xe. Đi đến hàng ghế giữa"
    - "vào xe. Đi qua mấy hàng ghế trước"
  enforcement: audit_hidden_bugs.py + R41 hook check
  cross_ref: [R49 template variation]

R54_reveal_word_count_min:
  rule: "REVEAL section MIN 600 words (target 800-1050) để depth backstory passenger"
  hard_floor: 600
  target_range: [800, 1050]
  rationale: |
    REVEAL là core emotional payload. < 600 words = backstory shallow.
    EP02-04 + EP42, EP44 vi phạm — cần expand backstory.
  enforcement: audit_hidden_bugs.py check + R41 hook
  cross_ref: [R39 word count]

R55_driver_R42_strict_enforce:
  rule: "Bác tài quote ngoài 2-line standard CHỈ allowed trong CLIFFHANGER foreshadow (R42). Detect >1 extra ngoài CLIFFHANGER = HIGH"
  detection: |
    EP có >1 'Bác tài[...]"..."' quote ngoài CLIFFHANGER section + ngoài 2 standard lines = vi phạm
  enforcement: audit_hidden_bugs.py + new check in audit_60_dimensions
  cross_ref: [R42 driver foreshadow]

R51_dialogue_audit_smart_v2:
  # round 12 add 2026-06-28 (Mr.Long lệnh refine bot báo thông minh)
  rule: "Audit dialogue chỉ flag TRUE ambiguity, accept Ngọc Ngạn first-person monologue"
  acceptable_patterns:
    - 'First-person passenger monologue: "Em là X. Em sống. Em đi. Em hứa" — natural Vietnamese'
    - "Self-action verbs sau 'em': cố/sẽ/đã/không/chỉ/cũng/vẫn/đang/là/có"
    - 'Quoted direct speech với context rõ về subject'
  flag_patterns:
    HIGH: "'em [non-self-verb] em' trong cùng 1 sentence (2 referents)"
    MEDIUM: "3+ em sau named person trong cùng sentence"
  excluded_false_positives:
    - '"Em cố nhớ" / "Em sẽ làm" / "Em đã đi" → self-ref OK'
    - '"Em là Bích Trâm" intro → OK'
    - '"Chị tắm cho em lúc em mới sinh" → "em" both refer speaker (self) → OK'
  enforcement: tools/audit_dialogue_hierarchy.py v2 smart
  no_inference: "Pattern strict — chỉ flag 'em [object_verb] em' + multi-named context"
  cross_ref: [R46 anaphora accept, R48 hierarchy]

R52_acceptable_ngoc_ngan_first_person:
  # round 12 add — codify literary convention
  rule: "First-person passenger monologue 'Em [verb] / Em [adj]' chains CHẤP NHẬN không giới hạn nếu speaker nói về chính mình"
  rationale: |
    Vietnamese narrative tradition (Nguyễn Ngọc Ngạn, Hồ Biểu Chánh):
    Passenger kể chuyện về bản thân thường bắt đầu mỗi câu với 'Em/Tôi'.
    Đây KHÔNG phải anaphora bug — đây là Vietnamese literary signature.
  example_accept: |
    "Em là Bích Trâm. Em ba mươi hai tuổi. Em làm giáo viên.
     Em sống Hà Nội. Em có một con gái — Linh."
    → 5 câu start "Em" về SPEAKER → ACCEPT
  example_flag: |
    "Em đem em về phòng trọ em ở Sóc Trăng."
    → 3 em refer 2 different people (speaker + Vân) → FLAG R48 HIGH
  enforcement: audit_dialogue_hierarchy v2 + manual editorial review
  cross_ref: [R46 anaphora]

R50_audit_toolkit_mandatory_pre_commit:
  # round 11 add 2026-06-28 (Mr.Long lệnh "cam kết các tool luôn chạy và kiểm thử")
  rule: "Pre-commit hook BẮT BUỘC chạy 7 audit tools — block nếu BẤT KỲ HIGH issue"
  mandatory_tools:
    - tools/post_render_gate.py        # 11 hard constraints / EP
    - tools/audit_pronoun_pov.py        # R47 POV violations
    - tools/audit_60_dimensions.py     # 70 dimensions cross-EP
    - tools/audit_dialogue_hierarchy.py # R48 dialogue R rối
    - tools/audit_deep_qa.py           # 100 deep QA dimensions
    - tools/detect_template_repetition.py # R49 formulaic check
    - tools/audit_100_check.py         # legacy 100-check (kept)
  enforcement: |
    .githooks/pre-commit chạy 7 tools tuần tự.
    Tool nào trả exit code != 0 → BLOCK commit + log details.
    KHÔNG bypass --no-verify trừ Mr.Long explicit.
  rationale: |
    Round 18-24 đã add 5 audit tools mới — nếu chỉ chạy post_render_gate (legacy)
    sẽ bỏ sót POV violations, dialogue R48, template formulaic, deep QA.
    Phải chạy TẤT CẢ để đảm bảo no regression.
  no_inference: "Tool block based on exit code rule — không suy luận"
  violation_action: "LOG B47 + counter rule_break_count++"
  cross_ref: [.githooks/pre-commit, R41 HARDLOCK]

R49_template_variation_hardlock:
  # round 10 add 2026-06-28 (Mr.Long reader judgement phát hiện 40/50 EPs same opener)
  rule: "HOOK opener + atmospheric description phải VARIED across EPs. Cấm dùng cùng template > 5 EPs liên tiếp."
  rationale: |
    Audit phát hiện 40/50 EPs HOOK start với 'Đêm tháng tư' — formulaic AI.
    36/50 dùng 'Đêm tháng tư. Mưa nhẹ.'
    38/50 dùng 'Chuyến xe đêm chạy qua đoạn đường'
    Khán giả nghe 5 EPs liên tục sẽ phát ngán template.
  required_variation:
    hook_opener_templates_min: 10
    atmospheric_descriptions_min: 8
    repetition_max_consecutive: 5  # max 5 EPs có thể dùng same template
  approved_opener_variants:
    - "Đêm tháng tư. Mưa nhẹ."          # current default — limit ≤30%
    - "Tháng tư. Đêm vừa khuya."
    - "Mưa đã rơi từ chiều."
    - "Cuối tháng tư. Trời ẩm."
    - "Đêm. Đường vắng."
    - "Hà Nội cuối tháng tư."
    - "Sau cơn mưa chiều. Đêm xuống nhanh."
    - "Đêm thứ X — Khải Phong ngồi ghế thứ ba."
    - "Đèn xe rọi vào sương."
    - "Phố vắng. Đêm thưa."
  enforcement: tools/detect_template_repetition.py + R41 hook (formulaic_score > 60% = warning)
  no_inference: "Strict template variation rule — pick from approved list"
  cross_ref: [bible/01_series_bible, EP01 golden ref]

R47_narrator_3rd_person_pov_hardlock:
  # round 9 add 2026-06-28 (CRITICAL BUG phát hiện đọc sample 5 EPs)
  rule: "Narrator 3rd person — Khải Phong refer = 'anh' / 'Khải Phong' / 'mình' (NEVER 'em' ngoài quoted dialogue)"
  rationale: |
    EP01 golden ref (Mr.Long approve): narrative dùng 'Khải Phong... anh...' = 3rd person consistent.
    EP02-50 em ship sai: 'Khải Phong cố nhớ. Em không nhớ rõ...' = mix 1st/3rd POV.
    Nghe TTS sẽ confused 'em' nào — Khải Phong hay passenger.
    Vi phạm narrative POV consistency 49 EPs.
  enforcement:
    in_quotes: "Dialogue passenger tự xưng 'em' / 'tôi' OK — accept (R46)"
    out_of_quotes: "Narrator nói về Khải Phong DÙNG 'anh' hoặc 'Khải Phong' — CẤM 'em'"
    check_script: tools/audit_pronoun_pov.py
  no_inference: "Rule rõ — không guess. Trong quotes accept, ngoài quotes Khải Phong = anh."
  cross_ref: [output/ep_01/episode.md golden ref, BUGS_FIXED B42]

R48_passenger_dialogue_hierarchy_pronoun:
  # round 9 add 2026-06-28 (EP40 Hải gọi Hạ Vy là 'em' sai)
  rule: "Passenger dialogue đại từ tuân hierarchy thật: gọi người lớn tuổi hơn = 'anh/chị', người nhỏ tuổi = 'em', cùng tuổi = 'cậu/tớ/bạn'"
  example_correct: |
    Hải (22) nói về Hạ Vy (27): 'Em yêu thầm CHỊ Hạ Vy' (chị vì Hạ Vy hơn 5 tuổi)
    Hải nói về Khải Phong (anh hơn): 'Em đến — ANH cảm ơn em'
  example_wrong: |
    Hải nói 'Em yêu thầm Hạ Vy. Em biết EM có bạn trai' (lẫn em — không hiểu em nào)
  enforcement: Manual review + audit script flag context phụ thuộc age
  no_inference: "Pre-write check passenger age vs target_person_age"

R46_passenger_first_person_anaphora_accept:
  # round 8 add 2026-06-28 (audit 1.1 phát hiện passenger tự kể "Em..." dài)
  rule: "Anaphora 'Em' / 'Tôi' trong passenger first-person monologue CHẤP NHẬN ≤ 14 consecutive"
  rationale: |
    Tiếng Việt first-person narrative: passenger tự kể chuyện về mình mặc định
    bắt đầu mỗi câu bằng "Em..." / "Tôi..." Ngọc Ngạn style.
    EP29 Linh Đan 8 / EP40 Hải 13 / EP48 Hữu Duy 11 / EP49 Phương Linh 11 = intentional.
  threshold:
    OK: max_run <= 7
    MEDIUM: 8 <= max_run <= 14 (accept for passenger monologue)
    HIGH: max_run >= 15 (excessive even for monologue)
  no_inference: "Đếm rule-based theo max consecutive same start word"
  enforcement: audit_60_dimensions check 1.1

R45_context_block:
  # round 8 add 2026-06-28
  rule: "CẤM verb misuse + age sanity 10-100 + foreign word leak narrative"
  age_sanity: "Tuổi nhân vật trong [10, 100]"
  verb_collocation: "Verb + object kết hợp đúng tiếng Việt"
  foreign_words_max: 5  # per EP — accept brand names + acronyms whitelist
  enforcement: audit_60_dimensions Layer 7.4-7.9 check pre-commit
  no_inference: "KHÔNG suy luận. Strict rule check."

R42_driver_foreshadow_line_allowed_cliffhanger:
  # round 7 add 2026-06-27 (Mr.Long audit 100-check phát hiện 35 EPs có driver line 3 — refine SERIES_RULES.driver)
  rule: "Driver CHO PHÉP nói câu thứ 3 trong CLIFFHANGER nếu là 'foreshadow memory progression' (R35)"
  rationale: |
    SERIES_RULES.driver gốc cấm câu thứ 3 trừ EP73 + EP90.
    NHƯNG R35 (Khải Phong memory M1-M18) cần bác tài foreshadow đêm sau Khải Phong sẽ nhớ gì.
    Foreshadow line trong CLIFFHANGER là design intent — KHÔNG phải vi phạm.
    Format chuẩn: "Bác tài liếc gương. 'Đêm N. Con đã nhớ X. Đêm sau con sẽ nhớ Y. Đừng vội.'"
  allowed_format:
    - "Bác tài liếc gương. \"Đêm thứ N. ...Đừng vội.\""
    - "Bác tài cất lời. \"...\""  # within REVEAL section (passenger trigger)
  not_allowed:
    - Random extra chat từ bác tài không liên quan memory/foreshadow
    - Explanation dump lore từ bác tài (NEVER_7 explanation_dump giữ nguyên)
  enforcement: Generator pre-write check format + QA accept foreshadow context
  cross_ref: [bible/21_series_arc_design R35, bible/00 SERIES_RULES.driver]

R43_tier2_filler_cap_per_ep:
  # round 7 add 2026-06-27 (audit phát hiện filler tier 2 tổng 179 / 40 EPs)
  rule: "Tier 2 filler (khẽ/vô hình/thoáng/ánh mắt/lặng lẽ) cap MAX 3 instances/EP cho mỗi từ"
  rationale: |
    Audit 27/6 thấy khẽ 77 / vô hình 40 / thoáng 34 / ánh mắt 28 tổng 40 EPs.
    Trung bình khẽ 1.9/EP — acceptable.
    Cap 3/EP/word đảm bảo không lạm dụng trong 1 EP cụ thể.
  enforcement: Generator pre-write count check + QA flag if any word > 3 in one EP
  cross_ref: [bible/22_anti_slop_vi.yaml tier_2_filler]

R41_no_commit_if_gate_fail_HARDLOCK:
  # round 6 add 2026-06-27 (Mr.Long lệnh "xử lý nghiêm hiến pháp cấm tái diễn")
  rule: "CẤM TUYỆT ĐỐI commit EP nào nếu post_render_gate FAIL bất kỳ check nào"
  enforcement: |
    Auto-block via git pre-commit hook (.githooks/pre-commit):
    - Hook scan staged EP files (output/ep_*/episode.md)
    - Run post_render_gate.py cho mỗi EP staged
    - Nếu BẤT KỲ EP nào FAIL → BLOCK commit + print FAIL details
    - Em/AI KHÔNG được bypass hook (--no-verify CẤM trừ khi Mr.Long explicit)
  rationale: |
    Em đã vi phạm R39 hard_floor 2 lần (EP21-25 + EP31-34) DÙ đã có rule cứng.
    Cause: không tự verify trước commit — chạy gate sau commit phát hiện muộn.
    Fix: gate phải BLOCK ở pre-commit — physically không commit được.
  violation_action: |
    Vi phạm R41 = LOG B40 BUGS_FIXED + memory feedback nghiêm trọng.
    Mỗi vi phạm = +1 vào counter "rule_break_count" trong VERSION.md.
    Counter >= 3 → escalate Mr.Long review workflow.
  no_exception: true
  cross_ref: [.githooks/pre-commit, BUGS_FIXED.md B40]

R40_intro_hac_da_ky_mandatory:
  rule: "Mọi EP PHẢI prepend intro 5 elements ở đầu file episode.md trước metadata block"
  elements:
    - "Hắc Dạ Ký — chuyện kể từ cõi vô hình."
    - "Tác giả: Hắc Dạ Ký."
    - "Series: Chuyến xe cuối cùng về đâu."
    - "Ai cũng có một chuyến xe chưa nói lời tạm biệt."
    - "Tập NN — câu chuyện đêm nay."
  duration_target: 4.5_seconds  # TTS narrator spoken
  pause_pattern: "800ms / 600ms / 600ms / 600ms / 1000ms / 1500ms (intro→tập)"
  enforcement: "Generator pre-write template + post-render check has_intro()"
  cross_ref: [prompts/ep_scaffold_template.md]

# ============================================================
# IDENTITY — bất biến series-wide
# ============================================================

identity:
  series_id: SVHMP
  genre: regret_supernatural
  soul: unresolved_goodbye
  format: episodic_radio_horror
  status: LOCKED
  production_status: READY_FOR_SERIES
  golden_reference: ep_01_v7_final_round3_lock
  scalability: "50-100 episodes"
  risk_of_dna_drift: LOW (when constitution enforced)

core_promise: |
  Một chuyến xe đêm dành cho những người còn một điều chưa kịp nói.
  Từ ep01 trở đi, KHÔNG còn là "làm truyện ma đáng sợ hơn" — mà là giữ tuyệt đối cảm giác trên.

# ============================================================
# ALWAYS — 5 nguyên tắc PHẢI có mỗi tập
# ============================================================

ALWAYS:
  melancholy:
    description: "Mạch cảm xúc chủ đạo là buồn man mác, không phải sợ hãi."
    enforcement: QA HARD-FAIL nếu aftertaste KHÔNG nằm trong [buồn, nghẹn, ám ảnh nhẹ]
    cross_ref: [01_series_bible.soul_dna, 09_emotion_intensity]

  unresolved_goodbye:
    description: "Tập phải xoay quanh 1 lời tạm biệt chưa kịp nói / lời hứa chưa kịp giữ."
    enforcement: QA HARD-FAIL nếu hành khách KHÔNG có 1 regret cụ thể từ regret_catalog
    cross_ref: [11_regret_catalog, 03_character_bible]

  object_symbolism:
    description: "Mỗi hành khách MANG 1 vật từ object_library. Vật = vehicle of regret."
    enforcement: QA HARD-FAIL nếu hành khách main_pov không có object từ 12_object_library
    cross_ref: [12_object_library]
    rule: "fact_014 — Mỗi hành khách mang 1 điều chưa kịp làm (vật hóa)"

  subtle_supernatural:
    description: "Yếu tố siêu nhiên có nhưng KHỎE, KHÔNG show-off. Chuông / kim đồng hồ / ghế trống / kính phản chiếu."
    enforcement: QA HARD-FAIL nếu siêu nhiên explicit (ma hiện nguyên hình + nói chuyện trực tiếp)
    rule: "ghost_visual.max_manifestation = 1 / ep"

  emotional_aftertaste:
    description: "Tập KẾT phải để lại dư âm — viewer suy nghĩ tiếp sau khi tắt."
    enforcement: QA HARD-FAIL nếu beat_5 (DƯ ÂM) thiếu / aftertaste resolved hoàn toàn
    rule: "ending phải unresolved_memory (mandatory)"

# ============================================================
# NEVER — 7 cấm tuyệt đối (vi phạm = HARD-FAIL)
# ============================================================

NEVER:
  gore:
    description: "KHÔNG mô tả máu chi tiết, nội tạng, vết thương open. Tinh tế kiểu 'ngực áo sẫm hơn' OK."
    examples_forbidden:
      - "máu chảy ròng ròng"
      - "vết thương há miệng"
      - "xác phân hủy"
    cross_ref: [01_series_bible.fear_source_forbidden]

  jump_scare_spam:
    description: "KHÔNG dùng âm thanh đột ngột để hù. Nếu có scare CHỈ 1 lần/ep + có justification cảm xúc."
    examples_forbidden:
      - "BÙM! tiếng đập cửa đột ngột"
      - "tiếng hét chói tai bất thình lình"
    note: "Scare khác sự ám ảnh. Series này bán ám ảnh, không bán giật mình."

  exorcism:
    description: "KHÔNG có thầy cúng / pháp sư / lễ trừ tà / bài kinh xua đuổi."
    rationale: "Bác tài KHÔNG phải Diêm Vương / thần linh / ma (02_lore_db.permanent_locks.driver_nature). Không có thực thể để trừ."

  monster_hunting:
    description: "KHÔNG có thợ săn ma / điều tra siêu nhiên / 'team' đi diệt."
    rationale: "Series là regret_supernatural, không phải action-horror."

  combat_with_ghost:
    description: "KHÔNG đánh nhau với ma. Không vũ khí chống lại siêu nhiên."
    rationale: "Hành khách không kháng cự được — họ chỉ nhớ ra và rời xe."

  villain_ghost:
    description: "KHÔNG có ma 'ác' / motive trả thù / linh hồn báo oán."
    rationale: "Soul = unresolved_goodbye, không phải vengeance. Ma trong SVHMP là hành khách chính họ, không phải kẻ thù."

  explanation_dump:
    description: "KHÔNG có đoạn giải thích lore dài. Bác tài KHÔNG bao giờ giải thích."
    enforcement: |
      - Bác tài chỉ 2 câu chuẩn (03_character_bible.CHAR_DRIVER.speech_lines).
      - Lore reveal CHỈ qua experience của hành khách (cô y tá lắc đầu / kính phản chiếu / chuông ngân).
      - Cấm narrator-voiceover giải thích "vì sao chuyến xe tồn tại".

# ============================================================
# GHOST_RULES — 3 quy tắc siêu nhiên cứng
# ============================================================

GHOST_RULES:
  never_attack:
    value: true
    description: "Yếu tố siêu nhiên KHÔNG tấn công ai. Không vật lý. Không tâm linh aggressive."

  never_chase:
    value: true
    description: "KHÔNG đuổi theo. Không chase scene. Hành khách rời xe trong yên tĩnh."

  never_speak_directly:
    value: true
    description: "Ma KHÔNG nói chuyện trực tiếp với người sống. Chỉ qua: kính phản chiếu, kim đồng hồ nhích, bóng sát vai, chuông ngân."
    exception: "Hành khách trên xe nói chuyện với nhau — họ đều là 'hành khách', không ai là 'ma' để hù người sống."

# ============================================================
# ENDING_RULES — 2 quy tắc kết thúc
# ============================================================

ENDING_RULES:
  unresolved_memory:
    value: mandatory
    description: "Mỗi tập PHẢI kết bằng 1 ký ức chưa được nói rõ / 1 câu chưa kịp nói. KHÔNG resolve hoàn toàn."
    enforcement: QA HARD-FAIL nếu beat_5 close hoàn toàn (kiểu "và họ sống hạnh phúc")

  lingering_question:
    value: preferred
    description: "Khuyến khích để lại 1 câu hỏi mở trong đầu viewer ('cô gái mới là ai?', 'còn ai trên xe?')."
    note: "Không bắt buộc nhưng tăng retention + setup cho ep sau."

# ============================================================
# SERIES_RULES — 8 quy tắc DNA từ round 3
# ============================================================

SERIES_RULES:
  bus:
    one_bus_only: true
    description: "1 chuyến xe đêm duy nhất xuyên 50-100 ep."

  driver:
    speaks_only:
      - "Con đã nhớ ra chưa?"
      - "Chưa tới lúc."
    exception_eps: [73, 90]   # 03_character_bible.CHAR_DRIVER ghi rõ
    description: "Tài xế CHỈ 2 câu này. KHÔNG sáng tạo câu thứ 3 (trừ ep 73 + ep 90)."

  bell:
    max_per_episode: 1
    description: "Chuông càng hiếm càng linh. KHÔNG thêm chuông phụ."

  ghost_visual:
    max_manifestation: 1
    description: "Tối đa 1 lần hiện hình mỗi tập (gương / bóng / kim nhích...)."

  horror_type:
    value: regret_supernatural
    description: "KHÔNG action / KHÔNG slasher / KHÔNG creepypasta."

  passengers:
    each_carries_object: true
    description: "Mỗi hành khách 1 vật ký ức từ 12_object_library."
