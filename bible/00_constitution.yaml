  - id: R96
    name: 'BigVGAN onset ramp MITIGATION (không cure)'
    severity: HARD
    statement: 'BigVGAN chunk-start slow onset ramp INHERENT vocoder artifact. CANNOT eliminate by trim without consonant loss. Mitigate via pre-roll + overlap-add + conservative trim.'
    mitigation:
      pre_roll: 'Prepend warm-up syllable to TTS input → model warmed when actual content starts. Strip in post-process.'
      overlap_add: 'Render chunks với overlap, crossfade 30-50ms tại boundary cosine ramp'
      conservative_trim: 'Head trim SAFETY only, max 80-180ms, fade-in 5-15ms nếu trim > 100ms'
    pre_check_consonants: 'KHÔNG split chunk ngay trước phụ âm mạnh (b, đ, t, k, ch, tr, p)'
    voiced_onset_detection: 'Multi-metric: RMS energy + zero-crossing rate + spectral flux (không chỉ dB threshold)'
    chunk_strategy: 'Chunk dài hơn nếu VRAM chịu được (giảm số boundaries → ít ramps)'
    qa_tolerance:
      # CMD LEAD 29/6 18:30 — STAGE 3 QA chấp nhận BigVGAN reality:
      slow_onset_ratio_max: 0.25  # ≤25% pause-ends có slow onset (was 0% strict — không khả thi với BigVGAN)
      rms_range_db: [-25, -12]    # extend -25 (was -22) tolerate vocoder output level
      peak_max_db: -0.1           # KEEP strict (clip prevention)
      noisy_pause_max: 1          # ≤1 noisy pause/section tolerated (rare BigVGAN artifact)
      click_count_max: 10         # KEEP existing
    qa_tolerance_why: |
      EP01 STAGE 3 audit 29/6 cho 6 sections: RMS uniformly -23 (off chỉ 1dB), slow_onset 9-23%.
      Pipeline v66 đã best-effort mitigation. Stricter threshold = false FAIL forever.
      Tolerance này áp cho qa_post_render.py + qa_watch.py STAGE 3 check.
    added: '2026-06-29 14:38'
    updated: '2026-06-29 18:30 — CMD LEAD add qa_tolerance section'
    why: 'Mr.Long lock report: trim alone cannot fix onset. Need mitigation strategy.'

