# Priority: LOAD FIRST trước mọi bible khác. Mọi file 01-17 phải tuân hiến pháp này.
# Loaded by: Generator (writing constraints) / QA Lock (HARD-FAIL audit) / TTS Director (no SFX violation) / Video Director (no visual violation)
# Mục tiêu: 1 file duy nhất chứa identity + bất biến của series. Tránh AI trôi DNA sau 50-100 ep.

version: 1.2
lock_date: 2026-06-27 (round 5 — ALL rules HARD + pre-render scaffold mandatory)
lock_trigger: "Mr.Long 27/6: 'tất cả rule phải cứng' + 'đọc kỹ trước render tránh làm đi làm lại'"
authority: Mr.Long
supersedes: 1.1

# ============================================================
# UNIVERSAL HARD RULE ENFORCEMENT (v1.2 add 2026-06-27)
# ============================================================
# Mr.Long lệnh: "tất cả các rule phải cứng" — ALL rules hard, ZERO exception.
# "đã là rule phải tuân thủ tuyệt đối — đọc kỹ trước khi render —
#  phải có định hướng dựng chuẩn trước — tránh làm đi làm lại."

enforcement_level: HARD_UNIVERSAL  # mọi rule R1-R39 đều hard - không có "soft" / "preferred"
exception_policy: ZERO  # không exception cho bất kỳ rule nào
pre_render_protocol: MANDATORY  # phải PASS pre_render_check trước khi viết EP

pre_render_checklist:
  description: "BẮT BUỘC chạy `python tools/pre_render_checklist.py --ep N` PASS trước khi viết EP_N"
  must_verify:
    - "Read bible/00_constitution.yaml (this file)"
    - "Read bible/21_series_arc_design.yaml (EP-level target)"
    - "Read bible/09_emotion_intensity.yaml (intensity for EP_N phase)"
    - "Read bible/11_regret_catalog.yaml (regret pillar for EP_N)"
    - "Read prompts/ep_scaffold_template.md (section budget)"
    - "Verify pillar from R33 interleave map"
    - "Verify intensity from R34 phase target"
    - "Verify memory fragment M_X from R35 progression"
    - "Verify callback target from R36 (if EP_N in callback_schedule)"
    - "Verify milestone flag from R37 (EP_N in [10,20,30,40,50,60,70,80,90])"
    - "Verify object sub-arc target from R38"
    - "Verify word count target 2200-2500 from R39"
  fail_action: "BLOCK ship — không được viết EP_N nếu checklist FAIL"

post_render_gate:
  description: "BẮT BUỘC verify VNQA + arc compliance sau khi viết EP, trước commit"
  must_pass:
    - "VNQA verdict != CRITICAL"
    - "word_count >= 2000 (R39 hard_floor)"
    - "word_count <= 2700 (R39 hard_ceiling)"
    - "duration >= 13 minutes (R39)"
    - "bell_count == 1 (SERIES_RULES.bell)"
    - "ghost_manifest == 1 (SERIES_RULES.ghost_visual)"
    - "driver speech only 2 lines unless EP in [73, 90] or milestone (SERIES_RULES.driver)"
    - "Hà → Hạ Vy / Quang → Khải Phong rename verified"
    - "Intro Hắc Dạ Ký injected (5 elements per R40)"
  fail_action: "BLOCK commit — fix và re-render, KHÔNG ship draft"

