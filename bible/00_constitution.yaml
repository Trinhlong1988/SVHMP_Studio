R56_story_mode_hoi_tuong_am_anh:
  # round 14 add 2026-06-28 (Mr.Long CORE FEEDBACK)
  rule: "REVEAL phải là HỒI TƯỞNG ÁM ẢNH TÂM LINH — CẤM kể lể chronological year-by-year"
  is_truyen_mode:
    must_be:
      - '"Hồi tưởng" — fragments ký ức không tuyến tính'
      - '"Ám ảnh tâm linh" — chi tiết quay trở (vật/âm/mùi/ánh)'
      - '"Dư âm" — kết để mở, viewer suy nghĩ tiếp'
      - '"Sensory anchor" — mỗi memory có 1 vật/âm/mùi cụ thể neo lại'
    must_NOT_be:
      - 'Kể lể tuyến tính: "Năm tôi X — Năm tôi Y — Năm tôi Z..."'
      - 'Liệt kê đời: học cấp 1, cấp 2, đại học, đi làm, cưới...'
      - 'Recap biography từ A→Z'
      - 'Show resume (lương, vị trí công ty)'
  example_correct: |
    "Tay bà run. Lạnh.
     Em nhớ tay bà ấm. Hồi mười tuổi. Bà chải tóc em.
     Bây giờ tay bà — lạnh — em không chải lại được.
     Khăn tay trong túi áo bà. Em mở. Hai đầu thêu hoa cúc.
     Cùng cúc bà cài tóc — hồi đám tang ông."
  example_wrong: |
    "Em là Bích Trâm. 32 tuổi. Em làm giáo viên.
     Năm em 18 tuổi sinh Linh. Em chia tay bố Linh khi em 2 tuổi.
     Em nuôi Linh một mình 18 năm. Em đi dạy ở trường X..."
  detection_patterns:
    - '"Năm tôi/em [age] tuổi" lặp 5+ lần consecutive = chronological recap'
    - '"Em làm [job]" intro full resume = biography mode'
    - 'Year-by-year breakdown > 60% REVEAL = miên man'
  enforcement: tools/audit_story_mode.py + manual editorial
  cross_ref: [bible/01 series_bible.soul_dna, bible/06 lexical_style]

R66_short_sentence_chain_hardlock:
  # round 18 add 2026-06-28 — Mr.Long: "anh đến đó, anh ngồi xuống, anh đứng dậy — giật cục không mềm mại"
  rule: "1 câu ngắn (4-6 từ) phải đi kèm 1 câu dài (≥10 từ) — CẤM lạm dụng chuỗi câu ngắn liên tiếp"
  why: |
    TTS Vietnamese đọc chuỗi câu ngắn liên tiếp → rhythm chopped, giật cục.
    Nghe giống máy đọc đều đều, không tự nhiên như Ngọc Ngạn cadence.
    Mr.Long flag: "anh đến đó, anh ngồi xuống, anh đứng dậy" = lỗi.
  rule_detail:
    short_sentence: "câu 4-6 từ"
    max_consecutive: 2  # tối đa 2 câu ngắn liền — câu thứ 3 PHẢI dài ≥10 từ
    exception: "Cho phép sử dụng trường hợp đặc biệt nhấn mạnh dramatic — KHÔNG được lạm dụng"
  example:
    bad: |
      Anh đến đó.
      Anh ngồi xuống.
      Anh đứng dậy.
    good: |
      Khải Phong đến đó. Người đàn ông ngồi xuống một lúc, rồi từ từ đứng dậy bước ra ngoài.
  enforcement: tools/audit_short_chain.py (build phase 2)
  cross_ref: [R60 short EOL, R61 short START, R62 anaphora]

R73_lufs_gating_hardlock:
