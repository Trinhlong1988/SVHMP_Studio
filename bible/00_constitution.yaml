        - '[3.2] R89 spectrum baseline (RMS -22 to -12, peak ≤ -0.1)'
        - '[3.3] Boundary continuity (clicks < 10 với threshold 0.8)'
        - '[3.4] R88 head onset audit (voice reach -20dB within 50ms)'
      blocks_on_fail: 'ship to Mr.Long'
    stage_5_pre_commit:
      tool: '.githooks/pre-commit'
      checks: ['R86 + R87 + R88 + R89']
      blocks_on_fail: 'git commit'
    workflow:
      proper: 'STAGE 1 → render → STAGE 3 audit → if FAIL fix + restart STAGE 1 → if PASS ship → STAGE 5 commit'
      antipattern: 'render → ship → Mr.Long flag → fix 1 layer → re-render (em iterate v22-v33 vì thiếu gate)'
    added: '2026-06-29 09:30'
    why: 'Mr.Long: "đã có bài học kinh nghiệm rồi sao vẫn bị" — em REACTIVE iter 12 versions vì thiếu audit gate. R90 force PROACTIVE workflow.'

  - id: R91
    name: 'MASTER PIPELINE LOCK + cấm REACTIVE render (HARDLOCK Mr.Long capslock 29/6)'
    severity: HARD_BLOCK
