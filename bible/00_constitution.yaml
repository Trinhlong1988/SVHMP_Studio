# ============================================================
# REVISION POLICY
# ============================================================

revision_policy:
  immutable_fields:
    - identity.*
    - ALWAYS.*
    - NEVER.*
    - GHOST_RULES.*
  amendable_fields:
    - ENDING_RULES.lingering_question.value (preferred → mandatory possible)
    - SERIES_RULES.bell.max_per_episode (nếu Mr.Long quyết bỏ chuông hẳn)
  who_can_amend: Mr.Long ONLY
  process: "Edit 00_constitution.yaml + bump version + add changelog entry"

changelog:
  - version: 1.0
    date: 2026-06-23
    author: Mr.Long
    note: "Initial lock sau EP01 v7_final_round3_lock golden reference."
  - version: 1.1
    date: 2026-06-27
    author: Mr.Long (em codify lesson learned)
    note: |
      Round 4 amend — add SERIES_ARC_RULES R33-R38 chống "lộn xộn không thành bản nhạc".
      Trigger: Mr.Long 26/6 reject EP11-41 — viết linear theo pillar / flat intensity / no cross-EP arc.
      Lesson: Per-EP constitution PASS không đảm bảo series-level "bản nhạc".
      Fix: Add 6 series-wide ARC rules (interleave / escalation / memory progressive / callback / milestone / object sub-arc).
      Cross-ref bible/21_series_arc_design.yaml mới (EP-level arc map).
      QA Lock thêm PHASE 12.16-12.18 enforce R33-R38.

  - id: R86
    name: 'EOL diacritic ban — ngã/nặng/hỏi (HARDLOCK)'
    severity: HARD_BLOCK
    rule: 'CẤM TUYỆT ĐỐI sentence/chunk kết thúc bằng từ mà ký tự cuối có dấu ngã (combining U+0303), dấu nặng (combining U+0323), dấu hỏi (combining U+0309). BigVGAN vocoder không model accurate glottal stop pitch contour → âm ngắn cụt / hụt hơi / lệch tone / phát thành dấu sai.'
    banned_chars_complete:
      hoi:   ['ả', 'ẳ', 'ẩ', 'ẻ', 'ể', 'ỉ', 'ỏ', 'ổ', 'ở', 'ủ', 'ử', 'ỷ']
      nga:   ['ã', 'ẵ', 'ẫ', 'ẽ', 'ễ', 'ĩ', 'õ', 'ỗ', 'ỡ', 'ũ', 'ữ', 'ỹ']
      nang:  ['ạ', 'ặ', 'ậ', 'ẹ', 'ệ', 'ị', 'ọ', 'ộ', 'ợ', 'ụ', 'ự', 'ỵ']
    banned_unicode_combining_marks: ['U+0303 ngã', 'U+0309 hỏi', 'U+0323 nặng']
    examples_banned_words: ['nữa', 'đã', 'cũng', 'nhỏ', 'vỏ', 'rõ', 'cả', 'ạ', 'nhẹ', 'chỗ', 'tủ', 'sợ', 'nở', 'mở', 'ngỗ', 'hỏi', 'ở', 'thử', 'đặt', 'mặt', 'lại', 'chậm', 'ngại', 'lặng', 'Nội', 'mịch', 'tĩnh', 'lạnh', 'lệ', 'dạ', 'lụa']
    examples_safe_eol: ['rồi', 'này', 'kia', 'đó', 'nay', 'mai', 'sáng', 'tối', 'đêm', 'ngày', 'thôi', 'hôm nay', 'lúc đó', 'nhanh', 'lắm', 'ấy', 'này nữa rồi']
    fix_strategy:
      - 'Reword EOL với từ kết thúc dấu SẮC ́ / HUYỀN ̀ / KHÔNG-DẤU'
      - 'Prefer nguyên âm đóng + phụ âm /-n/, /-m/, /-ng/, /-t/, /-p/, /-k/'
      - 'KHÔNG sliding glide tail /-j/, /-w/ với từ có dấu ngã/nặng/hỏi'
      - 'Tên riêng (Hà Nội, Mỹ Chi…) bắt buộc giữ → MERGE sang câu sau, KHÔNG để EOL'
    detect_tool: 'tools/qa_eol_diacritic.py — scan NFD combining 0x0303/0x0309/0x0323 trên ký tự cuối từ cuối câu'
    enforce:
      pre_render: 'qa_eol_diacritic.py BLOCK render nếu > 0 violations'
      post_render: 'auto-flag chunk có EOL banned tone for re-render với reworded text'
    added: '2026-06-29 06:30'
    updated: '2026-06-29 07:00 — full diacritic chars + enforce gate'
    why: 'Mr.Long catch v25 nữa/mườ/ngày-nào-nữa/Hà-Nội/tĩnh-mịch hụt chữ — BigVGAN vocoder không thể model accurate 6-tone Vietnamese tại EOL, đặc biệt 3 dấu glottal stop pattern (ngã/nặng/hỏi)'

  - id: R87
    name: 'Pause = ZERO TUYỆT ĐỐI + trim 1/1000 precision (HARDLOCK)'
    severity: HARD_BLOCK
    rule: 'Mọi đoạn pause/silence giữa chunks PHẢI có amplitude = 0 TUYỆT ĐỐI. KHÔNG residue, KHÔNG breath, KHÔNG vocoder noise tail. Trim precision = 1ms (1/1000 second) cho word-end detection.'
    requirements:
      pause_silence: 'np.zeros(pause_ms * sr / 1000) — pure zero amplitude bridge'
      trim_precision: '1ms window (= 22 samples @ 22050Hz) for word-end RMS detection'
      truncate_policy: 'TRUNCATE AT detected word-end (NO grace zone keeping voice content)'
      fade_method: 'Linear fade 25ms INSIDE last voice content → 0 at truncate point (chống click, no residue past truncate)'
      no_post_trim_fade: 'KHÔNG fade_tail post-truncate (already smooth via linear fade inside voice)'
      no_zero_pad: 'KHÔNG zero pad after truncate (audio ends AT 0 already)'
    verification_audit:
      method: 'Find pauses >=1200ms in final audio, measure peak amplitude in pause zones'
      pass_criteria: 'ALL pauses peak < -70 dBFS (true silence inaudible)'
      fail_criteria: 'ANY pause peak > -55 dBFS (audible residue)'
      tool: 'tools/qa_pause_silence.py (TBD)'
    pipeline_v31:
      stage_1: '1ms-precise scan backwards 600ms — find last window RMS > -30dB'
      stage_2: 'Truncate AT detected word-end (NO grace keep)'
      stage_3: 'Linear fade 25ms INSIDE voice (last 25ms before truncate)'
      stage_4: 'Concat với np.zeros(pause_ms) bridge — pure silence'
    why: 'Mr.Long catch v22-v30 vẫn còn ù/phù/tiếng-gió/tiếng-thở ở pause boundaries. ROOT CAUSE: pipeline keep grace zone 40ms với voice content -27 đến -50dB AUDIBLE. FIX: hard truncate ngay word-end + smooth voice→0 fade INSIDE voice.'
    added: '2026-06-29 08:00'
    updated: '2026-06-29 10:30 — v39 LOCKED FINAL (head_trim 1500ms search + 2-pass fallback + 2-stage agate)'
    enforced_by: 'svhmp_v13_render.py v39 (aggressive_trim_tail + aggressive_trim_head 2-pass + 2-stage agate)'
    pipeline_v39_FINAL_LOCKED:
      tail_trim:
        method: '1ms-precise scan backwards 600ms'
        threshold: '-30 dBFS find word-end'
        action: 'TRUNCATE AT word-end (NO grace keep)'
        fade: 'EXP 30ms inside voice (e^-12 = 0.000006 ratio)'
      head_trim:
        method: '1ms-precise scan forward 1500ms (PASS 1) + 1500ms fallback (PASS 2)'
        pass_1_threshold: '-15 dBFS strict (catch full voice)'
        pass_2_threshold: '-25 dBFS fallback (catch quiet voice chunks)'
        action: 'Trim từ (first_voice - 1ms) preserve attack'
        fade: 'EXP fade-in 8ms (e^-12 reverse)'
        bug_v33_v37: 'search_ms=400 → fail detect chunks với voice ramp >400ms → keep entire chunk → audible'
      bridge: 'np.zeros(pause_ms * sr / 1000) — TRUE SILENCE'
      ffmpeg_chain:
