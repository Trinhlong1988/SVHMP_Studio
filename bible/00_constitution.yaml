  - id: R103
    name: 'amix ≠ concat — sequential audio dùng concat'
    severity: HARD_BLOCK
    rule: 'amix MIXES audio inputs (chồng chéo). concat NỐI TIẾP. Để ghép HOOK + SETUP sequential PHẢI dùng concat=n=2. Sai dùng amix = 2 voices play đồng thời.'
    forbidden: 'amix=inputs=2:duration=longest cho sequential voice (= chồng đè)'
    correct: 'concat=n=2:v=0:a=1 (hoặc concat=n=3 với silence bridge)'
    added: '2026-06-29 14:25'
    why: 'Em SAI dùng amix cho HOOK+SETUP → chồng đè 134s đầu. Mr.Long catch "chồng đè lên nhau".'

