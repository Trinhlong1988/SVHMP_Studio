rule_R181_verb_noun_compatibility:
  description: "Verb-Noun pair phải fit natural Vietnamese (extends R180 collocation)"
  severity: Major
  example_violations:
    - 'chuông bò qua phòng (chuông không bo)'
    - 'ánh mắt chảy xuống (ánh mắt không chảy)'
    - 'màn sương khép chặt (sương không khep)'
  enforce: tools/qa_collocation.py (TBD build)

rule_R182_adjective_noun_compatibility:
  description: "Adj-Noun pair tự nhiên VN"
  severity: Major
  example_violations:
    - 'đèn vàng cứng (cứng không hợp đèn)'
    - 'sương đêm sắc (sắc không hợp sương)'
  enforce: qa_collocation.py

rule_R183_register_consistency:
  description: "Register (formality) consistent per character + scene"
  severity: Major
  examples:
    - 'bà cụ KHÔNG nói: Theo quan điểm của tôi...'
    - 'đứa bé KHÔNG dùng từ Hán Việt cao'
    - 'dialogue gần gũi (cô-cháu) KHÔNG mix với formal speech'
  enforce: per-character voice profile (R178)

rule_R184_ai_style_sentence_detector:
  description: |
    Phát hiện các pattern câu LLM-generic "AI tone" — câu đối xứng quá đều, kết luận khuôn mẫu,
    transition từ ngữ phổ biến.
  severity: Major
  ai_pattern_examples:
    - "Tóm lại..."
    - "Cuối cùng..."
    - "Trong khoảnh khắc ấy..."
    - "Điều quan trọng là..."
    - "Có thể nói rằng..."
    - "Cảm giác như..."
    - 5+ câu liên tiếp cùng cấu trúc (Subject+Verb đầu)
  enforce: tools/qa_ai_style.py (TBD build) — score per chunk based on N-gram + sentence rhythm

rule_R185_corpus_collocation_db:
  description: |
    Build corpus collocation DB từ 20-50 truyện approved (SVHMP DNA-validated).
    Trích cặp noun-verb / noun-adj / verb-adverb.
    QA: Ưu tiên kết hợp đã có, flag novel combinations review.
  severity: Long-term
  enforce: tools/build_corpus_collocation.py (TBD)
  status: PLANNING


