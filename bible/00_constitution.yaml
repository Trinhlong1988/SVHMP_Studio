  novelty_guard:
    file: bible/08_novelty_constraints.yaml
    summary: |
      11-axis distance + novelty_hash 7-dim (threshold 0.40/0.50/0.70/0.90).
      Numbers stricter than Mr.Long round-3-docx-15:49 suggestion (kept 08 since lock 2026-06-19).
    enforced_by: Generator pre-write + QA PHASE 12.13

  emotion_intensity:
    file: bible/09_emotion_intensity.yaml
    summary: |
      1D level scalar 0.45→0.95 (legacy) + 2D axis_breakdown {sorrow, mystery} per phase (round 3 add).
      Sorrow peaks per ep beat_4. Mystery peaks series ep 73.
    enforced_by: Generator depth + TTS multiplier + Video saturation + QA PHASE 12.8

  driver_reveal_budget:
    file: bible/18_driver_reveal_budget.yaml
    summary: |
      Cumulative cap % theo phase (5/10/25/60/95/98/100). Clue weight taxonomy.
      Fact_073_X reveal ONLY ở source_ep. North star QA question added.
    enforced_by: Generator pre-write budget check + QA PHASE 12.0 driver_reveal_budget sub-check

  arc_rolling_expansion:                 # round 12 add 2026-06-26 (Phase D1 Pattern 5)
    file: bible/20_arc_rolling_expansion.yaml
    summary: |
      Codify state.arcs[] schema implicit pattern (round 8 B5 fix).
      6 consistency rules AC1-AC6: payoff_owner_presence, payoff_ep_timing, canon_lock_immutable,
      status_monotonic, payoff_duration_cap, high_importance_series_invariants.
      Rolling season expansion: full S1 (ep 1-30) / skeleton S2 (ep 31-60) / skeleton minimal S3 (ep 61-90).
    enforced_by: QA Lock PHASE 12.14 (NEW round 12) + Director.step_1 arc carry forward

  anti_slop_vietnamese:                  # round 14 add 2026-06-26 (F1 adapt autonovel)
    file: bible/22_anti_slop_vi.yaml
    summary: |
      Word-level + structural AI-tell detection adapt từ NousResearch/autonovel ANTI-SLOP.md + ANTI-PATTERNS.md.
      10 tier-1 banned Vietnamese words (đột nhiên/như thể/không thể nào quên/...) + 10 tier-2 cluster
      + 9 tier-3 filler + 8 structural patterns AP1-AP8 (over-explain/triadic/negative-assertion/simile-crutch/...).
      Complementary với 32 hiến pháp R1-R32 (structural) — KHÔNG overlap.
    enforced_by: QA Lock PHASE 12.15 (NEW round 14) + Generator pre-write hint

# ============================================================
# NORTH STAR QA QUESTION (round 3 add)
# ============================================================
# Áp dụng sau khi check ALWAYS_5 / NEVER_7 / GHOST_RULES_3 / ENDING_RULES.

north_star:
  question: "Nếu bỏ tên series đi, người nghe còn cảm nhận được 'một chuyến xe đêm dành cho những người còn một điều chưa kịp nói' không?"
  apply_at: QA PHASE 12.0 sau constitution check
  if_no: "critical_error: north_star_violation"
  rationale: |
    Tập có thể PASS hết rule kỹ thuật nhưng vẫn KHÔNG đúng core_promise.
    North star là kiểm tra cuối — series identity còn nhận ra không.

# ============================================================
# ENFORCEMENT — cách Constitution áp vào pipeline
# ============================================================

enforcement:
  generator:
    pre_write:
      - load 00_constitution + 01_series_bible + 11_regret_catalog
      - reject prompt vi phạm NEVER / GHOST_RULES
    during_write:
      - sentence-level diction check (06_lexical_style)
      - object pick từ 12_object_library
    post_write:
      - self-check ALWAYS 5 mục present

  qa_lock:
    HARD_FAIL_triggers:
      - any NEVER violation
      - any GHOST_RULES violation
      - missing ALWAYS principle
      - aftertaste resolved (vi phạm ENDING_RULES.unresolved_memory)
      - bell > 1
      - ghost_visual > 1
      - driver speak câu thứ 3 (trừ ep 73/90)

  tts_director:
    - không render SFX gore / jump_scare_spam
    - bell SFX max 1 instance / ep

  video_director:
    - không render visual gore / monster / combat scene
    - ghost manifestation visual max 1 / ep

# ============================================================
# REVISION POLICY
# ============================================================

revision_policy:
  immutable_fields:
    - identity.*
    - ALWAYS.*
    - NEVER.*
    - GHOST_RULES.*
  amendable_fields:
    - ENDING_RULES.lingering_question.value (preferred → mandatory possible)
    - SERIES_RULES.bell.max_per_episode (nếu Mr.Long quyết bỏ chuông hẳn)
  who_can_amend: Mr.Long ONLY
  process: "Edit 00_constitution.yaml + bump version + add changelog entry"

changelog:
  - version: 1.0
