# SVHMP — bible/36 VIETNAMESE STYLE & GRAMMAR DATABASE v0.1 (seed)
# Mr.Long approve 30/6 20:30 "cách dùng từ tinh tế, hoa mỹ và khoa học"
# Phase A skeleton — 50 seed entries từ EP01 fix catalog.
# Phase B (later): curate 500 entries từ Hoàng Phê + Ngọc Ngạn corpus.

version: 0.1
lock_date: 2026-06-30
authority: Mr.Long
seed_source: EP01 fix catalog T1-T14 + B60 driver dialogue + R178b time markers + R180b collocation

# ============================================================
# COLLOCATIONS — đúng/sai cho Vietnamese narrative literary
# ============================================================
collocations:
  cai_nhin:
    base: "cái nhìn"
    valid_modifiers:
      - thoáng qua
      - đăm chiêu
      - sâu thẳm
      - lạnh
      - lạnh lùng
      - dịu dàng
      - bồi hồi
      - âm thầm
      - lặng lẽ
    forbidden_modifiers:
      - rất ngắn        # SAI — em B-T14 catch
      - rất dài         # SAI — không có duration cảm xúc
      - rất to          # SAI — kích thước không gắn với "cái nhìn"
      - rất nhỏ         # SAI
    grammar_note: "Cái nhìn + tính từ cảm xúc/thái độ/khoảng cách tinh thần. KHÔNG kích thước."
    source: ["Hoàng Phê 1998", "Ngọc Ngạn audiobook style"]

  anh_nhin:
    base: "ánh nhìn"
    valid_modifiers: [trìu mến, sâu thẳm, ấm áp, bồi hồi, xa xăm]
    forbidden_modifiers: [rất to, rất nhỏ, rất ngắn]

  noi_thi_tham:
    base: "thì thầm"
    valid_patterns:
      - "thì thầm bí ẩn"
      - "thì thầm trong tai"
      - "thì thầm với chính mình"
    forbidden_patterns:
      - "thì thầm to"   # contradictory
    note: "Thì thầm = thầm thì cũ. Hiện đại dùng 'thì thầm'."

  bac_tai_buong:
    base: "bác tài buông"
    valid: "buông một cái nhìn thoáng qua / buông tiếng thở dài / buông tay khỏi vô-lăng"
    forbidden: "buông một cái nhìn rất ngắn"

# ============================================================
# SYNONYM TABLE — vary repetition (R177 + R74)
# ============================================================
synonyms:
  so_emotion:
    base: "sợ"
    register: literary
    alternatives:
      - ám ảnh         # ám ảnh thâm sâu
      - khiếp đảm      # mạnh hơn sợ
      - rúng động      # nội tâm rung chuyển
      - bất an         # nhẹ hơn sợ
      - hoảng hốt      # cường độ cao + ngắn hạn
      - kinh hãi       # formal/old
    chain_max: 1       # cấm dùng "sợ" >1 lần/100w EP01-90
    example_fix_old: "Tôi vẫn còn sợ... sợ đến tận hôm nay. Sợ mở ngăn tủ..."
    example_fix_new: "Tôi vẫn còn sợ... ám ảnh đến tận hôm nay. Mỗi lần mở ngăn tủ..."

  kinh_window:
    base: "cửa kính"
    alternatives:
      - cửa xe
      - khung kính
      - tấm kính
      - lớp kính
    note: "Vary trong cùng đoạn để tránh R177 adjacent repeat"

  nhin_action:
    base: "nhìn"
    alternatives_literary:
      - ngước nhìn
      - quay nhìn
      - dõi mắt
      - đăm đăm
      - thoáng nhìn
      - liếc
      - ngoảnh
    register_map:
      formal: [dõi mắt, ngoảnh]
      literary: [ngước, đăm đăm, thoáng nhìn]
      colloquial: [nhìn, liếc]

  mat_action:
    base: "mở mắt / nhắm mắt"
    alternatives_literary:
      - chầm chậm mở mắt
      - hé mở
      - khẽ khàng mở
      - trong giây lát
      - lặng lẽ khép
    note: "Tránh ngắn cụt 'mở mắt.' / 'nhắm mắt.' — luôn add complement"

# ============================================================
# LITERARY VOCABULARY — hoa mỹ tinh tế
# ============================================================
literary_vocab:
  pace_descriptors:
    - chầm chậm
    - khe khẽ
    - khẽ khàng
    - lặng lẽ
    - thì thầm
    - man mác
    - lưu luyến
    - bồi hồi
  emotion_atmosphere:
    - sâu thẳm
    - êm đềm
    - xa xăm
    - mong manh
    - mơ hồ
    - hư ảo
    - lành lạnh
    - se sắt
  horror_specific:
    - âm u
    - u uẩn
    - âm vang
    - rờn rợn
    - se lạnh
    - hắt hiu

# ============================================================
# FORBIDDEN AI-isms (extends bible/22)
# ============================================================
ai_slop_extended:
  - phrase: "Có lẽ"
    max_per_episode: 3
    note: "Overused AI hedge"
  - phrase: "Đó là một"
    max_per_episode: 2
    note: "AI definition pattern"
  - phrase: "Trong khoảnh khắc"
    max_per_episode: 2
    note: "AI dramatic filler"
  - phrase: "Một cách"
    max_per_episode: 5
    note: "AI adverb phrase — vary"
  - phrase: "Vô cùng"
    max_per_episode: 3
    note: "AI intensifier"
  - phrase: "Tinh khiết"
    max_per_episode: 1
    note: "AI poetic overuse"

# ============================================================
# GRAMMAR RULES — Vietnamese văn phạm core
# ============================================================
grammar_rules:
  G01_chot_question:
    description: "'chợt' + câu hỏi SAI ('Anh chợt hiểu chưa?' WRONG)"
    correct: "'chợt' đi với past-tense statement"
    source: "R44 B55 30/6"

  G02_double_preposition:
    description: "double 'vào lên' / 'trong trong' SAI"
    correct: "Chọn 1 preposition phù hợp context"
    source: "R88 catch B-EP01"

  G03_pronoun_distance:
    description: "'cô gái ấy' chỉ stranger POV; 'cô ấy / tên' cho known character"
    source: "R107 fix B-EP01"

  G04_time_marker_pause_flashback:
    description: "Cụm hôm/ngày/đêm/thuở/hồi + ấy MỞ ĐẦU hồi tưởng PHẢI có pause sau ≥400ms"
    source: "R178b Mr.Long lock 30/6 17:36"

  G05_collocation_kichthuoc:
    description: "Tính từ kích thước (dài/ngắn/to/nhỏ) KHÔNG dùng với danh từ trừu tượng (cái nhìn, ánh mắt, nụ cười)"
    correct: "Dùng tính từ cảm xúc/thái độ/thời gian phù hợp"
    source: "R180b Mr.Long lock 30/6 17:40 B-T14"

  G06_em_dash_dramatic:
    description: "Em-dash double-space-emdash-space cho dramatic pause / interruption"
    pattern: " — "
    avoid_pattern: ",  "
    avoid_note: "double-space comma"
    source: "Ngọc Ngạn narrative style"

  G07_pronoun_dialogue_attribution:
    description: "Khi narrator kể, dialogue trực tiếp KHÔNG cần 'anh nói:' nếu context rõ"
    source: "R132 dialogue_attribution"

# ============================================================
# TIME / SPACE MARKERS (R178b enforcement)
# ============================================================
time_markers_flashback:
  triggers:
    - hôm ấy
    - ngày ấy
    - đêm ấy
    - thuở ấy
    - hồi ấy
    - lúc ấy
    - khi ấy
    - năm ấy
    - hôm đó
    - ngày đó
    - đêm đó
    - tối ấy
  must_have_pause_after_ms: 400
  context_filter: only_at_clause_start

# ============================================================
# DRAMATIC DEVICES (horror genre)
# ============================================================
horror_devices:
  ellipsis_use:
    pattern: "..."
    contexts:
      - "Bỗng nhiên... [event]"
      - "Cô ấy thì thầm: ..."
      - "[char] khẽ nói: ..."
    max_per_paragraph: 3

  em_dash_reveal:
    pattern: " — "
    contexts:
      - "Anh khựng người — Hạ-Vy từng hát một câu rất giống như vậy"
      - "Bóng anh mờ dần — cửa xe đóng lại"
    purpose: "Dramatic pause + revelation"

  pause_marker_explicit:
    pattern: "[pause:Xms]"
    range_ms: [200, 3000]
    contexts:
      - Dramatic gap (1200-1500ms)
      - Section transition (1500ms)
      - Subtle hesitation (300-400ms)

# ============================================================
# REGISTER MAP
# ============================================================
register_map:
  formal:
    - thưa
    - quý vị
    - nguyện
    - kính
  literary:
    - bồi hồi
    - man mác
    - lưu luyến
    - sâu thẳm
  colloquial:
    - thật
    - ơi
    - đấy
    - mà
  horror_narrative:
    - rờn rợn
    - se sắt
    - âm u
    - hắt hiu

