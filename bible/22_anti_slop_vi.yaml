# ============================================================
# TIER 1 — Vietnamese AI-tell words (lạm dụng = flag rewrite)
# ============================================================
# Single-word check. Frequency > threshold trong 1 ep = flag.

tier_1_banned_words_vietnamese:
  description: "Từ AI Vietnamese hay lạm dụng. Vẫn dùng được nhưng cluster = AI-tell rõ."
  threshold_max_per_ep: 3   # vượt 3 lần / ep = WARN

  words:
    - word: "đột nhiên"
      reason: "AI hay dùng làm transition mặc định. Real Vietnamese narrative dùng đa dạng: bỗng, chợt, vụt, thoáng, lúc đó."
      alternatives: [bỗng, chợt, vụt nhiên, thoáng cái, lúc đó]
      precedent: "32 hiến pháp R4 mispronounce trigger (Bất chợt → Bỗng nhiên)"

    - word: "bỗng nhiên"
      reason: "Tương tự đột nhiên. Lạm dụng = rhythm flat."
      alternatives: [bỗng, chợt, lúc đó, vụt]

    - word: "trong khoảnh khắc đó"
      reason: "Cliché AI horror Vietnamese. Real narrative ít dùng phrase này."
      alternatives: [lúc ấy, khi đó, giây phút ấy, ngay khi]

    - word: "không thể nào quên"
      reason: "Phrase AI Vietnamese horror lạm dụng. Telling instead of showing."
      alternatives: ["còn nhớ rõ", "in sâu trong trí", "vẫn nhớ từng chi tiết"]
      cross_ref: "32 hiến pháp R5 ENDING_PHRASES — 'không thể nào quên' đã trong R5 list. Sync."

    - word: "như thể"
      reason: "Simile crutch (autonovel #5). AI dùng 'như thể' thay vì describe direct."
      alternatives: [như, tưởng chừng, cứ như, có vẻ]

    - word: "có lẽ"
      reason: "Hedge AI. Overuse = unconfident narrator. Horror cần narrator confident."
      alternatives: [có thể, hình như, biết đâu]

    - word: "dường như"
      reason: "Hedge AI same với 'có lẽ'. Lạm dụng = vô hồn."
      alternatives: [hình như, có vẻ, tưởng chừng]

    - word: "vô cùng"
      reason: "Adverb generic AI. Real narrative dùng cụ thể (rất, quá, lắm, đến mức)."
      alternatives: [rất, quá, lắm, kinh khủng, đến mức]

    - word: "thầm lặng"
      reason: "Adjective AI horror cliché. Dùng quá nhiều = flat."
      alternatives: [im lìm, lặng lẽ, không tiếng động]

    - word: "rùng mình"
      reason: "Cliché reaction AI horror. Show body specific: tóc gáy dựng, cổ lạnh buốt, tim đập."
      alternatives: ["tóc gáy dựng đứng", "cổ lạnh ngắt", "tim hụt 1 nhịp"]

# ============================================================
# TIER 2 — Suspicious in clusters (3+ trong 1 đoạn = flag)
# ============================================================

tier_2_cluster_suspicious:
  threshold_cluster_per_paragraph: 3

  words:
    - "thoáng": "Generic transition AI hay dùng"
    - "khẽ": "Adverb filler"
    - "se sẽ": "Filler"
    - "lặng lẽ": "Adjective generic AI"
    - "dần dần": "Telling instead of showing pace"
    - "nhẹ nhàng": "Generic adverb"
    - "chậm rãi": "Pace filler, lạm dụng = drag"
    - "vô hình": "Cliché horror"
    - "ánh mắt": "Body part filler (autonovel similar pattern)"
    - "khuôn mặt": "Body part filler"

# ============================================================
# TIER 3 — Filler phrases (zero information, just delete)
# ============================================================

tier_3_filler_phrases:
  always_delete:
    - "Trong khi đó,"      # transition AI filler
    - "Mặt khác,"          # academic AI tone không hợp horror narrative
    - "Đáng chú ý,"
    - "Đáng kể,"
    - "Cần lưu ý rằng"
    - "Có một điều đặc biệt là"
    - "Thực ra,"          # hedge filler
    - "Nói chung,"        # academic
    - "Một cách nào đó,"  # hedge

# ============================================================
# STRUCTURAL ANTI-PATTERNS (autonovel ANTI-PATTERNS.md adapt)
# ============================================================

structural_patterns:

  AP1_over_explain:
    description: "AI giải thích metaphor/symbol mới vừa dùng. Real writer trust reader."
    example_bad: |
      "Đồng hồ kim dừng 7:10. Đó là giờ Hà mất. Kim không động nữa vì Hà đã không còn. Đồng hồ
      như đang nhớ về Hà. Quang nhìn đồng hồ, anh hiểu ý nghĩa của giờ 7:10."
    example_good: |
      "Đồng hồ kim dừng 7:10. Quang nhắm mắt."
    flag_pattern: "Câu sau giải thích câu trước bằng phrase 'nghĩa là', 'tức là', 'vì', 'do đó'"
    cross_ref: "32 hiến pháp R8 câu flat → tò mò"

  AP2_triadic_listing:
    description: "AI lạm dụng list 3-item: 'A, B, và C' / 'không A, không B, không C'"
    example_bad: |
      "Anh thấy cô gái áo gió xanh, mái tóc dài, ánh mắt buồn."
    example_good: |
      "Anh thấy cô gái áo gió xanh."
    flag_pattern: "Câu chứa 2 dấu phẩy ngăn cách 3 noun phrase + 'và'/'cùng'"
    threshold_max_per_ep: 3

  AP3_negative_assertion_repetition:
    description: "AI hay 'không A, không B, không C'. 1 negation OK, 3+ = pattern."
    example_bad: |
      "Anh không nói. Anh không nhìn. Anh không động đậy."
    example_good: |
      "Anh đứng yên."
    cross_ref: "32 hiến pháp R1 updated pattern 'X không Y, X chỉ Z' lặp"

  AP4_simile_crutch:
    description: "Lạm dụng 'như' / 'như thể' / 'tựa như'. 3+ similes / scene = AI."
    threshold_max_per_scene: 3
    cross_ref: "tier_1 'như thể'"

  AP5_dialogue_as_prose:
    description: "Nhân vật nói như viết văn. Real dialogue có ngắt câu, từ thừa ('à', 'thì', 'mà')."
    example_bad: |
      "Cô gái nói: 'Tôi vẫn nhớ rõ ngày hôm đó, khi cha tôi rời nhà ra đi mà không một lời từ biệt.'"
    example_good: |
      "Cô gái khẽ: 'Cha đi... không nói gì hết.'"
    cross_ref: "32 hiến pháp R19 dialog character ≠ narrator"

  AP6_predictable_emotional_arc:
    description: "AI mặc định arc 'shocked → understand → accept'. Real horror linger ở unresolved."
    cross_ref: "bible/00 ENDING_RULES.unresolved_memory mandatory"

  AP7_section_break_rhythm_crutch:
    description: "AI dùng '---' / 'section break' thay vì smooth transition. SVHMP TTS narrate không có visual break → cần verbal transition."

  AP8_paragraph_uniformity:
    description: "Paragraph dài đều nhau = AI rhythm. Real prose vary length (1 câu emphasis, 5-7 câu develop)."

