# SVHMP — 17 SFX ACQUISITION PIPELINE (round 16 — Mr.Long 19/6 "đưa vào quy trình chặt chẽ")
# Status: IMMUTABLE workflow — KHÔNG ad-hoc download. Mọi SFX vào series PHẢI qua pipeline này.
# Loaded by: tools/sfx_acquire.py + TTS Director M4 SFX DUCKING + bible/05 audio_bible (asset_registry sync)

version: 1.0
lock_date: 2026-06-19
purpose: |
  Acquisition + processing + lock SFX assets theo quy trình 8-step nghiêm ngặt.
  Mọi SFX trong bible/05 PHẢI có entry trong này + qua pipeline + checksum lock.
  Tránh: ad-hoc download / different sample rates / LUFS drift / copyright drift.

# ============================================================
# STEP 1 — REQUIREMENT SPEC (per SFX asset)
# ============================================================

requirement_spec_template:
  asset_id: <bible/05 entry name — vd bell_resonance>
  purpose: <vd "bell ngân khi REGRET LINE land in beat_4">
  target_duration_ms: <vd 1500>
  target_loudness_lufs: <vd -16>
  target_peak_db: <vd -3>
  channels: mono | stereo
  sample_rate_hz: 44100 (match TTS output) OR 48000 (production target)
  emotional_tone: <vd "soft warm resonant" / "harsh metallic — FORBIDDEN">
  pairable_with: <list ep section/beat>
  forbidden_qualities: <vd "no harsh attack / no high-pitched ring / no echo > 2s">

# ============================================================
# STEP 2 — SOURCE PRIORITY (decision tree)
# ============================================================

source_priority:
  tier_1_FREE_CC0:
    - freesound.org (filter: license=CC0)
    - pixabay.com/sound-effects (free for commercial)
    - youtube_audio_library (free, no attribution required)
    - mixkit.co (free SFX)
  tier_2_FREE_ATTRIBUTION:
    - freesound.org CC-BY (need attribution in description)
    - bbc.co.uk/sound-effects (free for personal + small commercial)
  tier_3_AI_GENERATE:
    - "**Stable Audio Open** local (Mr.Long set 19/6 sau 17:30) — PRIMARY native 44.1kHz stereo, gen up to 47s, MIT weights"
    - "AudioLDM2 local (C:\\Users\\Administrator\\audioldm2\\ port 7866) — FALLBACK text-to-SFX 10s max"
    - "ACE-Step local (C:\\Users\\Administrator\\ace-step\\ port 7865) cho vocal generation"
    - "ElevenLabs SFX gen (cloud — $0.30/sample, last resort)"

  tier_3_routing_decision:
    - SFX naturalistic + ambient loops (rain/engine/wet_road): Stable Audio Open (native 44.1k stereo + 47s gen)
    - SFX discrete short (bell/door/footsteps/fog): Stable Audio Open (better timbre control)
    - Music ambient (piano_low_C transition): Stable Audio Open
    - Anything failing Stable Audio Open: AudioLDM2 fallback
    - Anything failing local: ElevenLabs SFX cloud

  stable_audio_open_config:
    setup_status: "Mr.Long đang setup 19/6 18:58"
    path: TBD (Mr.Long ship khi xong)
    port: TBD
    api_type: TBD (Gradio webui / FastAPI / CLI / python script)
    target_native_output: 44.1kHz stereo (KHÔNG cần resample step trong pipeline)
    target_native_format: WAV PCM s16le hoặc s24le tùy build
    cost_per_gen: $0 (local GPU)
    expected_latency: ~30-60s per 10s audio (estimate RTX 5060 Ti)
  tier_4_PAID_LICENSE:
    - epidemicsound (subscription)
    - artlist (subscription)
    - LAST RESORT only nếu tier 1-3 không có asset chất lượng

selection_rule:
  - LUÔN ưu tiên tier_1 (CC0 — no attribution complexity)
  - tier_2 chỉ khi tier_1 không đủ chất lượng — phải log attribution vào ATTRIBUTIONS.md
  - tier_3 (AI gen) cho asset signature unique (vd brand piano_low_C, brand bell_distant)
  - tier_4 KHÔNG dùng cho SVHMP (cost overflow per ep budget)

# ============================================================
# STEP 3 — SEARCH + PREVIEW (candidates)
# ============================================================

search_protocol:
  per_asset:
    - run search query trên top 3 sources tier 1
    - collect 3-5 candidate URLs
    - preview each (auto-fetch sample + listen rating heuristic OR Mr.Long manual)
    - pick top candidate per emotional_tone match + duration fit + loudness fit
  log: tools/sfx_search_log.yaml (append per asset)

search_query_templates:
  rain_light:
    - "light rain on roof loop seamless"
    - "soft rain ambient bedroom"
  bus_engine:
    - "bus diesel engine idle interior"
    - "vintage minibus engine hum loop"
  bell_resonance:
    - "small brass bell single chime soft"
    - "tibetan singing bowl gentle"
  yellow_lamp_hum:
    - "old street lamp electrical hum"
    - "fluorescent buzz low warm"
  door_open_bus:
    - "bus door open soft hiss"
    - "vintage vehicle door open"
  door_close_bus:
    - "bus door close gentle click"
  footsteps_fading:
    - "footsteps on wet pavement walking away"
    - "footsteps fading distance stereo pan"
  fog_split:
    - "soft wind whoosh subtle"
    - "mist dispersing ambient"
  wet_road:
    - "tire on wet road loop"
    - "car driving rain road continuous"
  piano_low_C:
    - "piano single low note C2 sustained reverb"
    - "deep piano note resonant warm"

# ============================================================
# STEP 4 — DOWNLOAD (automated)
# ============================================================

download_protocol:
  tool: tools/sfx_acquire.py (Python + requests)
  destination_temp: assets/sfx/_raw/{category}/{asset_id}_RAW.wav
  retry: 3 với exponential backoff
  user_agent: "SVHMP-Studio-SFX-Acquirer/1.0"
  rate_limit: 1 req / 2s per source (politeness)
  log: tools/sfx_acquire_log.yaml (timestamp + source + URL + size + checksum)

# ============================================================
# STEP 5 — PROCESSING PIPELINE (ffmpeg deterministic)
# ============================================================

processing_pipeline:
  per_asset:
    step_5a_validate:
      - check file ≥ 30 KB (not corrupt)
      - check duration > 0.1s (not empty)
      - check sample rate valid (8k-96k)

    step_5b_trim:
      - if asset.target_duration > 0: ffmpeg -ss 0 -t {target_duration}
      - if loop_seamless required: extract longest seamless segment via librosa beat detection

    step_5c_normalize:
      - ffmpeg loudnorm I={target_lufs}:TP={target_peak}:LRA=7 (2-pass measured)

    step_5d_resample:
      - ffmpeg aresample={target_sr} -acodec pcm_s16le (cho ambient/loops)
      - aresample={target_sr} -acodec pcm_s24le (cho discrete signature — bell, brand)

    step_5e_channel_fix:
      - target=mono: ffmpeg ac=1 (downmix)
      - target=stereo: keep stereo if source stereo, else duplicate L→R

    step_5f_format_naming:
      - output: assets/sfx/{category}/{asset_id}.wav
      - vd: assets/sfx/discrete/bell_v01.wav

# ============================================================
# STEP 6 — CHECKSUM LOCK
# ============================================================

checksum_lock:
  compute: sha256 của file sau processing
  store_in: bible/05_audio_bible.yaml.asset_registry.{asset_id}.checksum
  manifest: assets/sfx/CHECKSUMS.sha256 (lock manifest)
  drift_policy: any checksum change post-lock → HARD-FAIL (alert)

# ============================================================
# STEP 7 — REGISTER vào bible/05
# ============================================================

bible_register_update:
  file: bible/05_audio_bible.yaml
  section: ambience_loops | discrete_signature | passenger_exit | brand | music_beds
  fields_to_update:
    - file (path relative SVHMP_Studio/)
    - checksum: sha256:<actual>
    - duration_ms (measured)
    - source_url (provenance)
    - source_license (CC0 / CC-BY / AI-generated / etc.)
    - acquisition_date (ISO)
    - processing_log (pointer to tools/sfx_acquire_log.yaml entry)

# ============================================================
# STEP 8 — TTS QA M7 VERIFICATION
# ============================================================

qa_integration:
  per_ep_render:
    - tts.md M7 QA AUDIO load assets/sfx/CHECKSUMS.sha256
    - verify mọi SFX dùng trong ep có checksum match manifest
    - if mismatch → REJECT render + alert
  per_batch:
    - manifest unchanged 10 ep liền = healthy
    - manifest change = require Mr.Long sign-off + re-test affected eps

# ============================================================
# ATTRIBUTION TRACKING (CC-BY assets)
# ============================================================

attribution_file: assets/sfx/ATTRIBUTIONS.md
schema:
  - asset_id: bell_resonance
    source: freesound.org/people/foo/sounds/12345
    creator: "foo"
    license: CC-BY-3.0
    attribution_text: "Bell sound by foo (freesound.org), CC-BY 3.0"
    used_in: ["every ep — discrete signature"]
    require_credit_in_publisher_description: true

publisher_integration:
  rule: "Publisher P3 description Part 5 (credit_disclaimer) add attribution block nếu có asset CC-BY"
  template: |
    ━━━━━━━━━━
    ÂM THANH:
    {list each attribution_text}

# ============================================================
# ACQUISITION TARGET LIST (Ep01 priority)
# ============================================================

ep01_required_assets:
  priority_1_must_have:
    - rain_light (ambient loop ≥30s)
    - bus_engine (ambient loop ≥60s)
    - bell_resonance (1500ms discrete)
    - door_open_bus (1000ms)
    - door_close_bus (1000ms)
    - footsteps_fading (4000ms stereo pan)
    - brand_intro_components: rain_intro_4s + bell_distant + engine_hum (for M8 layer)
    - brand_outro_components: bell_single + rain_fade

  priority_2_nice_to_have:
    - yellow_lamp_hum (3000ms — chỉ khi đèn vàng xuất hiện)
    - fog_split (800ms whoosh)
    - wet_road (loop suốt xe chạy)
    - piano_low_C (transition giữa sections)

  priority_3_defer_to_ep02_plus:
    - phone_ring_distant (cliffhanger pattern F)
    - chant_distant (setting_ram_thang_bay)
    - firecracker_distant (setting_dem_giao_thua)

# ============================================================
# CMD WORKFLOW
# ============================================================

cmd_to_run_pipeline:
  bash: python tools/sfx_acquire.py --asset {asset_id} --target ep01
  batch: python tools/sfx_acquire.py --batch ep01_priority_1
  full: python tools/sfx_acquire.py --full

  options:
    --dry-run    : search + preview only, no download
    --resume     : skip assets đã có trong CHECKSUMS.sha256
    --force      : redownload + reprocess + relock (require Mr.Long sign-off)
    --gen-with-ace-step  : route to ACE-Step local cho asset music/ambient

drift_policy:
  - KHÔNG download SFX ngoài pipeline này
  - KHÔNG edit assets/sfx/ files manually sau lock
  - KHÔNG bypass step_5 processing (đảm bảo deterministic LUFS/format)
  - Asset replacement = mandatory new version (vd bell_v01 → bell_v02) + sign-off
