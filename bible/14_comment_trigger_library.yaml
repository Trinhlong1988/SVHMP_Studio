# ============================================================
# USAGE RULES
# ============================================================

selection_rules:
  - Generator pre-write: load trigger_lines + state.trigger_history (last 8 ep — distance 8)
  - filter: NOT in last 8 ep
  - pair: pillar + archetype + relationship match cumulative
  - apply: write beat_4 + beat_5 to maximize trigger_mechanism probability
  - update: ledger trigger_id used + used_count ++

distance: 8 (= same_trigger_distance — bible/08 sẽ track)

ratio_target_per_batch_10:
  family_action: ≥4 trigger (universal pull)
  love_action: ≥1
  kindness_action: ≥1
  self_existential: ≥2 trigger (deep moments)
  universal: ≥2 (T_DUNG_LAI_NHIN / T_GIA_NHU / T_NHO_ME_QUA — fallback)

cross_module_query:
  generator: pick trigger → write toward in beat_4 + beat_5
  qa_lock: PHASE 12.8 comment_trigger sub-score = how many target comments likely trigger
  publisher_P5: comment_classifier desired_keywords merge với trigger_lines.target_comment
  publisher_P11: audience_memory.top_triggers = winners feed back to Generator

forbidden:
  - target_comment dạng "tôi shock quá" / "tôi sợ" / "tôi giật mình" (anti-soul)
  - target_comment dạng "twist hay" / "AI làm hay" (meta-engagement, không soul)
  - manipulation rõ rệt ("comment ABC để được tha thứ")
