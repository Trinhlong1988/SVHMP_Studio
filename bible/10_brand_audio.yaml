# SVHMP — 10 BRAND AUDIO SIGNATURE
# Lock date: 2026-06-19 (round 11 — Mr.Long docx 13:33)
# Status: IMMUTABLE per series — KHÔNG sửa mid-production
# Loaded by: TTS Director M8 (brand audio render) / Publisher (intro/outro consistency QA)
# Mục tiêu: Người nghe chỉ cần nghe 2-3 giây đầu → biết "À, đúng kênh này rồi"

version: 1.0
lock_date: 2026-06-19
purpose: |
  Tạo signature âm thanh cố định brand — không thay đổi giữa 90 ep.
  Mọi ep mở/đóng đều có cùng audio fingerprint → recognition bền 3-5 năm.

brand_audio:
  intro:
    duration_total_ms: 6500
    sequence:
      - id: rain_4s
        type: ambient
        file: assets/sfx/brand/rain_intro_v01.wav
        duration_ms: 4000
        LUFS: -20
        description: "Mưa nhẹ trên mái xe — 4 giây mở. Tạo cảm giác đêm."
        fade_in_ms: 800
      - id: distant_bell
        type: signature_sfx
        file: assets/sfx/brand/bell_distant_v01.wav
        duration_ms: 1800
        LUFS: -16
        description: "1 nhịp chuông xa, reverb dài. Signature âm thanh kênh."
        start_offset_ms: 3500 (overlap rain)
      - id: engine_hum_start
        type: ambient
        file: assets/sfx/brand/engine_hum_v01.wav
        duration_ms: indefinite (loop suốt tập)
        LUFS: -30
        description: "Tiếng động cơ xe đêm — bắt đầu phát ở giây 5, kéo dài suốt tập"
        start_offset_ms: 5000
        low_pass_hz: 200
      - id: narrator_first_word
        start_offset_ms: 6500
        description: "Câu đầu tập bắt đầu sau intro"

  transition:
    # giữa các section (HOOK→SETUP, SETUP→INCIDENT, ...)
    duration_ms: 1200
    sequence:
      - id: low_piano_note
        type: musical_motif
        file: assets/sfx/brand/piano_low_C_v01.wav
        duration_ms: 800
        LUFS: -22
        description: "1 nốt piano trầm (note C2 hoặc D2). Sustained, slight reverb."
        fade_in_ms: 100
        fade_out_ms: 400
      - id: room_tone_continuous
        always_on: true
        description: "Rain + engine_hum vẫn loop dưới — không tắt"
    use_count_per_ep:
      between_sections: 4
      between_sections_note: "giữa 5 section transitions chính"
      avoid_at: ["before_beat_4", "before_beat_5"]
      avoid_at_note: "cần silence tuyệt đối"

  regret_line:
    # ngay trước REGRET LINE (beat_4 PHẦN 3)
    duration_ms: 3500
    sequence:
      - id: room_tone_fade_off
        action: fade rain + engine_hum to -∞
        fade_duration_ms: 1500
        description: "Tắt mọi ambient — tạo silence tuyệt đối"
      - id: silence_3s
        type: pure_silence
        duration_ms: 3000
        description: "Im lặng tuyệt đối 3 giây — viewer cảm thấy nghẹn"
      - id: room_tone_fade_back
        action: fade rain + engine_hum back to baseline
        fade_duration_ms: 800
        start_after: REGRET LINE phát xong
    apply_position: 1500ms before beat_4 PHẦN 3 dialog "Tôi không..."

  outro:
    duration_total_ms: 5500 (variable, tail có thể kéo 5s-8s)
    sequence:
      - id: bell_single_final
        type: signature_sfx
        file: assets/sfx/brand/bell_single_outro_v01.wav
        duration_ms: 1500
        LUFS: -18
        description: "1 nhịp chuông signature — đóng tập"
        start_offset_ms: 0 (ngay sau câu cuối narrator)
        pre_silence_ms: 1000 (im lặng 1s trước bell)
      - id: rain_fade
        action: fade rain_loop từ -26 → -∞
        fade_duration_ms: 2500
        start_offset_ms: 1500 (sau bell decay)
      - id: engine_hum_fade
        action: fade engine_hum từ -30 → -∞
        fade_duration_ms: 2500
        start_offset_ms: 1500
      - id: tail_silence
        duration_ms: 2000-5000
        description: "Im lặng cuối — để viewer ngồi lặng. Track kết ở -∞ LUFS."
    exception_ep_90_finale:
      - bell_distant (3s reverb) thay bell_single
      - rain_fade kéo 4s (extended)
      - tail_silence kéo 8-10s (closure series)

signature_consistency_rules:
  - intro 6.5s phải IDENTICAL từng byte sample 90 ep (1 file master, không re-render)
  - distant_bell + bell_single_outro phải cùng pitch (root note D3) — recognition
  - low_piano_note transition phải cùng note C2 hoặc D2, không random
  - engine_hum loop file IDENTICAL 90 ep
  - rain_loop file IDENTICAL 90 ep (loop seamless, không audible loop point)

asset_master_files:
  required (must exist + checksum lock):
    - assets/sfx/brand/rain_intro_v01.wav
    - assets/sfx/brand/bell_distant_v01.wav
    - assets/sfx/brand/engine_hum_v01.wav
    - assets/sfx/brand/piano_low_C_v01.wav
    - assets/sfx/brand/bell_single_outro_v01.wav

  checksum_file: assets/sfx/brand/CHECKSUMS.sha256
  drift_policy: any master file checksum change → REJECT all renders + alert human

quality_check_per_render:
  intro_check:
    - duration[0:6500] = exact intro template (cross-correlation ≥ 0.95)
    - rain at 0:0-0:4 detected
    - bell at 0:3.5-0:5.3 detected
    - narrator_first_word at 0:6.5 ±100ms

  transition_check:
    - 4 piano_low_C inserted between 5 sections
    - 0 piano inserted in beat_4/beat_5 zones

  regret_line_check:
    - silence_3s detected at REGRET LINE position
    - room_tone fade-off detected 1500ms before

  outro_check:
    - bell_single (or bell_distant for ep 90) at last narrator + 1000ms
    - rain_fade + engine_fade complete by tail_silence start
    - tail_silence ≥ 2000ms (≥ 8000ms for ep 90)

publisher_usage:
  - first 6.5s phải có signature intro → YouTube auto-skip ad detection
  - last 5s phải có signature outro → end_screen template overlay đồng nhất
  - thumbnail có thể overlay icon chuông để cross-reference brand audio

handoff_to_tts_director_M8:
  - tts.md M8 BRAND AUDIO SIGNATURE module sẽ load file này
  - implement render pipeline với 4 phase: intro / transition / regret_line / outro
  - validate per quality_check_per_render

