# 05_AUDIO_BIBLE — SFX library + music beds + TTS masters.
# Extract từ SVHMP-RC3.2 audio_bible + audio_director + tts_asset_bible.
# Render time (TTS engine) load file này.

# ============================================================
# AUDIO SFX LIBRARY
# ============================================================

version: 1.0
lock_date: 2026-06-19

ambience_loops:                    # CHẠY SUỐT TẬP
  rain_light:
    file: sfx/ambience/rain_v02_loop.wav
    checksum: sha256:PLACEHOLDER
    duration_ms: 30000
    volume: 20
    loop: true
    fade_in_ms: 1500
    fade_out_ms: 1500
    immutable: true
  bus_engine:
    file: sfx/ambience/bus_engine_v01_loop.wav
    checksum: sha256:PLACEHOLDER
    duration_ms: 60000
    volume: 15
    loop: true
    fade_in_ms: 1500
    immutable: true
  wet_road:
    file: sfx/ambience/wet_road_v01_loop.wav
    checksum: sha256:PLACEHOLDER
    duration_ms: 45000
    volume: 10
    loop: true
    immutable: true

discrete_signature:                # SFX dấu ấn series
  bell_resonance:
    file: sfx/discrete/bell_v01.wav
    checksum: sha256:PLACEHOLDER
    duration_ms: 1500
    volume: 80                     # ÂM LƯỢNG TO NHẤT TẬP
    fade_in_ms: 200
    fade_out_ms: 800
    peak_db: -3
    immutable: true
  yellow_lamp_hum:
    file: sfx/discrete/lamp_v01_hum.wav
    checksum: sha256:PLACEHOLDER
    duration_ms: 3000
    volume: 35
    fade_in_ms: 500
    fade_out_ms: 1000
    peak_db: -12
    immutable: true
  fog_split:
    file: sfx/discrete/fog_v01_whoosh.wav
    checksum: sha256:PLACEHOLDER
    duration_ms: 800
    volume: 30
    peak_db: -10
    immutable: true

passenger_exit:                    # combo SFX khi 1 người rời
  seat_creak:    {file: sfx/exit/seat_creak_1000ms.wav, duration_ms: 1000, volume: 40}
  door_open:     {file: sfx/exit/bus_door_open_1000ms.wav, duration_ms: 1000, volume: 50}
  footsteps_fading: {file: sfx/exit/footsteps_fading_4000ms.wav, duration_ms: 4000, volume: 30, pan: stereo_fade_out}
  door_close:    {file: sfx/exit/bus_door_close_1000ms.wav, duration_ms: 1000, volume: 45}

distant:
  dog_bark:      {file: sfx/distant/dog_bark_distant_800ms.wav, volume: 20}
  train_horn:    {file: sfx/distant/train_horn_distant_2500ms.wav, volume: 18}
  car_horn:      {file: sfx/distant/car_horn_distant_600ms.wav, volume: 18}
  night_wind:    {file: sfx/distant/night_wind_loop.wav, volume: 12, loop: true}

# ============================================================
# MUSIC BEDS (theo emotion_curve_ngocngan)
# ============================================================

music_beds:
  ambient_light: {file: music/ambient_light_loop.wav, volume: 18, loop: true}
  low_drone:     {file: music/low_drone_loop.wav, volume: 22, loop: true}
  piano_sparse:  {file: music/piano_sparse_loop.wav, volume: 25, loop: true}
  strings_soft:  {file: music/strings_soft_loop.wav, volume: 22, loop: true}
  piano_reverb:  {file: music/piano_reverb_loop.wav, volume: 25, loop: true}

# ============================================================
# AUDIO DIRECTOR — MOOD → MUSIC mapping
# ============================================================

mood_to_music:
  tò_mò:     ambient_light          # 0–10%
  bất_an:    low_drone              # 10–25%
  đồng_cảm:  piano_sparse           # 25–45%
  nghẹn:     strings_soft           # 45–70% beat_4 peak
  dư_âm:     piano_reverb           # 70–100% kéo dài đến hết

event_to_sfx:
  bell:
    sequence: [bell_resonance]
    music_dim: {target_volume: 7, duration_ms: 2000}
  yellow_lamp_appears:
    sequence: [fog_split, yellow_lamp_hum]
    timing: "fog_split → 200ms pause → yellow_lamp_hum"
  passenger_exit:
    sequence: [seat_creak, door_open, footsteps_fading, door_close]
    spacing_ms: 500
  passenger_enter:
    sequence: [seat_creak]
    note: "không có door (xuất hiện trong xe)"
  driver_speaks:
    sequence: []
    note: "không SFX — chỉ giọng + ambience"

audio_rules:
  forbidden:
    - tiếng hét bất ngờ
    - jump scare
    - spike >20dB trong <500ms
    - whisper-stinger
    - drone-spike
  always:
    - rain_light + bus_engine loop SUỐT TẬP
    - wet_road loop khi xe đang chạy
    - music_bed theo mood, KHÔNG tắt giữa tập
  limits:
    max_discrete_cue_per_ep: 15      # tập 12-14 phút
    max_bell_per_ep: 3
    max_distant_per_ep: 2

# ============================================================
# TTS MASTERS — voice ID lock, brand identity kênh
# ============================================================

