    model_card: "dinhthuan/index-tts-2-vietnamese MOS 4.3"
    port: 7861
    prompt_audio: "C:\\Users\\Administrator\\Desktop\\NNG_narration_sample_19062026.wav"
    emo_audio_prompt: same as prompt_audio
    use_emo_text: false
