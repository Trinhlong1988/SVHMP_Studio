    notes: "Last resort khi cả IndexTTS2 (primary + fallback_1) + RVC NNG đều fail. Brand drift cảnh báo."

# ============================================================
# TTS RUNTIME CONFIG
# ============================================================

tts_runtime:
  primary_voice: narrator_voice_primary_v01
  fallback_voice: narrator_voice_backup_v01
  speech_rate: 0.88
  pitch_semitones: -1
  emphasis: low

  pause_model_ms:
    short_pause_ellipsis: 400          # "..."
    long_pause_blank_line: 1200
    sentence_end: 600
    paragraph: 1500
    beat_transition: 2000              # beat_4 → beat_5

  breathing_model:
    enable_natural_breath: true
    breath_intensity: low
    breath_per_minute: [12, 16]
    breath_before_beat_4: true
    breath_before_beat_5: true

# ============================================================
# TTS EMOTION PRESETS (RC3.2 R9)
# ============================================================

tts_emotion_presets:
  # ========== ROUND 8 BASELINE (7 preset) ==========
  curious:        {stability: 0.70, similarity_boost: 0.85, style: 0.30, intensity: 0.40, note: "HOOK TÒ MÒ"}
  uneasy:         {stability: 0.60, similarity_boost: 0.85, style: 0.40, intensity: 0.50, note: "SETUP/INCIDENT BẤT AN"}
  empathy:        {stability: 0.65, similarity_boost: 0.85, style: 0.45, intensity: 0.55, note: "REVEAL ĐỒNG CẢM"}
  regret:         {stability: 0.50, similarity_boost: 0.85, style: 0.60, intensity: 0.70, note: "REVEAL→PAYOFF NGHẸN beat_4 peak"}
  regret_fading:  {stability: 0.65, similarity_boost: 0.85, style: 0.55, intensity: 0.55, note: "PAYOFF transition"}
  lingering:      {stability: 0.75, similarity_boost: 0.85, style: 0.50, intensity: 0.45, note: "CLIFFHANGER DƯ ÂM"}
  bac_tai_speech: {stability: 0.85, similarity_boost: 0.90, style: 0.20, intensity: 0.35, note: "2 câu bác tài — flat tuyệt đối"}

  # ========== ROUND 12 BACKPORT (B20.1 fix) — 4 preset từ tts.md M2 + voice_direction ==========
  regret_climax:  {stability: 0.40, similarity_boost: 0.85, style: 0.75, intensity: 0.80, note: "beat_4 đỉnh — dùng cho 3-5 dòng REGRET LINE PHẦN 3 'Tôi không/Tôi đã không...'. Chậm hơn regret + vibrato cực nhẹ + ngắt câu giữa cố ý"}
  lingering_extended: {stability: 0.80, similarity_boost: 0.85, style: 0.45, intensity: 0.40, note: "câu cuối cliffhanger — kéo dài âm cuối 1.5x. Đặc biệt chậm. Chỉ áp 1 câu cuối/ep"}
  passenger_regret: {stability: 0.55, similarity_boost: 0.85, style: 0.65, intensity: 0.75, speech_rate: 0.82, note: "passenger nói REGRET — 'quiet sob held back', KHÔNG vỡ òa. Trầm 1 semitone vs baseline"}
  child_voiceover_flashback: {stability: 0.70, similarity_boost: 0.85, style: 0.35, intensity: 0.50, speech_rate: 0.95, note: "CHỈ trong flashback có voice trẻ con (ARCH có trẻ — vd memorial). KHÔNG dùng cho passenger sống/chết hiện tại"}

render_preset_map:                 # auto-detect per section
  HOOK:        curious
  SETUP:       uneasy
  INCIDENT:    empathy
  REVEAL:      regret
  PAYOFF:      regret_fading
  CLIFFHANGER: lingering

# OVERRIDE per-line: `[preset:bac_tai_speech]` inline trong script.txt

tts_output_spec:
  format: wav
  sample_rate_hz: 48000
  bit_depth: 24
  channels: mono
  loudness_target_lufs: -16
  peak_db: -3

tts_drift_policy:
  - voice_id thay đổi giữa series → HARD-FAIL (brand identity)
  - voice_signature_checksum mismatch >5% → reject, regen với primary
  - speech_rate drift >0.02 → reject
  - pause_model parameter thay đổi giữa ep → reject
  - preset table immutable per series
