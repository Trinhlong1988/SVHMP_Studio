# ============================================================
# AUDIO_MIX_RULES — round 15 add 2026-06-28 (HARD UNIVERSAL)
# ============================================================
# Loaded by: tools/audit_audio_mix_qa.py (PHYSICAL gate) + tools/assignment_planner.py v2.0
# Cross-ref: bible/00 R58 audio_mix_qa_mandatory_pre_render

audio_mix_rules:

  R_AUDIO_01_viewer_empathy_test:
    rule: "TRƯỚC KHI pick music/SFX cho 1 moment — em PHẢI mental-simulate người nghe + nhạc cùng lúc"
    protocol:
      - "1. Đọc text moment cụ thể (câu/đoạn)"
      - "2. Identify emotion intent (death_announce / memory_of_dead / haunting / regret / setup / transition)"
      - "3. Imagine khán giả nghe TTS + music + ambient cùng lúc — cảm xúc nào nổi lên?"
      - "4. Nếu khán giả CONFUSED (sad voice + cheerful music) hoặc OVERWHELMED (death + bombastic) → REJECT pick"
      - "5. Pick chỉ approve khi music REINFORCE emotion intent + KHÔNG fight voice"
    forbidden_pairings:
      - death_announce + upbeat/bright_piano
      - haunting + cheerful_melody
      - memory_of_dead + tension_drone (mistakes sadness for terror)
      - regret_quiet + loud_percussion
      - setup_calm + scream_sfx
    enforcement: tools/audit_audio_mix_qa.py C1 + manual reviewer
    no_inference: "Mental-simulate là REQUIRED, KHÔNG pick blind từ metadata"
    cross_ref: [bible/09 emotion_intensity, feedback_cam_suy_luan.md]

  R_AUDIO_02_moment_level_music_selection:
    rule: "Section music KHÔNG ĐƯỢC 1 track sustained — phải sub-pick theo MOMENT trong section"
    rationale: "REVEAL có 3-5 moments khác emotion: backstory intro → death_announce → ám ảnh kim → memory of dead → tonight regret. Mỗi moment cần music protocol riêng."
    requirement:
      - "Mỗi EP có moment_map.yaml chia 6 section thành 15-25 moments"
      - "Mỗi moment có: line_range / emotion_label / music_pick / dB_level / transition_type"
      - "Music transitions giữa moments dùng cross-fade 2-4s (NOT hard cut → click pop = vi phạm R_AUDIO_09)"
    enforcement: tools/audit_audio_mix_qa.py C2 verify moment_map.yaml present + valid
    forbidden: "1 piano track loop suốt REVEAL 252s = LAZY MIXING REJECT"
    cross_ref: [R_AUDIO_05 death_protocol, R_AUDIO_07 impact_moment_mute]

  R_AUDIO_03_ambient_bed_constant_layer:
    rule: "Ambient SFX bed (rain + bus_engine + wet_road) PHẢI loop CONSTANT suốt EP, KHÔNG tắt"
    spec:
      layers:
        - rain_light:  {volume_db: -22, fade_in_ms: 1500, loop: true}    # full EP
        - bus_engine:  {volume_db: -27, fade_in_ms: 1500, loop: true}    # full EP
        - wet_road:    {volume_db: -28, loop: true, when: "xe đang chạy"}  # EP đoạn xe chạy
      ducking: "Sidechain duck -2 dB khi TTS speaking để bed nằm dưới voice"
    enforcement: tools/audit_audio_mix_qa.py C3 verify continuous bed via RMS scan
    forbidden:
      - "Ambient bed silent > 3s khoảng nào trong EP"
      - "Bed level > -18 dB (lấn voice)"
      - "Bed level < -35 dB (mất presence)"
    cross_ref: [bible/05 ambience_loops, bible/13 setting_library sfx_layer]

  R_AUDIO_04_setting_sfx_validation:
    rule: "SFX picks PHẢI semantic-match với setting EP từ bible/13 — CẤM physical impossibilities"
    forbidden_by_vehicle_context:
      xe_buyt_dem:
        - "fire / fireplace / lò sưởi / campfire"        # KHÔNG có lửa trên xe
        - "chandelier / đèn chùm"                         # KHÔNG có đèn chùm
        - "desert / sa mạc / cactus"                      # SVHMP Hà Nội KHÔNG sa mạc
        - "ocean / waves / beach / surf"                  # xe đường bộ
        - "forest_birds / jungle / wild_animals"          # urban
        - "church_organ / cathedral_bells"                # secular setting
        - "baby_cry / infant"                             # không có em bé trên xe
        - "explosion / gunfire / military"                # vi phạm NEVER.gore
    setting_appropriate_sfx:
      - "rain (varied intensity per bible/13 setting_*)"
      - "wet_road, road_water_splash"
      - "bus_engine_low (idle / cruise)"
      - "wiper_blades (subtle)"
      - "distant_thunder (mưa setting)"
      - "lamp_hum (đèn vàng setting)"
      - "footsteps (passenger exit)"
      - "door_open/close (passenger exit, max 1 each)"
      - "bell (max 1/EP per SERIES_RULES.bell)"
      - "wind_gentle / night_wind (distant)"
      - "dog_distant / crickets (urban night)"
    enforcement: tools/audit_audio_mix_qa.py C4 keyword scan vs setting bible/13
    fail_action: "REJECT pick — re-run assignment_planner với forbidden_keywords applied"
    cross_ref: [bible/00 NEVER.gore + NEVER.jump_scare_spam, bible/13 setting_library]

  R_AUDIO_05_death_memory_haunting_music_protocol:
    rule: "Moments liên quan cái chết / nhớ về người chết / ám ảnh tâm linh PHẢI dùng music category cụ thể"
    moment_to_music_category:
      death_announce:
        description: "Câu thông báo cái chết (Hạ Vy mất tại chỗ / Hà mất / etc)"
        music_category: HDK_SAD (G minor 52bpm sparse piano)
        special_treatment: "MUTE music 3-4s quanh câu + pause 1200ms sau → câu nổi trong silence radio (impact tối đa Ngọc Ngạn signature)"
        bed_during_silence: "ambient bed ONLY (rain + bus_engine) — KHÔNG music"
      death_echo:
        description: "Câu echo cái chết (Là lúc Hạ Vy mất / Kim dừng đúng giờ Hạ Vy mất)"
        music_category: HDK_SAD + cross-fade vào HDK_MYSTERY (cho kim/đồng hồ haunting)
        level_db: -16
      memory_of_dead:
        description: "Hồi tưởng về người đã mất (Hạ Vy cười / Hạ Vy vẫy tay)"
        music_category: HDK_REVEAL (ethereal floating piano)
        level_db: -15 sustained
        rationale: "Memory của người chết = melancholic ethereal, KHÔNG sad heavy, KHÔNG horror tension"
      haunting_supernatural:
        description: "Ám ảnh siêu nhiên (kim nhích Tách / kính phản chiếu / chuông ngân / đèn vàng)"
        music_category: HDK_MYSTERY (D minor 58bpm drone) + có thể HDK_TENSION cho peak
        level_db: -17 swell
        rationale: "Ám ảnh = sợ hãi tâm linh subtle, KHÔNG sad, KHÔNG bombastic"
      regret_quiet:
        description: "Câu regret line cuối (Tôi không... / Tôi đã không...)"
        music_category: HDK_SAD sustained quiet
        level_db: -18 (quiet để voice nổi)
      farewell_lingering:
        description: "Câu cuối CLIFFHANGER, lời tạm biệt chưa nói"
        music_category: HDK_ENDING (G minor 52bpm slow piano)
        level_db: -16 → fade 10s → silence
    forbidden:
      - death_announce + HDK_TENSION (vi phạm: sai genre)
      - haunting + HDK_REVEAL (vi phạm: ethereal sad ≠ ám ảnh fear)
      - memory_of_dead + HDK_TENSION (vi phạm: terror ≠ memory)
    enforcement: tools/audit_audio_mix_qa.py C5-C8 per-moment category match
    cross_ref: [R_AUDIO_01 viewer_empathy, R_AUDIO_07 impact_mute]

  R_AUDIO_06_music_section_personality:
    rule: "6 section personality theo Mr.Long 28/6 spec (codify từ chat directive)"
    sections:
      HOOK:
        personality: "build dần lên như intro phim"
        spec_dB_curve: "ramp from -25 to -10 over 12s (per R_AUDIO_08), then decrescendo natural to bed"
        music_category: HDK_MYSTERY (tò mò horror, không sad ngay)
      SETUP:
        personality: "bed nền thấp -22 cố định, không drama"
        spec_dB_level: -22
        spec_variability: "std ≤ 3 dB (flat sustained)"
        music_category: HDK_TENSION subtle (build unease nền)
      INCIDENT:
        personality: "swell ngay tại peak TTS (sidechain dynamic)"
        spec_dB_swell_peak: -11
        spec_dB_quiet: -19
        music_category: HDK_TENSION peak
      REVEAL:
        personality: "ethereal floating sustained"
        spec_dB_level: -15
        spec_variability: "std ≤ 3 dB (sustained)"
        music_category: HDK_REVEAL (default) + sub-pick per moment per R_AUDIO_05
      PAYOFF:
        personality: "emotional swell sustained KHÔNG drop"
        spec_dB_level: -14
        spec_no_drop: "drop từ first quartile → last quartile < 3 dB"
        music_category: HDK_SAD (emotional peak)
      CLIFFHANGER:
        personality: "fade 10s cuối → silence impact"
        spec_dB_start: -16
        spec_dB_end_last_10s: -45 (effectively mute)
        spec_fade_includes: "ALL layers (TTS + music + ambient) — KHÔNG chỉ music"
        music_category: HDK_ENDING
    enforcement: tools/audit_audio_mix_qa.py C9 per-section dB curve verify
    cross_ref: [R_AUDIO_05 death_protocol, R_AUDIO_08 hook_swell]

  R_AUDIO_07_impact_moment_music_mute:
    rule: "5 câu nặng nhất EP01 → MUTE music 3-4s quanh câu + pause 1200ms sau"
    rationale: "Câu impact (Hạ Vy mất tại chỗ) NỔI trong silence radio = Ngọc Ngạn signature. Music + voice cùng lúc = lấn impact."
    ep01_impact_moments_locked:
      - "Hạ Vy mất tại chỗ. [pause:1200ms]"
      - "Là lúc Hạ Vy mất."
      - "Kim dừng đúng giờ Hạ Vy mất."
      - "Đó là lần cuối tôi gặp Hạ Vy."
      - "[câu cuối cliffhanger TBD]"
    spec:
      mute_window: "Mute music 1.5s BEFORE câu + 2.5s AFTER câu (total ~4s)"
      bed_during_mute: "Ambient bed (rain + bus_engine) ONLY — không music"
      music_restore: "Cross-fade music back over 2s sau pause"
    detection: "Forced-align Whisper word_timestamps + match impact phrases từ moment_map.yaml"
    enforcement: tools/audit_audio_mix_qa.py C7 verify mute regions present at impact phrases
    cross_ref: [R_AUDIO_05 death_protocol]

  R_AUDIO_08_hook_opening_swell_sync_first_word:
    # Mr.Long spec 28/6 clarify 5 câu — LOCKED:
    #   #1 crescendo duration = 12s
    #   #2 peak align = "âm chung" syllable đầu (vowel center / midpoint)
    #   #3 áp cho HOOK CONTENT (sau intro Hắc Dạ Ký 4.5s), KHÔNG intro brand
    #   #4 decrescendo = tới end of paragraph đầu, tự nhiên
    #   #5 áp tự động cho từ đầu tiên BẤT KỲ EP02-EP90 (Đêm/Mưa/Tháng/Cuối/Phố/etc)
    rule: "HOOK opening music PHẢI swell 12s + peak tại vowel center từ đầu tiên HOOK + decrescendo natural tới end opening paragraph"
    spec:
      phase_1_intro_brand: "0 → 4.5s: Hắc Dạ Ký intro (per R40), music SILENT hoặc bed-only"
      phase_2_crescendo: "4.5s → 16.5s (12s duration): music ramp -28 dB → peak -10 dB"
      phase_3_peak_anchor:
        target: "vowel center (sustain midpoint) của syllable đầu tiên HOOK content"
        computed_via: "Whisper word_timestamps=True forced alignment + midpoint(word_start, word_end)"
        tolerance: "± 200 ms (auto-shift crescendo end để peak hit chính xác)"
        examples:
          - "Đêm (vowel 'ê' center)"
          - "Mưa (vowel 'ư' center)"
          - "Tháng (vowel 'á' center)"
          - "Cuối (vowel 'uô' center)"
          - "Phố (vowel 'ô' center)"
      phase_4_decrescendo:
        target: "end of opening paragraph (paragraph 1 của HOOK content)"
        curve: "smooth natural decrescendo từ peak -10 dB → SETUP bed -22 dB"
        duration: "dynamic theo paragraph length (typically 10-20s), KHÔNG fixed"
        rationale: "Mr.Long 28/6: giảm dần cho đến xong đoạn đầu cho tự nhiên"
      phase_5_settle: "SETUP bed -22 dB từ end-of-paragraph trở đi"
    scope: "MỌI EP (EP01-EP90), forced-align tự động cho từ đầu tiên bất kỳ"
    implementation:
      module: "tools/hook_swell_aligner.py (Phase R45)"
      deps: "faster-whisper word_timestamps + numpy curve gen"
    forbidden:
      - "Hard-cut peak (no crescendo)"
      - "Peak before vowel center > 200ms (audio leads voice = amateur)"
      - "Peak after vowel center > 200ms (delayed swell = lazy)"
      - "Decrescendo cliff (no smooth curve)"
      - "Decrescendo continue past paragraph end (drown SETUP)"
      - "Crescendo during Hắc Dạ Ký intro 4.5s (vi phạm brand audio)"
    enforcement: tools/audit_audio_mix_qa.py C10 forced-align verify peak position
    cross_ref: [R40 intro Hắc Dạ Ký, R_AUDIO_06 music_section_personality HOOK, R_AUDIO_10 empirical]

  R_AUDIO_09_no_audio_artifacts_hardlock:
    rule: "CẤM TUYỆT ĐỐI click/pop/glitch/loẹt-xoẹt/DC-offset/aliasing trong final mix"
    forbidden_artifacts:
      click_pop:
        detection: "Sample-level discontinuity > 0.3 amplitude trong 2 samples liền"
        max_count_per_ep: 0
      dc_offset:
        detection: "Rolling mean signal offset > 0.001 sustained > 100ms"
        max: 0.001
      aliasing:
        detection: "High-freq spike > -40 dB above 22 kHz (Nyquist artifact)"
        max: -40dB
      clip_edge_pop:
        detection: "Audible cut tại piano/SFX clip boundary (fade < 50ms = risk)"
        min_fade_ms: 80
      loẹt_xoẹt:
        detection: "Noise burst / static / scratch tại bất kỳ position (RMS spike >12dB above local 2s window)"
        max_count_per_ep: 0
      resampling_artifact:
        detection: "SR conversion 48k↔22k chưa proper lowpass → highfreq fold"
        prevention: "Always use scipy.signal.resample_poly với anti-alias filter"
    enforcement: tools/audit_audio_mix_qa.py C13-C15 sample-level scan
    fail_action: "BLOCK ship — fix root cause (extend fade / DC remove / oversample / clean source)"
    no_inference: "Phải đo sample-level THỰC, không trust metadata"

  R_AUDIO_13_single_word_dialogue_pad:
    # round 19+ add 2026-06-29 00:35 (Mr.Long: "đoạn dạ dạ như bị dắt chữ, gấp")
    rule: "Single-word dialogue (Dạ / Vâng / Ờ / À / Ừm) PHẢI pad với confirmation phrase 2-3 syllables thêm"
    why: |
      BigVGAN/IndexTTS2 TTS render 1-word dialogue chunks:
      - Too short to establish prosody anchor
      - Connects to surrounding context → "dạ dạ" dắt chữ rushed
      - Sounds robotic / abrupt
    banned_standalone:
      - '"— Dạ."'
      - '"— Vâng."'
      - '"— Ờ."'
      - '"— À."'
      - '"— Ừm."'
    fix_template:
      - '"— Dạ." → "— Dạ, đúng vậy." / "— Dạ, là xà cừ ạ."'
      - '"— Vâng." → "— Vâng, em hiểu rồi."'
      - '"— Ờ." → "— Ờ, mà sao?"'
    precedent: 'EP01 L220 "— Dạ." → "— Dạ, đúng vậy." ✅'
    enforcement: 'pre-render scan: dialogue lines (start with —) with ≤ 1 word → BLOCK'
    cross_ref: [R60 short EOL, R66 short chain]

  R_AUDIO_12_phone_call_death_announce_template:
    # round 19+ add 2026-06-28 23:45 (Mr.Long approve EP01 L370-380: "Tiếng mẹ cô ấy khàn. — Khải-Phong ơi…")
    rule: "Đoạn thoại phone call announce cái chết (người nhà gọi cho main char) PHẢI follow TEMPLATE thành công EP01"
    template_structure:
      L1_caller_voice_state: 'Mô tả giọng caller (khàn / nghẹn / rung) + 1 câu narrator setup'
      L2_vocative_open: 'Câu mở ngắn vocative + ellipsis: "{Main_char} ơi…"'
      L3_recipient_intuition: '{Main_char} biết / cảm nhận (im lặng → pre-knowledge)'
      L4_pause_1200ms: '[pause:1200ms] (radio silence — Ngọc Ngạn signature)'
      L5_callers_setup: 'Caller setup safe arrival / context positive trước twist'
      L6_reveal_detail: 'Chi tiết bi kịch (accident location / cause)'
      L7_death_announce: '{Main_char} mất tại chỗ. (R67 verb tense + dấu chấm cụt — final)'
      L8_pause_1200ms: '[pause:1200ms] (silence to absorb)'
    example_ep01:
      L1: 'Tiếng mẹ cô ấy khàn.'
      L2: '— Khải-Phong ơi…'
      L3: 'anh biết.'
      L4: '[pause:1200ms]'
      L5: 'anh chưa nghe hết câu, anh đã biết.'
      L6: '— Máy bay tới nơi an toàn. Hạ-Vy xuống sân bay Kennedy ở New York. Bắt taxi về nhà người dì. / — Taxi gặp xe tải. Trên đường cao tốc.'
      L7: '— cô ấy mất tại chỗ.'
      L8: '[pause:1200ms]'
    tts_emo_assignment:
      caller_voice: 'passenger_regret emo + tempo_factor 0.85 + pitch -0.5'
      main_char_intuition: 'narrator emo + pause padding'
      death_announce_line: 'PASSENGER_EMO sad 0.4 / melancholic 0.45 / calm 0.15 (peak)'
    forbidden:
      - 'Skip pause 1200ms (impact lost without silence)'
      - 'Long detail dump before reveal (gives audience time to brace — kills shock)'
      - 'Death announce câu dài + adverb (vague — must be 5-word direct: "{Name} mất tại chỗ.")'
    apply_to_future_eps: '90 EPs total. Mỗi EP có passenger backstory death scene → use this template.'
    cross_ref: [R_AUDIO_05 death_protocol, R_AUDIO_07 impact_moment_mute, R_AUDIO_11 flashback_slowdown]

  R_AUDIO_11_flashback_slowdown_pitch_drop:
    # round 19+ add 2026-06-28 23:30 (Mr.Long: "đoạn kể truyện hồi ức phải chậm lại hạ giọng xuống")
    rule: "Flashback / hồi ức chunks (Khải-Phong recall past) PHẢI tempo_factor 0.85 + pitch -0.5 semitones"
    why: |
      Hồi ức narrative trong văn nói VN (Ngọc Ngạn style) đọc chậm + trầm để:
      - Mark transition realtime → past
      - Increase emotional weight (melancholic peak)
      - Khán giả immerse vào quá khứ Khải-Phong recall Hạ-Vy
    detection_pattern:
      - 'Dialogue lines (start with —) trong REVEAL section'
      - 'Specific flashback opener: "Sân bay hôm đó", "Hồi ấy", "Năm cuối"'
      - 'First-person past tense: "Tôi đứng cổng B", "Tôi đưa hộp đồng hồ"'
    apply:
      tempo_factor: 0.85   # slow down 15%
      pitch_offset_semitones: -0.5   # lower 0.5 semitones
      pause_after_increase: '+200ms each sentence end (more breathing room)'
    enforcement: 'spec.json per-chunk tempo_factor + pitch_offset_semitones'
    cross_ref: [R_AUDIO_06 music section personality REVEAL, R_AUDIO_05 memory_of_dead]

  R_AUDIO_10_empirical_verification_required:
    rule: "MỌI rule / pick music / SFX / mix decision PHẢI verify trên file THỰC trước approve"
    forbidden:
      - "Pick music dựa metadata only (bpm/key/duration) không nghe sample"
      - "Approve curve dựa lý thuyết (db curve script tính) không đo file output"
      - "Suy luận spec từ Mr.Long ambiguous comment — phải ASK clarify"
      - "Trust prior session memory cho music selection — phải re-verify"
      - "Default value khi spec missing — phải ASK Mr.Long"
    protocol:
      - "1. Render audio decision (sample or full mix)"
      - "2. Run audit_audio_mix_qa.py đo thực (15 checks)"
      - "3. Mr.Long listen sample (60-120s of changed section)"
      - "4. Mr.Long verbal/written approve → ghi memory với timestamp"
      - "Skip bất kỳ bước nào = vi phạm R_AUDIO_10"
    enforcement: "Workflow gate + R58 pre-render checklist"
    cross_ref: [memory feedback_cam_suy_luan + feedback_auto_qa_no_speculation]

