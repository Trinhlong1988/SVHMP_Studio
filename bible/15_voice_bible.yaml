# ============================================================
# QA TIER 2.x — 5 artifact types riêng biệt (Mr.Long docx 30/6)
# ============================================================
artifact_types:
  voice_identity_drift:
    detect_via: speaker_embedding cosine sim < 0.85
    severity: Critical
    fix: re-render with same seed + voice profile reload
  pause_boundary_artifact:
    description: u u / xi / e tai pause boundary
    detect_via: spectral analysis +/- 200ms quanh pause
    severity: Critical
    priority_rank: 1
    note: Mr.Long mark TOP 5-star
    rule_ref: R188
  breath_artifact:
    description: xi / phu / e / hu khong mong muon
    detect_via: sibilance excess + aspiration energy
    severity: High
    rule_ref: R189
  onset_artifact:
    description: e o dau cau
    detect_via: spectral analysis +/- 100ms tu chunk start
    severity: High
    rule_ref: R190b
  prosody_collapse:
    description: tut cao do / rung / lem sau ...
    detect_via: F0 contour anomaly
    severity: High
    rule_ref: R190

# ============================================================
# SEALED FIELD INVARIANT (R181b enforcement)
# ============================================================
sealed_invariants:
  - VoiceProfile.set_locked_field() PHAI raise LockedFieldError
  - VoiceProfile.modify_emotion() PHAI validate range truoc apply
  - VoiceProfile.transition_state() PHAI check transition matrix
  - Registry init tu bible/15 KHONG ad-hoc voice_id
  - Moi TTS render call PHAI lookup profile truoc

