v1_1_note: "v1.1 THÊM rule_06..09 (region/generation/culture/vietnamese) — rule_01..05 GIỮ NGUYÊN VĂN, KHÔNG sửa. TASK_G2_CHARACTER B1, Mr.Long ký 2026-07-03. Pool tên cụ thể theo vùng CHƯA ký (chờ hybrid classification riêng)."

# ============================================================
# RULES (HARD-FAIL nếu vi phạm — QA enforce)
# ============================================================

RULES:

  rule_01_two_syllable_min:
    description: "Tên hành khách PHẢI 2 âm tiết (đẹp, có nét văn học). KHÔNG 1 âm tiết (thô, cộc lốc)."
    examples_valid: ["Hạ Vi", "Tường Vi", "Diệu Nhi", "Minh Khang", "Hoàng Long"]
    examples_invalid: ["Loan", "Khải Phong", "Nam", "Hạ Vy", "Tâm"]
    enforcement: QA HARD-FAIL nếu char_name có 1 word duy nhất
    note: "Exception: CHAR_DRIVER='Bác tài' (recurring, KHÔNG là passenger). CHAR_NAM='Nam' (recurring, MIỄN TRỪ)."

  rule_02_word_uniqueness_global:
    description: "TUYỆT ĐỐI KHÔNG dùng cùng WORD (âm tiết) trong 2 tên khác nhau. Vd: Hạ Vi → CẤM Tường Vi."
    enforcement: QA HARD-FAIL nếu intersection(words(name_A), words(name_B)) != ∅ với A ≠ B
    scope: cross-passenger (toàn bộ 88-100 hành khách + recurring CHAR_NAM)
    rationale: "Mr.Long 27/6 — tránh viewer confuse 2 nhân vật cùng âm cuối/đầu."

  rule_03_pool_size_match_count:
    description: "Pool tên ≥ số passenger cần (default ≥100). Pool nhỏ → wrap-around → trùng tên → vi phạm rule_02."
    enforcement: gen_100_passenger.py assert len(NAMES_NU) ≥ count_nu AND len(NAMES_NAM) ≥ count_nam
    note: "Recommend pool 50 nu + 50 nam minimum (100 unique names total)."

  rule_04_avoid_recurring_collision:
    description: "Passenger naming KHÔNG được trùng/giống tên recurring (CHAR_NAM='Nam', CHAR_DRIVER='Bác tài')."
    enforcement: passenger pool MUST exclude 'Nam' as a word.
    scope: feminine + masculine pool

  rule_05_aesthetic_quality:
    description: "Tên đẹp gợi cảm xúc văn học, không tên thô hay chế giễu."
    examples_good: ["Hạ Vi", "Tường Vân", "Hoàng Yến", "Minh Châu"]
    examples_bad_aesthetic: ["Tèo", "Tí", "Hùng Lùn", "Mèo Mun"]
    enforcement: subjective — Mr.Long approve pool lần đầu, frozen after

  rule_06_region_match:   # facet naming_region (v1.1, Mr.Long ký 2026-07-03)
    description: "TÊN GẦN QUÊ: tên phải hợp vùng quê nhân vật (mirror 'giọng gần quê' R206)."
    style_by_region:
      bac:   "cổ điển Bắc: Hạ/Nguyệt/Tường/Hoàng + âm Hán-Việt trang nhã"
      trung: "Huế/Trung: Diệu/Tôn Nữ/Như/Đoan — nữ tính cung đình; nam: Bảo/Vĩnh/Hữu"
      nam:   "Nam bộ: thứ danh Út/Tư/Sáu chấp nhận trong xưng gọi (KHÔNG làm char_name chính vì vướng rule_01); tên mộc: Kiều/Diễm/Phụng"
    enforcement: "roster_validator C4 (khung — pool cụ thể chờ ký riêng)"
    note: "Chi tiết đầy đủ: governance/blueprint/schemas/naming_extension_rules.yaml (2 file 1 nội dung)."

  rule_07_generation_match:   # facet naming_generation (v1.1)
    description: "TUỔI ↔ THỜI TÊN (hướng dẫn thẩm mỹ, KIỂM TAY): nhân vật 58 tuổi (sinh ~196x) nên mang tên thời đó; tránh tên trend trẻ cho người già."
    era_style:
      "sinh <=1970":  "tên mộc/Hán-Việt cũ: Hảo/Liên/Hồng/Văn/Hữu/Trọng"
      "sinh 1970-1995": "tên phổ thông: Tuấn/Hằng/Minh/Ngọc"
      "sinh >=1995":  "tên trẻ hiện đại: Nhi/Khả/Bảo (vẫn thuần Việt rule_09)"
    enforcement: "CHƯA CÓ ENFORCER (DEBT-027, R215) — KIỂM TAY khi duyệt hồ sơ mới. KHÔNG tự động hoá được: thiếu CẢ input data (dob/age_exact = 0/139 populated) LẪN reference data (bộ tham chiếu tên-theo-thời-kỳ không tồn tại trong repo); tự tạo bảng tên-thời-kỳ = bịa (vi phạm R195). Điều tra 40/139 passenger bracket 51-65/66+ (11/7): quan sát định tính KHÔNG thấy dấu hiệu trend trẻ, nhưng không có bộ tham chiếu để khẳng định. Không phải 'CẤM tuyệt đối đã enforce' như bản v1.1 cũ khai."

  rule_08_culture_belief:   # facet naming_culture (v1.1)
    description: "TÔN GIÁO/TÍN NGƯỠNG ảnh hưởng tên: Phật tử pháp danh Diệu/Minh; Công giáo thêm tên thánh (chỉ trong thoại xưng gọi, char_name vẫn thuần Việt)."
    link_facet: belief (tier_2 religion)
    enforcement: "roster_validator C4 — PENDING_CONTENT (roster chưa có religion field)"

  rule_09_vietnamese_purity:   # facet naming_vietnamese (v1.1)
    description: "Giữ chuẩn thuần Việt đẹp (rule_01 sẵn) + CẤM tên lai (Jenny Trần), tên game/phi thực (Dragon, Zed), teencode."
    enforcement: "phủ một phần bởi C1 hiện có (rule_01/02/forbidden); regex charset đầy đủ hoãn (chống false-positive trên roster LOCK)"

# ============================================================
# VALIDATION HOOKS
# ============================================================

validation_hooks:
  pre_gen:
    - "load bible/23 → extract RULES"
    - "Pool NAMES_NU + NAMES_NAM word-uniqueness check"
    - "Recurring exclusion check (no 'Nam' word in pool)"
  during_gen:
    - "Per passenger: assert name in pool"
    - "Assert name word NOT IN already_used_words set"
    - "Add name words to already_used_words"
  post_gen:
    - "Audit 100 passenger: 100/100 unique full-name"
    - "Audit 200 syllables: 200/200 distinct (50 nu × 2 + 50 nam × 2)"
    - "Audit no collision với CHAR_NAM ('Nam' word)"

