# SVHMP — 01 NARRATIVE STRUCTURE
# Round 18 add 2026-06-28 — Agent 1 Ngọc Ngạn style synthesis

opening_hook_template_ngan_style:
  # Mandatory cho EP02-EP90 (EP01 đã restore via Z1 punch)
  rule: "Opening 4-8 từ đầu PHẢI = [BỐI CẢNH THỜI GIAN/ĐỊA DANH] + (optional) [NHÂN CHỨNG FRAME]"
  why: |
    Ngọc Ngạn signature: 90% truyện dẫn dắt bằng bối cảnh trước, sự kiện sau.
    TUYỆT ĐỐI tránh "in medias res" kiểu phim Mỹ (mở đầu giữa sự kiện).
    Lý do: tạo distance giữa narrator và sự kiện → lớp phòng vệ tâm lý cho người nghe nửa đêm.

  templates_accepted:
    1_bối_cảnh:
      - "Năm [YYYY], [PLACE]..."
      - "Tháng [N] năm ấy, [PLACE] [WEATHER/MOOD]..."
      - "[MONTH] [PLACE]. [WEATHER]..."
      - "Hôm đó, [TIME], [WEATHER]..."  # mid-acceptable
    2_nhân_chứng_frame:
      - "Câu chuyện tôi sắp kể quý vị nghe là của [PERSON]..."
      - "Tôi nghe được [STORY] hồi [TIME] từ [PERSON]..."
      - "Có một câu chuyện [PERSON] kể với tôi..."

  examples_good:
    - "Tháng tư Hà Nội. Mưa từ bảy giờ tối, không dứt."  # EP01 Z1 restore
    - "Đêm hai tám tháng Chạp. Cụ bà Hằng ngồi đợi xe khách."
    - "Năm 2005, tôi còn làm văn phòng ở Đà Lạt..."

  examples_forbidden:
    - "Đêm đó mưa từ bảy giờ."  # in medias res — quá ngắn không bối cảnh
    - "Tôi giật mình tỉnh giấc."  # in medias res action-first
    - "Bỗng nhiên, tiếng động vang lên."  # in medias res Mỹ-style

  enforcement: "Generator pre-write check: HOOK section opening MUST match 1_bối_cảnh OR 2_nhân_chứng_frame template"

double_anchor_tts_pattern:
  # Round 18 add 2026-06-28 — Agent 1 voice anchor upgrade
  rule: "Voice anchor TTS chunk 1 dùng double-anchor pattern"
  pattern: "Khánh An kể chậm rãi rằng, [pause 400ms] câu chuyện này tôi nghe được hồi..."
  why: "Single anchor (Khánh An kể chậm rãi rằng,...) đủ lock voice nhưng KHÔNG đủ lock cadence Ngạn-style 2-clause. Double-anchor lock both."
  apply: "First chunk per EP narration only (chunk 1). Subsequent chunks normal."

sensory_hierarchy_ghost_manifest:
  # Round 18 add 2026-06-28 — Agent 1 critical horror rule
  rule: "Ghost manifest đầu tiên trong INCIDENT section PHẢI bằng ÂM THANH (NGHE), KHÔNG bằng thị giác (NHÌN)"
  priority_order: "NGHE > LẠNH > MÙI > NHÌN"
  why: |
    Ngọc Ngạn signature: ma NGHE TRƯỚC NHÌN.
    Khác biệt cốt lõi với horror phim ảnh (ưu tiên jumpscare visual).
    Tạo psychological build-up trước khi reveal visual.

  examples_good:
    - "Có tiếng dép lê chậm rãi từ cuối xe..."  # NGHE
    - "Một mùi nhang cũ thoảng qua..."  # MÙI
    - "Khải Phong rùng mình. Không khí trong cabin đột nhiên lạnh hơn..."  # LẠNH

  examples_forbidden:
    - "Khải Phong thấy bóng người ngồi phía sau..."  # NHÌN trước → wrong order
    - "Một cô gái mặc áo dài trắng xuất hiện..."  # NHÌN direct → wrong
    - "Mắt trắng dã. Miệng há hốc đầy máu."  # negative-space violation (see ghost_negative_space)

  enforcement: tools/audit_sensory_order.py — scan INCIDENT first ghost mention

ghost_negative_space_description:
  # Round 18 add 2026-06-28 — Agent 1 critical horror rule
  rule: "Mô tả ma BẰNG NEGATIVE-SPACE, CẤM mô tả face features"
  why: |
    Ngọc Ngạn signature: tóc dài che kín mặt / ngồi quay lưng / bóng đen lờ mờ
    Để não người nghe tự vẽ → ám ảnh hơn detail explicit.

  allowed_patterns:
    - "Tóc dài che kín mặt"
    - "Ngồi quay lưng lại"
    - "Bóng lờ mờ không rõ hình thù"
    - "Chỉ thấy hai chân trắng"
    - "Bóng cô gái sát vai anh"  # SVHMP EP01 reflective

  forbidden_patterns_blacklist:
    - "Mắt trắng dã"
    - "Miệng há hốc đầy máu"
    - "Khuôn mặt biến dạng"
    - "Răng nanh nhọn"
    - "Da xanh xao"
    - "Vết thương lòi ra"
    - "Máu chảy thành dòng"
  enforcement: tools/audit_ghost_negative_space.py + VNQA blacklist auto-flag HIGH

cliffhanger_pool_ngan_lung_triết_lý:
  # Round 18 add 2026-06-28 — Agent 1 + bible/07 expand
  rule: "EP ending PHẢI dùng kết lửng triết lý Ngạn-style, KHÔNG cliffhanger Mỹ-style"
  why: "Cliffhanger Mỹ = audience expectation reset. Kết lửng triết lý = đọng lại trong tâm trí → moat literary."

  template_pool:
    - "...đến giờ tôi vẫn không hiểu vì sao đêm hôm ấy lại như vậy."
    - "...có những chuyện trên đời này, có lẽ không bao giờ có lời giải."
    - "...tôi chỉ biết kể lại, còn tin hay không là ở quý vị."
    - "...đến giờ vẫn chưa ai biết chuyến xe ấy còn chạy hay không."
    - "...có lẽ có những điều, đêm khuya càng nghĩ, càng không hiểu."
    - "...quý vị tin hay không, đó là quyền của quý vị."

  current_svhmp_pattern: |
    SVHMP đang dùng "Con đã nhớ ra chưa?" + bác tài liếc gương kết → đủ ghost vibe.
    Bổ sung pool trên cho narrator coda 60-90s cuối mỗi EP (sau bác tài quote, trước intro EP next).

bimodal_sentence_length_per_section:
  # Round 18 add 2026-06-28 — Agent 1 critical Ngạn rhythm
  rule: "Mỗi section EP PHẢI có ít nhất 1 cụm 3 câu cụt liên tiếp (3-7 từ) xen kẽ 1 câu dài 60+ từ"
  why: |
    Ngọc Ngạn signature: bimodal distribution sentence length.
    Câu dài 60-100+ từ cho đoạn miêu tả ký ức / dòng suy nghĩ.
    Câu cụt 3-7 từ cho moment kịch tính ("Tôi giật mình.", "Im phăng phắc.").
    KHÔNG được toàn câu 15-25 từ đều đều (monotone = robotic feel).

  pattern_per_section:
    HOOK: "Mở đầu bối cảnh dài → 2-3 câu cụt"
    SETUP: "Description dài → 1 cụm cụt observation"
    INCIDENT: "Cụt-cụt-cụt cho ghost manifest moment"
    REVEAL: "1-2 câu dài 60+ từ memory peak"
    PAYOFF: "Mix bimodal"
    CLIFFHANGER: "Cụt → dư âm dài philosophy"

  enforcement: tools/vnqa/audit_bimodal_check.py H8 check

reveal_pause_marker:
  # Round 18 add 2026-06-28 — Agent 1 mandatory TTS pause TRƯỚC reveal
  rule: "Câu key reveal PHẢI có marker [REVEAL_PAUSE_1000ms] đặt TRƯỚC (KHÔNG sau)"
  why: |
    Ngạn signature: pause 800-1200ms TRƯỚC câu thắt nút (KHÔNG sau).
    BigVGAN TTS không tự generate pause trước reveal → manual marker.

  example:
    bad: "Khải Phong gật. Hạ Vy đã mất tại nơi. [pause:1200ms]"  # pause SAU = wrong
    good: "Khải Phong gật. [REVEAL_PAUSE_1000ms] Hạ Vy đã mất tại nơi."  # pause TRƯỚC = right

  enforcement: TTS adapter scan [REVEAL_PAUSE_Nms] markers + insert silence segment
