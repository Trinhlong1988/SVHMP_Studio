# R94b — Mix configuration (YAML config for build_mix_command.py)
# Mr.Long lock 30/6 10:58 — Tier 2.1 Audio/Mix Gate.

ep01_v_next:
  episode: 1
  sections_order:
    - hook
    - setup
    - incident
    - reveal
    - payoff
    - cliffhanger

  section_silence_ms: 1500  # R94b mandatory bridge

  voice_pipeline:
    volume: 0.92               # R102 ≤1.0 chống pcm clamp
    alimiter_limit: 0.80       # R101 + R104b
    alimiter_attack_ms: 10
    alimiter_release_ms: 80

  music_pipeline:
    file: D:/hdk_music_library/_episodes/ep_001/ep_001_full.mp3
    volume: 0.282              # R94 constant bed -15 dB
    intro_lead_sec: 6.0        # R97 dạo đầu
    fade_in_sec: 2.0

  output:
    voice_wav: output/ep_01/EP01_VOICE_v{version}.wav
    final_mp3: output/ep_01/EP01_FULL_v{version}.mp3
    sample_rate_voice: 22050
    sample_rate_final: 44100
    mp3_quality: 2

  audio_qa_thresholds:
    peak_dbfs_max: -0.1
    true_peak_dbtp_max: -1.0
    clip_count_max: 0
    lufs_i_target: -16
    lufs_i_tolerance: 6.0    # ±6 LU
    silence_ratio_max_pct: 50
    longest_silence_max_sec: 3.0
    expected_section_boundaries_silence_ms: 1500
    expected_boundaries_count: 5
