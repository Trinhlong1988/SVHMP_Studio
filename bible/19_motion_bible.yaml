    - lantern_rules.flame_flicker.cycle_hz (tune sau A/B)
    - logo_rules.fade_in_frames (Mr.Long preference)
    - camera_rules.intro_push_speed_pct_per_s (Mr.Long preference)
  amendment_process: "Mr.Long edit yaml + bump version + add changelog entry. KHÔNG quietly drift trong code render script."
  who_can_amend: Mr.Long ONLY

