# SVHMP — 19 MOTION BIBLE (HDK channel intro + ep video motion rules)
# Lock date: 2026-06-26 (Mr.Long chốt phương án HDK Motion Engine + AI review docx 26/6)
#
# ✅ APPROVED Mr.Long 2026-06-26 — T1.1-T1.22 LOCKED
# Audit trail historical: assets/hdk_channel/_AUDIT_TENTATIVE_LOG.md cluster T1.
# Rule cứng cho content MỚI sau 26/6: memory feedback_cam_suy_luan.md.
# Status: APPROVED IMMUTABLE v1.0 (Mr.Long lock 2026-06-26).
# Priority: LOAD by Video Director (V3 camera + V8 intro motion) + HDK Intro Pipeline
# Loaded by: Video Director v1.0 (V3 CAMERA TIMELINE ref + V8 INTRO MOTION) / HDK Intro Build Script
# Mục tiêu: Cố định "ngôn ngữ chuyển động" của series — fog/lantern/logo/camera consistent 1000+ ep.

version: 1.0
lock_date: 2026-06-26 (initial — values TENTATIVE cho tới khi A/B render 4 motion asset thật và Mr.Long approve)
authority: Mr.Long
supersedes: none (NEW bible)
parent_constitution: bible/00_constitution.yaml
related:
  - bible/04_asset_bible.yaml (asset registry + sha256)
  - bible/10_brand_audio.yaml (audio signature counterpart)
  - prompts/video.md V3 CAMERA TIMELINE (ep body camera rules)
  - prompts/video_intro.md V8 INTRO MOTION (channel intro motion rules — load file này)

purpose: |
  Tách "ngôn ngữ chuyển động" thành bible độc lập để:
  1. Video Director ep body (V3) reuse motion rules cho ep scene
  2. HDK Intro Pipeline (V8) reuse cho intro 4.5s channel-level
  3. AI/người tiếp tục dự án có 1 single source motion truth
  Tránh drift: ep 1 fog speed 0.12 px/frame vs ep 50 fog speed 0.30 px/frame → cảm giác khác.

# ============================================================
# FOG (sương mù) — element xuyên suốt intro + ep body
# ============================================================

fog_rules:
  speed:
    horizontal_drift_px_per_frame: 0.12   # TENTATIVE, lock sau A/B test
    vertical_rise_px_per_frame: 0.08      # cho smoke_fx (vertical), khác fog (horizontal)
    max_speed_px_per_frame: 0.20          # HARD cap — vượt = chuyển động giả, mất eerie
    fps_reference: 24
  density:
    intro_segment_2: 60                   # opacity %, segment ĐÈN DẦU+SƯƠNG
    intro_segment_3: 60                   # giữ liên tục
    intro_segment_4: 60                   # giữ liên tục
    ep_body_baseline: 40                  # ep body dùng nhẹ hơn intro
    ep_body_payoff: 50                    # tăng nhẹ tại S5/S6
  blend_mode: screen                      # NEVER multiply (đậm quá, mất transparency)
  color_cast:
    allowed: ["neutral_grey", "warm_amber_tint"]
    forbidden: ["blue_tint", "green_tint", "red_tint"]
    rationale: "Neutral cho phép composite mọi background. Tint = bake-in màu, mất linh hoạt 1000+ ep."
  drift_policy: HARD-FAIL if speed > max_speed OR density > 70

# ============================================================
# LANTERN + FLAME — signature visual của HDK
# ============================================================

lantern_rules:
  flame_flicker:
    cycle_hz: 2.0                          # 2 chu kỳ "thở" / giây — tự nhiên, không strobe
    intensity_variation_pct: 12            # ± 12% brightness around mean (12% = AI kia đề xuất)
    forbidden: ["violent_flicker_>4Hz", "strobe", "abrupt_extinguish"]
  color_temperature_kelvin: 2500          # warm amber, đúng đèn dầu cổ
  position_in_intro:
    segment_2: center                      # frame 19-52 center
    segment_3: center                      # logo overlay center, lantern lui xuống background
    segment_4: center                      # vẫn center 40% opacity background
  scale_in_intro:
    segment_2: "100% → 108%"               # camera push-in slow (matches camera_rules)
    segment_3: "108% (constant scale, position behind logo)"
    segment_4: "108% (background)"
  scale_in_ep_body: 100                    # ep body lantern không có push-in
  drift_policy: HARD-FAIL if flicker_hz > 4 OR color_temp outside [2300, 2700]

# ============================================================
# LOGO — HDK brand mark
# ============================================================

logo_rules:
  fade_in_frames: 18                       # 0.75s @ 24fps (AI kia đề xuất 18)
  fade_out_intro_frames: 24                # segment 4 mờ dần 100→60%
  scale:
    intro_appear: "95% → 100%"             # subtle bloom on appear
    intro_hold: 100
    intro_end: 100                         # KHÔNG shrink, chỉ fade opacity
    max_scale_ever: 105                    # HARD cap — vượt = thiếu kiềm chế (AI kia đề xuất)
  inner_glow_intensity_pct: 15             # "không phát sáng mạnh" per docx LOCK 25/6
  inner_glow_color: warm_amber
  outer_glow: false                        # docx LOCK forbid
  position: center
  rotation_forbidden: true                 # NEVER rotate logo
  drift_policy: HARD-FAIL if scale > max_scale_ever OR rotation != 0 OR outer_glow detected

# ============================================================
# CAMERA — push/pan/dolly rules per segment
# ============================================================

camera_rules:
  intro_4_5s:
    segment_1: static                                            # ĐEN, không camera
    segment_2: "push_in_slow scale 100% → 108% over 1.4s"        # 0.8-2.2s
    segment_3: "hold (no camera motion, only opacity changes)"   # 2.2-3.5s
    segment_4: "hold"                                            # 3.5-4.5s
    segment_5_cut: instant                                       # 4.5s hard cut
  intro_push_speed_pct_per_s: 5.7          # (108-100) / 1.4s ≈ 5.7% / s
  ep_body: ref prompts/video.md V3 CAMERA TIMELINE (re-use camera rules)
  shake_forbidden: true                    # AI kia đề xuất "Never shake" — chấp nhận
  rotation_forbidden: true                 # KHÔNG xoay camera

# ============================================================
# MOON — element ep body (KHÔNG dùng trong intro 4.5s theo docx LOCK)
# ============================================================

moon_rules:
  animation_allowed: ["scale", "opacity"]
  animation_forbidden: ["rotation"]         # AI kia đề xuất "Never animate rotation"
  opacity_ep_body_default: 35               # AI kia đề xuất 35%
  drift_policy: HARD-FAIL if rotation animation detected

# ============================================================
# DUST PARTICLE — element optional ep body atmospheric
# ============================================================

dust_rules:
  intro_use: FORBIDDEN                     # docx LOCK 25/6 không mention dust trong intro
  ep_body_opacity_pct: 20                  # nhẹ, ambient
  ep_body_blend_mode: screen
  direction: "match key_light direction (warm side light)"
  speed: "very slow natural drift"

# ============================================================
# AUDIO MOTION SYNC — beat match với brand audio
# ============================================================

audio_motion_sync:
  intro_4_5s_sync:
    bell_distant_at_0_3s: "no visual change (still black per docx)"
    flame_ignite_at_0_8s: "lantern_flame_loop start"
    logo_appear_at_2_2s: "smoke + glow build"
    whistle_at_3_5s: "tagline fade in (whistle = signature audio mark)"
    hard_cut_at_4_5s: "all audio cut hard, video cut to ep narration first frame"
  ep_body_sync:
    bell_ring_moments: "static camera 3s hold synced with bell (M4 reference brand_audio)"
    regret_line_moments: "extreme close + zero motion 3s (sync M8 phase_3 silence_3s)"
  ref: bible/10_brand_audio.yaml

# ============================================================
# SIGNATURE CONSISTENCY RULES — cross-ep
# ============================================================

signature_consistency_rules:
  intro_4_5s_byte_identical_after_render: true
  fog_speed_drift_max_pct_across_eps: 5     # vd ep1 0.12 px/frame, ep90 không vượt 0.126
  lantern_flicker_drift_max_pct_across_eps: 10
  logo_scale_drift_max_pct_across_eps: 2    # gần như zero drift
  camera_push_speed_drift_max_pct_across_eps: 5

# ============================================================
# QUALITY CHECK PER RENDER
# ============================================================

quality_check_per_render:
  intro_motion_check:
    - fog_horizontal_speed measured within [0.08, 0.20] px/frame
    - lantern_flicker_hz measured within [1.5, 2.5] Hz
    - logo_scale_max measured ≤ 105
    - logo_rotation measured = 0
    - camera_push measured 100% → 108% over 1.4s ±50ms
    - 0 violations forbidden lists above
  ep_body_motion_check:
    - ref prompts/video.md V3 camera + add this bible motion drift rules

# ============================================================
# REVISION POLICY
# ============================================================

revision_policy:
  status: APPROVED_IMMUTABLE  # Mr.Long approved 2026-06-26
  immutable_after: 2026-06-26
  amendable_fields_initial:
