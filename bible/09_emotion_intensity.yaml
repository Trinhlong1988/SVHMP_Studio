# SVHMP — 09 EMOTION INTENSITY CURVE
# Lock date: 2026-06-19 (round 11 — Mr.Long docx 13:33)
# Status: IMMUTABLE per series — KHÔNG sửa mid-production
# Loaded by: Generator (writing intensity bias) / TTS Director (preset intensity multiplier)
#            Video Director (color/lighting depth) / QA Lock (PHASE 12.8 emotional_depth audit)

version: 1.0
lock_date: 2026-06-19
purpose: |
  Emotion rotation (bible/06_lexical_style hoặc generator content_layer) đảm bảo VARIETY.
  Emotion intensity curve đảm bảo cường độ TĂNG DẦN theo series — season cuối nặng hơn đầu.
  Tránh: season 1 đã max intensity → season 3 không còn chỗ leo.

intensity_curve:
  # Level 0-1 = scalar composite (legacy, giữ cho TTS/Video multiplier).
  # ROUND 3 (2026-06-23) — see axis_breakdown block dưới for 2D {sorrow, mystery}.
  # Multiplier áp vào TTS style + Video saturation + lighting contrast.
  # KHÔNG áp vào QA threshold (threshold cố định).

  ep_1_to_10:
    level: 0.45
    name: "introductory"
    description: "Khán giả mới — không vội đẩy nghẹn quá mạnh. Build trust trước."
    examples_of_intensity:
      - REGRET LINE đơn giản, 1 việc nhỏ
      - sensory ≤ 4 dòng/ep
      - bell single chuông, no double
      - silence 3s cuối (default)

  ep_11_to_30:
    level: 0.55
    name: "warming"
    description: "Khán giả quen format. Bắt đầu push depth nhẹ."
    examples_of_intensity:
      - REGRET LINE có thể có flashback ngắn
      - sensory 4-5 dòng/ep
      - bell single + 1 SFX phụ (door close / phone)
      - silence 3-4s cuối

  ep_31_to_60:
    level: 0.70
    name: "deepening"
    description: "Mid-series. Khán giả invested. Push regret nặng hơn, twist sâu hơn."
    examples_of_intensity:
      - REGRET LINE có thể 2 dòng key thay vì 1
      - sensory 5-6 dòng/ep
      - bell + ambient SFX layer
      - silence 4s cuối
      - allow variant C dual-perspective (chỉ từ ep 31+)
      - allow narrative_dna A+B blend (chỉ từ ep 30+)

  ep_61_to_90:
    level: 0.85
    name: "climactic"
    description: "Season 3 buông bỏ. Cảm xúc đỉnh. Khán giả ready cho cú nặng."
    examples_of_intensity:
      - REGRET LINE đầy đủ + bonus 1 dòng dư âm
      - sensory 6-7 dòng/ep
      - bell có thể double (ep 73 PIVOT)
      - silence 4-5s cuối
      - allow RELEASE/RETURN payoff_kind (chỉ S3)
      - allow narrative_dna blend mọi cặp
      - ep 73 PIVOT: intensity boost +0.05 = 0.90
      - ep 90 FINALE: intensity boost +0.10 = 0.95

  ep_91_plus (sequel/season 4+):
    level: 0.75
    name: "post-finale"
    description: "Nếu series có sequel — reset xuống 0.75 để có chỗ leo lại."

# ============================================================
# 2D AXIS BREAKDOWN — round 3 (2026-06-23) Mr.Long docx 15:49
# ============================================================
# SORROW = cường độ regret/tiếc nuối/buồn từng ep (peak each episode at beat_4).
# MYSTERY = cường độ "driver/73 reveal" xuyên series (peak ep 73).
# Tách 2D giúp QA check curve riêng — tránh ep 5 đã max sorrow + ep 50 đã max mystery.

axis_breakdown:
  phase_establish:             # ep 1-10
    sorrow: 40
    mystery: 20
    description: "Buồn nhẹ + tạo wonder. KHÔNG đẩy sorrow đỉnh + KHÔNG lộ mystery."

  phase_mystery:               # ep 11-30
    sorrow: 50
    mystery: 35
    description: "Sorrow build qua hành khách thường. Mystery bắt đầu hint qua chi tiết bác tài."

  phase_escalation:            # ep 31-60
    sorrow: 60
    mystery: 60
    description: "Sorrow đậm + mystery rõ. Hành khách khác bắt đầu cảm nhận bác tài lạ."

  phase_revelation:            # ep 61-72
    sorrow: 70
    mystery: 80
    description: "Sorrow đỉnh áp + mystery gần lộ. Backstory bác tài hiện qua hint."

  phase_pivot:                 # ep 73 (special)
    sorrow: 75
    mystery: 95
    description: "PIVOT — mystery reveal cùng tập Nam = hành khách 73."

  phase_aftermath_finale:      # ep 74-90
    sorrow: 80
    mystery: 100
    description: "Nam học lái. Sorrow chuyển sang thanh thản dần. Mystery resolve."

axis_check_qa:
  per_episode:
    - "ep.sorrow_observed <= phase.sorrow_cap + 5 (tolerance)"
    - "ep.mystery_observed <= phase.mystery_cap + 5 (tolerance)"
  curve_check:
    - "sorrow_curve monotonic non-decreasing across phases"
    - "mystery_curve monotonic non-decreasing"
    - "if any phase regression > 10 → minor_error emotion_intensity_regression"

intensity_application_per_cmd:
  # NOTE round 12 fix B5.1: Generator (RC3.4) + QA Lock (v1.1) FROZEN — KHÔNG explicit load file.
  # Inline trong generator/qa: emotion_rotation (6 emo) + season_roadmap (3 season pillar_skew).
  # TTS Director v1.1 DO load (M2 intensity_multiplier) + Video v1.0 DO load (V3 color_grading).
  # Khi unfreeze (v10.1-FINAL), Generator/QA migrate sang load file này.

  generator:
    - REGRET LINE depth biên cố định cao thấp theo level
    - sensory count = round(4 + level * 4)  → 4-8 dòng
    - emotional_core_line frequency = 1 (always) ; ở ep 73/90 = 2
    - cliffhanger length = 8 + round(level * 6) câu → 12-14 câu

  tts_director:
    # multiplier áp lên render_preset emotion intensity
    intensity_multiplier:
      ep_1_to_10:    0.85   # nhẹ hơn baseline
      ep_11_to_30:   1.00   # baseline
      ep_31_to_60:   1.15   # đậm hơn
      ep_61_to_90:   1.30   # đậm nhất
      ep_73:         1.40   # PIVOT
      ep_90:         1.45   # FINALE

    # apply: preset.intensity (cadence M2) × multiplier, cap [0.30, 0.90]

  video_director:
    # color grading depth
    saturation_offset:
      ep_1_to_10:    -0.05
      ep_11_to_30:    0.00
      ep_31_to_60:   +0.08
      ep_61_to_90:   +0.15
    contrast_offset:
      ep_1_to_10:    -3
      ep_11_to_30:    0
      ep_31_to_60:   +5
      ep_61_to_90:   +10
    vignette_strength:
      ep_1_to_10:    0.30
      ep_11_to_30:   0.35
      ep_31_to_60:   0.45
      ep_61_to_90:   0.55

  qa_lock:
    # emotional_depth rubric (PHASE 12.8) — adjust expectation per intensity level
    expected_regret_line_depth:
      ep_1_to_10:    "1 việc nhỏ — đơn giản — không cần flashback"
      ep_11_to_30:   "1 việc + flashback ngắn — sensory đủ"
      ep_31_to_60:   "1-2 việc + flashback đầy + emotional_core_line rõ"
      ep_61_to_90:   "việc lớn + RELEASE/RETURN payoff + dư âm extended"

    if depth thấp hơn expected: minor_error (downgrade soft)
    if depth cao hơn expected ở S1: minor_error (over-peak sớm)

drift_alert:
  - if ep_15 có intensity_observed > 0.65 → flag "peak quá sớm" (warming)
  - if ep_85 có intensity_observed < 0.75 → flag "thiếu climax"
  - if 5 ep liên tiếp đều ở 0.85+ → flag "fatigue audience" → ép 1 ep nhẹ
