# SVHMP — 11 REGRET CATALOG
# Lock date: 2026-06-23 (Mr.Long round 3 chốt — bổ sung sau EP01 v7_final_round3_lock)
# Status: IMMUTABLE per series
# Loaded by: Generator (pick regret pillar → match archetype + object) / QA Lock (variety + uniqueness audit)
# Mục tiêu: 5 pillars × ~6 sub-archetypes = 30 regret cores → cover 50-100 ep với distance 6+

version: 1.0
lock_date: 2026-06-23 15:30
purpose: |
  Regret = lý do hành khách lên chuyến xe. Pillar = phân loại regret theo relationship.
  Mỗi tập pick 1 pillar + 1 sub-archetype. Generator + QA enforce variety (no repeat trong 6 ep liền).
  Cross-ref: 12_object_library.pairable_pillars + 13_setting_library.pairable_pillars + 03_character_bible.archetypes.

# ============================================================
# 5 PILLARS
# ============================================================

pillars:

  # ─────────────────────────────────────────────
  family_regret:
    display_name: "Hối tiếc với gia đình"
    weight: 0.32           # cao nhất — relate dễ nhất với khán giả 28-55
    core_emotion: [tiếc nuối, day dứt, muộn màng]
    description: "Tiếc về cha/mẹ/ông/bà/anh chị em — người thân mất khi mình không có mặt, không kịp nói lời cuối, hoặc không kịp về."

    sub_archetypes:
      - id: REG_FAM_001
        label: "Mẹ đợi con về Tết — con không về kịp"
        sample_story: "Mẹ ở quê đợi con từ 28 Tết. Con kẹt việc ở thành phố. Mùng 1 mẹ mất. Mẹ không kịp nói gì với con."
        signature_objects: [OBJ_AO_LEN_NAU, OBJ_BANH_CHUNG_GOI_DO, OBJ_LI_XI_DO]
        pairable_archetypes: [ARCH_01_me_doi_con]
        pairable_settings: [setting_can_tet, setting_dem_giao_thua]

      - id: REG_FAM_002
        label: "Bà nội mất giao thừa — cháu không bắt máy"
        sample_story: "Bà gọi cháu đêm giao thừa. Cháu đang nhậu, không bắt. Rạng sáng mùng 1 bà mất. Cuộc gọi nhỡ đó là cuối cùng."
        signature_objects: [OBJ_KHAN_TAY_CU, OBJ_BANG_CASSETTE]
        pairable_archetypes: [ARCH_08_ba_co_don, ARCH_09_con_roi_nha]
        pairable_settings: [setting_dem_giao_thua, setting_dong_lanh]
        note: "LỊCH SỬ: từng là core_wound của hồ sơ CHAR_NAM (03_character_bible.yaml, ban
          nháp 19/6, chưa từng dùng trong episode nào). bible/03 v1.1 (12/7) thay CHAR_NAM
          bằng CHAR_KHAI_PHONG (wound thật: Hạ Vy) — REG_FAM_002 KHÔNG còn map tới character
          nào trong bible/03, giữ nguyên làm archetype chung dùng cho hành khách one-shot."

      - id: REG_FAM_003
        label: "Cha câm lặng — con không hiểu cha"
        sample_story: "Cha cả đời không nói. Con tưởng cha lạnh lùng. Cha mất, con đọc nhật ký cha — mỗi trang đều viết về con."
        signature_objects: [OBJ_BUT_MAY_CHA, OBJ_SO_GHI_CHEP]
        pairable_archetypes: [ARCH_02_cha_cam_lang]

      - id: REG_FAM_004
        label: "Em mất khi anh đi xa — anh không kịp về"
        sample_story: "Em ốm liệt giường. Anh đi xuất khẩu lao động. Em nhắn 'em đợi anh về'. Anh về muộn 2 ngày."
        signature_objects: [OBJ_AO_DAI_TRANG, OBJ_THU_TAY]
        pairable_archetypes: [ARCH_04_gai_18]

      - id: REG_FAM_005
        label: "Ông mất — cháu chưa kịp xin lỗi vì cãi ông"
        sample_story: "Cháu cãi ông vụ thi đại học. Bỏ về nhà mình. Ông mất 1 tuần sau. Câu cuối ông nói là 'ông không giận con'."
        signature_objects: [OBJ_GAY_TRUC, OBJ_KINH_CU]
        pairable_archetypes: [ARCH_05_linh_gia]

      - id: REG_FAM_006
        label: "Mẹ chăm con suốt đời — con quên hỏi mẹ thích gì"
        sample_story: "Mẹ nấu cơm 60 năm. Con chưa bao giờ hỏi mẹ thích ăn gì. Mẹ mất — con tìm trong sổ tay mẹ: 'mẹ thích cá kho'."
        signature_objects: [OBJ_NOI_DAT_CU, OBJ_DAO_NHA_BEP]
        pairable_archetypes: [ARCH_01_me_doi_con]

  # ─────────────────────────────────────────────
  love_regret:
    display_name: "Hối tiếc tình yêu"
    weight: 0.24
    core_emotion: [tiếc nuối, nhớ thương, day dứt nhẹ]
    description: "Tiếc về người yêu / vợ / chồng / mối tình đầu — câu chưa kịp nói, lời chia tay vội, cái ôm không có."

    sub_archetypes:
      - id: REG_LOV_001
        label: "Yêu thầm tới lúc người ấy mất — chưa kịp tỏ tình"
        sample_story: "Anh thương cô từ cấp 3. 8 năm im lặng. Cô đi học bổng nước ngoài — mất trên đường về nhà người dì."
        signature_objects: [OBJ_DONG_HO_XA_CU, OBJ_AO_GIO_XANH]
        pairable_archetypes: [ARCH_12_yeu_xa]
        pairable_settings: [setting_dem_thang_tu_HN, setting_san_bay_dem]
        note: "Đây là core của EP01 Khải Phong ↔ Hạ Vy — golden reference."

      - id: REG_LOV_002
        label: "Vợ trẻ mất khi sinh — chồng vắng vì công tác"
        sample_story: "Vợ trở dạ sớm. Chồng đi công tác xa. Mẹ vợ điện báo — chồng về kịp lúc vợ đã đi."
        signature_objects: [OBJ_VONG_TAY, OBJ_QUAN_AO_TRE_SO_SINH]
        pairable_archetypes: [ARCH_03_vo_tre, ARCH_07_chong_di_xa]

      - id: REG_LOV_003
        label: "Chia tay vì hiểu lầm — chưa kịp xin lỗi"
        sample_story: "Cãi nhau vụ nhỏ. Cô bỏ đi. Anh tưởng sẽ làm lành sau. Cô gặp tai nạn 3 ngày sau."
        signature_objects: [OBJ_NHAN_CUOI, OBJ_THU_CHIA_TAY]
        pairable_archetypes: [ARCH_03_vo_tre, ARCH_12_yeu_xa]

      - id: REG_LOV_004
        label: "Yêu xa 10 năm — gặp lại thì người ấy đã có gia đình"
        sample_story: "10 năm đợi. Về quê — cô đã lấy chồng. Anh không trách. Chỉ tiếc đã không nói sớm."
        signature_objects: [OBJ_HOP_THU_CU, OBJ_VE_TAU_KHU_HOI]
        pairable_archetypes: [ARCH_12_yeu_xa]

      - id: REG_LOV_005
        label: "Chồng già mất — vợ tiếc chưa nói 'cảm ơn'"
        sample_story: "60 năm vợ chồng. Cãi vặt nhiều, lời cảm ơn ít. Chồng đi đêm trong giấc ngủ. Vợ ngồi đầu giường nói câu cảm ơn."
        signature_objects: [OBJ_AO_LEN_NAU, OBJ_KINH_LAO]
        pairable_archetypes: [ARCH_08_ba_co_don]

      - id: REG_LOV_006
        label: "Yêu xa thư tay — cô gái mất trước khi anh đọc thư cuối"
        sample_story: "Yêu xa 3 năm. Thư cuối của cô từ Nhật. Anh chưa kịp mở. Nhận tin cô mất do biến chứng đột ngột. 10 năm sau anh mới đủ can đảm đọc."
        signature_objects: [OBJ_THU_TAY, OBJ_HOP_THU_CU]
        pairable_archetypes: [ARCH_12_yeu_xa]

  # ─────────────────────────────────────────────
  promise_regret:
    display_name: "Hối tiếc lời hứa"
    weight: 0.20
    core_emotion: [day dứt, lỗi, không yên]
    description: "Tiếc về 1 lời hứa cụ thể không giữ. Hứa về thăm / hứa chăm sóc / hứa quay lại. Người được hứa mất khi mình còn nợ."

    sub_archetypes:
      - id: REG_PRO_001
        label: "Hứa đưa con đi công viên — không kịp"
        sample_story: "Bố hứa cuối tuần đưa con đi. Bố kẹt làm. Tuần sau con ốm. Tháng sau con mất do bệnh đột ngột."
        signature_objects: [OBJ_VE_CONG_VIEN, OBJ_GAU_BONG]
        pairable_archetypes: [ARCH_02_cha_cam_lang, ARCH_09_con_roi_nha]

      - id: REG_PRO_002
        label: "Hứa về ăn Tết với mẹ — không về"
        sample_story: "Con hứa Tết về. Kẹt việc. Hứa Tết sau. Mẹ mất giữa năm."
        signature_objects: [OBJ_BANH_CHUNG_GOI_DO, OBJ_THU_TAY]
        pairable_archetypes: [ARCH_01_me_doi_con]
        pairable_settings: [setting_can_tet]

      - id: REG_PRO_003
        label: "Hứa cưới — đến ngày không tới được"
        sample_story: "Hứa cưới sau khi anh ra trường. Ra trường anh đi nước ngoài. Cô đợi 5 năm. Anh không về."
        signature_objects: [OBJ_NHAN_CUOI, OBJ_VAY_CUOI_TRANG]
        pairable_archetypes: [ARCH_03_vo_tre]

      - id: REG_PRO_004
        label: "Hứa thăm ông bà cuối tuần — quên"
        sample_story: "Tuần nào ông bà cũng đợi. Tuần nào cháu cũng quên. Một sáng nhận tin ông mất."
        signature_objects: [OBJ_KINH_LAO, OBJ_RADIO_CU]
        pairable_archetypes: [ARCH_05_linh_gia, ARCH_08_ba_co_don]

      - id: REG_PRO_005
        label: "Hứa đưa mẹ đi khám sức khỏe — quên 6 tháng"
        sample_story: "Mẹ kêu đau ngực. Con hứa cuối tháng đưa đi khám. Trì hoãn 6 tháng. Mẹ ngã quỵ — ung thư giai đoạn cuối."
        signature_objects: [OBJ_TOA_THUOC_CU, OBJ_THE_BHYT_HET_HAN]
        pairable_archetypes: [ARCH_01_me_doi_con]

      - id: REG_PRO_006
        label: "Hứa giữ liên lạc — 5 năm không gọi 1 lần"
        sample_story: "Bạn thân thời sinh viên. Tốt nghiệp 'gọi nha'. 5 năm sau biết bạn tự tử vì trầm cảm. Bạn chỉ cần 1 cuộc gọi."
        signature_objects: [OBJ_HOP_THU_CU, OBJ_DANH_BA_GHI_TAY]
        pairable_archetypes: [ARCH_06_ban_hang_dem]

  # ─────────────────────────────────────────────
  kindness_regret:
    display_name: "Hối tiếc lòng tốt chưa kịp đáp"
    weight: 0.14
    core_emotion: [áy náy, biết ơn muộn, tiếc nhẹ]
    description: "Tiếc với người không thân — cô giáo cũ, bà bán nước đầu hẻm, bác xe ôm, đồng nghiệp đã từng giúp. Nhận lòng tốt nhưng chưa kịp đáp / chưa kịp cảm ơn."

    sub_archetypes:
      - id: REG_KIN_001
        label: "Cô giáo cũ mất — chưa kịp đến thăm"
        sample_story: "Cô dạy mình lớp 5. Mình thành đạt — định về thăm. Cô mất. Mình mới biết cô vẫn nhắc mình suốt 20 năm."
        signature_objects: [OBJ_PHAN_TRANG, OBJ_QUYEN_SACH_GIAO_KHOA_CU]
        pairable_archetypes: [ARCH_10_co_giao_lang]

      - id: REG_KIN_002
        label: "Bà bán nước cho mình ngồi nhờ đêm mưa — không kịp cảm ơn"
        sample_story: "Đêm mưa hỏng xe. Bà cho ngồi nhờ + cốc nước. Mình đi không cảm ơn. 2 năm sau qua lại — bà mất."
        signature_objects: [OBJ_AM_TRA_NHOM, OBJ_GHE_DAU]
        pairable_archetypes: [ARCH_06_ban_hang_dem, ARCH_08_ba_co_don]

      - id: REG_KIN_003
        label: "Đồng nghiệp giúp mình lúc khó — chưa kịp trả ơn thì họ chuyển"
        sample_story: "Anh ấy gánh việc cho mình lúc mẹ mình ốm. Mình hứa mời ăn. Anh nghỉ việc trước. Năm sau nghe tin anh mất."
        signature_objects: [OBJ_HOP_QUA_CHUA_TANG, OBJ_THE_NHAN_VIEN]
        pairable_archetypes: [ARCH_06_ban_hang_dem]

      - id: REG_KIN_004
        label: "Bác xe ôm 10 năm chở đi học — chưa lần cảm ơn"
        sample_story: "Bác xe ôm đầu hẻm chở mình đi học 10 năm cấp 1-2-3. Lớn lên đi xa. Về thăm hẻm — bác mất 3 năm trước."
        signature_objects: [OBJ_NON_BAO_HIEM_CU, OBJ_TIEN_LE_GIAY]
        pairable_archetypes: [ARCH_06_ban_hang_dem, ARCH_05_linh_gia]

      - id: REG_KIN_005
        label: "Người lạ giúp lúc lạc đường — chưa kịp hỏi tên"
        sample_story: "Lạc đường đêm khuya. Anh xe lai chở mình về tận nhà, không lấy tiền. Mình quên hỏi tên. Vài tháng sau nghe tin anh mất do tai nạn."
        signature_objects: [OBJ_AO_MUA_CU, OBJ_BAN_DO_GIAY]
        pairable_archetypes: [ARCH_06_ban_hang_dem]

  # ─────────────────────────────────────────────
  self_regret:
    display_name: "Hối tiếc với chính mình"
    weight: 0.10
    core_emotion: [tiếc, tiếc tuổi trẻ, nhớ giấc mơ cũ]
    description: "Tiếc về quyết định của chính mình. Giấc mơ bỏ dở, lựa chọn không dám, con đường đáng lẽ đi. Không có 'đối tượng người khác' — chỉ có mình vs mình."

    sub_archetypes:
      - id: REG_SELF_001
        label: "Bỏ giấc mơ vẽ — theo nghề an toàn"
        sample_story: "Hồi 18 tuổi vẽ giỏi. Cha bảo theo kế toán. Mình theo. 40 năm sau mở lại hộp tranh cũ — khóc một mình."
        signature_objects: [OBJ_HOP_MAU_VE_CU, OBJ_BUC_TRANH_DANG_DO]
        pairable_archetypes: [ARCH_11_ban_ve_so]

      - id: REG_SELF_002
        label: "Không dám tỏ tình — cả đời độc thân"
        sample_story: "Có 1 người mình thương. Không dám nói. Họ lấy người khác. Mình ở một mình tới 60 tuổi."
        signature_objects: [OBJ_THU_CHUA_GUI, OBJ_ANH_CHUP_CHUNG]
        pairable_archetypes: [ARCH_08_ba_co_don]

      - id: REG_SELF_003
        label: "Bỏ con vì sự nghiệp — cuối đời không có ai"
        sample_story: "Trẻ tham công. Vợ bỏ vì không có thời gian. Già không con không cháu. Một mình trong phòng trọ."
        signature_objects: [OBJ_HUY_CHUONG_VANG, OBJ_KEM_LO_BAT_CO_DON]
        pairable_archetypes: [ARCH_06_ban_hang_dem]

      - id: REG_SELF_004
        label: "Sợ bệnh viện — bỏ qua dấu hiệu cảnh báo 2 năm"
        sample_story: "Đau ngực 2 năm. Sợ kết quả xấu nên không đi khám. Cuối cùng đến viện — quá muộn. Tiếc đã không can đảm sớm."
        signature_objects: [OBJ_DON_THUOC_GIAU, OBJ_LICH_HEN_KHONG_DI]
        pairable_archetypes: [ARCH_11_ban_ve_so, ARCH_08_ba_co_don]

# ============================================================
# VARIETY RULES
# ============================================================

variety_rules:
  pillar_distance: 3                # cùng pillar cách nhau ≥3 ep (no back-to-back)
  archetype_distance: 6             # cùng sub-archetype cách nhau ≥6 ep
  pillar_per_10_ep_min_distinct: 4  # mỗi 10 ep batch dùng ≥4 pillar khác nhau
  family_regret_max_per_10_ep: 4    # pillar mạnh nhất, không lạm dụng

# ============================================================
# CROSS-MODULE QUERY
# ============================================================

cross_module:
  generator:
    pre_write:
      - load 11_regret_catalog + 12_object_library + 13_setting_library
      - filter pillar NOT in last 3 ep (state.pillar_history)
      - pick sub_archetype NOT in last 6 ep
      - cross-check signature_objects available + pairable_settings match phase
      - cross-check pillar weight (family 0.32 / love 0.24 / promise 0.20 / kindness 0.14 / self 0.10)

  qa_lock:
    PHASE_12_3_audit:
      - verify pillar trong regret_catalog (no orphan)
      - verify sub_archetype có signature_objects khớp object_library
      - verify variety: pillar distance ≥3, archetype distance ≥6
      - HARD-FAIL: ep KHÔNG có regret (vi phạm ALWAYS.unresolved_goodbye)

  state_tracking:
    fields_added_to_state_diff:
      - pillar_history: [last 10 ep]
      - archetype_history: [last 20 ep]
      - pillar_count_per_season: {family_regret: N, love_regret: M, ...}

# ============================================================
# CHANGELOG
# ============================================================

changelog:
  - version: 1.0
    date: 2026-06-23
    author: Mr.Long (round 3)
    note: |
      Initial lock. 5 pillars × 5-6 sub-archetypes = 27 regret cores.
      EP01 (Khải Phong ↔ Hà) = REG_LOV_001.
      Nam core_wound = REG_FAM_002.
