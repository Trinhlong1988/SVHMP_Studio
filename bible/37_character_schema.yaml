# 37_CHARACTER_SCHEMA — Character Identity System v2 (SVHMP)
# Hop nhat: Đúng.docx (20 muc/~200 field) + phan bien.txt (3 tang) + phan bien Claude (audio-first).
# Status: LOCKED (Boss/Mr.Long 2/7). Authority: Mr.Long. Roster DA migrate v2 (0 flag can bang).
# Tai dung: bible/03 (recurring), bible/11 (regret), bible/12 (object), bible/13 (setting),
#           bible/23 (naming — KHONG sinh lai ten), runtime/passenger_roster_100.yaml.

meta:
  version: 2.2
  status: LOCKED
  note: "v2.1: + g2_extension (knowledge/reveal_permission/continuity_risk) — Mr.Long ký 2026-07-03, TASK_G2_CHARACTER B1. v2.2: + g5_extension (entity_class) — Mr.Long ký 2026-07-05, TASK_G5_SUPERNATURAL D2. tier_1/critical_groups/modules_v2/balance_targets KHÔNG đổi (v2.0 lock nguyên vẹn)."
  sources: [Đúng.docx, phản biện.txt, claude_critique]
  principle: |
    AUDIO-FIRST. Dự án TTS kể chuyện, KHÔNG hình → CẮT field thị giác thuần
    (silhouette, color_theme, eyelash, blood_type, ADN...). ~200 field ép điền =
    ép SUY LUẬN (mâu thuẫn nguyên tắc). Thay bằng 3 TẦNG + gate completeness.
  hard_rules:
    - "KHÔNG đổi character_id."
    - "KHÔNG đổi field đã KHÓA (tier_1 locked)."
    - "Mọi quan hệ tham chiếu character_id."
    - "Voice Profile + Relationship Graph = BẮT BUỘC."
    - "Không để field tier_1 trống trước khi sinh dialog (completeness gate)."
    - "Không bịa: field không có căn cứ truyện → để trống, KHÔNG suy luận."

# ============================================================
# TẦNG 1 — BẮT BUỘC (~40 field, đủ để AI viết truyện + sinh thoại)
# ============================================================
tier_1_mandatory:
  core_id: [character_id, full_name, nickname, gender, date_of_birth, age, age_group,
            alive_status]          # alive|dead|ghost
  background: [hometown, current_residence, occupation, education_level, marital_status]
  psyche: [dominant_traits, strength, weakness, goal, fear, pain_core, secret]
  voice: [region_dialect, pronoun_style, speaking_speed, catchphrase, forbidden_words, dialogue_sample]
  story: [role, regret_type, death_type, death_context, haunting_symbol, object_link]
  visual_recognition: [memorable_feature_1, memorable_feature_2, signature_outfit]  # 2-3 dau nhan dien MANH
  relationships: [linked_characters]   # graph, ref character_id

# ============================================================
# TẦNG 2 — THEO BỐI CẢNH (điền khi truyện cần)
# ============================================================
tier_2_contextual:
  - children, parents, siblings, spouse, relatives
  - religion, social_class, income_level
  - previous_jobs, workplace, skills, talents
  - military_service, vehicle, housing
  - hobbies, likes, dislikes, values, habits

# ============================================================
# TẦNG 3 — MỞ RỘNG (chỉ khi dự án khác cần — tái sử dụng)
# ============================================================
tier_3_extended:
  - MBTI, Big_Five, zodiac, blood_type
  - physical_health, mental_health, disabilities, allergies, medication
  - smell, fingerprint, DNA
  - full_physical (height, weight, face_shape, eyes, nose, lips... — chi khi co VIDEO)

# ============================================================
# 5 NHÓM QUAN TRỌNG (phản biện.txt) — nâng chất lượng rõ rệt
# ============================================================
critical_groups:
  character_memory: [known_people, known_places, known_events, forgotten_memories]
  dialogue_dna: [sentence_length, hesitation_or_direct, politeness_level, local_words, catchphrase]
  emotion_trigger: [trigger_fear, trigger_anger, trigger_cry, trigger_calm]
  story_consistency:   # cross-episode LOCK — validator enforce
    locked_never_change: [character_id, full_name, gender, date_of_birth, age_group, hometown, occupation]
  visual_recognition: "2-3 dấu MẠNH: vd sẹo má trái / tóc bạc / luôn cầm đèn dầu / áo bà ba đen"

# ============================================================
# 6 MODULE v2 (phản biện.txt bản 2) — dùng nhiều năm, tái sử dụng dự án khác
# ============================================================
modules_v2:
  character_lifecycle: [created, first_episode, last_episode, locked, dead, reincarnated, reusable]
  character_state:     # STATE ĐỘNG theo tập (KHÁC identity tĩnh)
    example: [dang_vui, dang_so, dang_bi_thuong, dang_mang_thai, dang_say, dang_mat_ngu, dang_bi_am]
    note: "state_by_episode[ep] = trạng thái; identity KHÔNG đổi, state ĐỔI theo tập"
  story_memory: [su_kien, ai_biet, ai_chua_biet, khan_gia_biet, nguoi_ke_chua_lo]  # tránh lộ bí mật sớm
  dialogue_consistency: "đúng tuổi/nghề/quan hệ/hoàn cảnh — bà cụ 80 KHÔNG nói 'Ok bro' (validator R208)"
  suspense_profile: [muc_bi_an, muc_am_anh, muc_hoi_tiec, muc_cam_dong, muc_so_hai]  # Generator biết chỗ tăng/giảm
  canon_lock:        # VĨNH VIỄN không đổi — story_consistency_validator enforce
    fields: [ten, que, giong, cha_me, nam_sinh, ngay_chet, loai_chet, noi_dau, cau_cua_mieng]

diversity_report:    # ngoài balance — đảm bảo 100 tập KHÔNG lặp
  dims: [gender, age, occupation, hometown, region_dialect, death_type, pain, role, religion, family]
  tool: tools/character_balance_report.py (diversity_report)

# ============================================================
# TARGET CÂN BẰNG XUYÊN 100 TẬP (Đúng.docx) — balance_report enforce
# ============================================================
balance_targets:
  age_stage_pct: {child: [10,15], youth: [25,30], middle: [30,35], elderly: [15,20], unknown: [5,10]}
  death_types: [tai_nan, benh_tat, mat_tich, oan_khuat, tu_nhien, hieu_lam, hy_sinh, bi_phan_boi, khong_ro]
  per_ep_character_count: {effective: [5,8], hard_max: 10}   # nghe TTS >10 de roi
  region_dialect_spread: "≥3 vùng (Bắc/Trung/Nam ± Tây/đô thị), không 1 giọng đơn điệu"

# ============================================================
# G2 EXTENSION (v2.1, Mr.Long ký 2026-07-03) — 3 facet BP2 domain character:
# knowledge / reveal_permission / continuity_risk. Chi tiết field đầy đủ:
# governance/blueprint/schemas/character_ext_schema.yaml (2 file 1 nội dung,
# đồng bộ — đổi 1 bên PHẢI đổi bên kia). SoT chính thức cho bp2/domain_specs.yaml
# là file schemas/character_ext_schema.yaml; mục dưới đây là bản tóm tắt cho
# người đọc bible/37 liền mạch.
# ============================================================
g2_extension:
  knowledge:        # "Nhân vật BIẾT gì" — QUAN TRỌNG NHẤT truyện dài tập, chống know-the-script
    item_fields: [fact_id, desc, learned_ep, source_evidence, secrecy]
    invariant: "dialog tập N chỉ dùng fact có learned_ep <= N"
  reveal_permission:   # PERMISSION lộ bí mật (character OWN) — KHÁC timing (story_planner/bp6)
    entry_fields: [fact_id, permission, note]
    invariant: "mọi fact secrecy=secret PHẢI có entry reveal_permission"
    forbidden: "KHÔNG chứa timing tập nào lộ — đó là reveal_curve (bp6 decision_engine)"
  continuity_risk:     # cờ rủi ro continuity — qa_runtime đọc
    fields: [flags, level, evidence]
    allowed_flags: [da_chet_xuat_hien_lai, mat_tich, doi_ten, bi_nhap, biet_bi_mat,
                    recurring_cross_ep, roster_drift_no_pas_id]
    invariant: "flag chỉ được set kèm evidence (ep:line) — máy đề xuất, người duyệt"

# ============================================================
# G5 EXTENSION (v2.2, Mr.Long ký 2026-07-05) — 1 facet BP2 domain character:
# entity_class. Chi tiết field đầy đủ: governance/blueprint/schemas/character_ext_schema.yaml
# (2 file 1 nội dung, đồng bộ — đổi 1 bên PHẢI đổi bên kia). SoT chính thức cho
# bp2/domain_specs.yaml là file schemas/character_ext_schema.yaml.
# ============================================================
g5_extension:
  entity_class:   # phân loại bản chất nhân vật — đọc luật thật từ G5 supernatural typology
    values: [nguoi, linh_hon, thuc_the_sieu_nhien, nhan_vat_lich_su]
    default: nguoi
    invariant: "entity_class=linh_hon PHẢI khớp alive_status=ghost (tier_1_mandatory.core_id)"
    reconcile: "KHÔNG tự định nghĩa quyền năng — chi tiết typology đọc từ
               governance/proposals/supernatural_typology_proposal.yaml (G5)"

# ============================================================
# CÔNG CỤ VẬN HÀNH + QA
# ============================================================
tooling:
  manager: tools/character_manager.py           # CharacterRegistry/Profile (R205)
  voice_qa: tools/dialog_voice_validator.py     # giọng/vùng/xưng hô (R206 1000-case)
  balance_qa: tools/character_balance_report.py # cân bằng vs target (7 flag hiện tại)
  consistency_qa: tools/story_consistency_validator.py  # cross-episode lock (R207)
  gate: "Render 1 tập CẢNH BÁO (WARN-default, chưa BLOCK) nếu focal char thiếu tier_1 / thiếu
    voice / thiếu haunting_symbol / lệch giọng-quê — code THẬT (svhmp_preflight_qa.py
    CHARACTER_GATE) mặc định chỉ WARN, cần cờ --strict-characters mới thật sự BLOCK
    (exit 2). CHƯA bật strict mặc định vì roster completeness còn ~23% (GOV-2,
    master_roadmap.md §9) — cập nhật 10/7 per Mr.Long authorization, G2-6
    TASK_AUDIT_HIGH_G2_G8.md, khớp đúng hành vi code thật thay vì claim BỊ CHẶN"

# ============================================================
# RECONCILE với hệ đã có (KHÔNG phá lock)
# ============================================================
reconciliation:
  naming: "bible/23 quản lý sinh tên — schema này KHÔNG sinh tên, chỉ dùng char_name có sẵn."
  regret: "regret_type ← bible/11 pillar/sub (đã khóa 32/24/20/14/10)."
  object: "object_link ← bible/12. setting ← bible/13."
  recurring: "CHAR_DRIVER + CHAR_NAM (bible/03) đã đủ tier_1 → import làm mẫu."
  roster_migration: "roster hiện thiếu child/elderly/death/voice → cần Mr.Long duyệt enrich/regen (đụng framework_lock)."
