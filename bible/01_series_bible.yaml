# 01_SERIES_BIBLE — high-level config series-wide
# Áp dụng kiến trúc Mr.Long round 7: tách lore/character/state/asset thành file riêng để 100+ ep không quên ngữ cảnh

version: 1.0
lock_date: 2026-06-19

series:
  id: SVHMP_CHUYEN_XE_CUOI_CUNG
  title_vi: "CHUYẾN XE CUỐI CÙNG VỀ ĐÂU"
  tagline: "Ai cũng nghĩ mình còn thời gian."
  theme: "Chúng ta không tiếc về người thân rời đi. Chúng ta tiếc về cảm giác rằng ngày mai vẫn còn gặp được họ."
  philosophy: "Truyện ma TTS KHÔNG bán nỗi sợ. Bán tiếc nuối + dư âm."

structure:
  total_seasons: 3
  total_episodes: 90
  pivot_ep: 73
  finale_ep: 90
  season_1: {range: "1-30", arc: "ESTABLISH RULES"}
  season_2: {range: "31-60", arc: "REVEAL DRIVER"}
  season_3: {range: "61-90", arc: "REVEAL 73 + DESTINATION"}

production:
  word_count_target: [2200, 2600]            # round 3 update: longer ep target
  duration_target_minutes: [15, 17]          # round 3 update: was [12, 14]
  acceptable_duration_window: [15, 18]       # round 3 add: tối thiểu 15, tối đa 18 (Mr.Long chốt 23/6)
  wpm: 140
  tts_speech_rate: 0.88
  upload_cadence: "1 ep/day"

soul_dna:
  core_feeling: [tiếc nuối, nhớ thương, muộn màng, day dứt]
  fear_source_valid:
    - unsaid_words
    - broken_promises
    - memories
    - missed_meetings
    - regret
  fear_source_forbidden:
    # round 3 (2026-06-23): align với 00_constitution.NEVER (7 mục)
    - visible_ghost
    - jump_scare_spam
    - creepypasta
    - gore
    - demon
    - exorcism
    - monster_hunting
    - combat_with_ghost
    - villain_ghost
    - explanation_dump
  aftertaste_enum:
    - "buồn"
    - "nghẹn"
    - "ám ảnh nhẹ"
    - "subtle_haunting"   # round 3 add

# ============================================================
# SERIES_RULES — round 3 lock (2026-06-23, Mr.Long sau EP01 v7_final_round3_lock)
# Detail đầy đủ ở bible/00_constitution.yaml — file này chỉ tham chiếu nhanh.
# ============================================================
series_rules_quick_ref:
  bus.one_bus_only: true
  driver.speech_lines_max: 2          # "Con đã nhớ ra chưa?" / "Chưa tới lúc."
  bell.max_per_episode: 1             # round 3 chốt — chuông càng hiếm càng linh
  ghost_visual.max_manifestation: 1   # round 3 chốt
  passengers.each_carries_object: true
  ending.unresolved_memory: mandatory
  aftertaste.value: subtle_haunting
  source_of_truth: bible/00_constitution.yaml

emotion_curve_ngocngan:
  beat_1: {range_pct: "0-10", emotion: "curiosity / TÒ MÒ"}
  beat_2: {range_pct: "10-25", emotion: "unease / BẤT AN"}
  beat_3: {range_pct: "25-45", emotion: "empathy / ĐỒNG CẢM"}
  beat_4: {range_pct: "45-70", emotion: "choking_emotion / NGHẸN (KEY)"}
  beat_5: {range_pct: "70-100", emotion: "lingering_aftertaste / DƯ ÂM (MANDATORY)"}

narrative_dna_rotation:
  A: {weight: 0.60, label: "Classic"}
  B: {weight: 0.25, label: "Flashback-led"}
  C: {weight: 0.15, label: "Dual-perspective", max_per_6_ep: 1}

phase_per_ep:
  establish: {range: "1-10", mythology_target_pct: "0-10", tension: 20}
  mystery: {range: "11-25", mythology_target_pct: "10-25", tension: 35}
  escalation: {range: "26-50", mythology_target_pct: "25-50", tension: 60}
  revelation: {range: "51-72", mythology_target_pct: "50-85", tension: 75}
  pivot: {ep: 73, mythology_target_pct: "85-95", tension: 95}
  aftermath_finale: {range: "74-90", mythology_target_pct: "95-100", tension: 85}

compatibility:                       # round 12 fix B8.1 — updated to current versions
  generator: SVHMP-10.0-RC3.4        # round 9 CONTENT LAYER added (was RC3.2 → RC3.3 SLIM → RC3.4)
  qa: SVHMP_CMD_QA_MASTER_LOCK_v1.1  # round 9 PHASE 12 CONTENT QA added
  tts_director: SVHMP_TTS_DIRECTOR_v1.1   # round 10 M1-M7 + round 11 M8 brand_audio
  video_director: SVHMP_VIDEO_DIRECTOR_v1.0 # round 10 V1-V6 + round 11 bible loads
  publisher: SVHMP_PUBLISHER_v1.0    # round 10 P1-P7
  bible_files: ["00_constitution","01_series_bible","02_lore_db","03_character_bible","04_asset_bible","05_audio_bible","06_lexical_style","07_viewer_persona","08_novelty_constraints","09_emotion_intensity","10_brand_audio","11_regret_catalog","12_object_library","13_setting_library","14_comment_trigger_library","15_voice_bible","16_series_kpi","17_sfx_acquisition_pipeline","18_driver_reveal_budget"]
  bible_files_added_round3: ["00_constitution","11_regret_catalog","18_driver_reveal_budget"]  # 2026-06-23 Mr.Long (3 file new)
  bible_files_patched_round3: ["01_series_bible","09_emotion_intensity"]  # 09 add axis_breakdown
  freeze_target: SVHMP-10.1-FINAL    # sau batch_3 (ep 30) validate qua analytics

ownership:
  studio: SV Horror Story Studio
  channel_target: YouTube TTS Vietnamese
  scale_target: 100-500 episodes
