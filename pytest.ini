[pytest]
# Canonical test scope. Freeze-gate / constitution (03_qa_auditor.md) requires
# `pytest all pass` — the pytest suite lives in tests/ (tests/conftest.py handles
# the script-style files there). tools/ holds script-style *_test.py files with
# import-time side effects (e.g. e2e_pipeline_test.py) that are NOT pytest modules;
# scoping to tests/ keeps a bare `pytest -q` from the repo root green.
testpaths = tests
norecursedirs = tools output runtime assets input bible docs governance .git .githooks .pytest_cache __pycache__
