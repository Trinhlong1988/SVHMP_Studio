    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 159
    text: 'Thứ năm tuần đó — vợ Toàn nhắn tin: ''Anh Tài ơi anh Toàn đã đi. Vào tối qua ở đó. Đột ngột nặng hơn — không.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 161
    text: Tôi sốc. Người đàn ông không khóc. Tôi đây đây ngồi văn phòng — nhìn ngoài cửa sổ. Hình bóng người đàn ông đã định
      mai gửi một trăm triệu cho Toàn. Tôi đây đây không.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 165
    text: 'Sau tang Toàn — vợ Toàn đưa tôi USB này. Bảo: ''Anh Toàn viết thư cho anh tuần trước — bảo em đưa anh nếu anh ấy
      đi. Thư trong USB.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 167
    text: Tôi cầm USB. Về nhà. Mở. Đọc thư.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 169
    text: 'Toàn viết: ''Tài thân — nếu anh đọc thư này — tức là tôi đã đi. Tôi không trách anh không xoay kịp tiền. Hình bóng
      người đàn ông biết anh bận. Tôi đây đây biết anh thương tôi. Bóng người kể xin anh một điều — chăm con tôi thay tôi
      — hai đứa nhỏ — chúng coi anh như chú ruột. Hình bóng đàn ông là người tôi tin nhất sau vợ tôi. Cảm ơn anh đã làm bạn
      tôi ba mươi năm. Toàn.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 171
    text: Tôi đọc xong — khóc. Lần đầu khóc sau ba mươi năm — không khóc từ lúc bố tôi mất.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 173
    text: Ba năm tôi giữ USB. Mỗi đêm tôi mở — đọc thư Toàn — một lần. Như cách Toàn còn nói với tôi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 177
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 181
    text: Tôi nhớ. Tôi không xoay tiền — không kịp gọi lại — không kịp cứu. Toàn không trách tôi — Toàn dặn tôi chăm con Toàn.
      Tôi đã chăm — ba năm — đem hai cháu đi học — đem đi chơi cuối tuần — như cha. Nhưng USB này — tôi không buông được.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 185
    text: Đêm nay — tôi đem USB về Sóc Sơn — về bệnh viện nơi Toàn nằm tháng cuối — em chôn USB trong vườn cây sau bệnh viện.
      Toàn không cần USB — Toàn đã đi — nhưng tôi cần buông. Tôi đã thuộc thư Toàn — không cần USB nữa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
