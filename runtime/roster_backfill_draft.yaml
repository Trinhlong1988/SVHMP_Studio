    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 155
    text: Em không khóc khi quỳ. Mười ba năm em không khóc. Em ngồi yên — vuốt cánh cúc — thắp hương — nghe gió thổi qua bia.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 157
    text: Đêm nay — em sẽ ngồi với mẹ đến sáng. Trời sáng — em về nhà — nấu cơm cho mình. Cuộc sống của em — bình thường —
      không phức tạp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 159
    text: Hai con em ở Hà Nội — em không phiền. Em sống một mình quê — không cô đơn. Em có vườn cúc của mẹ — em có mộ mẹ —
