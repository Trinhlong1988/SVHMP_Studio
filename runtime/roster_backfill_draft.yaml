  PAS_0020:
    char_name: Phượng Ngọc
    assigned_ep: 9
    appearances:
    - ep: 9
      source: header_passenger_main
    speech_evidence:
    - ep: 9
      line: 115
      text: Em tên Ngọc. Em năm nay ba mốt tuổi. Quê em Lạng Sơn. Bà ngoại em mất bốn năm trước, cũng vào tháng Một âm. Đợt
        rét đậm. Bà bị viêm phổi, mất sau ba ngày nằm bệnh viện huyện.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 119
      text: Bà ngoại nuôi em từ ba tuổi. Bố mẹ em đi xuất khẩu lao động bên Hạ Vyn Quốc — gửi tiền về cho bà nuôi em. Em ở
        với bà tới hết cấp ba. Sau đi học đại học ở Hà Nội. Đi làm. Lấy chồng. Có con.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 123
      text: 'Bà già rồi không biết dùng điện thoại smart. Bà chỉ có cái điện thoại nút bấm xưa. Mỗi tháng em gọi cho bà hai
        lần — chiều chủ nhật. Bà luôn bảo: ''Cháu ơi bà nhớ cháu. Khi nào về thăm bà?'' Em luôn trả lời: ''Hè cháu về, bà
        ơi.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 127
      text: 'Mấy năm em không về kịp hè — bận con nhỏ, bận công việc. Cuối năm tính về Tết — lại bận. Tết năm bà mất, em hứa:
        ''Tết này con đưa con của con về cho bà. Bà cụ ấy chưa gặp chắt.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 129
      text: 'Người bà bảo: ''Bà chờ cháu.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 133
      text: 'Tết em đi du lịch với gia đình chồng ở Đà Lạt. Không về quê. Em nghĩ: ''Hè con sẽ về. Bà cụ còn khoẻ, không sao.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 135
      text: 'Tháng Một âm, em đang ở Hà Nội. Em gái nhắn: ''Chị ơi bà ngoại nhập viện viêm phổi. Bác sĩ bảo bà yếu lắm rồi.''
        Em đặt vé xe luôn. Lên xe đêm. Đến bệnh viện huyện sáng. Bà cụ đã đi đêm trước.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 139
      text: 'Em đứng bên giường bà. Mẹ em — con gái bà — đứng cạnh. Em hỏi mẹ: ''Mẹ ơi bà có dặn gì không?'' Mẹ bảo: ''Bà
        chỉ nói một câu trước khi đi: Bà chưa kịp hát ru cho chắt nghe.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 149
      text: Con đã nhớ ra chưa?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 153
      text: Em nhớ, bác.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 157
      text: 'Đám tang xong, mẹ em đưa bạn băng cassette này. Mẹ bảo: ''Bà tự thu trước khi đi. Bà bảo: nếu chắt không kịp
        gặp bà, thì cho chắt nghe giọng bà.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 159
      text: Em về Hà Nội. Mua máy cassette xưa. Phát băng. Giọng bà cất lên — bà hát ru bài bà vẫn hát em hồi nhỏ. 'Cò bay
        lả lả bay la...' Bà hát chậm. Hát run. Có tiếng bà ho ở giữa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 161
      text: 'Em bật băng cho con em nghe. Con em năm tuổi. Nó nghe một lát. Nó hỏi: ''Mẹ ơi bà cố hát hay quá. Bà ở đâu?''
        Em không trả lời được.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 165
      text: Em mang băng theo. Mỗi tháng em lại bật một lần. Để con em nhớ giọng bà cố. Để em nhớ giọng bà ngoại.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 169
      text: 'Bà ngoại em là người Tày. Bà nói tiếng Tày với em từ bé. Em hiểu nhưng không nói được nữa — lâu rồi không tập.
        Trên băng cassette, có một đoạn bà nói tiếng Tày — bà bảo: ''Cháu nhớ tiếng quê mình. Đừng quên.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 171
      text: Em đã quên rồi. Em chỉ nhớ vài câu chào. Mỗi lần em nghe đoạn đó, em xấu hổ. Vì em đã quên tiếng bà.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 175
      text: Bà kể em nghe nhiều chuyện trước khi em đi học đại học. Chuyện hồi bà còn trẻ — chiến tranh, đói kém. Bà phải
        đi cõng gạo qua núi cho bộ đội. Chân trần. Tay đặt lên đá lạnh. Bà có một vết sẹo dài ở bắp chân — em vẫn nhớ vết
        sẹo đó. Sẹo mà bà cười khi kể.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 177
      text: 'Bà bảo: ''Người mình lúc khó nhất, vẫn phải cười. Vì khóc thì ai cũng khóc — nhưng cười khi khó, mới có ngày
        qua.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 181
      text: 'Em đã quên câu đó suốt mười năm. Lúc em sinh con đầu lòng — em đau đẻ — em tự nhiên nhớ câu bà. Cô gái gái ấy
        cố cười. Cười không ra ngoài. Nhưng cố. Em sinh con xong, cô bác sĩ bảo: ''Mẹ này lạ — cười suốt lúc đau.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 183
      text: Em không kể chuyện bà cho ai. Cô gái chỉ giữ trong lòng. Bà ngoại — chỉ riêng em hiểu bà.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 185
      text: Khi em đi, không còn ai biết câu bà đã nói với em. Không còn ai biết bà có vết sẹo ở bắp chân. Không còn biết
        bà nói tiếng Tày.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 195
      text: 'Năm nay em về quê đúng tháng Một âm. Một mình. Em sẽ đem băng đến nhà sàn cũ của bà. Cháu sẽ ngồi trên hiên nhà
        — chỗ bà vẫn ngồi võng — bật băng cho bà nghe lại. Em sẽ nói: ''Bà ơi cháu về rồi. Chắt của bà đã năm tuổi. Cháu sẽ
        về thường xuyên hơn.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 199
      text: 'Chồng em không hiểu vì sao em đi một mình. Em không kể đủ. Cháu chỉ bảo: ''Em về quê thắp hương bà. Em đi hai
        ngày.'' Chồng em gật. Hình bóng khách ấy là người thành phố — không có quê nội ngoại ở vùng núi. Hình bóng người đàn
        ông ấy không hiểu việc đi xa thắp hương.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 201
      text: 'Con em năm tuổi đã hỏi: ''Mẹ ơi bà cố ở đâu?'' Em chỉ vào ngực mình. Con không hiểu. Em bảo: ''Bà ở trong lòng
        mẹ. Khi con lớn, mẹ kể cho con nghe.'' Con không hỏi nữa. Nhưng con thường hát theo băng cassette — bài cò bay. Con
        thuộc lời. Nhưng con cố hát.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 205
      text: Mẹ em — con gái duy nhất của bà — sống ở Bắc Giang. Bà với mẹ em không hợp tính. Mẹ em đi sớm khỏi nhà từ hồi
        mười tám. Em là cháu duy nhất bà chăm. Khi bà mất, mẹ em chỉ về một ngày. Đến đám tang. Khóc một lúc. Rồi đi rất xa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 207
      text: Em hiểu — mẹ em có những vết thương với bà. Em không trách mẹ. Mẹ cũng có lý do của mẹ. Nhưng bà — bà chỉ có mình
        em. Em là chắt thứ ba bà gặp trong đời — sau bố em, mẹ em.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 211
      text: 'Bà thường nói tiếng Tày một câu cuối ngày: ''Pò en chi pài.'' Em nhớ câu đó. Nhưng em không biết nghĩa. Em ấy
        chưa bao giờ hỏi. Bây giờ em không hỏi được ai. Người duy nhất biết tiếng Tày trong họ em — là bà.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 213
      text: Em đem băng cassette về quê. Định sẽ tìm cụ già nào trong xóm còn biết tiếng Tày. Xin dịch câu đó. Để em biết
        bà nói gì với em mỗi tối.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 225
      text: Chào anh.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 235
      text: Bác có còn để gọi không?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 239
      text: Chưa tới lúc.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 9
      line: 279
      text: Con cũng có một cái gì đó chưa kịp nói. Con biết đấy.
      speaker: UNATTRIBUTED_can_nguoi_duyet
