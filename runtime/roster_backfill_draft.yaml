  - ep: 13
    line: 141
    text: Sáu tháng sau bố đi. Tôi về quê — tang lễ hội. Bố nằm trong quan tài — mặt yên — không đau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 145
    text: 'Sau tang — tôi về Hà Nội. Tôi nói với vợ tôi: ''Bố muốn tôi chăm vườn cúc. Cuối tuần mình về quê.'' Vợ tôi đồng
      ý.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 147
    text: Tháng thứ nhất — vợ chồng tôi về cùng — tưới cúc — vun gốc — nhổ cỏ. Tháng thứ hai — vợ tôi bận con — con tôi bệnh
