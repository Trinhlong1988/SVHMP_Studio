    text: Tôi cười khi bố nói. Tôi nghĩ bố lãng mạn quá. Bây giờ tôi thấy bố đúng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 135
    text: Khi bố biết ung thư — bố gọi tôi về quê. Tôi ở Hà Nội — kế toán — công ty xây dựng — bận. Tôi về cuối tuần.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 137
    text: 'Bố ngồi bên giường — vẫn còn khỏe — chưa nằm liệt. Bố bảo: ''Con ơi bố muốn nhờ con — sau khi bố đi — con chăm
