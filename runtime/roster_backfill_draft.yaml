    text: Bác...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 117
    text: Em là Tâm Đan. Bà cụ năm mươi sáu tuổi. Cô gái ấy em ở Chương Hoa Kỳ — quê. Hình bóng người con gái ấy làm kế toán
      Hà Nội — sắp về hưu.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 121
    text: Ba mươi năm trước — em hai mươi sáu tuổi — vừa ra trường — đi làm tại Hà Nội. Phòng trọ nhỏ ở phố Khâm Thiên. Mỗi
      sáng em đi chợ Long Biên mua đồ ăn về nấu trưa — em sống một mình — chưa lập gia đình.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 125
    text: Một sáng — tháng mười — em đi chợ. Trời lạnh sớm. Em mặc áo len — khăn quàng cổ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 127
    text: Em gặp bà cụ — khoảng bảy mươi tuổi — ngồi co bên góc chợ — chỗ bán cá khô. Bát mẻ trên tay — bát không có gì. Tay
      bà run — không phải vì lạnh — vì đói.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 129
    text: Bà nhìn em — không nói — chỉ nhìn. Mắt bà mờ — già — nhưng còn tỉnh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 133
    text: Em đi ngang qua. Em có tiền — bốn nghìn đồng trong ví — đủ cho bà một bát phở — phở thời đó hai nghìn rưỡi một bát.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 135
    text: 'Em không cho. Người bà cũng vội — đi làm — ca tám giờ — em đi từ chợ tới văn phòng mất bốn mươi phút. Đứa em nghĩ
      trong đầu: ''Hôm khác. Cô ấy sẽ cho hôm khác.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 137
    text: 'Em đi làm cả buổi sáng — quên bà cụ. Trưa — em ngồi ăn cơm văn phòng — tự nhiên nhớ bà cụ. Em nghĩ: ''Chiều về
      em ghé chợ — cho bà.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 139
    text: 'Chiều em về — không qua chợ — em mệt — em về thẳng phòng trọ. Tối em nhớ — bảo bụng: ''Mai. Mai chắc chắn em cho.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 143
    text: Sáng hôm sau — em đi chợ. Em mang sẵn năm nghìn — đủ một bát phở và một bánh mì kẹp. Em đến góc chợ — chỗ bà cụ
      ngồi hôm qua. Trống. Không có bà.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 145
    text: 'Em hỏi cô bán rau gần đó: ''Cô ơi bà cụ hôm qua ngồi đây đâu rồi?'' Cô bán rau nhìn em — im một lúc — rồi đáp:
      ''Bà ấy chết sáng nay rồi cô. Người ta tìm thấy bà chết trong góc — đói lả — không ai biết bà từ đâu — cảnh sát đến
      chiều hôm qua đem đi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 149
    text: Em sốc. Người bà không đi làm hôm đó — gọi điện báo bệnh. Em về phòng trọ — khóc cả ngày.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 151
    text: Em đi chợ tìm hiểu thêm. Bà cụ tên Mai — bảy mươi tám tuổi — không nhà — chồng mất từ năm bà sáu mươi — con đi xa
      không về — bà sống lang thang ba năm — ngủ chợ — xin cơm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 153
    text: Em đến nhà tang — nhà tang xã hội của quận — nơi cảnh sát đưa bà về. Em xin được nhìn bà lần cuối. Bà nằm — gầy
      — mặt yên.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 155
    text: Em mua một khăn quàng cổ ở chợ — đặt thợ thêu hoa cúc vào góc — cúc là hoa em thấy bà cụ cài lên tóc trong di ảnh
      xã hội đặt bên bà — bà cụ thích cúc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 157
    text: Em đến đắp khăn lên quan tài bà. Nhưng đến muộn — người nhà bà cụ đến nhận đêm trước — quan tài đã đem đi — chôn
      ở nghĩa trang xã Vĩnh Phúc — quê bà cụ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 161
    text: Em giữ khăn — ba mươi năm. Không bao giờ tặng ai. Không dùng. Chỉ giữ trong tủ — gấp gọn — mỗi rằm tháng giêng em
      lấy ra — phơi nắng — gấp lại.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 163
    text: Ba mươi năm em sống tử tế hơn — vì một lần không tử tế đã mất một người. Cô gái gái làm từ thiện. Em mỗi cuối tháng
      đem cơm cho cụ già khu vực gần nhà em — cụ nghèo neo đơn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 165
    text: 'Em cưới — sinh hai con — chăm con tử tế. Em dạy con: ''Khi thấy người cần — đừng nói "hôm khác". Hôm khác có thể
      không có.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 169
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 173
    text: Em nhớ. Người bà không tử tế một lần — bà cụ Mai mất. Em không thể chuộc lại bà cụ — em chỉ có thể nhớ — sống cẩn
      thận hơn ba mươi năm — và truyền cho hai con em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 177
    text: Đêm nay — em sắp về hưu — em đem khăn này về Chương Hoa Kỳ — đặt giữa nghĩa trang xã Hương Đáy — không phải mộ ai
      cụ thể — để khăn này nằm cùng ai đó — ai cũng có thể cần — như bà cụ Mai đã cần một bát phở em không cho.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 179
    text: Em không thể đến mộ bà cụ Mai ở Vĩnh Phúc — quá xa — em yếu rồi đó. Khăn này đặt ở nghĩa trang Chương Hoa Kỳ — em
      gửi tâm nguyện qua đất — đất sẽ chuyển đến bà cụ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 14
    line: 191
    text: Chào con.
    speaker: UNATTRIBUTED_can_nguoi_duyet
