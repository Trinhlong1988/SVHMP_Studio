  PAS_0019:
    char_name: Hùng Kiệt
    assigned_ep: 8
    appearances:
    - ep: 8
      source: header_passenger_main
    speech_evidence:
    - ep: 8
      line: 115
      text: Em tên Kiệt. Hai hai tuổi. Sinh viên năm cuối. Bà nội em mất đêm ba mươi năm ngoái. Đúng đêm giao thừa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 119
      text: 'Bà nội nuôi em từ bé. Bố mẹ em đi làm ăn ở Bình Dương, em ở với bà ở quê. Bà thương em nhất nhà. Mỗi lần em về
        nghỉ hè, bà luôn bỏ một cái khăn tay cũ vào túi quần áo em — bảo: ''Mang theo, lau mồ hôi. Khăn này bà giặt sạch,
        có mùi nhà mình.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 123
      text: Năm cuối cấp ba, em được học bổng học bên Hà Nội. Cô gái ấy đi rất xa. Người bà cụ ấy tiễn em ra bến xe. Hình
        bóng bà cụ ấy cụ cụ cho em cái khăn tay này — khăn bà giữ từ hồi bà còn trẻ. Hoa thêu là chính tay bà thêu năm mười
        tám tuổi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 127
      text: 'Em lên Hà Nội. Học bận. Thi cử. Cũng lười về quê — đường xa, một mình. Mỗi tháng em gọi điện cho bà một hai lần.
        Bà luôn hỏi: ''Cháu ăn cơm chưa? Cháu mặc đủ ấm chưa?'' Em luôn trả lời: ''Bà yên tâm.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 129
      text: 'Đêm ba mươi Tết năm ngoái, bà gọi cho em lúc tám giờ tối. Em đang đi nhậu với bạn lớp. Cháu không bắt máy. Em
        nghĩ: ''Lát nữa về phòng gọi lại.'' Bà gọi thêm hai lần. Em không bắt.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 133
      text: 'Mười một giờ đêm em về phòng. Mở điện thoại — ba cuộc gọi không nhận được. Một tin nhắn từ bà: ''Cháu ơi, bà
        thấy mệt. Cháu về với bà nhé.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 135
      text: 'Em gọi lại. Bà không bắt. Em hoảng. Gọi cho cô em — cô bảo: ''Cô đang đến nhà bà. Bà nằm trên giường, không thở
        nữa.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 139
      text: Em ngồi sàn phòng trọ. Tay run. Tiếng pháo hoa giao thừa nổ ngoài đường. Em không khóc được. Em chỉ ngồi đó tới
        sáng.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 149
      text: Con đã nhớ ra chưa?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 153
      text: Em nhớ, bác.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 157
      text: Em về quê sáng mùng một. Người cô em đứng cổng đón. Đám tang bà đông lắm. Em không đứng vững. Cô em phải dìu em
        vào.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 159
      text: Người bà nằm trong quan tài. Em đặt tay lên ngực bà. Trong túi áo bà — chiếc áo bông xám bà vẫn mặc — em sờ thấy
        cái khăn tay này. Khăn bà giữ lại. Em ấy ấy rút ra ngoài. Cô gái gái ấp lên mặt. Mùi long não xưa. Mùi tay bà.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 161
      text: Em mang theo từ ngày đó. Mỗi đêm trước khi ngủ, em đặt khăn dưới gối. Mùi bà chưa tan.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 165
      text: Em vẫn nhớ những đêm hè bà nằm võng kể chuyện cho em. Bà kể chuyện hồi bà còn trẻ — bà mười tám tuổi, đẹp nhất
        làng, ai cũng đến hỏi. Hình ảnh người đàn ông già nội em là một thanh niên nghèo, không có gì. Bóng người bà già cụ
        cụ cụ ngày ấy đã chọn ông. Bố mẹ bà phản đối. Bà cụ bỏ nhà, theo ông. Hai người dựng nhà tranh ở rìa làng — chính
        cái nhà em ở với bà sau này.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 169
      text: Ông nội em mất khi bố em mới năm tuổi. Bà nuôi bố em một mình. Sau đó bố lớn lên, đi làm ăn xa, gửi em về cho
        bà nuôi. Bà cụ nuôi hai thế hệ. Cả đời bà nấu cơm bằng nồi đất nhỏ — bà nói nồi gang nóng quá.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 171
      text: Mỗi mùa hè em về, bà luôn nấu món em thích — bún cá rô đồng. Bà bắt cá ở ruộng sau nhà. Tự kho. Tự nấu nước dùng.
        Em ấy ngồi xem bà nấu. Tay bà rất nhanh — nhanh hơn em mặc dù em trẻ.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 175
      text: 'Năm cuối em về, bà đã yếu. Tay bà run, không nấu được nữa. Người cô em nấu hộ. Bóng bà cụ ngồi cạnh đó nhìn.
        Đứa em hỏi: ''Bà thấy có ngon không?'' Bà bảo: ''Ngon. Nhưng không phải vị bà nấu.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 177
      text: Em nhớ câu đó. Bây giờ em hối hận. Em không học bà cách nấu bún cá rô. Em không bao giờ ăn lại được vị đó.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 179
      text: Em biết — khi bà đi, một cái gì đó của em cũng đi theo. Không phải bà thôi. Mà là tuổi thơ em. Là cách em hiểu
        thế giới. Là cách em biết 'nhà' nghĩa là gì.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 189
      text: 'Năm nay em về quê đúng đêm ba mươi. Một mình. Em sẽ ngồi cạnh ban thờ bà. Cháu sẽ gọi điện cho bà — gọi vào sim
        bà vẫn còn trong điện thoại em. Em sẽ nói: ''Bà ơi cháu về rồi. Cháu xin lỗi năm ngoái cháu không bắt máy.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 193
      text: 'Em không kể chuyện này với bố mẹ em. Bố mẹ em ở Bình Dương — không về kịp đám tang bà năm ngoái. Họ nghĩ em đã
        ổn. Em không muốn họ lo. Họ đã chọn đi xa làm ăn, em không trách họ. Bà luôn nói: ''Bố mẹ con khổ. Con đừng giận họ.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 195
      text: 'Em đi học đại học bằng tiền lương hưu của bà. Bà nói: ''Tiền của bà — bà cho cháu. Sau này có công việc, cháu
        sống đời cháu.'' Em vâng. Em chưa kịp gửi đồng lương đầu tiên về cho bà. Em định: ''Tốt nghiệp xong, mua quà cho bà.''
        Bà không đợi được.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 199
      text: Bạn em ở trường không ai biết chuyện. Cô gái đi học bình thường. Cháu đi làm thêm. Em ấy ăn cơm sinh viên. Cô
        gái nói chuyện cười đùa. Nhưng đêm về phòng trọ, em lấy khăn tay ra. Ấp lên mặt. Khóc nhẹ nhàng. Để sáng dậy, mắt
        không sưng quá — không ai biết.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 201
      text: 'Có một đêm bạn cùng phòng dậy đi vệ sinh, thấy em ngồi trên giường, khăn tay áp trên mặt. Bạn hỏi: ''Mày sao
        thế?'' Em bảo: ''Không. Tao mất ngủ.'' Bạn không hỏi nữa. Bạn quay lại ngủ. Em cũng không kể.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 205
      text: Em giấu bà trong lòng. Vì nếu em kể, bà thành câu chuyện. Em không muốn bà thành câu. Bà là bà của em — không
        phải câu ai cũng có thể nghe.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 207
      text: Đêm nay là lần đầu em kể. Em không biết vì sao em kể với anh — người lạ trên chuyến xe lạ. Có lẽ vì anh không
        quen bà. Em sẽ không nhớ bà nữa. Khi anh xuống xe, câu chuyện cũng đi theo. Người bà vẫn riêng của em.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 209
      text: Em biết bà không bắt. Nhưng em vẫn gọi. Để tự gọi cho mình. Để tự tha thứ một chút.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 221
      text: Chào anh.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 231
      text: Bác có còn nhớ bà bác không?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 235
      text: Chưa tới lúc.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 273
      text: Hôm nào con sẽ tự ngồi vào ghế thứ chín.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 8
      line: 309
      text: Có những việc, cần một chuyến xe đêm dài, mới nhớ ra.
      speaker: UNATTRIBUTED_can_nguoi_duyet
