  speech_evidence:
  - ep: 26
    line: 107
    text: Bố...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 125
    text: Tôi là Đức Hùng. Ba mươi tám tuổi. Tôi ở Hoài Đức — quê. Tôi làm kế toán — văn phòng nhỏ phố Cầu Giấy Hà Nội.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 129
    text: Bố tôi mất bảy năm trước. Sáu mươi mốt tuổi. Tai biến mạch máu não — đột tử buổi sáng đang ngồi bàn vẽ ra — đang
      vẽ đồ án nhà phố cho khách hàng cuối.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 131
    text: Bố tôi là kiến trúc sư. Tốt nghiệp Đại học Kiến trúc Hà Nội năm bảy chín — đời đầu mở cửa. Bố làm cho viện thiết
      kế nhà nước — sau ra mở văn kiến trúc riêng — văn Hoài An — chính văn tôi vừa bước lên xe đêm nay.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 135
    text: Bố mở văn năm tôi mười tuổi. Văn phòng nhỏ — bố và hai bạn kiến trúc sư trẻ. Bố đặt tên Hoài An — vì quê bố ở Hoài
      Đức — và bố muốn mỗi nhà bố thiết kế đem lại sự bình an cho gia chủ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 137
    text: Tôi ở văn bố thường — sau giờ học cấp hai — tôi đến văn — ngồi xem bố vẽ ra. Bố ngồi bàn vẽ lớn — bàn nghiêng —
      thước treo bên — bố vẽ chì trước — sau lên mực đen.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 139
    text: Bố dạy tôi vẽ ra. Năm tôi mười hai — bố mua tôi bộ thước nhỏ — thước học sinh — cán nhựa. Bố ngồi cạnh — chỉ tôi
      vẽ mặt cắt nhà đơn giản — vẽ chính diện — vẽ mặt bằng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 141
    text: 'Bố bảo: ''Hùng ơi sau này con học kiến trúc — bố muốn con tiếp nối văn Hoài An — bố và con cùng làm.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 145
    text: Tôi gật. Lúc đó tôi mười hai — tôi gật vì bố bảo. Tôi không biết tôi có thích kiến trúc hay không. Tôi chỉ thích
      ngồi cạnh bố — xem bố vẽ ra — không phải mong tự mình vẽ ra.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 147
    text: 'Cấp ba tôi học khá toán lý — bố vui — bảo: ''Con đủ điểm thi vào Đại học Kiến trúc — bố tin con.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 149
    text: Năm tôi mười tám — thi đại học. Tôi không thi Kiến trúc. Hình bóng con thi Kế toán Học viện Tài chính. Người kể
      giấu bố — nộp hồ sơ — đến lúc trúng tuyển — bố mới biết.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 151
    text: Bố sốc. Bố không nói gì hai tuần. Bố ăn cơm cùng — không nhìn tôi. Mẹ tôi đứng giữa — khuyên bố — khuyên tôi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 153
    text: 'Tôi xin lỗi bố. Tôi nói thật: ''Bố ơi con không thích vẽ ra — con thích con số — con thích tính toán — con xin
      lỗi con không tiếp nối văn được.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 157
    text: 'Người bố im lặng. Rồi bố bảo: ''Con chọn nghề con thích — bố không ép. Bố chỉ tiếc — văn Hoài An — bố hai mươi
      năm xây — sẽ tan khi bố không còn.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 159
    text: Tôi học kế toán. Ra trường năm hai bốn — vào văn kế toán nhỏ — lương thường — không cao vút. Tôi không liên quan
      kiến trúc nữa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 161
    text: Bố tiếp tục văn Hoài An. Hai bạn kiến trúc sư cùng bố — một bạn nghỉ năm bố sáu mươi — về quê. Một bạn vẫn còn —
      anh Lâm — thân thiết bố.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 163
    text: Năm bố sáu mươi tuổi — bố mua bộ thước mới — bộ chuyên nghiệp — thước inox cán gỗ mun — bố mua ở cửa hàng dụng cụ
      kiến trúc phố Tràng Tiền. Bố mua tháng sáu năm hai nghìn không trăm mười bảy — bố ghi ngày mua vào sổ tay.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 167
    text: Bố dùng thước mới một năm. Năm sau — sáu mươi mốt — bố tai biến. Đột tử bàn vẽ ra — sáng — đang vẽ dở đồ án.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 169
    text: Tôi đến văn. Bố nằm bên bàn vẽ ra — thước inox còn trên bàn — bản vẽ dở dang — chì còn cầm trong tay.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 171
    text: 'Sau tang bố — anh Lâm hỏi tôi: ''Hùng ơi anh nhận tiếp văn Hoài An — em không phản đối à? Anh nuôi sống văn — giữ
      tên Hoài An.'' Tôi đồng ý. ''Anh giữ tên giúp bố em — em cảm ơn.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 173
    text: Anh Lâm đưa tôi bộ thước inox của bố — bộ bố mua năm hai nghìn không trăm mười bảy. 'Hùng ơi đây là vật quý nhất
      bố em — anh không thể giữ lại — em là con — em giữ lại.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 175
    text: Tôi cầm. Đem về nhà. Không dùng. Không vẽ ra ngoài. Tôi không biết vẽ kiến trúc — tôi không có khả năng. Tôi cất
      hộp thước trong tủ — bảy năm — không mở.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 179
    text: 'Năm vừa rồi — anh Lâm gọi tôi. ''Hùng ơi anh sắp nghỉ hưu — anh đóng cửa văn Hoài An tháng sau. Em có muốn giữ
      tên không? Bóng người đàn ông truyền em.'' Tôi đáp: ''Anh ơi em không làm kiến trúc — em không giữ được tên. Hình ảnh
      người đàn ông đóng cửa — em chấp nhận.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 181
    text: Văn phòng Hoài An đóng cửa tháng trước. Người tên Lâm về quê. Tên bố — tan.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 183
    text: Tôi áy náy. Tôi không phải lý do tan — anh Lâm nghỉ tự nhiên — nhưng tôi là nguyên nhân không có người tiếp nối
      khi bố mất bảy năm trước. Nếu tôi học kiến trúc — anh Lâm có thể giữ thêm — chờ tôi đủ kinh nghiệm — truyền tôi. Tôi
      không học — không có lựa chọn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 187
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 191
    text: Tôi nhớ. Tôi không học kiến trúc theo bố — bố không trách lúc sống. Văn phòng Hoài An tan vì tôi không tiếp nối.
      Bộ thước inox bố mua năm hai nghìn không trăm mười bảy — bố dùng một năm — chưa hết khả năng — đã tan cùng bố.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 195
    text: Đêm nay — tôi đem bộ thước về Hoài Đức — về văn Hoài An đã đóng cửa — chính tòa nhà tôi vừa bước lên xe. Tôi sẽ
      đặt hộp thước T trước cửa văn phòng — như cách trả lại bộ thước T cho chính nơi nó từng được dùng. Để ai đến mua tòa
      nhà sau — thấy hộp — biết đây từng là văn phòng kiến trúc — tên Hoài An — bố tôi đã có hai mươi năm ở đây.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 26
    line: 207
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
