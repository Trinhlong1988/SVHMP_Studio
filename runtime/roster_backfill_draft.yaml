    text: Em là Mỹ Hạnh. Ba mươi hai tuổi. Em ở Hà Nội — phố Bạch Mai. Em làm giáo viên cấp hai — trường gần nhà.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 125
    text: Chồng em — Hùng — mất một năm trước. Ba mươi mốt tuổi. Tai nạn xe máy — đoạn ngã phố Huế — Hai Bà Trưng — chính
      ngã tư em vừa đi qua. Xe tải lớn vào ngã tư không đúng đèn — tông xe máy em — em mất tại nơi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 129
    text: Em và Hùng cưới ba năm — chưa có con. Hai vợ chồng còn trẻ — định có con sau khi mua được nhà nhỏ ở Hà Nội.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 131
    text: Hùng làm kỹ sư phần mềm — công ty Việt Nhật ở Cầu Giấy. Em làm giáo viên — trường ở Bạch Mai. Hai đứa em đi làm
      sáng cùng — đi về tối cùng — chở nhau bằng xe máy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 133
    text: Đêm mất em — Hùng đi học thêm khóa kỹ thuật tối — sáu tháng nay. Em về phòng trọ một mình tối thứ ba và thứ năm.
      Đêm thứ ba mất em — em học thêm xong mười giờ tối — đi xe máy về phòng trọ — đoạn phố Huế — em va chạm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 137
    text: Em chạy đến bệnh viện đêm đó. Em đã đưa vào phòng cấp cứu — em mất ba mươi phút sau khi vào viện — chấn thương sọ
      não nặng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 139
    text: Em quỳ bên giường em trong phòng tang. Em không khóc — em sốc — em không thể tin chỉ vài giờ trước em còn ăn cơm
      chung em ở phòng trọ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 141
    text: 'Tang em — gia đình em — mẹ em từ Bình Định ra Hà Nội — bố em đã mất sớm. Mẹ em ôm bạn — khóc — bảo: ''Con ơi mẹ
      biết em là con trai mẹ — em đã chọn em — bây giờ em đi — em sống tiếp.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 145
    text: Sau tang em — em quay lại phòng trọ. Cô gái gái ở một mình. Em không thể dọn ngay — vật của em vẫn ở nơi — quần
      áo trong tủ — laptop trên bàn — sách trên kệ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 147
    text: Em dọn dần — sáu tháng. Cô gái đem quần áo em về Bình Định gửi mẹ em. Em bán laptop — bán xe máy còn lại của em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 149
    text: Em đến tiệm sửa xe — chính tiệm Sửa xe Toàn em vừa bước lên xe — em gửi xe máy hỏng em sau tai nạn cho thợ Toàn
      xử lý.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 151
    text: Anh Toàn thợ sửa xe đưa em mảnh biển số xe — biển vỡ một góc — anh giữ làm chứng tích sau tai nạn. Anh hỏi em có
      muốn giữ không. Cô gái ấy ấy ấy gật. Hình bóng con gái ấy đem mảnh về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 155
    text: Một năm em giữ mảnh biển số. Em không treo — em cất trong ngăn kéo bàn. Em không nhìn — em chỉ biết nó ở đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 157
    text: Năm vừa rồi — em quyết. Em sẽ trả mảnh biển về tiệm sửa xe — chính tiệm Toàn đã giữ trước đây. Để mảnh ở nơi nó
      từng ở — không ở chỗ em — em đã đủ ký ức.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 159
    text: Em cũng quyết — em sẽ chuyển nhà. Cô gái bán phòng trọ — em chuyển sang căn hộ chung cư nhỏ ở phố Cầu Giấy — gần
      nơi làm chồng em làm xưa. Em sống tiếp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 161
    text: Em không tái hôn ngay. Cô gái ba lăm hai — em còn thời gian. Em đợi em hồi phục — em đợi mẹ em yên tâm — em đợi
      chính em quyết.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 165
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 169
    text: Em nhớ. Cô gái đi xe máy phố Huế một mình tối thứ ba — em va chạm xe tải — em mất. Em không có ai bên cạnh — chỉ
      có người đi đường gọi cấp cứu.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 173
    text: Đêm nay — em đem mảnh biển số về tiệm Sửa xe Toàn — chính tiệm em vừa bước lên xe. Em sẽ gửi mảnh cho anh Toàn —
      anh giữ tiếp. Em đã đủ — em không cần vật chứng nữa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 37
    line: 185
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
