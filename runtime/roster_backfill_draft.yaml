    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 153
    text: Em đem cúc đêm nay. Không phải ngày — vì ban ngày em bận làm đồng. Đêm — em đi xe đạp ra nghĩa trang — em quỳ một
