    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 159
    text: Năm vừa rồi — thầy mất. Đột tử — tim. Người con gái gái đi tang thầy. Em quỳ bên quan tài — em xin cảm ơn thầy đã
      cứu em mười năm trước.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 163
    text: Sau tang thầy — em giữ mảnh gương vỡ này — chính mảnh em đập đêm em hai mươi — em giữ mười năm trong hộp — không
      vứt. Em đem hộp ra mỗi rằm tháng bảy — vuốt — nhớ đêm thầy cứu em qua điện thoại.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 165
    text: Vào đêm nay — em quyết. Em đem gương về trường THCS Mai Trung — em tặng phòng tâm lý trường — phòng mới mở năm vừa
      rồi — em làm hỗ trợ tâm lý cho học sinh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 167
    text: 'Em sẽ kể câu chuyện em — học sinh nào trầm cảm — em sẽ cho em nhìn mảnh — em nói: ''Thầy Hồng đã cứu anh qua mảnh
      gương này. Em đến gặp thầy Hồng trên đời này không còn — nhưng em có thể đến gặp thầy cô khác.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 171
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 175
    text: Em nhớ. Thầy Hồng cứu em qua điện thoại đêm em hai mươi. Mảnh gương là chứng tích em đã chọn sống — thầy là người
      chọn em sống. Bây giờ thầy đi — em đem mảnh tặng phòng tâm lý trường — em làm tiếp thay thầy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 179
    text: Đêm nay — em đem mảnh về trường THCS Mai Trung — tặng phòng tâm lý — em giúp học sinh sau như thầy Hồng giúp em
      mười năm trước.
    speaker: UNATTRIBUTED_can_nguoi_duyet
