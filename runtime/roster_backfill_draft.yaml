  - ep: 12
    line: 137
    text: Em yêu anh sau buổi thứ ba. Em không nói. Người anh Khôi cũng không nói. Hai đứa em chỉ uống cà phê — đi dạo trên
      cầu — bàn về cầu sắt thế kỷ. Anh có lẽ cũng yêu em — nhưng anh không vội.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 141
    text: Sáu tháng sau buổi cà phê đầu — anh tỏ tình. Cô gái gái ấy đồng ý. Hai đứa em yêu nhau một năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 143
    text: Anh mua nhà ven sông — gần cầu Long Biên — định cưới. Người con gái gái đồng ý cưới. Đặt cọc địa điểm. Báo gia đình.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 145
    text: Một tháng trước cưới — em đi học thêm khóa thiết kế nội thất ở trường. Em gặp một bạn cùng khóa — tên Tuấn — cùng
      tuổi em — kiến trúc sư trẻ — vừa du học Singapore về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 147
    text: Em yêu Tuấn nhanh. Cô gái cũng không hiểu vì sao. Em chỉ cảm thấy — em yêu Tuấn theo cách trẻ — không yêu anh Khôi
