    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 129
    text: 'Bố bảo: ''Cúc dại Việt Nam đẹp hơn cúc Nhật Bản trồng mảnh. Cúc dại có hồn quê. Cúc Nhật chỉ có hình.'''
