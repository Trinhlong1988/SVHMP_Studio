    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 32
    line: 151
    text: Tôi dậy bảy giờ. Người đàn ông ra phòng khách. Tôi thấy em — ngồi ghế gỗ mun — đầu gục về phía trước — kim đan còn
