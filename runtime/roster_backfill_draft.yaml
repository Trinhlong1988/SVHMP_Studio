    - ep: 4
      line: 137
      text: Năm nay con mua xong xấp phong bao từ hôm hai mươi ba. Mẹ ngồi viết từ chiều hai bảy. Mỗi ngày viết vài cái. Mệt
        thì nghỉ, hôm sau viết tiếp. Mẹ viết đến cái thứ mười lăm thì dừng — cái cho cháu Diệu. Đứa cháu mới nhất, mới sinh
        tháng Mười. Mẹ chưa gặp cháu lần nào — vì cháu ở Sài Gòn, mẹ ở Phú Thọ.
