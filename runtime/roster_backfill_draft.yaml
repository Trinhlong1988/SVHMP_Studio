  - ep: 17
    line: 113
    text: Tôi là Hữu Tài. Bốn mươi hai tuổi. Tôi ở Sóc Sơn — quê. Tôi làm giám đốc nhỏ — công ty xuất nhập khẩu Hà Nội.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 117
    text: Bạn thân nhất của tôi — Toàn — mất ba năm trước. Bốn mươi tuổi. Ung thư gan giai đoạn cuối — phát hiện muộn — sống
      thêm tám tháng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 119
    text: Tôi và Toàn quen từ tiểu học. Cùng làng. Cùng lớp cấp một. Cùng lớp cấp hai. Cấp ba tách trường — vẫn ở chung phòng
      học thêm. Đại học tách Hà Nội — Toàn bách khoa — tôi kinh tế. Tốt nghiệp — vẫn gặp nhau mỗi tuần.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 123
    text: Toàn cưới sớm — hai mươi sáu — vợ là bạn cùng lớp đại học. Sinh hai con. Sống Hà Đông — căn hộ chung cư nhỏ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 125
    text: Tôi cưới muộn — ba mươi mốt — sinh một con. Sống Đống Đa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 127
    text: Hai vợ chồng vẫn ăn cơm với nhau cuối tuần. Bạn từ tiểu học — không thay đổi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 131
    text: Bốn năm trước — Toàn đau bụng nhiều tháng. Đi khám — viêm gan. Điều trị. Sáu tháng sau — phát hiện ung thư. Giai
      đoạn cuối — đã di căn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 133
    text: 'Bác sĩ bảo: ''Cần thuốc nhập ngoại — hai trăm triệu một liệu trình — bảo hiểm không chi trả.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 135
    text: Toàn không có hai trăm triệu. Lương kỹ sư Toàn nuôi gia đình — tiết kiệm được bốn năm chục triệu. Vợ Toàn nghỉ làm
      chăm con nhỏ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 137
    text: Toàn gọi tôi. Một tối — bảy giờ — tháng năm. Tôi đang họp công ty. Tôi không nghe. Cuộc gọi không nhận được.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 141
    text: Tám giờ Toàn gọi lại. Tôi vẫn đang họp — quan trọng — đối tác Nhật. Tôi không bắt.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 143
    text: 'Mười giờ tôi xong họp. Tôi gọi lại Toàn. Toàn không bắt. Tôi nghĩ: ''Toàn đang ngủ — sáng mai gọi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 145
    text: 'Sáng hôm sau — sáu giờ — Toàn nhắn tin: ''Tài ơi tôi xin mượn anh hai trăm triệu chữa ung thư. Tôi sẽ trả dần năm
      năm. Cảm ơn anh trước.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 147
    text: Tôi đọc tin. Người đàn ông sốc — tôi không biết Toàn đến giai đoạn nặng. Tôi không gọi lại ngay — tôi đến công ty
