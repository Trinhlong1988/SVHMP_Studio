  - ep: 12
    line: 173
    text: Em sốc. Cô gái không khóc trước anh Long. Em về Sài Gòn — khóc đêm ở đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 175
    text: Em cảm thấy lỗi — không phải vì em đã rời anh — em đã yêu Tuấn thật — không giả. Lỗi em là — em bao giờ nói cảm
      ơn anh Khôi đã không trách em. Anh đã sống bốn năm — em biết — anh có thể đã chờ một câu cảm ơn nào từ em — em không
      gửi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 179
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 183
    text: Em nhớ. Em không yêu Tuấn nhiều hơn anh Khôi — em chỉ trẻ. Hai mươi mốt tuổi không biết phân biệt yêu trẻ và yêu
      trưởng thành. Anh tặng đồng — như cách nói anh không trách em — em đeo mười lăm năm — như nợ một câu cảm ơn chưa nói.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 187
    text: Đêm nay — em về Long Biên — em đến giữa cầu Long Biên — nơi anh từng làm dự án — em ném đồng này xuống sông Hồng.
      Em không giữ nữa. Trả lại sông — anh ở đâu đó — biết bạn đã nói cảm ơn — qua cách trả vật.
