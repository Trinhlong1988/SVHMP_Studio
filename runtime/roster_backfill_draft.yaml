    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 149
    text: Em xấu hổ. Em không thể cưới anh Khôi trong khi yêu Tuấn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 153
    text: Em hẹn anh Khôi ở quán cà phê ven đê — chính quán cô gái vừa bước lên xe. Cô gái cũng nói thật lòng. Em xin lỗi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 155
    text: 'Người anh Khôi không khóc. Anh ngồi yên — uống cà phê — nhìn ra cầu. Mười phút. Rồi anh bảo: ''Em chọn người em
      yêu hơn — anh không trách. Anh chỉ buồn vì anh tin em từ lúc anh tỏ tình.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 157
    text: Em không biết nói gì. Em xin lỗi lần nữa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 159
    text: Anh đứng dậy — đi ra xe — mở cốp — lấy hộp giấy bọc gấm đỏ. Đưa em. 'Anh mua đồng này tuần trước — định tặng em
      ngày cưới. Em đeo — nhớ anh là người yêu em không trách em.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 161
    text: 'Em mở hộp. Đồng hồ xà — mặt trắng — viền bạc — kim chỉ đúng bảy giờ mười phút lúc đó — không phải giờ thật — anh
      đã đặt kim dừng. Anh bảo: ''Kim dừng bảy giờ mười — giờ chúng ta gặp nhau lần đầu phỏng vấn — em nhớ không?'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 163
    text: Em nhớ. Buổi phỏng vấn đầu — bảy giờ mười tối — anh trả lời câu đầu của em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 167
    text: Em đeo đồng. Em cưới Tuấn ba tháng sau. Sống Sài Gòn — chuyển vào theo công việc Tuấn. Sinh con — bé trai — bốn
      tuổi rồi đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 169
    text: Cuộc sống em với Tuấn — bình thường. Không hạnh phúc cực — không bất hạnh. Trung tính.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 171
    text: 'Năm vừa rồi — em về Hà Nội tang lễ bố em. Em gặp bạn của anh Khôi ở đám tang — anh Long — bạn cùng phòng kỹ sư
      của anh Khôi. Anh Long bảo: ''Khôi mất bốn năm rồi — em không biết à? Đột tử trong chuyến công tác xa — Hà Giang — đập
