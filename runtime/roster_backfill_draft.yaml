    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 15
    line: 153
    text: Tôi không nhận ra mình. Mặt trong gương — không phải Phong. Mặt người lạ — gầy hơn tôi — già hơn — buồn hơn.
