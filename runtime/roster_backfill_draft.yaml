    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 141
    text: Mười ba năm em không bỏ một tháng nào. Em đi xe đạp về quê từ Hà Nội — ba mươi cây — em ở quê ba ngày — em đặt chậu
      cúc lên mộ mẹ — quỳ — về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 145
    text: Năm vừa rồi — em năm tư — em quyết — em sẽ ở luôn quê. Hai con em đã lớn — đã có gia đình — em không cần ở Hà Nội
      nữa. Em về An Vinh — em sống căn nhà mẹ — em trồng cúc tiếp như mẹ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 147
    text: Vườn cúc mẹ — em chăm tiếp. Hai mươi chậu đã giảm còn mười hai — tám chậu đã chết vì em không ở quê chăm — em chỉ
      về tháng. Em trồng lại từ hạt — cúc mới ra — chưa đẹp như xưa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 149
    text: Chậu cúc này — em chọn chậu đẹp nhất trong vườn — em mang ra mộ mẹ đêm nay — đúng ngày mười hai tháng — kỷ niệm
