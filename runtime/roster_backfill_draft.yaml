  speech_evidence:
  - ep: 23
    line: 101
    text: Yến...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 119
    text: Tôi là Đức Vinh. Bốn mươi lăm tuổi. Tôi ở Hải Phòng — quê. Tôi làm giám đốc công ty cảng — Hải Cảng — công ty tôi
      vừa rời đêm nay sau cuộc họp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 123
    text: Năm tôi hai mươi lăm — tôi tốt nghiệp Đại học Hàng hải Hải Phòng — vào công ty Hải Cảng làm chuyên viên trẻ — phòng
      kinh doanh. Thư ký giám đốc là Yến — hơn tôi hai tuổi — cô đã làm công ty năm năm — quen việc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 125
    text: Yến đẹp. Yến hiền. Yến giúp tôi quen việc — pha trà cho tôi mỗi sáng — chỉ tôi viết báo cáo theo mẫu công ty. Tôi
      yêu Yến sau ba tháng làm cùng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 129
    text: 'Tôi không nói. Người đàn ông mới hai lăm — chưa va vấp — tôi sợ Yến không yêu — sợ làm khó nhau ở văn phòng — sợ
      Yến phải nghỉ việc nếu hai đứa lỡ chia tay. Tôi đây đây đây giữ trong lòng. Hình bóng người kể nghĩ: ''Năm sau em chín
      chắn hơn — em nói.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 131
    text: Tôi và Yến làm cùng văn phòng. Cô gái lên trợ lý giám. Tôi lên phó phòng — rồi trưởng phòng — rồi giám phòng. Sau
      lên giám đốc công ty — Yến vẫn làm trợ lý — phục vụ tôi như xưa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 133
    text: Năm năm trôi — tôi ba mươi. Tôi vẫn không nói. Tôi quá quen Yến — tôi sợ thay đổi — sợ làm hỏng quan hệ đồng nghiệp
      tốt.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 135
    text: 'Mười năm trôi — tôi ba lăm. Yến ba bảy. Tôi nghĩ: ''Yến sắp bốn mươi — em sẽ tìm chồng — tôi phải nói.'' Tôi định
      nói. Rồi tôi không nói. Tôi sợ Yến đã có ai. Tôi không hỏi — tôi sợ trả lời.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 139
    text: Hai mươi năm tôi yêu Yến — không nói. Yến cũng chưa lấy chồng — sống một mình ở căn hộ nhỏ phố Trần Nguyên Hãn.
      Mỗi đêm Yến về căn hộ — một mình.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 141
    text: Năm tôi bốn mươi — tôi quyết. Tôi không thể giữ thêm. Tôi mời Yến đi ăn tối — quán hải sản ven biển — chính quán
      hai đứa đã ăn cùng nhiều lần trong các đợt tiếp khách công ty.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 143
    text: 'Tôi gọi món Yến thích — cua hấp bia — bánh đa cua. Người đàn ông đợi Yến ăn xong — uống nửa ly bia. Tôi đây đây
      đây nói: ''Yến ơi tôi yêu em hai mươi năm. Hình bóng người kể muốn cưới em.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 145
    text: 'Yến im lâu. Lâu — tôi nghĩ Yến không nghe rõ ràng. Rồi cô nhìn tôi — mắt cô có lệ — không khóc — chỉ lệ đứng ở
      khóe. Cô bảo: ''Vinh ơi anh nói muộn quá. Tháng trước em đồng ý cưới một người — người Vũng Tàu — anh ấy sắp về Hải
      Phòng làm. Cô gái ấy cưới tháng sau. Anh đến muộn ba mươi ngày.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 147
    text: Tôi sốc. Người đàn ông không nói gì. Tôi uống nốt ly bia. Trả tiền. Đưa Yến về căn hộ. Không nói gì suốt đường.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 151
    text: Sáng hôm sau — Yến đến văn phòng — đến bàn tôi — đặt phong bì kraft lên bàn. 'Anh đọc khi nào anh sẵn sàng. Em xin
      nghỉ việc — em sẽ về Vũng Tàu với chồng — sau cưới. Em đã làm đơn — anh ký giúp em.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 153
    text: Tôi ký đơn. Yến đi ra khỏi phòng. Không nhìn lại.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 155
    text: 'Tôi đọc thư sau khi Yến nghỉ — sau cưới Yến — hai tháng sau cô đã đi Vũng Tàu. Yến viết: ''Vinh ơi cảm ơn anh yêu
      em hai mươi năm. Cô gái đã biết — từ năm thứ ba anh vào công ty — em thấy anh nhìn em mỗi sáng khi em pha trà. Đứa em
      chờ anh nói — năm năm — mười năm — mười lăm năm. Bóng người con gái ấy chờ đủ — em quyết cưới người khác để không chờ
      nữa. Hình ảnh anh đến muộn — không phải lỗi anh — là vì hai chúng ta đều không nói thật. Hình người đàn ông sợ em không
      yêu — em sợ anh không nói thật. Đứa em chúc anh sống vui — tìm được người không phải đợi hai mươi năm. Yến.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 157
    text: Tôi đọc xong — khóc lần đầu sau hai mươi năm. Khóc một mình trong phòng giám đốc. Đêm đó tôi ngủ lại văn phòng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 161
    text: Yến cưới ba tháng sau. Em về Vũng Tàu với chồng. Người kể không liên lạc. Hình đàn ông không gửi quà cưới. Người
      kể không có mặt.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 163
    text: Năm vừa rồi — tôi bốn mươi tư — tôi nhận tin Yến mất. Ung thư vú giai đoạn cuối — bốn mươi sáu tuổi. Yến đã sống
      với chồng sáu năm — sinh một con gái — em mất trước con vào lớp một. Bạn cùng phòng cũ Yến nhắn tin báo tôi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 165
    text: Người đàn ông không đến đám tang Yến — tôi không phải gia đình — tôi không có vai trò gì để có mặt. Tôi đến mộ Yến
      ở nghĩa trang Vũng Tàu — một tháng sau tang — đi máy bay xuống — đặt vòng hoa — quỳ — không nói gì. Tôi đứng nửa giờ
      — rồi đi rất xa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 167
    text: Tôi không gặp chồng Yến — không gặp con Yến. Tôi không muốn xen vào gia đình em đã chọn — em chọn người khác — em
      có gia đình của em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 171
    text: Năm năm tôi giữ bức thư này. Người đàn ông đọc một tuần một lần — đêm Chủ nhật — văn phòng vắng — tôi mở ngăn kéo
      — đọc — đặt lại. Em vẫn còn trong thư — em hai mươi năm đợi — em viết câu cuối với tôi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 173
    text: Đêm nay — đúng năm Yến đi. Người đàn ông đem thư về Hải Phòng — về văn phòng công ty Hải Cảng — anh đem về chính
      văn phòng tôi và Yến từng làm cùng. Tôi đây đây đây sẽ đặt thư trong ngăn kéo bàn Yến xưa — bàn còn đó — không ai dùng
      — tôi giữ làm bàn của Yến năm. Hình người kể không cho ai ngồi vào bàn — như thầy Hồng giữ ghế cho Quỳnh Mai mười năm
      — tôi giữ bàn cho Yến năm năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 177
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 181
    text: Tôi nhớ. Tôi yêu Yến hai mươi năm — không nói. Yến đợi tôi — đợi đủ — quyết cưới khác. Tôi đến muộn ba mươi ngày.
      Yến không trách — Yến chỉ nói thật trong thư. Bức thư là câu cuối Yến nói với tôi — em đã có gia đình mới — không trách
      tôi — chỉ chúc tôi sống vui.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 185
    text: Đêm nay — tôi đặt thư trong ngăn kéo bàn Yến — bàn em giữ năm năm. Như cách gửi thư về với người viết — kết thúc
      thời em đọc một mình. Em không cần ai đọc — em có gia đình — em đã đi xa. Bức thư về với bàn em — đó là chỗ nó nên ở.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 23
    line: 197
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
