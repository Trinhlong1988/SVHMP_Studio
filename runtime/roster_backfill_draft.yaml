      tặng bác sĩ tâm lý. Đêm nay — sẽ có cậu trai thứ tư cũng đem gương. Vật thứ tư trong cụm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 65
    text: Xe dừng cùng bến đêm hai mươi hai — Quỳnh Mai. Bến xưa — callback. Cứ giữ vật.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 109
    text: Tôi...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 127
    text: Em là Mạnh Hiếu. Ba mươi tuổi. Em ở Mai Trung — Bắc Ninh — quê. Em làm giáo viên cấp hai — chính trường THCS Mai
      Trung em vừa bước lên xe — trường em đã học cấp hai — trường thầy Hồng dạy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 131
    text: Mười năm trước — em hai mươi tuổi — em sinh viên năm cuối cao đẳng sư phạm. Em vừa nhận thông báo trượt thi cuối
      khóa môn chính. Em phải học lại một năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 135
    text: Em sốc. Cô gái nghèo — bố mẹ em làm nông cà phê — họ đã chật vật trang trải học phí cho em. Em phải báo bố mẹ học
      thêm một năm — em không dám.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 137
    text: Em về phòng trọ một mình. Cô gái ngồi trước gương treo tường. Đứa em nhìn mình. Bóng người con gái ấy thấy mặt mình
      — gầy — thất bại — không nên sống tiếp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 139
    text: Em đập gương. Mảnh vỡ rơi xuống. Em nhặt một mảnh — định cứa cổ tay.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 141
    text: Trước khi cứa — em nhìn mảnh gương tan. Em thấy mặt mình trong mảnh — gầy như trên gương lớn — nhưng nhỏ hơn — cô
      đơn hơn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 145
    text: Em nhớ thầy Hồng — thầy chủ nhiệm em hồi cấp hai trường THCS Mai Trung. Thầy đã dạy em hai năm cấp hai. Thầy thương
      em — thầy giúp em tự tin học tiếp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 147
    text: 'Em nhớ thầy bảo em hồi lớp tám: ''Hiếu ơi em có giỏi hơn em nghĩ thầm. Thất bại một lần — không phải hết rồi. Cuộc
      đời dài.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 149
    text: 'Em không cứa. Cô gái gái gọi thầy Hồng. Thầy bắt máy. Thầy bảo em: ''Em đến nhà thầy tối nay đi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 151
    text: 'Em đến nhà thầy. Thầy pha trà — ngồi nói chuyện với em hai giờ. Thầy nghe em kể. Thầy không phán xét. Thầy chỉ
      bảo: ''Em học lại một năm — không sao. Bố mẹ em sẽ hiểu. Thầy gọi giúp em nếu em sợ.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 155
    text: Hôm sau thầy Hồng gọi bố mẹ em. Bố mẹ em buồn nhưng hiểu. Em ấy học lại một năm. Em tốt nghiệp năm em hai mươi mốt
      — chính năm hai nghìn không trăm mười bảy — em là một trong khóa em — chỉ chậm một năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 45
    line: 157
    text: Sau tốt nghiệp — em quay về trường THCS Mai Trung dạy — chính trường thầy dạy. Em làm đồng nghiệp thầy chín năm.
