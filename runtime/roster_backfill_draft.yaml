    - ep: 4
      line: 199
      text: 'Có một lần con bảo mẹ: ''Mẹ về Hà Nội ở với con. Một mình mẹ vất vả.'' Mẹ cười: ''Mẹ ở đây bao nhiêu năm rồi.
        Bố con cũng nằm ở đây. Mẹ đi sao được.'' Con không nói thêm. Mẹ ở quê tới ngày đi.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 203
      text: 'Năm nay con về Phú Thọ ăn Tết với gia đình. Em trai con và vợ con anh ấy ở quê. Bé Diệu ngoài Sài Gòn, mẹ bé
        nhắn: ''Năm sau bé biết đi, em đưa về cho bà nội thắp hương.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 205
      text: Con mang theo xấp phong bao. Định ngày mùng một, con phát cho các cháu. Tất cả đều có chữ bà. Riêng phong bao
        cho bé Diệu — con sẽ đặt lên ban thờ mẹ. Để mẹ tự gọi tên cháu vào nhà mới.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 219
      text: Chào anh.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 231
      text: Chưa tới lúc.
      speaker: UNATTRIBUTED_can_nguoi_duyet
