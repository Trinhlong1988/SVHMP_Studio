    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 32
    line: 137
    text: Em thương Nhung. Nhung hiền — biết may — biết đan — biết nấu. Mỗi mùa đông em đan chăn — đan cho em — cho mẹ em
      — cho hàng xóm. Chăn em đan đẹp — len mềm — đường đan tròn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 32
    line: 141
    text: Tháng tư năm hai nghìn không trăm mười tám — sắp mười năm cưới. Em định tổ chức nhỏ — mời gia đình hai bên — bốn
