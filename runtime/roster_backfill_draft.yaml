  PAS_0016:
    char_name: Tuấn Quốc
    assigned_ep: 5
    appearances:
    - ep: 5
      source: header_passenger_main
    speech_evidence:
    - ep: 5
      line: 133
      text: 'Áo này mẹ đan cho chú năm chú hai mươi mốt tuổi. Chú đang học đại học ở Hà Nội. Mẹ ở quê Hà Tĩnh. Mẹ gọi điện
        bảo: ''Mẹ đang đan cho con cái áo len. Mẹ đan màu nâu, con thích nâu mà. Cuối tháng Chạp mẹ gửi xe khách ra cho con.
        Mặc Tết cho ấm.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 137
      text: Chú đợi áo. Mẹ gửi xe khách. Áo tới Hà Nội đêm hai bảy. Chú mở ra ngoài. Áo len nâu, đan tay, mềm. Chú thử lên
        — vừa vặn. Mẹ đan chính xác cỡ chú.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 141
      text: 'Hai mươi chín tháng Chạp, em gái nhắn lên: ''Anh ơi mẹ ốm. Mẹ về bệnh viện huyện rồi.'' Chú hỏi: ''Nặng không?''
        Em trả lời: ''Cũng không nhẹ.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 145
      text: Chú mặc áo len mẹ đan, xách túi, ra bến xe. Vào đêm ba mươi cuối năm. Xe khách kẹt. Đến nhà lúc bốn giờ sáng mùng
        một. Đứa em gái đứng cổng đợi. Cô bé ấy không nói gì. Em chỉ dẫn chú vào nhà.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 147
      text: Mẹ đã đặt giữa nhà. Mẹ mặc áo dài nâu. Tay mẹ đặt trên ngực. Bên cạnh quan tài, có cuộn len nâu còn lại — phần
        mẹ đan dở. Mẹ chưa đan xong cái áo cho em gái chú. Đan cho chú trước, đan cho em sau.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 151
      text: 'Em gái chú bảo: ''Mẹ đan tới chiều hai chín, vừa khâu xong cổ áo cho em thì gục xuống. Cuộn len mẹ vẫn để trên
        ghế mây ngoài hiên.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 153
      text: Chú không khóc được. Chú chỉ đứng đó, mặc cái áo len mẹ đã đan xong cho mình. Cảm thấy tay mẹ vẫn còn áp lên vai.
        Vì mỗi mũi len đều có hơi tay mẹ.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 167
      text: Con đã nhớ ra chưa?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 171
      text: Con nhớ, bác.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 175
      text: Chú giữ áo này ba mươi năm. Tháng ba mươi nào chú cũng mặc. Mỗi năm áo lại sờn thêm một nơi. Mỗi năm chú lại tự
        đan lại một mảng — bằng len khác, không vừa màu — nhưng chú vẫn đan. Vì nếu chú không đan, áo sẽ rách. Áo rách thì
        mẹ mất một lần nữa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 177
      text: Năm nào chú cũng về quê đêm ba mươi. Mặc áo. Ngồi trên ghế mây ngoài hiên — chính cái ghế mẹ đã ngồi đan dở. Cuộn
        len còn lại trên ghế, chú không dám chạm. Chỉ ngồi cạnh. Đến mùng một.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 181
      text: Em gái chú giờ đã lập gia đình ở Vinh — gần ngoại. Mỗi năm em chỉ về quê được mùng hai. Em chưa bao giờ thấy chú
        mặc áo len mẹ đan vào đêm ba mươi. Em không biết. Chú giữ riêng cho mình.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 183
      text: 'Vợ chú từng hỏi: ''Áo cũ thế anh không thay sao?'' Chú bảo: ''Áo mẹ đan, anh giữ lại.'' Vợ chú không hỏi nữa.
        Sau này vợ chú mất sớm — chú góa ba năm rồi. Một mình. Hai con trai chú đã trưởng thành, ở Hà Nội.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 187
      text: 'Mỗi năm chú về quê, hàng xóm sang chơi. Họ hỏi: ''Chú vẫn mặc áo len cũ thế nhỉ?'' Chú gật. Họ không hỏi nữa.
        Họ biết — cái áo này không thay được.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 189
      text: Chú nghĩ thầm — nếu một ngày chú không còn nữa, áo sẽ thế nào? Vợ con chú có biết câu chuyện áo này không? Chú
        chưa kể với ai. Chú chỉ giữ trong lòng. Mẹ đan áo này cho chú — chỉ mẹ và chú biết. Đến khi chú đi, không còn ai biết
        nữa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 193
      text: Đêm nay chú đem áo về Hạ Vy Tĩnh. Để mặc lên giường mẹ — giường mẹ vẫn ở chỗ xưa. Chú sẽ nằm trên giường đó. Mặc
        áo. Một đêm. Đến mùng một về Hà Nội.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 197
      text: Năm sau chú sẽ về một mình nữa. Một năm sau nữa cũng vậy. Đến khi chú không còn về được — vì già, vì yếu, vì đi
        rồi — áo này sẽ ở đâu, chú không biết. Vợ chú đã mất. Hai con trai chú ở Hà Nội, chưa từng mặc áo này. Có lẽ áo sẽ
        vào chiếc tủ cũ ở quê. Nằm im lặng yên. Đến khi căn nhà cũng đổ.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 201
      text: 'Chú đã suy nghĩ: nên đốt áo cùng chú khi chú đi. Để mẹ với chú cùng có hơi áo. Nhưng chú lại nghĩ thầm — có khi
        nào con trai chú một ngày trẻ tuổi nó cần một cái áo của bà nội? Có khi nào nó muốn biết bà nó đã đan dở cái áo này
        cho ai? Chú không dám quyết. Chú để áo trong tủ. Tự tủ sẽ quyết.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 203
      text: Đêm nay chú về để chia tay áo. Có thể là lần cuối chú mặc đêm ba mươi. Có thể không. Chú đã sáu mươi mấy tuổi.
        Mỗi năm chú về quê, chú lại đếm — còn bao nhiêu lần ba mươi nữa? Mười? Năm thứ mấy của em rồi? Hai? Không ai biết.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 219
      text: Chào con. Con cũng đi đêm thường xuyên à?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 229
      text: Bác tài lái xe này bao nhiêu năm rồi nhỉ?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 5
      line: 233
      text: Chưa tới lúc.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    knowledge_candidates:
    - ep: 5
      line: 203
      text: '"Đêm nay chú về để chia tay áo. Có thể là lần cuối chú mặc đêm ba mươi. Có thể không. Chú đã sáu mươi mấy tuổi.
        Mỗi năm chú về quê, chú lại đếm — còn bao nhiêu lần ba mươi nữa? Mười? Năm thứ mấy của e'
