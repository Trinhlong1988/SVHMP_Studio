    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 42
    line: 153
    text: Em sẽ giữ ảnh em đeo nhẫn — chính ảnh em chụp ngày cưới. Ý nghĩa trong ảnh — vật chứng ngoài đời.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 42
    line: 159
    text: 'Đêm trước hôm em đi — chúng tôi nằm cùng giường. Em ấy ấy xoa lưng tôi. Em bảo: ''Anh ngủ đi mai dậy sớm em đi
