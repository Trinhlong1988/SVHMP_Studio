  - ep: 13
    line: 151
    text: Tháng thứ năm — tôi về — cúc đã khô gốc — đất nứt. Tôi tưới — nhưng muộn — cúc không lại sức. Hoa rụng sạch.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 155
    text: Tháng thứ sáu — sáu tháng sau bố đi — vườn cúc của bố — đã chết hoàn toàn. Tôi đến — thấy cánh đồng cúc bốn năm
