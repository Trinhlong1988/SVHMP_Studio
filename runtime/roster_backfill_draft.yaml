    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 12
    line: 131
    text: Anh Khôi hơn em năm tuổi. Anh học bách khoa — ra trường vào công ty cầu đường. Lúc em phỏng vấn — anh đã đứng dự
