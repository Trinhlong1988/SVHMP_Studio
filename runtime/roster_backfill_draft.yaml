    text: 'Mẹ không nói tiếp. Mẹ đứng dậy: ''Em cưới em chịu. Nhưng nếu em cưới người này — em không phải con mẹ nữa.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 141
    text: Em sốc. Em chưa nghĩ mẹ cương đến vậy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 143
    text: Em về phòng. Khóc. Em yêu anh — em cũng yêu mẹ — không thể chọn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 145
    text: Em hẹn anh ra quán cà phê Lâm — phố Hàng Bài — chính quán em vừa bước lên xe đêm nay. Em nói thật với anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 147
    text: 'Anh nghe — im một lúc — không khóc. Rồi anh bảo: ''Trang ơi em chọn mẹ. Anh không muốn em mất gia đình vì anh.
      Anh ấy sẽ chia tay em.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 149
    text: Em không nói lại. Em ấy ấy im lặng yên. Anh đứng dậy — đi ra cửa. Trước khi đi — anh quay lại — đặt phong bì lên
      bàn. 'Anh viết thư cho em — tối qua ở đó. Em đọc khi nào em sẵn sàng.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 153
    text: anh ấy bước đi. Em ngồi quán cà phê hai giờ — không đọc thư — chỉ giữ phong bì.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 155
    text: Em về nhà. Mẹ ôm em — biết bạn đã chia tay. Mẹ không nói gì.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 157
    text: Em không đọc thư anh trong một tháng. Cô gái sợ — không biết anh viết gì. Em sợ thư có lời trách em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 159
    text: 'Một tháng sau — em đọc. Anh không trách. Hình ảnh người anh chỉ viết: ''Trang ơi cảm ơn em đã yêu anh hai năm.
      Bóng người ấy không trách em chọn mẹ — em đúng. Hình bóng đàn ông sẽ về Hải Phòng — đi học cao học bên đó — quên Hà
      Nội. Hình bóng con gái ấy sống vui — lấy chồng tốt — sinh con khỏe. Khang.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 163
    text: Em đọc xong — khóc một đêm. Em không liên lạc anh — không muốn làm anh khó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 165
    text: 'Hai tháng sau — em nhận điện thoại bạn cùng câu lạc bộ ghi-ta. Bạn bảo: ''Trang ơi Khang tự tử. Treo cổ trong phòng
      trọ Hải Phòng. Bố mẹ Khang phát hiện sáng nay.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 167
    text: Em sốc. Cô gái không tin nổi điều đó. Em đi Hải Phòng — đến nhà tang. Bố mẹ Khang nhìn em — biết em là người yêu
      — không trách — chỉ buồn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 169
    text: 'Mẹ Khang bảo: ''Khang về Hải Phòng tháng trước — không nói lý do. Khang im suốt — không ăn — không ngủ. Cô không
      biết Khang đau như vậy. Cô không cứu được con cô.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 173
    text: Em quỳ bên quan tài. Cô gái xin lỗi anh — qua thân xác đã đi. Em không cứu được anh — em không cãi mẹ kịp lúc anh
      cần em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 175
    text: Bảy năm em giữ thư anh. Bảy năm em không lấy chồng — không yêu ai. Mẹ em không ép em cưới — mẹ em hiểu — mẹ đã ép
      em chia tay — mẹ thể ép cưới ai khác.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 179
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 183
    text: Em nhớ. Cô gái chia tay anh Khang vì mẹ — em chọn mẹ — em không cứu được anh khi anh tự tử. Em giữ thư bảy năm —
      vì thư là câu cuối anh nói với em — anh không trách em — nhưng em trách bản thân.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 187
    text: Đêm nay — em đem thư về phố Hàng Bài — đến quán cà phê Lâm — chính quán em ngồi đêm chia tay. Em sẽ đốt thư trên
      bàn quán — như tro tiễn anh. Em ấy đã đủ bảy năm — em không cần thư nữa. Hình bóng đàn ông ở đâu đó — biết bạn đã thôi
      cầm thư.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 18
    line: 199
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
