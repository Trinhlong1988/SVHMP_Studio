    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 191
    text: Em không biết anh có hợp hiến thận không. Có thể không. Nhưng em thử. Em chưa thử.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 193
    text: Năm vừa rồi — em quyết về Việt Nam dài hạn — sáu tháng. Em đem khung ảnh — chính khung Hằng tặng em hai mươi bốn
      năm trước. Khung em đem sang Hoa Kỳ — đặt bàn làm việc — em nhìn mỗi ngày — em nhớ Hằng đủ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 197
    text: Con đã nhớ ra chưa?
