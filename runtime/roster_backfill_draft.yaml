  - ep: 12
    line: 135
    text: Em đến văn phòng anh ba lần. Lần thứ nhất — anh trả lời câu hỏi luận văn của em — chuyên môn. Lần thứ hai — em hỏi
      thêm về kết cấu nhịp cầu — anh giảng — em hiểu. Lần ba — anh mời em uống cà phê ở quán ven đê — chính quán em vừa bước
