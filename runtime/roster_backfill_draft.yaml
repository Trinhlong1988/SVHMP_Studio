    text: Hằng...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 123
    text: Em là Mỹ Linh. Bốn mươi lăm tuổi. Em sinh ở Phú Thọ — Vĩnh Lộc. Người con gái gái ấy gái sống Hoa Kỳ từ năm em hai
      mươi mốt. Hình ảnh người con gái ấy vừa về Việt Nam tuần trước.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 127
    text: Bạn thân nhất hồi tiểu học em — Hằng — mất hai năm trước. Bốn mươi ba tuổi. Suy thận mạn — không có người hiến —
      sống bằng chạy thận năm năm — không qua ở đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 129
    text: Em và Hằng học cùng lớp từ lớp một đến lớp năm — trường này — trường tiểu học Vĩnh Lộc. Hai đứa em ngồi cùng bàn
      năm năm liền. Hằng giỏi văn — em giỏi toán — hai đứa kèm nhau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 133
    text: Cấp hai tách lớp — em vào lớp chọn — Hằng vào lớp thường. Hai đứa em vẫn chơi cuối tuần — đến nhà nhau — học bài
      chung.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 135
    text: Cấp ba — em vào trường chuyên Phú Thọ — Hằng học cấp ba thường ở xã đó. Em ở trường nội trú — về nhà cuối tuần —
      vẫn gặp Hằng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 137
    text: Năm em mười tám — em đỗ học bổng du học Hoa Kỳ — đại học ngành kỹ sư hóa học. Em đi tháng chín năm chín bảy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 141
    text: Trước hôm em đi — em đến nhà Hằng chào. Hằng pha trà — đưa em khung ảnh chung lớp năm — chụp lúc hai đứa em tốt
      nghiệp tiểu học.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 143
    text: 'Hằng bảo: ''Linh ơi em đi xa — em đem khung này. Mỗi lần nhớ quê em nhìn ảnh — em thấy chị Hằng — em không quên.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 145
    text: Em nhận lấy nó. Em đem khung sang Hoa Kỳ — đặt trên bàn làm việc phòng ký túc xá.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 147
    text: 'Hằng nói thêm: ''Linh ơi nếu chị có chuyện gì — em về giúp chị nhé. Chị không có anh chị em — chỉ có Linh là người
      chị tin.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 149
    text: 'Em đã hứa với chị. Em gật: ''Vâng chị Hằng — Linh sẽ về giúp chị bất cứ khi nào.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 153
    text: Em sang Hoa Kỳ. Hai mươi bốn năm. Em học đại học — cao học — đi làm cho công ty hóa chất bên đó. Em cưới chồng người
      Hoa Kỳ — sinh hai con — sống Texas.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 155
    text: Em về Việt Nam mỗi năm một lần — Tết — gặp gia đình em ở Phú Thọ. Mỗi lần em gặp Hằng — uống cà phê — kể chuyện.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 157
    text: Hằng cưới năm em hai sáu — em không về dự cưới — em đang ở bên đó — em gửi quà cưới — em xin lỗi không về kịp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 159
    text: Hằng sinh hai con. Sống ở xã Vĩnh Lộc — chồng làm nông.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 163
    text: 'Năm Hằng ba tám — Hằng phát hiện suy thận. Hằng nhắn em qua Facebook: ''Linh ơi chị bệnh — thận hư — phải chạy
      thận tuần ba lần. Bác sĩ bảo cần ghép thận — không có người hiến — chị sợ chờ đợi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 165
    text: 'Em đọc tin nhắn — em sốc. Em định viết: ''Chị ơi em về Việt Nam khám — em có thể là người hiến nếu hợp.'' Em chưa
      kịp viết — em bận họp công ty — em định viết tối.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 167
    text: 'Tối em viết tin nhắn ngắn: ''Chị ơi em sẽ về Việt Nam Tết tới — em đi khám — xem em có hợp hiến chị không. Em xin
      lỗi em đang bận — em viết dài sau.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 169
    text: Em không viết dài sau. Cô gái quên hẳn câu chuyện. Em bận con — bận công việc — bận chuẩn bị di chuyển bộ phận.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 171
    text: 'Tết năm đó em về Việt Nam — em đến nhà Hằng — em đem quà. Em quên hỏi về việc hiến thận — em chỉ uống cà phê —
      hỏi sức khỏe — Hằng bảo: ''Đỡ rồi em — chạy thận quen.'' Em tin — không hỏi sâu — em định Tết sau hỏi.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 175
    text: Em về Hoa Kỳ. Năm sau Tết em về — em sinh con thứ hai — em ở Hoa Kỳ. Em nhắn Hằng chúc Tết — Hằng đáp bình thường.
      Em không hỏi thận.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 177
    text: 'Năm sau nữa — Hằng nhắn: ''Linh ơi chị nặng hơn — chuyển bệnh viện Bạch Mai tuần sau. Chị xin em — em về thử khám
      không?'' Em đọc. Em định gọi điện — em bận họp — em định gọi tối.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 179
    text: Vào tối em quên gọi. Cô gái gái định ngày mai. Mai bận. Tuần sau bận. Hai tháng trôi — em gọi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 181
    text: Một tối — em nhận tin nhắn từ chồng Hằng. 'Linh ơi chị Hằng đã đi sáng nay. Người đàn ông xin báo em.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 183
    text: Em sốc. Cô gái không khóc trước chồng. Em ngồi văn phòng — đêm — khóc một mình.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 187
    text: Em không về dự tang Hằng — em đang giữa dự án quan trọng — em xin nghỉ kịp. Em gửi tiền phúng — em gửi lời chia
      buồn qua chồng Hằng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 189
    text: Hai năm em sống với cảm giác lỗi. Em hứa Hằng giúp khi cần — em giúp — em về thử khám hiến thận — em gọi điện. Em
