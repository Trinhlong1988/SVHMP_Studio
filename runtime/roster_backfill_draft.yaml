    text: Nga...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 125
    text: Em là Linh Đan. Hai mươi tám tuổi. Em ở Đà Nẵng — Liên Chiểu — quê. Em làm thiết kế đồ họa cho công ty quảng cáo
      Đà Nẵng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 129
    text: Bạn cùng phòng trọ em hồi đại học — Nga — mất bảy năm trước. Hai mươi mốt tuổi. Bệnh thalassemia thể nặng — di truyền
      — phụ thuộc truyền máu hàng tháng — biến chứng tim — không qua ở đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 131
    text: Em và Nga học cùng Đại học Kiến trúc Đà Nẵng — khoa nội thất. Em ở ghép phòng trọ với Nga từ năm hai — phòng nhỏ
      phố Đào Duy Anh — chia tiền thuê hai mươi mốt năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 135
    text: Nga bệnh thalassemia thể nặng — phát hiện từ nhỏ — phụ thuộc truyền máu mỗi tháng. Em biết bệnh em từ ngày em chuyển
      vào ở ghép — em không giấu — em nói thật.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 137
    text: Em đi truyền máu Bệnh viện Trung ương Đà Nẵng mỗi tháng. Em cần hai bịch máu mỗi lần — máu nhóm O dương — em hợp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 139
    text: 'Năm 2017 — em hai mươi mốt tuổi — chuẩn bị tốt nghiệp đại học. Em nặng hơn — bác sĩ bảo: ''Nếu có người hiến tủy
      hợp — em sẽ chữa được — không còn phụ thuộc truyền máu.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 143
    text: 'Em hỏi em: ''Linh ơi em xem em có hợp tủy với chị không? Em thử khám ngân hàng tủy — không tốn nhiều — chỉ thủ
      tục.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 145
    text: 'Em đáp: ''Em ơi để em xem.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 147
    text: 'Em không đi khám. Cô gái cảm thấy rất ngại. Người nữ em sợ kim tiêm — em sợ đau — em thủ tục ngân hàng tủy phức
      tạp. Hình ảnh người con gái ấy nghĩ: ''Có thể em không hợp — em đi khám tốn thời gian.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 149
    text: 'Em bịa lý do với em: ''Em ơi em hôm trước tới ngân hàng tủy hỏi — họ bảo phải đợi sáu tháng làm hồ sơ — em vào
      kỳ thi tốt nghiệp — em chưa làm kịp. Sang năm em làm.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 153
    text: 'Em không nghi em. Cô gái gái gái gái gật. Bảo: ''Em đợi chị tốt nghiệp xong — chị có thời gian.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 155
    text: Em tốt nghiệp năm 2017 — em đi làm cho công ty quảng cáo. Em vẫn ở ghép với em — em vẫn đi truyền máu mỗi tháng
      — em vẫn yếu hơn — em hỏi em em đã làm hồ sơ tủy chưa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 157
    text: 'Em nói dối em mỗi tháng: ''Chị ơi em đang làm — chậm thủ tục.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 159
    text: Đầu năm 2018 — em ốm nặng — biến chứng tim — không truyền máu kịp đêm. Em ấy đưa em vào bệnh. Em mất ba ngày sau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 163
    text: Em đến tang em. Cô gái quỳ bên quan tài Nga. Đứa em xin lỗi — qua thân xác đã đi. Bóng người con gái ấy không thử
      khám hiến tủy — em thủ tục — em lười.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 165
    text: 'Mẹ Nga đến — bà nhìn em — không trách — chỉ nhìn. Bà bảo: ''Linh ơi cảm ơn em ở ghép với Nga ba năm — Nga thương
      em.'' Em im — em nói được — em nói lý do em không khám tủy.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 167
    text: Sau tang Nga — em một mình ở phòng trọ. Em không tìm bạn ghép mới. Em ở một mình hai năm — đến khi em chuyển nhà
      mới.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 169
    text: Năm vừa rồi — em dọn nhà xưa — em tìm thấy thẻ này. Thẻ đăng hiến máu tự nguyện — em đăng năm 2017 — em đăng ký
      vì em định đi hiến tủy cho Nga — em nghĩ thẻ hiến máu là bước đầu — sẽ chuyển sang hiến tủy sau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 171
    text: Em đăng ký xong — không bao giờ đi hiến máu một lần. Em vứt thẻ vào ngăn kéo bàn — quên bảy năm. Bây giờ dọn nhà
      — em tìm thấy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 175
    text: Em không thể đi hiến tủy cho Nga — em đã đi xa. Em đi hiến máu thường cho bệnh — bắt đầu năm vừa rồi — em đi mỗi
      ba tháng một lần — em làm gì có thể làm bây giờ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 177
    text: Em đăng ký lại ngân hàng tủy — em làm hồ sơ — em đi khám — em hợp tủy với một bệnh nhân khác — không phải em. Em
      đã hiến tủy tháng trước — cho một em bé năm tuổi ở Bệnh viện Huyết học Hà Nội — em không biết em này — em chỉ biết em
      hợp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 179
    text: Em làm — vì em không thể chuộc Nga. Em chỉ có thể làm gì em có thể làm bây giờ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 183
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 187
    text: Em nhớ. Cô gái không thử khám tủy cho Nga — em ngại — em sợ kim — em lười. Em không phải lý do trực tiếp em mất
      — Nga có bệnh nặng — không chắc em hợp tủy. Nhưng em là một trong nhiều người có thể thử — em không thử. Em sống bảy
      năm với cảm giác lỗi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 191
    text: Đêm nay — em đem thẻ về Đà Nẵng — về Bệnh viện đa khoa Liên Chiểu — chính bệnh em đến đêm Nga mất. Em sẽ đặt thẻ
      trong phòng tiếp tân — gửi thẻ cho bệnh viện — như cách trả lại nơi em đã đăng ký năm 2017 — không sử dụng. Để bệnh
      viện biết — thẻ này em đã có — em không dùng — bây giờ em dùng cách khác.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 29
    line: 203
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
