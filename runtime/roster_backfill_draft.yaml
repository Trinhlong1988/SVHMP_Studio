  - ep: 24
    line: 105
    text: Mai...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 123
    text: Em là Hồng Liên. Sáu mươi tuổi. Em ở Đại Lộc — Hà Nam — quê. Em làm cán bộ xã đó — về hưu hai năm trước.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 127
    text: Cháu họ em — Mai Anh — mất mười năm trước. Mười bốn tuổi. Tai nạn xe — chạy đi học về tối — đoạn đường ven đê —
      xe tải va. Mai mất tại nơi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 129
    text: Mai là con chị họ em — chị Lan — sống cùng xã đó. Chị Lan nghèo — chồng mất sớm vì tai nạn lao động — chị nuôi con
      một mình. Mai học giỏi — đứng nhất lớp suốt từ lớp một đến lớp năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 133
    text: Năm Mai lớp năm — Mai mười tuổi — bà nội Mai ốm nặng — chị Lan phải bỏ việc bán quán tạp hóa nhỏ ở chợ để chăm bà.
      Không có thu nhập — chỉ còn tiền tiết kiệm ít ỏi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 135
    text: Chị Lan đến nhà em — đêm trước Tết Trung thu — em đang dọn nhà. Chị ngồi xuống ghế phòng khách — không nhìn em —
      nhìn xuống bàn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 137
    text: 'Chị nói: ''Liên ơi — chị xin em — chị Lan đỡ học phí học thêm toán cho Mai. Sáu trăm nghìn một tháng. Bé sắp vào
      lớp sáu — cần học thêm — không thì không theo kịp bạn. Bà nội bé ốm — chị bỏ việc chăm — chị không có tiền. Em đỡ cháu
      một năm — sang năm chị có tiền chị trả lại em.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 141
    text: Em im lâu. Em có tiền — em làm cán bộ xã đó — lương đủ — em độc thân — không gia đình — em không tiêu nhiều. Sáu
      trăm nghìn một tháng — em chi được mà không khó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 143
    text: 'Nhưng em ngại. Em nghĩ trong đầu: ''Nếu em cho — em phải cho luôn — không thể dừng một tháng nào. Em không muốn
      ràng buộc tiền với họ hàng — sẽ sinh chuyện. Sang năm chị Lan không trả lại được — em không thể đòi — sẽ xấu họ hàng.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 145
    text: 'Em nghĩ thêm: ''Mai cháu chị họ em — không phải cháu ruột. Em không có nghĩa vụ. Chị Lan có thể xin chỗ khác.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 147
    text: 'Em đáp: ''Chị Lan ơi em xin lỗi — em cũng đang khó — em đang gửi tiền cho bố mẹ em chữa bệnh — em không cho được.
      Em xin lỗi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 151
    text: Em nói dối. Bố mẹ em vẫn khỏe — không bệnh. Em nói dối vì em sợ mất mặt nếu nói thật lý do em không cho — em sợ
      ngại.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 153
    text: Người chị Lan không nói gì. Chị ngồi thêm một lúc — uống nốt ly nước em pha. Đứng dậy — chào — đi về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 155
    text: Em ngồi nhà — biết em nói dối. Cô gái xấu hổ với chính mình — nhưng em không gọi chị Lan lại — em không chạy theo
      đưa tiền. Em để chị Lan đi về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 157
    text: Mai không học. Vẫn học giỏi lớp năm — vẫn đứng nhất. Nhưng lên lớp sáu — Mai học sa sút — vì không có học — không
      theo kịp các bạn được học thêm — không hiểu bài lớp trên.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 161
    text: Bốn năm sau — Mai học lớp chín — học không nổi nữa — em xếp loại trung bình — em ngại đi học — em bỏ học sau học
      kỳ một lớp chín. Em xin chị Lan đi làm thuê quán cà phê xã đó — kiếm tiền phụ chị nuôi bà nội đang yếu hơn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 163
    text: Mai làm quán cà phê được sáu tháng. Cô gái gái mười bốn tuổi. Đêm hôm đó — em làm ca tối — về nhà mười giờ đêm —
      đi xe đạp dọc đê — xe tải chở vật liệu xây dựng va ngang — em mất tại nơi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 165
    text: Em đến đám tang. Cô gái quỳ bên quan tài Mai. Cô ấy không khóc trước người. Hình bóng con gái gái xin lỗi Mai —
      qua thân xác đã đi. Em ấy không phải lý do trực tiếp em chết — em không phải tài xế xe tải — nhưng em là một trong nhiều
      người có thể đỡ em vào lúc em cần.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 169
    text: Em không nói chuyện được với chị Lan suốt đám tang. Người chị Lan không nhìn em. Chị không trách em — chỉ không
      nhìn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 171
    text: Sau tang Mai — em quyết. Em đỡ học phí cho hai em khác cùng xã đó — hai em con nhà nghèo — sáu trăm nghìn một tháng
      mỗi em — kéo dài năm năm — đến em tốt nghiệp lớp mười hai.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 173
    text: Em làm vì em hối tiếc Mai. Em không thể cứu Mai sống lại — em có thể cứu hai em khác khỏi cảnh không học. Hai em
      đó bây giờ đã vào đại học — đang học năm hai và năm ba — em vẫn đỡ một phần.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 177
    text: Cuốn vở này — chị Lan đưa em một năm sau Mai mất. Một sáng — em đang quét sân — chị Lan đến nhà em — không gọi trước
      — đưa em cuốn vở.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 179
    text: 'Chị bảo: ''Liên ơi vở Mai lớp bốn — em giữ làm kỷ niệm. Mai thích bài tập làm văn — trang đầu vở là bài ''Tả cô
      giáo em yêu nhất'' — Mai viết về cô chủ nhiệm lớp bốn. Em đọc đi xa.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 181
    text: Em ngạc nhiên — chị Lan không trách em — chị còn đưa vở cho em. Cô gái ấy ấy cầm vở. Lật trang đầu. Đọc bài tập
      làm văn Mai viết. Em khóc — lần đầu khóc sau tang Mai.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 183
    text: 'Em hỏi chị Lan: ''Sao chị đưa em? Sao chị không giữ lại?'' Chị Lan đáp: ''Em muốn em nhớ Mai — em nhớ thì Mai Anh
      không bao giờ mất hoàn toàn. Chị giữ vở — chỉ chị nhớ. Em giữ lại — em cũng nhớ. Hai chị em cùng nhớ — Mai Anh tồn tại
      lâu hơn.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 185
    text: Mười năm em giữ vở. Mỗi rằm tháng bảy em đem vở lên mộ Mai Anh — đặt cạnh bia — thắp hương — đọc lại trang đầu —
      về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 189
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 193
    text: Em nhớ. Cô gái từ chối đỡ học phí Mai Anh — em ngại — em không phải lý do trực tiếp em mất — nhưng em là một trong
      những người có thể giúp lúc em cần. Đứa em không giúp. Bóng người con gái ấy không thể chuộc — em chỉ có thể đỡ hai
      em khác — như cách nói em đã sửa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 197
    text: 'Đêm nay — em đem vở về Đại Lộc — về trường tiểu học Mai Anh học. Em sẽ đặt vở trong văn phòng giáo viên — gửi vở
      cho trường — như cách chị Lan đưa vở cho em mười năm trước. Để vở đến tay người sau — đến tay cô giáo trẻ nào đó — cô
      đọc bài Mai Anh viết — cô nhắc nhở mình: không từ chối em nào cần đỡ lấy.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 24
    line: 209
    text: Chào con.
    speaker: UNATTRIBUTED_can_nguoi_duyet
