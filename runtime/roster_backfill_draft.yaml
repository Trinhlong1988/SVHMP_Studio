    text: 'Em hỏi: ''Chị mua ở đâu?'' Chị bảo: ''Chị mua khi du học Pháp — chợ đêm Paris — hồi chị hai mươi mốt. Chị giữ năm
      năm chưa đeo. Hôm nay chị tặng em — vừa đỗ đại học — chị cầu may cho em.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 155
    text: 'Em hỏi: ''Sao chị không đeo?'' Chị cười: ''Vòng cho con trai — không phải con gái. Chị thấy ngôi sao hợp em hơn
      — em yêu thiên văn từ bé.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 157
    text: 'Em đeo. Người chị Hà vuốt đầu em. Bảo: ''Em học giỏi — em sống tử tế — chị không cần xin gì hơn.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 159
    text: Em cảm ơn chị. Người chị Hà ra phòng. Em học tiếp đến mười giờ — đi ngủ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 163
    text: 'Sáng hôm sau — năm giờ — mẹ gọi em dậy. Mẹ khóc. Mẹ nói: ''Đức ơi chị Hà...'' Mẹ không nói hết. Em hiểu.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 165
    text: Bệnh viện đêm đó — chị có ca trực gấp — chị ở lại đến hai giờ sáng. Chị Thu Hà đi xe máy về. Đoạn đường vành đai
      3 — xe tải mệt — tài xế ngủ gật — va ngang vào xe chị.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 167
    text: Em đến bệnh viện. Chị nằm — đã được cấp cứu nhưng không qua. Em đứng — không khóc — chỉ vuốt tóc chị. Em không tin
      chị đi nhanh đến vậy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 171
    text: Em đeo vòng cổ này tám năm. Không tháo một lần. Em qua bốn năm đại học. Vòng đó cũng theo em qua hai năm đi làm
      đầu. Em qua một năm chuẩn bị cưới.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 173
    text: 'Năm vừa rồi em cưới vợ. Vợ em hỏi vòng cổ ngay đêm cưới. Cô gái gái gái gái kể. Vợ em im một lúc. Em sợ — em nói:
      ''Anh sẽ tháo nếu em không thích.'' Vợ lắc đầu: ''Anh đeo tiếp đi — em không ghen với chị đã mất. Em cảm ơn chị đã nuôi
      anh thành anh.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 175
    text: Em yêu vợ em hơn vì câu đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 177
    text: Bây giờ — vợ em mang thai bốn tháng. Bé trai. Em sắp có con.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 183
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 187
    text: Em nhớ. Chị em tặng vòng cổ đêm trước hôm chị đi — như cách chị chia tay em. Em không biết lúc đó. Người chị Hà
      có linh tính. Chị muốn để lại em một vật — phòng khi chị không kịp về sáng hôm sau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 191
    text: Tám năm em mang vòng — như mang chị đi cùng em mỗi ngày. Bây giờ — em sắp có con — em không muốn vòng chị tặng riêng
      em — đeo qua thời con em ra đời. Vòng chị là của em — phải nằm với em đến lúc em đi — nhưng không phải đeo qua đời con.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 193
    text: 'Đêm nay — đúng kỉ niệm năm thứ năm chị đi — em đem vòng về nghĩa trang Hà Đông. Đặt vòng giữa mộ chị. Quỳ. Nói:
      ''Chị ơi em đem vòng về. Người con gái sắp có con. Con em sẽ tên là Hải — chị từng nói chị thích tên Hải nếu chị có
      con. Em đặt cho con em tên chị thích. Chị về bên em ngày con em chào đời nhé.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 205
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 11
    line: 251
    text: Vào đêm mười một. Con bắt đầu nhớ một tên, con à. Một tên — sẽ trở lại nhiều đêm sau. Cứ giữ lấy. Đừng vội.
    speaker: UNATTRIBUTED_can_nguoi_duyet
