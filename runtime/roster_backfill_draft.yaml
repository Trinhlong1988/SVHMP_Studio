  PAS_0017:
    char_name: Nguyệt Hằng
    assigned_ep: 6
    appearances:
    - ep: 6
      source: header_passenger_main
    speech_evidence:
    - ep: 6
      line: 130
      text: Cụ tên Hằng. Cụ năm nay tám mươi mốt tuổi. Quê Ninh Bình. Sáu mươi năm rồi cụ gói bánh chưng đêm hai tám. Năm
        đầu cụ tự gói là năm mười tám tuổi — vừa cưới chú cụ. Mẹ chồng cụ dạy. Cụ học một năm, hai năm thì gói thành thạo.
        Năm thứ ba, mẹ chồng cụ đi. Cụ thay mẹ chồng gói cho cả nhà.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 134
      text: Cụ có ba đứa con. Hai trai, một gái. Đứa lớn ở Hà Nội, đứa thứ ở Sài Gòn, đứa út ở nước ngoài. Đứa nào cũng có
        gia đình riêng. Đứa nào cũng có con. Cụ có năm cháu nội ngoại.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 138
      text: Mấy năm trước, các con còn đưa cháu về quê ăn Tết. Cụ gói bánh chưng cho cả nhà. Cháu ngồi xem cụ gói — đứa nào
        cũng đòi tự gói thử. Tay cháu nhỏ, gói méo, nhưng cụ vẫn buộc cẩn thận, cho cháu khoe ngày mùng một.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 142
      text: Năm năm trở lại đây, các con bận. Mỗi năm chỉ một đứa về được. Cháu lớn lên, đi học, đi làm. Không còn đòi gói
        bánh nữa. Đứa nào về cũng chỉ ở qua mùng hai rồi đi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 144
      text: 'Năm nay không đứa nào về. Đứa lớn nhắn: ''Mẹ ơi con họp công ty mùng hai. Năm nay con không về được.'' Đứa thứ
        nhắn: ''Mẹ ơi vợ chồng con đi du lịch Tết. Sang năm con về.'' Đứa út ở nước ngoài, mấy năm rồi không về.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 150
      text: Cụ vẫn gói. Năm nay cụ tự xuống chợ huyện mua lá dong, mua gạo nếp, mua đậu xanh, mua thịt. Cụ thuê xe ôm chở
        rổ về. Cụ ngồi nhà gói. Một mình. Vào đêm hai tám tháng Chạp.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 160
      text: Con đã nhớ ra chưa?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 164
      text: Cụ nhớ, bác. Cụ nhớ năm mẹ cụ ngồi gói đêm hai tám. Vào lúc cụ mười tám tuổi. Cụ ngồi xem mẹ gói. Mẹ chồng cũng
        già như cụ bây giờ. Cụ chưa hiểu vì sao đêm đó mẹ chồng buồn — bây giờ cụ hiểu rồi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 168
      text: 'Mẹ cụ năm đó cũng đợi. Đợi mấy đứa con đi xa về. Không đứa nào về kịp đêm hai tám. Mẹ ngồi gói một mình. Cụ ngồi
        cạnh. Mẹ chỉ tay vào cụ, bảo: ''Sau này con cũng sẽ ngồi đây. Một mình.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 170
      text: 'Cụ không tin. Cụ nghĩ: ''Con cháu mình thì khác, sẽ không như thế.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 172
      text: Bây giờ cụ ngồi đây. Trên chuyến xe này. Mang rổ lá dong xuống tỉnh để gói nhờ ở nhà con gái nuôi — đứa cháu nuôi
        cụ mới biết mặt hai năm trước. Vì ở quê không có ai gói cùng cụ nữa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 176
      text: Con gái nuôi của cụ là cháu họ xa — bố mẹ nó mất trong tai nạn giao thông năm nó lên năm. Cụ nhận nuôi. Cháu giờ
        đã ba mươi sáu, lấy chồng ở thị xã đó. Có hai con. Cháu là đứa duy nhất trong họ còn về quê thăm cụ mỗi tháng.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 178
      text: 'Hai năm trước cháu sinh đứa thứ hai — em bé Nhi. Cụ về thăm. Bà cụ ôm em Nhi lần đầu. Người bà cụ khẽ khóc. Cháu
        hỏi: ''Bà sao khóc?'' Cụ bảo: ''Bà nhớ ngày mẹ con sinh con trong hoàn cảnh đó. Mẹ con đã không sống đủ để ôm con
        như thế này.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 180
      text: Cháu im lặng một thoáng. Cháu không trả lời. Cụ biết — cháu chưa bao giờ hỏi mẹ ruột. Bà cụ cũng không nhắc nữa.
        Cụ chỉ ôm em Nhi lâu hơn. Để em Nhi cũng có hơi của cụ — của bà cố.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 184
      text: 'Năm nay cháu nhắn: ''Bà ơi Tết về nhà con nhé. Con lo bà ở quê một mình.'' Cụ định không đi — quen ở quê rồi.
        Nhưng cụ nghĩ thầm — có lẽ đây là Tết cuối cụ có thể đi xa. Cụ đã tám mốt. Hai chân yếu. Hai tay run.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 186
      text: 'Cụ gọi cho con trai cả: ''Mẹ xuống Hải Phòng nhà em Lan ăn Tết.'' Con trai cả mừng: ''Vâng mẹ. Tết con bận họp
        công ty.'' Cụ gọi cho con thứ: ''Mẹ xuống nhà Lan.'' Con thứ: ''Vâng mẹ. Vợ chồng con đi du lịch Đà Lạt.'' Cụ cho
        út ở Hoa Kỳ — không nghe.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 188
      text: Cụ xếp rổ lá dong. Xuống xe khách huyện. Bắt chuyến này.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 192
      text: Trong rổ này còn một cuốn sổ tay xưa — sổ mẹ chồng để lại. Mẹ chồng cụ ghi công thức gói bánh chưng — đậu xanh
        ngâm bao giờ, gạo nếp vo mấy nước, thịt ướp gì. Cụ giữ sáu mươi năm. Sổ đã vàng. Chữ mờ. Cụ nhớ thuộc lòng rồi, nhưng
        vẫn cầm theo. Sổ là cái duy nhất của mẹ chồng còn lại.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 194
      text: Cụ sẽ đưa sổ này cho em Lan — con gái nuôi. Để Lan tiếp tục gói. Để khi Lan già, Lan đưa con Lan. Cứ thế truyền.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 210
      text: Cháu ngồi đây nhiều đêm rồi nhỉ?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 220
      text: Bác lái xe này, cụ có cảm giác đã gặp bác từ lâu lắm rồi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 6
      line: 224
      text: Chưa tới lúc.
      speaker: UNATTRIBUTED_can_nguoi_duyet
