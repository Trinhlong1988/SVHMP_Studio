  - ep: 27
    line: 201
    text: Em nhớ. Cô gái hứa Hằng giúp khi cần — em giữ lại. Đứa em không về thử hiến thận — em không gọi điện. Bóng người
      con gái ấy không thể chuộc Hằng — em chỉ có thể đem khung trả về trường tiểu học hai đứa em học chung.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 27
    line: 205
    text: Đêm nay — em đem khung về Vĩnh Lộc — về trường tiểu học xưa. Em sẽ đặt khung trong văn phòng giáo viên — gửi khung
