  - ep: 28
    line: 145
    text: 'Hồng quỳ trước em. Em không khóc — em không xin lỗi — em chỉ nói: ''Anh ơi em xin lỗi — anh muốn em làm gì.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 147
    text: 'Em đáp: ''Ly hôn. Tôi nuôi Hoa. Em đi khỏi nhà — tôi không muốn thấy em nữa.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 151
    text: Hồng không cãi. Em đi khỏi nhà ngày hôm sau — em đi về nhà mẹ em ở làng bên. Ly hôn xã làm thủ tục một tháng sau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 153
    text: Hoa ba tuổi — không hiểu — chỉ khóc đòi mẹ. Cô gái chăm Hoa một mình. Em đi biển — em gửi Hoa nhà mẹ em — mẹ em
      chăm cháu.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 155
    text: Em không tái hôn. Em sống với Hoa ba mươi năm. Hoa lớn — em nuôi mẹ ăn học — em tốt nghiệp đại học — em lấy chồng
      — em sinh con — bây giờ em ba mươi ba — em sống Sài Gòn với chồng con.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 157
    text: Hồng không gặp Hoa nữa. Em đi khỏi làng sau ly hôn — em sang xã bên ở — em lấy chồng khác — anh Tâm — chính anh
      tôi bắt gặp. Họ cưới một năm sau ly hôn em. Họ sinh hai con khác.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 161
    text: Ba mươi năm em không gặp Hồng. Em không nói chuyện với Hồng. Em không trao đổi gì.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 163
    text: Em thấy em đôi khi ở chợ huyện — em mua bán — không nhìn nhau. Em tránh em — em tránh em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 165
    text: 'Năm vừa rồi — Hoa về quê thăm em. Hoa nói: ''Bố ơi con vừa nhận tin mẹ Hồng đang ung thư gan giai đoạn cuối. Bố
      ơi mẹ con — con muốn về thăm mẹ trước khi mẹ đi. Bố cho phép không?'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 167
    text: 'Em đã im lặng. Người đàn ông nghĩ thầm. Em nói: ''Hoa ơi con là con của mẹ — bố không cấm. Con về thăm mẹ con đi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 169
    text: 'Hoa về thăm Hồng tháng trước. Hồng nằm — gầy — yếu. Hồng nói với Hoa: ''Mẹ xin lỗi con ba mươi năm — mẹ bỏ con
      khi con ba tuổi — mẹ không có quyền làm mẹ. Con tha lỗi mẹ không?'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 171
    text: 'Hoa khóc bên giường. Bảo: ''Mẹ ơi con tha. Con không trách mẹ — bố con nuôi con tốt — con không thiếu — chỉ thiếu
      mẹ.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 173
    text: 'Hồng nói: ''Mẹ xin con — về nói với bố con — mẹ xin lỗi anh ấy ba mươi năm. Mẹ đã sai. Mẹ không sống tiếp được
      — mẹ xin anh ấy tha mẹ — mẹ đi yên.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 177
    text: Hoa về nhà em. Kể em lời Hồng. Cô gái ấy im lặng yên. Em không nói gì cả tối.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 179
    text: Hai ngày sau — Hồng đi rất xa. Hoa báo em. Em quyết — em đi tang Hồng. Hình bóng đàn ông đến nhà thờ Vĩnh Hòa —
      chính giáo xứ tôi vừa bước lên xe đêm nay. Cô ấy quỳ bên quan tài Hồng. Cô em im — không nói gì.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 181
    text: Em đem nhẫn cưới này — chính nhẫn em mua ở chợ huyện ba mươi mốt năm trước. Em đã tháo ngày ly hôn — em cất trong
      hộp gỗ mun — ba mươi năm — không động.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 183
    text: Em đem nhẫn đến tang — em định đặt vào quan tài Hồng. Em không đặt — em ngại — đã ba mươi năm — em không có quyền.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 185
    text: Em cầm về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 189
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 193
    text: Tôi nhớ. Tôi đã ly hôn Hồng ba mươi năm trước — tôi không tha em. Em ấy đi yên với lời xin lỗi qua Hoa — em không
      nghe trực tiếp từ em. Hình bóng kể chuyện muộn — em đã đi xa. Cô ấy có thể nghe Hoa truyền — em đã đủ — em yên. Nhưng
      tôi không yên — tôi cầm nhẫn cũ về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 197
    text: 'Đêm nay — tôi quay lại nhà thờ Vĩnh Hòa — em đặt nhẫn cưới cũ trên bục giáo xứ — không phải mộ em — trên bục thờ
      Chúa. Vì em theo đạo Công giáo — em chôn theo nghi lễ hội. Em đặt nhẫn ở bục — nói với Chúa thay vì với em: ''Chúa ơi
      xin Chúa truyền lời em — em tha em ba mươi năm — em đi yên.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 28
    line: 209
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
