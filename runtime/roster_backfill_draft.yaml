    - ep: 4
      line: 193
      text: 'Tới khi con vào Hà Nội học đại học, mẹ vẫn ở quê. Em trai con cũng đi học xa, rồi lập gia đình ở Hà Nội. Mẹ ở
        một mình mười lăm năm. Mỗi cuối tuần con gọi điện. Mẹ luôn nói: ''Mẹ ổn, con đừng lo. Mẹ có hàng xóm tốt.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 195
      text: Mỗi Tết về quê, con thấy nhà mẹ rộng hơn — vì mẹ một mình. Mẹ giữ thói quen gói bánh chưng — mỗi năm năm cặp,
