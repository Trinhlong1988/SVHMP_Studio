    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 42
    line: 163
    text: Bảy giờ rưỡi — điện thoại reo. Bệnh viện Bến Tre. Giọng bác người. Em đã đi trong phòng cấp cứu — chấn thương sọ
