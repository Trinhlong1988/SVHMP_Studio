    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 42
    line: 179
    text: Đêm nay — em đem nhẫn về Bến Tre — về quán cà phê. Đặt nhẫn vào hộp lost items — gửi nhẫn cho chỗ em yêu bạn — không
