  speech_evidence:
  - ep: 25
    line: 61
    text: Đêm mười lăm — con đã thấy cậu trai đem mảnh gương vỡ ném hồ Đồng Mô — con nhớ không?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 67
    text: Đêm nay sẽ có cậu trai khác — cũng đem một mảnh kính — nhưng không phải mảnh đập tan — là kính phản chiếu chính
      anh ấy hồi khỏe. Hai mảnh kính — hai câu chuyện khác — cùng cụm vật. Cứ giữ vật con nhặt mỗi đêm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 115
    text: Tôi...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 133
    text: Tôi là Văn Quân. Ba mươi tám tuổi. Tôi ở Thái Nguyên — quê. Tôi từng làm kỹ sư xây dựng cho công ty cầu đường tỉnh
      — bây giờ nghỉ hai năm — phổi yếu — không làm việc nặng được.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 137
    text: Hai năm trước — tôi ba sáu tuổi — tôi phát hiện ung thư phổi giai đoạn ba. Hút thuốc hai mươi năm — uống rượu mỗi
      cuối tuần — bỏ bê — không khám sức khỏe định kỳ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 139
    text: Phẫu thuật cắt nửa phổi trái — tháng ba năm hai nghìn không trăm hai mươi tư. Hóa trị tám tháng sau phẫu thuật.
      Sống. Nhưng không trở lại như trước.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 143
    text: Tôi không lập gia đình. Sống một mình ở Thái Nguyên — căn nhà cấp bốn nhỏ bố mẹ để lại — gần chân đồi chè Phú Lương.
      Bố mẹ tôi mất sớm — bố sáu mươi mất vì ung thư phổi — mẹ năm mươi tám mất vì tai biến. Tôi không có anh chị — tôi con
      một.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 145
    text: Hai mươi năm trước — tôi mười tám — tôi đỗ Đại học Xây dựng Hà Nội. Thông minh — học giỏi — tốt nghiệp xuất sắc
      năm tôi hai hai. Về Thái Nguyên đi làm — vào công ty cầu đường tỉnh — lương khởi điểm tám triệu — sau lên hai mươi triệu
      trong năm năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 147
    text: Tôi tự hào. Người đàn vẫn nghĩ mình khỏe — tôi không bệnh — tôi trẻ. Tôi hút thuốc một bao một ngày — bắt đầu hồi
      đại học — bạn bè hút theo nhau. Uống rượu cuối tuần — đi karaoke với đồng nghiệp đêm — ngủ ít — ăn ngoài cơm bụi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 151
    text: 'Bạn tôi cảnh báo nhiều lần — bố tôi mất sớm vì phổi — tôi nên đi khám định kỳ. Tôi cười với bạn: ''Bố tôi tuổi
      cao mới phát hiện — tôi khác — tôi mới ba mươi — tôi không có triệu chứng gì.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 153
    text: Tôi không khám phổi một lần — suốt từ hai mươi tuổi đến ba lăm tuổi. Mười lăm năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 155
    text: Năm tôi ba lăm — bắt đầu ho khan — không có đờm — chỉ ho. Tôi nghĩ cảm lạnh — mua thuốc cảm hiệu thuốc gần nhà —
      uống một tuần — không khỏi. Hai tuần — không khỏi. Một tháng — vẫn ho.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 157
    text: Tôi đi khám hiệu thuốc lớn — bác sĩ kê thuốc kháng sinh — uống một tuần — đỡ một chút — nhưng vẫn ho khan.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 159
    text: Sáu tháng ho khan — tôi quyết đến bệnh Phổi tỉnh — bệnh này — chính bệnh viện tôi vừa bước lên xe đêm nay. Chụp
      X-quang ngực. Bác sĩ nhìn phim — im một lúc dài — gọi bác sĩ trưởng khoa vào.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 163
    text: Bác sĩ trưởng khoa nhìn phim — chỉ vào chỗ có bóng mờ ở thùy trên phổi trái. 'Anh có khối u — kích thước bốn xăng-ti-mét
      — cần sinh thiết xác định tế bào ung thư.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 165
    text: Tôi không hiểu. Tôi mới ba lăm. Bác sĩ giải thích nhẹ — tôi vẫn không tin.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 167
    text: Sinh thiết. Kết quả sau hai tuần. Tế bào ung thư. Giai đoạn ba — đã di căn hạch.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 169
    text: 'Bác sĩ bảo: ''Anh đã ung thư phổi — giai đoạn ba. Nếu đến sớm sáu tháng — giai đoạn một — chữa tốt — cắt cục u
      nhỏ — không cần hóa trị nhiều. Bây giờ — phải phẫu thuật cắt nửa phổi — hóa trị dài — cơ hội sống năm năm khoảng năm
      mươi phần trăm.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 171
    text: Tôi sốc. Người đàn không khóc trong phòng bệnh. Người kể đây về nhà cấp bốn — đêm đó ngồi sân — uống nước trà —
      nhìn lên trời. Hình bóng kể nghĩ về bố mẹ tôi. Bố tôi mất vì phổi — tôi không tin bệnh di truyền — bây giờ tôi mắc cùng
      bệnh — chỉ trẻ hơn bố hai mươi năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 175
    text: Tôi quyết phẫu thuật. Cắt nửa phổi trái — bốn tiếng dưới dao mổ. Tỉnh dậy — ngực đau như có vật nặng đè — không
      thở sâu được nữa — chỉ thở ngắn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 177
    text: Hóa trị tám tháng. Tóc rụng — mặt vàng — nôn liên tục ba tháng đầu — gầy mười kí trong ba tháng. Bạn bè đến thăm
      — không nhận ra tôi — mặt tôi như người khác.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 179
    text: Sống. Hai năm nay tôi sống — nhưng không sống như xưa. Tôi không leo cầu thang được — leo ba tầng phải nghỉ giữa.
      Hình bóng đàn không chạy được — đi nhanh là khò. Người kể không cười to được — vì cười là ho.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 181
    text: 'Tôi bỏ thuốc lá hoàn toàn — bỏ rượu — ăn uống điều độ — đi bộ nhẹ mỗi sáng. Bác sĩ bảo: ''Anh sống thêm năm năm
      nữa — nếu không tái phát.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 185
    text: Sau phẫu thuật — tôi tìm lại mảnh kính xưa. Kính nhỏ tôi mua ở chợ Đồng Xuân Hà Nội năm tôi ba mươi — kính tôi treo
      trên gương xe máy — kính phản chiếu mặt tôi mỗi sáng đi làm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 187
    text: Kính đã rơi vỡ một lần — tôi giữ một mảnh nhỏ — gói trong vải trắng — bỏ trong ngăn kéo bàn — quên năm năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 189
    text: Sau khi tôi gầy — tôi tìm lại mảnh kính. Tôi soi. Thấy mặt tôi trong mảnh kính — vẫn là mặt tôi hồi ba mươi — má
      hồng — môi đỏ. Mảnh kính phản chiếu ánh sáng xưa — phản chiếu tôi hồi khỏe.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 191
    text: Tôi vuốt kính — nhớ mình hồi khỏe — nhớ mình tự tay phá sức khỏe bằng thuốc lá và rượu. Mảnh kính là chứng tích
      tôi đã sống không cẩn thận.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 195
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 199
    text: Tôi nhớ. Người đàn đã không khám định kỳ — đã không bỏ thuốc — đã không nghe bạn. Tôi bây giờ — sống — nhưng nửa
      phổi. Mảnh kính là chứng tích tôi hồi khỏe — tôi không muốn quên — không muốn ai lặp lại như tôi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 203
    text: Đêm nay — tôi đem mảnh kính về Thái Nguyên — về bệnh viện Phổi nơi tôi điều trị — tôi sẽ tặng kính cho một bệnh
      nhân trẻ tôi gặp tuần trước — cậu hai mươi tuổi — phát hiện sớm ung thư phổi giai đoạn một — chữa được — bác sĩ cho
      về nhà điều trị. Cậu hỏi tôi nhiều — tôi kể tôi. Cậu sốc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 205
    text: Tôi sẽ tặng cậu mảnh kính — bảo cậu soi mỗi sáng — nhớ giữ sức khỏe — không như tôi. Cậu còn trẻ — cậu chữa kịp
      — cậu có thể sống bốn mươi năm nữa — nếu cậu bỏ thuốc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 217
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 25
    line: 273
    text: Người đàn là người đàn ông à? Em ở bệnh viện Bạch Mai. Vợ anh — chị Hạ Vy — vừa được đưa vào cấp cứu — tai nạn xe
      máy — đoạn ngã tư Hai Bà Trưng — Trần Hưng Đạo. Người đàn ông đến gấp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
