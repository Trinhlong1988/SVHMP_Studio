  - ep: 31
    line: 121
    text: Em là Thanh Vân. Bà năm mươi lăm tuổi rồi. Người nữ em ở An Vinh — Hưng Yên — quê. Hình ảnh người con gái ấy làm
      nông — ba sào ruộng — hai con đã ra Hà Nội đi làm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 125
    text: Mẹ em mất mười ba năm trước. Bảy mươi mốt tuổi. Đột tử vì xuất huyết não — đêm — đang ngủ — mất trong giấc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 127
    text: Mất ngày mười hai tháng năm hai nghìn không trăm mười một. Em nhớ rõ ngày — chính ngày em vừa về quê chăm mẹ tháng
      đó. Em ở nhà mẹ — mẹ vẫn khỏe — không có triệu chứng. Sáng hôm sau em vào phòng mẹ — mẹ nằm — mặt yên — đã đi rất xa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 131
    text: Mẹ em là giáo viên mầm non — về hưu năm sáu mươi. Sau khi nghỉ — mẹ trồng cúc — vườn nhỏ sau nhà — hai mươi chậu
      — chậu sứ trắng — mẹ thích cúc vàng nhạt — gọi là cúc tháng — vì cúc nở đẹp nhất tháng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 133
    text: Mỗi tháng — mẹ mời em về quê — em đem cúc cùng mẹ ra mộ ông ngoại. Hai mẹ con quỳ — mẹ thắp hương — em đặt cúc.
      Mỗi năm một lần.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 137
    text: Khi mẹ mất — ngày mười hai tháng — em sốc. Em mất một tuần không nói được. Em không khóc đêm tang — em không khóc
