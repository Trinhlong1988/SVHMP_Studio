    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 42
    line: 165
    text: Tôi không nhớ tôi mặc gì lúc chạy đến viện. Người đàn ông không nhớ tôi lái xe thế nào. Tôi chỉ nhớ tay tôi run
