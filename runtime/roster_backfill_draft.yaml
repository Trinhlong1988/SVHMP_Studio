      tháng tám.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 139
    text: 'Tôi hứa. Tôi nói: ''Vâng bố — con sẽ chăm vườn cúc bố. Cuối tuần con về.'' Bố mỉm cười. Bố vuốt tay tôi. ''Con
