  - ep: 42
    line: 139
    text: 'Tôi quỳ bên em. Em đeo nhẫn cưới trên tay — bệnh viện chưa tháo. Bác sĩ hỏi tôi: ''Anh ơi anh muốn tháo nhẫn em
