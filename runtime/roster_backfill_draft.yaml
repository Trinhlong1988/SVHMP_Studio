  - ep: 19
    line: 97
    text: Mai...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 115
    text: Em là Bích Hoa. Cô gái năm mươi tuổi rồi. Cô ấy ở Đông Anh — quê. Hình bóng con gái ấy làm cán bộ xã đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 119
    text: Bạn em — Mai — mất một tháng trước. Bốn mươi tám tuổi. Ung thư vú giai đoạn cuối — chữa hai năm — không qua ở đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 121
    text: Em và Mai bạn từ cấp hai — cùng lớp. Cùng xã Đông Hội. Cấp ba cùng trường. Đại học tách Hà Nội — em ngoại lời —
      Mai sư phạm. Tốt nghiệp — Mai về quê dạy cấp hai. Em ở Hà Nội — sau hai mươi năm về quê — làm cán bộ xã đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 125
    text: Hai mươi năm em xa quê — em ít gặp Mai. Mỗi Tết em về — gặp Mai ở chợ — vài lời chào. Mai không trách em xa lạ —
      Mai vẫn coi em bạn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 127
    text: Em về quê làm cán bộ — sáu năm trước — gặp Mai thường. Hai bạn nói chuyện hồi cấp ba — hồi tuổi trẻ — cười.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 129
    text: Mai chưa lấy chồng. Sống một mình — căn nhà mái ngói nhỏ ở xã đó. Mẹ Mai mất sớm — bố Mai mất sau đó — Mai một mình
      từ ba mươi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 133
    text: Hai năm trước — Mai phát hiện ung thư vú. Phẫu thuật — hóa trị — đỡ lấy — bệnh lại. Mai gầy. Mai cô đơn — không
      có ai chăm — em đến giúp vài lần — nấu cơm — đem thuốc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 135
    text: 'Tháng cuối — Mai nặng. Mai gọi em: ''Hoa ơi em đến đây đi — em ngủ một đêm với chị — chị sợ một mình.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 137
    text: 'Em đáp: ''Mai ơi tuần này em bận họp xã đó — cuối tuần em đến.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 139
    text: 'Mai nói: ''OK Hoa.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 143
    text: 'Em bận thật. Họp xã đó — duyệt báo cáo — em không đến cuối tuần. Em định: ''Tuần sau.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 145
    text: 'Tuần sau — em nhận điện thoại hàng xóm Mai. Bác hàng xóm khóc: ''Hoa ơi Mai đi sáng nay — bác thấy không có ai
      đến đêm qua — Mai đi một mình.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 147
    text: Em chạy đến nhà Mai. Mai nằm trên giường — gầy — mặt yên — đã đi sáng sớm — không có ai bên cạnh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 149
    text: Em quỳ bên Mai. Cô gái xin lỗi — qua thân xác đã đi. Em không đến tuần trước — Mai đi một mình — em không có mặt.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 153
    text: Tang Mai — em sắp xếp. Mai không có người thân — em là người duy nhất tổ chức.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 155
    text: Đêm tang Mai — em không đến đúng giờ. Cô gái gái gái gái ngại. Cô ấy gái ngại nhìn Mai trong quan tài — em sợ cảm
      giác lỗi sẽ nặng hơn. Hình bóng con gái ấy đến muộn ba giờ — tang đã gần xong.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 157
    text: 'Bác hàng xóm cũ trông tang. Bác bảo: ''Hoa ơi sao cô đến muộn — Mai chỉ có cô bạn thân — cô đến muộn — Mai một
      mình suốt ba giờ trong tang.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 159
    text: Em sốc. Cô gái không hề trả lời. Em ngồi xuống bên quan tài Mai. Quỳ cả đêm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 163
    text: Sau tang — em sửa lại. Em không thể đem Mai sống lại. Nhưng em có thể đem cúc — Mai thích cúc — hồi cấp hai Mai
      hay cài cúc tóc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 165
    text: Mỗi tháng em đem vòng hoa cúc đến mộ Mai. Em đặt cúc — em quỳ — em xin lỗi từng tháng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 167
    text: Hôm nay — đúng tháng thứ nhất Mai đi. Em đem vòng cúc lớn — đẹp — em chọn ở chợ Đông Anh — sáng nay — cúc tươi nhất.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 171
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 175
    text: Em nhớ. Cô gái không đến với Mai tuần cuối — Mai đi một mình. Cô ấy đến tang muộn — Mai cô đơn trong tang. Hình
      bóng con gái ấy không sửa được — em chỉ có thể đem cúc mỗi tháng — đến mộ Mai — quỳ — xin lỗi.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 179
    text: 'Đêm nay — em đem vòng cúc lớn — đặt lên mộ Mai. Quỳ. Nói: ''Mai ơi tháng đầu chị đi. Hoa đến mỗi tháng — không
      lỡ nữa thôi. Cúc tươi — chị nhớ chị cài cúc tóc cấp hai không — Hoa nhớ — Hoa đem cúc cho chị — đến lúc Hoa không đi
      nổi nữa.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 19
    line: 191
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
