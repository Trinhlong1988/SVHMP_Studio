  - ep: 22
    line: 107
    text: Thầy...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 125
    text: Em là Quỳnh Mai. Ba mươi lăm tuổi. Em ở Mai Trung — Bắc Ninh — quê. Hình bóng nữ gái làm giáo viên cấp ba — trường
      Trần Phú Hà Nội. Hình bóng người con gái ấy dạy môn Văn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 129
    text: Năm em hai mươi lăm — em tốt nghiệp Đại học Sư phạm Hà Nội. Chính năm hai nghìn không trăm mười bảy. Em là sinh
      viên giỏi nhất khóa — em được giải thưởng tốt nghiệp xuất sắc nhất khoa Văn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 131
    text: Thầy giáo chủ nhiệm em — thầy Hồng — tặng em cuốn sách này ngày em ra trường. Thầy bốn mươi tám tuổi lúc đó.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 135
    text: 'Thầy Hồng là người em quý nhất trong đời. Bốn năm đại học — thầy dạy em môn Lý luận văn học — môn khó nhất khoa.
      Em vào năm nhất — không hiểu lý luận — em bỏ giữa kỳ. Thầy gọi em vào văn phòng. Thầy bảo: ''Em không bỏ. Em hiểu sau
      hai năm — Lý luận như học bơi — không hiểu ngay được. Em ngồi nghe — đọc — viết — hai năm sau em hiểu.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 137
    text: Em nghe. Em không bỏ. Năm hai — em vẫn không hiểu nhiều. Năm ba — em bắt đầu hiểu. Năm bốn — em viết luận văn về
      'Cấu trúc tự sự trong tiểu thuyết Nguyễn Huy Thiệp' — em đạt điểm cao nhất.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 139
    text: Thầy đọc luận văn em ba lần. Mỗi lần thầy ghi chú vào lề bằng bút đỏ — chữ thầy nghiêng — chi tiết. Thầy bắt em
      viết lại chương ba — em lại — thầy đọc tiếp — thầy bắt em lại lần nữa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 143
    text: Ngày tốt nghiệp — em đến văn phòng thầy chào trước khi nhận bằng. Thầy đứng dậy — đưa em cuốn sách này. Cuốn 'Lý
      luận văn học cổ điển Việt Nam' — bản in 2017 — sách quý — thầy tự đặt mua.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 145
    text: 'Thầy mở trang đầu — đã viết sẵn bằng bút máy: ''Mai ơi — em là học trò giỏi nhất của thầy trong hai mươi năm dạy
      của thầy. Em ra trường — đi xa — đừng quên quê. Mỗi năm em về thăm trường một lần — thầy đợi em ở văn phòng. Hồng. Ngày
      em tốt nghiệp — mười lăm tháng sáu năm 2017.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 147
    text: 'Em đọc — em khóc trước thầy. Thầy vuốt vai em. Thầy nói: ''Em đừng khóc. Đời học trò ngắn — đời thầy trò dài. Em
      ra trường — vẫn là học trò của thầy. Em về thăm thầy.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 151
    text: 'Em hứa thầy: ''Vâng thầy — em sẽ về mỗi năm — không quên — em nhớ ơn thầy.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 153
    text: Em ra trường. Em đi Hà Nội — vào trường Trần Phú cấp ba — dạy môn Văn — lớp mười. Năm đầu em hai sáu — em bận làm
      quen — bận chấm bài lớp đầu — bận đi đám cưới bạn cùng khóa. Em không về thăm thầy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 155
    text: 'Em tự bảo: ''Năm sau em về. Năm sau em có kinh nghiệm — em không bận như năm đầu.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 157
    text: Năm thứ hai — em hai bảy — em yêu — em lấy chồng — em sinh con đầu lòng. Cô gái gái gái gái bận. Em không về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 159
    text: Năm thứ ba — con em một tuổi — em đi dạy — em bận chấm bài — bận chuẩn bị giáo án mới. Em không về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 163
    text: Mười năm — em chỉ về quê hai lần. Đám cưới chị họ em — em đến nhà chị — không qua trường. Đám tang ông ngoại — em
      về một ngày — không qua trường. Mỗi lần — em không tới trường thăm thầy. Em ngại — em giữ lời hứa — em sợ thầy thất
      vọng nhìn em mặt cô gái.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 165
    text: Em định mỗi năm sẽ về — mỗi năm trôi qua — em về. Mỗi tháng em nhớ thầy — em định gọi điện hỏi thăm — em không gọi.
      Em sợ giọng thầy buồn vì em không về.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 167
    text: Năm vừa rồi — em ba mươi tư tuổi — em nhận tin thầy Hồng mất. Đột tử — nhồi máu cơ tim — sáu mươi tuổi. Mất sáng
      sớm — đang đọc sách trong văn phòng — bảo vệ phát hiện.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 169
    text: Em sốc. Cô gái xin nghỉ — về Bắc Ninh đám tang. Em ấy ấy đến nhà thầy. Vợ thầy đón em ở cửa — vợ thầy biết em là
      Quỳnh Mai — vợ thầy đã nghe thầy kể về em — đều đặn — mười năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 171
    text: 'Vợ thầy bảo: ''Mai ơi anh Hồng hay nhắc em. Mỗi tháng anh ấy nói: "Quỳnh Mai chắc bận lắm." Anh ấy đợi em mười
      năm — chưa thấy em về. Anh ấy giữ một ghế trong văn phòng anh ấy — ghế chờ em — anh không cho ai ngồi vào ghế đó — đến
      chết.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 175
    text: Em sốc. Cô gái không khóc trước vợ thầy. Cô gái ấy em chỉ gật. Hình bóng người con gái ấy về nhà mẹ em — đêm đó
      khóc.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 177
    text: Em đi đám tang thầy hôm sau. Cô gái đứng bên quan tài. Đứa em quỳ. Bóng người con gái ấy không xin lỗi được — thầy
      đã không nghe.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 179
    text: Sau tang — em đến trường THCS Mai Trung — chính trường thầy dạy — em xin vào văn phòng thầy. Văn phòng đã được dọn
      — chỉ còn bàn ghế xưa. Có một ghế đối diện bàn thầy — ghế gỗ xưa — không ai ngồi — đúng như vợ thầy nói. Em ấy ngồi
      vào ghế đó. Cô gái ngồi một giờ. Khóc cả giờ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 181
    text: Cuốn sách này — em giữ từ ngày tốt nghiệp tám năm — không đọc lại. Em sợ đọc — sợ thấy chữ thầy viết — sợ nhớ ơn
      không giữ được. Sau tang thầy — em mở ra ngoài. Trang đầu vẫn còn chữ thầy. Em đọc lại — em đọc cả bốn trăm trang sách
      trong một tháng. Em hiểu — bây giờ — sau tám năm — em mới đủ hiểu sách thầy tặng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 185
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 189
    text: Em nhớ. Em hứa thầy về thăm mỗi năm — em không giữ mười năm. Thầy đợi em — đến chết. Em không thể chuộc — em chỉ
      có thể đem sách trả về — đặt trên ghế thầy giữ cho em.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 22
    line: 193
    text: 'Đêm nay — em đem sách về Bắc Ninh — về trường THCS Mai Trung — em sẽ vào văn phòng thầy — đặt sách trên ghế chờ
      em. Quỳ trước bàn thầy. Nói: ''Thầy ơi em xin lỗi mười năm. Em mang sách thầy tặng — đặt trên ghế thầy giữ lại. Hình
      bóng con gái không bao giờ giữ được lời hứa — em xin lỗi. Hình bóng người con gái ấy sẽ về mỗi năm — đặt sách lại đúng
      vị trí — như em đã có mặt — dù thầy không còn ngồi đối diện.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
