  PAS_0018:
    char_name: Bảo Minh
    assigned_ep: 7
    appearances:
    - ep: 7
      source: header_passenger_main
    speech_evidence:
    - ep: 7
      line: 116
      text: Con tên Minh. Em năm nay hai mốt tuổi. Sinh viên năm cuối Đại học Bách khoa. Quê con Hải Dương. Bố con mất từ
        lúc con học cấp ba. Mẹ con nuôi con và em gái con bằng nghề bán bún ở chợ huyện.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 120
      text: 'Tháng vừa rồi con nhận tiền lương thực tập đầu tiên. Một triệu năm trăm. Con để dành. Định mua cho mẹ một cái
        áo len mới — cái áo mẹ đang mặc đã ba bốn năm rồi, sờn lắm rồi. Con tính: ba mươi Tết con về, đưa mẹ phong lì xì có
        tiền lương đầu — để mẹ tự mua áo. Mẹ thích tự chọn.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 126
      text: 'Hôm qua hai chín, mẹ nhắn: ''Mai con về, mẹ nấu bún ốc cho con. Mẹ mua sẵn rồi.'' Con nhắn: ''Mai con về sớm.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 128
      text: 'Sáng nay ba mươi, em gái con gọi. Khóc trong điện thoại. Em bảo: ''Anh ơi mẹ ngã ở chợ. Mẹ đang chở rau về thì
        xe đạp đứt phanh, lao xuống dốc. Người ta đưa mẹ vào bệnh viện huyện. Bác sĩ bảo chấn thương sọ não nặng. Mẹ chưa
        tỉnh.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 130
      text: Con bắt xe khách ngay. Xe khách đường dài. Đường tắc. Con xuống xe ở thị trấn này lúc bảy giờ tối. Bắt được chuyến
        này về tiếp Hải Dương.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 134
      text: Con không gọi em gái lại. Sợ nghe tin mới. Con chỉ ngồi đây, cầm phong này. Tay con vẫn còn run.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 146
      text: Con đã nhớ ra chưa?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 150
      text: Con nhớ, bác.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 154
      text: 'Tới bến xe huyện lúc một giờ sáng. Người con gái gái gái đứng đón. Người nữ em ấy không khóc nữa. Hình bóng con
        gái ấy chỉ dẫn con vào bệnh viện. Mẹ vẫn nằm phòng cấp cứu — máy thở, máy đo. Bác sĩ bảo: ''Còn hai giờ thôi.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 158
      text: Con ngồi cạnh giường mẹ. Mẹ chưa tỉnh. Con cầm phong lì xì. Đặt vào lòng tay mẹ. Bàn tay mẹ lạnh. Mẹ chưa biết
        đó là phong đầu tiên con tặng mẹ — bằng tiền lương đầu tiên con kiếm được.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 160
      text: Đến năm giờ sáng, mẹ đi. Em gái dìu con ra ngoài. Con vẫn cầm phong. Cô gái ấy gái không mở. Con không mở. Đem
        về quê. Đặt lên ban thờ mẹ.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 164
      text: Trong hai giờ con ngồi cạnh mẹ, con nói chuyện với mẹ — dù mẹ không nghe. Con kể về tháng đầu thực tập. Sếp con
        khen con cẩn thận. Đồng nghiệp tốt. Con đã định cuối tháng Hai sẽ đưa mẹ lên Hà Nội chơi — cho mẹ đi chùa Hương lần
        đầu. Con đã đặt vé tàu cho mẹ. Vé vẫn còn trong ví con.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 166
      text: 'Con kể về em gái — em đã thi đỗ học sinh giỏi tỉnh. Người con gái gái vẫn vui. Em chưa hiểu chuyện gì sắp xảy
        ra. Con nói: ''Mẹ ơi, em vui lắm.'' Mẹ vẫn nằm. Máy thở đều.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 168
      text: 'Con kể về bố con — đã mười năm bố con đi. Con kể: ''Mẹ ơi, đêm nay mẹ đi với bố. Bố đợi mẹ lâu rồi.'' Lúc đó
        nước mắt con lăn xuống. Lần đầu con khóc trong hai giờ đó.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 172
      text: Mẹ con thở chậm hơn. Rồi chậm hơn. Bốn năm mươi sáu sáng, máy báo nhịp tim ngừng. Bác sĩ vào trong. Tắt máy. Cô
        gái ấy gái khóc to. Con ngồi yên. Tay vẫn cầm phong.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 180
      text: 'Đám tang xong, em gái bảo: ''Anh giữ phong này. Mẹ chưa kịp mở. người khách đem theo bên mình. Mỗi lần nhìn phong,
        nhớ mẹ.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 182
      text: Con đem theo. Lên Hà Nội đi học. Mỗi đêm trước khi ngủ, con lấy phong ra. Đặt trên đầu giường. Không mở. Vì nếu
        mở, không còn cái gì để 'tặng mẹ' nữa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 194
      text: Chào anh. Chúc anh năm mới.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 204
      text: Chưa tới lúc.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 7
      line: 246
      text: Con cũng sẽ nhớ ra thôi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
