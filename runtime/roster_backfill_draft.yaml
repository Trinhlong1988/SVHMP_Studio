  - ep: 16
    line: 115
    text: Em là Hoàng Yến. Ba mươi tám tuổi. Em ở Hà Đông.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 119
    text: Mẹ em mất tám năm trước. Sáu mươi tám tuổi. Đột tử — nhồi máu cơ tim — sáng sớm — mẹ đang tưới cúc trong sân nhà.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 121
    text: Mẹ em là giáo viên cấp một. Dạy bốn mươi năm — về hưu năm sáu mươi. Sau khi nghỉ — mẹ trồng cúc — vườn nhỏ sau nhà
      — hai mươi chậu — chậu sứ trắng — mẹ thích cúc vàng nhạt — gọi là cúc 'kim ngân'.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 125
    text: Năm em hai mươi tuổi — em sinh viên năm hai — em quen anh Hùng. Anh hơn em năm tuổi — kỹ sư phần mềm — ngoại tỉnh
      — Quảng Bình. Anh không có nhà Hà Nội — không có tiền — chỉ có lương.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 127
    text: Em đem anh về giới thiệu mẹ. Mẹ nhìn anh — không nói. Mẹ pha trà — đợi anh đi — gọi em ra ngoài.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 129
    text: 'Mẹ bảo: ''Yến ơi mẹ không thích anh này. Quê xa — không gia đình ở đây — không nhà — không nền tảng. Em yêu ai
      — mẹ cho — nhưng anh này — mẹ xin em đừng cưới.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 133
    text: 'Em cãi mẹ. Cô con gái lớn tiếng — chuyện đầu tiên trong đời em cãi mẹ. Em nói: ''Mẹ không hiểu — anh hiền — anh
      thương em. Mẹ nhìn vẻ ngoài — mẹ định kiến.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 135
    text: Mẹ không nói tiếp. Mẹ đứng dậy — vào phòng — đóng cửa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 137
    text: Em giận. Em về phòng trọ Hà Nội — không về nhà cuối tuần đó. Tuần sau em cũng không về. Tháng sau em cũng không.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 141
    text: 'Một tháng sau cãi nhau — em nhận điện thoại bố. Vào lúc năm giờ sáng dần lên. Bố khóc: ''Yến ơi mẹ...'' Bố không
      nói hết.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 143
    text: 'Em chạy về. Mẹ nằm trong sân — bên chậu cúc — bình nước đổ. Bố bảo: ''Mẹ ra tưới cúc sáng sớm — gục — không kịp
      gọi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 145
    text: 'Bác sĩ xác định: nhồi máu cơ tim — chết tức thì — không đau lâu.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 147
    text: Em quỳ bên mẹ. Khóc. Em xin lỗi mẹ — qua thân xác đã đi. Em không kịp nói câu xin lỗi lúc mẹ còn nghe.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 151
    text: Sau tang mẹ — em không cưới anh Hùng. Em chia tay anh hai tháng sau. Hình bóng con gái gái không vì giận anh — em
      vì giận mình. Hình bóng người con gái ấy không thể bắt đầu hôn nhân bằng cái chết của mẹ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 153
    text: Người anh Hùng hiểu. Anh không trách. Bốn năm sau anh cưới người khác — em mừng cho anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 155
    text: Em cưới năm em hai mươi tám — chồng em là bạn cấp ba — gia đình ở Hà Đông — mẹ em hồi sống có gặp — mẹ đã từng khen.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 157
    text: Tám năm em sống với cảm giác — em đã cãi mẹ — và mẹ đi mà em chưa xin lỗi. Mỗi mùa thu — em ra mộ mẹ — đem chậu
      cúc — đặt lên mộ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 161
    text: 'Bố em vẫn ở nhà cũ Hà Đông — trồng cúc tiếp — hai mươi chậu của mẹ — bố giữ lại. Năm vừa rồi bố yếu — bố không
      tưới đủ — mười chậu chết. Bố gọi em: ''Yến ơi bố không chăm cúc của mẹ được nữa. Em đem chậu nào em thích về nhà em.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 163
    text: Em về. Em chọn một chậu — chậu cúc kim ngân — chậu mẹ thích nhất. Chậu này — mẹ trồng năm em hai mươi tuổi — chính
      năm em cãi mẹ. Mẹ trồng sau ngày em đi Hà Nội không.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 165
    text: Em đem chậu về nhà em ở Hà Đông. Cô gái gái chăm tám tháng. Cúc nở — vàng nhạt — đẹp như mẹ trồng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 169
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 173
    text: Em nhớ. Em cãi mẹ năm hai mươi — mẹ trồng chậu cúc này tháng sau — mẹ trồng vì mẹ buồn em không về. Chậu này có
      lẽ chứa nỗi buồn mẹ. Em chăm tám tháng — như xin lỗi mẹ qua đất qua nước qua cánh hoa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 177
    text: 'Đêm nay — em đem chậu về Phú Xuyên — về chùa Phú Đường — chùa mẹ em hay đến tụng. Em sẽ đặt chậu cúc trước chánh
      điện. Cúng dường. Nói: ''Mẹ ơi con đã chăm chậu cúc mẹ trồng — đến lúc nở. Con xin lỗi con đã cãi mẹ — con xin lỗi con
      không về tháng đó. Con cúng chậu cho mẹ — để mẹ ở chùa tụng — cùng mẹ.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 16
    line: 189
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
