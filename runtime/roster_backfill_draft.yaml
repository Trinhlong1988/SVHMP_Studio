  - ep: 30
    line: 178
    text: Tôi học. Người con tốt THPT năm hai nghìn không trăm mười bảy — chính tấm bằng trong khung này. Người kể đây đậu
      Đại học Kinh tế Hà Nội — khoa kế toán. Hình bóng kể học bốn năm — tốt năm hai nghìn không trăm hai mươi mốt.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 180
    text: Người con đi làm cho văn phòng kế toán nhỏ ở Hà Nội — lương khởi điểm tám triệu. Tôi gửi tiền về cho mẹ mỗi tháng
      — mẹ đỡ vất vả. Tôi cũng gửi tiền cho thầy Hùng — nhỏ — coi như trả ơn thầy.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 182
    text: Thầy nhận một tháng — sau đó thầy gọi tôi. 'người đàn ông ơi em đừng gửi tiền cho thầy — em gửi cho em khác — học
      sinh em cảnh khó hơn em. Đó là trả thầy đúng nhất.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 184
    text: Tôi nghe thầy. Tôi tìm một em ở quê Hải Dương — gia đình nghèo — em định bỏ học — em đỡ học phí em từ năm tôi hai
      bốn. Em đã tốt THPT năm vừa rồi — đỗ đại học sư phạm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 188
    text: Năm vừa rồi — tôi ba mươi — tôi đã lên trưởng phòng — lương đủ. Tôi quyết về quê thăm thầy Hùng — đem bằng tốt THPT
      em đỡ lấy — em vừa tốt — em muốn khoe thầy 'thầy ơi nhờ thầy em đã đỡ một em khác — em em tốt đại học sư phạm.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 190
    text: 'Tôi gọi điện thầy. Vợ thầy bắt. Vợ thầy bảo: ''Phong ơi — thầy Hùng đột tử tháng trước. Đêm cô không biết — đang
      dạy ca tối — chấm bài lớp mười hai — tim. Bệnh viện đến không kịp.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 192
    text: Tôi sốc. Người con không khóc trước vợ thầy — qua điện thoại. Người kể đây xin về tang thầy — về tuần sau. Hình
      ảnh người con đi tang thầy. Người kể đây quỳ bên quan tài. Hình bóng kể không nói được lời cảm ơn — thầy đã đi xa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 196
    text: Sau tang thầy — tôi về nhà thầy lần nữa — gặp vợ thầy. Tôi tặng vợ hai mươi triệu — vợ không nhận. 'Anh Hùng không
      nhận tiền em — em đỡ bạn khác như anh Hùng đỡ em.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 198
    text: Vợ thầy đưa tôi một chiếc bằng xưa — bằng tốt THPT — chính bằng tôi tốt năm 2017. Bằng này tôi đã đưa thầy năm 2017
      — thầy xin tôi để treo phòng giáo viên — thầy nói 'em là học sinh đầu tôi đỡ qua cấp ba — bằng của em là tấm bằng thầy
      quý.' Thầy treo phòng giáo viên bảy năm.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 200
    text: 'Vợ thầy bảo: ''Phong ơi — anh Hùng đã đi — phòng giáo viên dọn — em đem bằng về với em đi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 202
    text: Tôi cầm. Tôi nhớ thầy treo bằng tôi bảy năm trong phòng — tôi không biết — không bao giờ về thăm — chỉ gửi tiền.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 206
    text: Đêm nay — tôi đem bằng về Hải Dương — về trường THPT Nguyễn Trãi — chính trường thầy dạy — chính trường tôi vừa
      bước lên xe. Tôi sẽ vào phòng giáo viên — đặt bằng lại chỗ thầy từng treo. Như cách trả bằng lại nơi thầy đã giữ lại
      — không đem về Hà Nội nữa.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 210
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 214
    text: Tôi nhớ. Thầy đỡ tôi học hai năm cấp ba — tôi trả thầy bằng tiền — chỉ bằng cách đỡ em khác. Thầy giữ bằng tôi bảy
      năm trong phòng — tôi biết — không thăm — chỉ gửi tiền. Thầy đi — tôi không kịp gặp lần cuối.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 218
    text: 'Đêm nay — tôi đem bằng trả lại trường. Đặt bằng lại chỗ thầy treo. Nói: ''Thầy ơi em xin lỗi không về thăm thầy
      bảy năm. Em đem bằng trả thầy — bằng em — thầy đã giữ lại. Em đỡ em ở quê tốt đại học sư phạm năm vừa rồi — em làm theo
      lời thầy. Thầy yên — bằng em đã về lại nơi.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 232
    text: Chào anh. Em không biết anh tên gì — nhưng cảm ơn anh đã nghe em kể.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 30
    line: 307
    text: Vào đêm ba mươi — milestone. Con đã nghe tên con lần đầu từ bên ngoài, con à. người đàn ông Nguyễn không phải con
      — nhưng đêm nay anh ấy đem tên con vào xe — vào chỗ con ngồi. Cứ giữ tên. Bốn vật cùng năm 2017 — con sẽ ngẫm sau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
