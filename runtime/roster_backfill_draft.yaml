      text: Con từ Hà Nội về quê tối hai tám để giúp mẹ. Lúc con về tới, mẹ vẫn đang ngồi ở bàn gỗ ngoài hiên. Mẹ cầm bút.
        Phong bao cho cháu Diệu đặt trước mặt. Mẹ vừa viết được hai nét bút 'Cháu Diệu' thì gục đầu xuống bàn.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 147
      text: 'Con chạy ra ngoài. Đỡ mẹ lên cao. Mẹ vẫn còn thở. Mẹ khẽ nói: ''Mẹ chưa viết xong. Con viết hộ mẹ. Cháu Diệu...
        cháu nội bé nhất...'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 149
      text: 'Con bảo: ''Mẹ vào nghỉ. Để con viết. Mai mẹ viết tiếp.'' Mẹ gật đầu nhẹ. Con dìu mẹ vào giường. Mẹ nằm xuống,
        nhắm mắt. Con ra đóng cửa sổ — gió đêm lạnh buốt. Vừa khép cửa, con quay lại — mẹ đã đi xa. Nhẹ như một hơi thở thoát
        ra.'
