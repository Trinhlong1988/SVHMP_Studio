    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 13
    line: 149
    text: Tháng thứ ba — tôi cũng bận công ty — quyết toán quý — đi không đều — chỉ về được hai cuối tuần. Tháng thứ tư —
