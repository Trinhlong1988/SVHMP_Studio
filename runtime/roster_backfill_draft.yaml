    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 32
    line: 133
    text: Tôi và Nhung cưới năm em hai mươi ba — Nhung hai mươi hai. Cùng công nhân nhà máy may. Quen từ ca làm chung. Cưới
