    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 149
    text: Trưa tôi gọi Toàn. Toàn bắt. Giọng yếu. 'Tài ơi cảm ơn anh đọc tin. Anh quyết được không?'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 151
    text: 'Tôi nói: ''Toàn ơi anh đợi tôi vài hôm — tôi đang khó — công ty tôi đang khủng hoảng dòng tiền — tôi sẽ xoay —
      đầu tuần sau anh nhé.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 155
    text: 'Toàn im một lúc. Rồi nói: ''OK Tài. Cảm ơn anh.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 17
    line: 157
    text: 'Tôi tắt máy. Tôi tiếp tục họp. Tuần đó tôi xoay tiền — nhưng tôi chỉ xoay được một trăm triệu — không phải hai
