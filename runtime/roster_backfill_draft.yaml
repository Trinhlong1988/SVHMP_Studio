  - ep: 21
    line: 107
    text: Mẹ...
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 125
    text: Tôi là Trọng Nhân. Cô gái năm mươi tuổi rồi. Tôi đây đây ở Mỹ Thuận — Nam Định. Hình bóng người kể chuyện làm nông
      — ba mẫu lúa hai vụ — đủ ăn — không dư nhiều.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 129
    text: Mẹ tôi mất năm mươi mốt năm trước. Vào đêm tôi sinh ra. Mẹ mất khi đẻ — biến chứng băng huyết — bệnh viện huyện
      thời đó không kịp cấp cứu — không đủ máu truyền.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 131
    text: 'Tôi sinh ra — không bao giờ nhìn thấy mặt mẹ. Mẹ mất ngay sau khi tôi cất tiếng khóc đầu — bà đỡ kể vậy. Bà bảo:
      ''Mẹ con nắm tay con một lần — rồi tay rũ xuống. Mẹ con nhìn con — không nói được — chỉ nhìn — rồi đi rất xa.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 135
    text: 'Bố tôi ở vậy nuôi tôi. Không tái hôn. Cả làng đều giục bố tái hôn — bố hai lăm tuổi lúc mẹ mất — bố còn trẻ — có
      thể có gia đình mới. Bố lắc đầu mọi lần. Bố chỉ nói: ''Tôi đã có vợ. Vợ tôi đi rồi — tôi không có ai khác.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 137
    text: Bố sống một mình với tôi đến năm bố sáu mươi chín — đột tử — nhồi máu cơ tim — sáng sớm đang nhổ cỏ vườn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 139
    text: Bố không bao giờ nói nhiều về mẹ. Mỗi rằm tháng tám — bố đem tôi ra mộ mẹ — bố thắp hương — không nói. Tôi quỳ bên
      bố. Hai bố con quỳ — không nói gì — gió thổi qua bia — qua hàng cau bên mộ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 141
    text: 'Năm tôi mười tuổi — tôi hỏi bố lần đầu: ''Bố ơi mẹ trông ra sao?'' Bố im một lúc dài — lâu — tôi nghĩ bố sẽ không
      trả lời. Rồi bố bảo: ''Mẹ con không có ảnh. Hồi đó nghèo — không chụp ảnh chân dung — chụp ảnh tốn tiền lắm. Mẹ con
      đẹp — bố nhớ — nhưng bố không tả được. Mặt mẹ — bố thấy trong đầu — nhưng không vẽ ra giấy được.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 145
    text: Tôi không hỏi nữa. Tôi sống năm mươi năm — không bao giờ thấy mặt mẹ. Mỗi đêm trước khi ngủ — tôi cố tưởng tượng
      — mẹ trông sao. Tôi tưởng tượng theo bố — theo tôi soi gương — mẹ chắc có nét tôi. Mũi mẹ chắc thẳng như mũi tôi. Mắt
      mẹ đen như mắt tôi. Tóc mẹ đen dài — vì phụ nữ thời đó hay để tóc dài.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 147
    text: Nhưng tôi không biết. Tất cả chỉ là tưởng tượng.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 149
    text: Tôi cưới năm hai bảy. Vợ tôi tên Hiền — cùng làng — hiền như tên. Sinh hai con — một trai một gái — đều khỏe.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 151
    text: Năm vợ tôi sinh con đầu — bệnh viện huyện đỡ đẻ — không biến chứng — vợ và con đều an toàn. Khi vợ ra phòng đẻ —
      tôi đứng ngoài — tay run. Tôi sợ điều mẹ tôi gặp năm mươi mốt năm trước sẽ lặp lại.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 153
    text: 'Bác sĩ ra báo: ''Anh ơi vợ anh khỏe — con trai — ba kí — khỏe.'' Tôi quỳ xuống sàn bệnh viện. Khóc. Lần đầu khóc
      sau hai mươi năm — không khóc từ hồi tôi mười tuổi nghe bố nói mẹ không có ảnh.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 157
    text: Bố tôi mất năm tôi bốn mươi tư. Bố nằm trong quan tài — bố cũng không có ảnh — bố không thích chụp — như mẹ. Hai
      vợ chồng đều không có ảnh chân dung.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 159
    text: Sau tang bố — tôi đi tìm ảnh bố. Tôi tìm khắp nhà — lục tủ — lục ngăn kéo — không có. Bố sống bảy mươi tuổi — chưa
      bao giờ chụp ảnh chân dung.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 161
    text: Tôi đi hỏi hàng xóm — ai có ảnh bố không? Một bác cùng làng — bác tám mươi — đưa tôi một ảnh đen trắng — chụp năm
      bố ba mươi — đứng cạnh tôi ba tháng tuổi — ảnh nhòe — chỉ thấy bóng người đàn ông cao gầy bế đứa bé nhỏ.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 163
    text: Tôi cầm ảnh. Nhìn. Không rõ mặt bố — chỉ có bóng — nhưng tôi biết bóng đó là bố. Tôi để ảnh trong khung — đặt lên
      bàn thờ bố.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 167
    text: Tôi không có ảnh mẹ. Suốt đời tôi không có một ảnh nào của mẹ. Mộ mẹ có bia đá — chỉ ghi tên 'Phạm Thị Liễu — 1948-1975'
      — không có ảnh trên bia.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 169
    text: Năm vừa rồi — tôi năm chục tuổi — tôi quyết. Tôi đem máy ảnh ra mộ mẹ — chụp một ảnh mộ — gọi là 'ảnh mẹ' của tôi.
      Ảnh chỉ có bia đá — không có người.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 171
    text: 'Vợ tôi hỏi: ''Sao anh chụp mộ? Khó nhìn lắm.'' Tôi đáp: ''Anh không có ảnh mẹ. Mộ là gần nhất anh có. Anh sẽ đặt
      ảnh mộ trên bàn thờ — bên cạnh bài vị mẹ.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 173
    text: Vợ tôi im lặng. Hiểu. Không nói gì.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 175
    text: Tôi đem ảnh về — đóng khung — đặt trên bàn thờ. Cạnh bài vị mẹ. Đó là ảnh duy nhất tôi có về mẹ — ảnh mộ — không
      phải mẹ. Nhưng có còn hơn không.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 179
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 183
    text: Tôi nhớ. Người con không bao giờ nhìn thấy mặt mẹ — năm mươi năm. Tôi không thể đem mẹ sống lại để chụp ảnh. Ảnh
      mộ là gần nhất tôi có. Tôi chấp nhận — mẹ không có hình dạng cụ thể trong đầu tôi — chỉ có một cảm giác. Cảm giác đó
      đủ cho năm mươi năm — sẽ đủ cho mấy chục năm sau.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 187
    text: 'Đêm nay — tôi đem khung ảnh này ra mộ mẹ — đặt cạnh bia — để ảnh nằm với chính mộ — gửi ảnh về với mẹ. Như cách
      tôi nói với mẹ: ''Mẹ ơi con đã đủ năm mươi — con không cần ảnh mẹ nữa — con đem ảnh trả về với mộ mẹ — để ảnh hợp nhất
      với — không tách rời.'''
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 21
    line: 199
    text: Chào anh.
    speaker: UNATTRIBUTED_can_nguoi_duyet
