    - ep: 4
      line: 161
      text: Con đã nhớ ra chưa?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 165
      text: Con nhớ rồi, bác.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 4
      line: 169
      text: Đám tang xong, con thu xếp đồ mẹ. Trong ngăn kéo bàn của mẹ, con tìm thấy xấp phong bao mẹ đã viết. Mười lăm cái.
        Tên đủ mười bốn đứa cháu. Đứa thứ mười lăm — cháu Diệu — chỉ có hai nét bút 'Cháu Diệu', không có 'thân mến', không
