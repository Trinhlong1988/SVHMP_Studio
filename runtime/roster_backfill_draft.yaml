  PAS_0021:
    char_name: Nguyên Việt
    assigned_ep: 10
    appearances:
    - ep: 10
      source: header_passenger_main
    speech_evidence:
    - ep: 10
      line: 91
      text: Anh cũng về Hà Nội đêm ba mươi à?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 127
      text: Em tên Việt. Bốn mươi sáu tuổi. Quê Bắc Ninh. Bà nội anh mất đêm ba mươi Tết — ba mươi năm trước. Vào lúc em mười
        sáu tuổi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 131
      text: Bà nội nuôi anh từ ba tuổi. Bố anh mất sớm, mẹ anh đi bước nữa và chuyển vào Nam. Cô gái ở với bà nội. Mười ba
        năm. Bà nuôi anh bằng đồng lương hưu giáo viên ít ỏi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 133
      text: 'Tết năm anh mười sáu, anh đi học thêm xa nhà — học trường nội trú. Lâu lắm mới về nhà. Đêm ba mươi anh đang ở
        trường thì cô anh gọi điện: ''Việt ơi bà ngất, đang đưa cấp cứu.'' Anh chạy bộ về nhà — hai mươi cây số. Mưa phùn.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 139
      text: 'Anh đến bệnh viện huyện lúc bảy giờ tối. Bà nội nằm phòng cấp cứu. Hình bóng cô đang ngồi ngoài. Cô ấy bảo: ''Bác
        sĩ bảo bà nhồi máu não. Đang theo dõi. Cháu vào với bà.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 141
      text: 'Em vào trong phòng. Bà nội đang nằm trên giường. Máy thở. Mắt nhắm. Cô gái ấy ngồi xuống ghế. Cầm tay bà. Bàn
        tay bà lạnh. Anh nói: ''Bà ơi cháu về.'' Bà không trả lời.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 145
      text: 'Đến mười giờ đêm, bà mở mắt. Một thoáng. Người bà nội khẽ nhìn em. Môi bà động. Cô gái ghé tai sát lại. Bà nội
        thì thầm: ''Khăn tay... trong túi áo bà...'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 147
      text: 'Anh hỏi: ''Bà nói gì?'' Bà đã nhắm mắt lại. Hơi thở chậm lại. Mười một giờ đêm, bà đi. Vào đêm ba mươi tháng
        Chạp. Pháo hoa giao thừa nổ ngoài đường.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 151
      text: Người cô dìu em ra ngoài. Đưa anh về nhà. Trong tủ áo bà, anh tìm chiếc áo bông xám bà vẫn mặc. Trong túi áo —
        chiếc khăn tay này. Cùng cái khăn ba mươi năm trước bà đã đưa anh khi anh đi học nội trú. Bà giữ lại, không đem theo.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 153
      text: Anh không hiểu vì sao bà đưa khăn cho anh hồi đó, rồi giữ lại khăn của mình. Sau này anh nghĩ thầm — chắc bà muốn
        giữ một cái gì có hơi tay anh. Để khi nhớ anh, bà có cái mà sờ.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 163
      text: Con đã nhớ ra chưa?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 167
      text: Em nhớ, bác.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 171
      text: 'Ba mươi năm anh giữ khăn này. Tháng nào anh cũng mang theo trong cặp. Đi công tác. Đi họp. Đi du lịch. Khăn luôn
        trong cặp. Vợ anh từng hỏi: ''Sao anh không giặt khăn cho mới?'' Anh bảo: ''Giặt mất hơi bà.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 173
      text: Năm năm trước cô anh mất — em gái bà. Người duy nhất còn nhớ bà cùng anh đã đi. Đứa em đứng đám tang cô. Bóng
        anh nhận ra — chỉ còn anh nhớ bà. Khi anh đi, sẽ không còn ai nhớ giọng bà, mùi bà, cách bà nấu canh chua.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 175
      text: Năm nay anh quyết định về quê đêm ba mươi. Anh sẽ thắp hương cho bà. Cho cô. Cho cả những người đã đi mà còn ai
        nhớ — và những người đã đi mà không ai nhớ nữa.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 179
      text: Vợ anh ở Hà Nội, một người Hà Nội. Vợ chưa bao giờ gặp bà — bà mất trước khi anh lập gia đình mười lăm năm. Vợ
        chỉ thấy ảnh bà trên ban thờ ở nhà anh. Anh chưa kể với vợ chuyện đêm bà mất — chuyện anh chạy bộ hai mươi cây số
        dưới mưa. Chuyện bà thì thầm 'Khăn tay... trong túi áo bà...'.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 181
      text: Em muốn kể. Nhiều lần. Nhưng mỗi lần định kể, anh lại dừng. Vì câu chuyện là của riêng anh và bà. Vợ anh có thể
        hiểu — nhưng vợ sẽ không thấm như anh. Câu chuyện sẽ thành ký ức của hai người — và bà sẽ ít riêng hơn.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 185
      text: 'Con trai anh giờ đã hai mươi tuổi — học đại học, ở phòng trọ riêng. Con anh chưa từng gặp cụ — bà nội của bố.
        Anh có lần kể sơ về cụ với con: ''Cụ tên Vân. Cụ là giáo viên cấp một về hưu. Cụ nuôi bố từ ba tuổi.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 187
      text: 'Con anh nghe. Gật đầu. Không hỏi thêm. Anh không biết con có thật sự quan tâm hay chỉ lịch sự. Có lẽ con nghĩ:
        ''Cụ là người xa lạ — của thế hệ trước.'' Con không biết — cụ là người yêu thương bố con nó nhất trên đời này.'
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 191
      text: Có một ngày anh sẽ đi. Khi anh đi, không còn ai biết cụ. Vợ anh sẽ kể với con anh — nhưng chỉ là kể lại lời anh
        kể. Câu chuyện sẽ phai đi qua hai thế hệ — đến khi không còn ai nhớ cụ là ai, đã có cuộc đời như thế nào.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 193
      text: Em sợ điều đó. Anh sợ ngày bà thực sự mất — không phải lúc bà tắt thở, mà là lúc không còn ai trên đời nhớ bà.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 195
      text: 'Vào đêm nay em về quê. Để gặp bà một lần nữa. Để nói: ''Bà ơi, cháu vẫn nhớ bà. Khi nào cháu đi, sẽ có ai khác
        biết bà không? Cháu không chắc. Nhưng cháu vẫn nhớ.'''
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 209
      text: Cầu Long Biên à? Đây là chỗ anh xuống. Em vợ anh đang ngồi nhà ở Phố Cổ chờ anh.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 219
      text: Chào anh. Một năm mới đến rồi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 229
      text: Bác lái xe này bao nhiêu năm rồi?
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 233
      text: Chưa tới lúc.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 259
      text: Cháu người khách — bà nhớ cháu.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 267
      text: Con sắp ngồi cùng họ rồi.
      speaker: UNATTRIBUTED_can_nguoi_duyet
    - ep: 10
      line: 291
      text: '...bà ơi cháu về...'
      speaker: UNATTRIBUTED_can_nguoi_duyet
