  - ep: 31
    line: 161
    text: 'Em đôi khi nhớ lời mẹ — mẹ dạy em hồi nhỏ: ''Cuộc đời ngắn — em đừng giữ giận lâu — em đừng để lời chưa nói chìm
      trong đêm.'' Em đã giữ lời mẹ — em không giận ai — em nói thật với người em thương.'
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 163
    text: Mẹ chỉ kịp dạy em điều này — không kịp nghe em cảm ơn. Em đem cúc tháng — như cảm ơn không cần lời.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 167
    text: Năm ngoái — chậu cúc của em rất đẹp — em đem một chậu lớn. Năm nay — chậu này nhỏ hơn — em chăm chưa kỹ càng — vườn
      vắng tay. Em xin lỗi mẹ đêm nay — chậu nhỏ — nhưng còn hoa. Sang năm em chăm tốt hơn.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 171
    text: Con đã nhớ ra chưa?
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 175
    text: Em nhớ. Cô gái không kịp nói lời yêu mẹ rõ trước khi mẹ đi. Em chỉ kịp về chăm tháng đó. Mẹ đi đột ngột — em không
      có thời gian xin lỗi điều em đã không làm — không nói. Em đem cúc tháng mười ba năm — như thay lời nói em chưa kịp.
    speaker: UNATTRIBUTED_can_nguoi_duyet
  - ep: 31
    line: 179
    text: Đêm nay — em đem chậu cúc tháng thứ mười ba — đặt lên mộ mẹ. Như cách giữ lời hứa em với chính em — không quên một
      tháng nào.
    speaker: UNATTRIBUTED_can_nguoi_duyet
