# ============================================================
# CANON DRIFT POLICY
# ============================================================

drift_policy:
  rules:
    - "Khi gen ep mới, AI MUST cross-check passenger reference với canon_registry."
    - "Nếu generated text mention PAS_XXXX với field khác immutable_fields lock → HARD-FAIL"
    - "Vd: PAS_0007 'cô gái áo gió xanh' → tập 20 KHÔNG được gọi 'cô y tá áo xanh' hay 'cô gái áo đỏ'"
  on_drift:
    - REGEN section vi phạm
    - Update QA flag canon_drift_violation
    - Log canon_drift_count vào ledger
  override:
    - Human explicit only (script.txt edit by Mr.Long)
    - Lý do phải ghi vào canon_override_log.yaml

