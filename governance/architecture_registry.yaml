# ============================================================
# TIER 0 GOVERNANCE — ARCHITECTURE REGISTRY (source of truth)
# Boss 2/7 (phản biện.txt): chống loạn khi Claude chạy lâu — map file→domain,
# source-of-truth, quyền sửa, promotion, data-contract. Kiểm bằng tools/architecture_registry_check.py.
# ============================================================
meta:
  version: 1.0
  status: locked
  authority: Mr.Long / LEAD
  promotion_flow:            # CHỈ 'locked' Generator được dùng
    - draft
    - candidate
    - locked
    - deprecated
  tiers:
    0: Governance
    1: Bible/Schema
    2: Managers/Engines
    3: Validators/QA
    4: Production
    5: Analytics
  # RECONCILE — KHÔNG nhân đôi cơ chế đã có trong hiến pháp:
  reconcile_existing:
    change_request_gate: "R_SUPREME R7 (Read→Diff→Proposal→Approval→Backup→Patch→Regression→Production)"
    audit_log: "R200 realtime sync + tools/log_ping.py (PING_CMD_LEAD) + git commit hash"
    promotion_lock: "bible lock_date + status field; git = backup (R8)"
    ownership: "R1 Mr.Long = only authority for architecture/rule change"

# 6 câu hỏi TRƯỚC khi code — không trả đủ → STOP (Change Request Gate)
change_request_gate:
  - "Đang sửa DOMAIN nào?"
  - "Có TRÙNG module cũ không? (kiểm registry này)"
  - "SOURCE OF TRUTH là file nào?"
  - "Sửa SCHEMA hay RUNTIME?"
  - "Ảnh hưởng QA nào?"
  - "TEST nào chứng minh không vỡ?"

# Định nghĩa DONE cho mỗi domain
definition_of_done:
  - schema
  - manager
  - validator
  - report
  - test_pass
  - md_doc
  - sample_yaml
  - regression

# Ai được sửa gì (Ownership Matrix) — sai quyền → STOP
ownership_matrix:
  LEAD:
    - governance/*
    - CLAUDE.md
    - bible/00_constitution.yaml
  CMD_CHARACTER:
    - bible/37*
    - tools/character_*
    - tools/dialog_voice_validator.py
    - tools/story_consistency_validator.py
    - tools/migrate_roster_v2.py
    - tools/roster_validator.py            # audit ML #2 10/7 - glob character_* khong khop, liet ke tuong minh
    - tools/roster_backfill_miner.py        # audit ML #2 10/7 - glob character_* khong khop, liet ke tuong minh
    - runtime/passenger_roster_100.yaml
  CMD_AUDIO:
    - tools/svhmp_v13_render.py
    - tools/render_with_character_gate.py
    - tools/svhmp_audio_qa.py
    - tools/cap_peak.py
  CMD_TEXT:
    - tools/svhmp_preflight_qa.py
    - tools/qa_eol_diacritic.py
  CMD_NAMING:
    - bible/23*
    - tools/gen_100_passenger.py
    - tools/build_name_pool.py
    - tools/name_pool.yaml

# Bản đồ phụ thuộc — sửa upstream phải chạy test downstream
dependency_map:
  - "Regret(bible/11) -> Character"
  - "Naming(bible/23) -> Character"
  - "Character -> Dialogue"
  - "Dialogue -> TTS(svhmp_v13_render)"
  - "TTS -> Audio_QA(svhmp_audio_qa)"
  - "Text -> Text_Gate(preflight) -> Render"

