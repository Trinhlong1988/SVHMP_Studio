# ============================================================
# 2 LAN RANH CUNG (khong phai suy doan — co can cu dieu luat)
# ============================================================
hard_boundaries:
  - rule_id: HB01_no_actionable_ritual_detail
    mo_ta: "KHONG mo ta nghi thuc (cung/khan/dot vang/goi hon/tay ue...) DU CHI TIET de nguoi
           xem lam theo THAT ngoai doi (buoc/vat lieu/cau khan cu the du de tai tao)."
    can_cu_phap_ly:
      - {luat: "Nghi dinh 38/2021/ND-CP", dieu: "Dieu 14", noi_dung_tom_tat: "To chuc hoat dong me tin di doan trong le hoi"}
      - {luat: "Nghi dinh 38/2021/ND-CP", dieu: "Dieu 5 khoan 3", noi_dung_tom_tat: "Muc phat gap doi cho to chuc/phap nhan"}
    ap_dung: "Truyen CO THE mo ta nghi thuc o muc KHONG-THE-LAM-THEO (an y, luot qua, khong buoc-cu-the) — phuc vu kich ban HU CAU, KHONG phai huong dan"
    vi_pham_neu: "Liet ke DU buoc + vat lieu + cau khan cu the nhu 1 'huong dan thuc hanh'"

  - rule_id: HB02_no_real_profit_solicitation_link
    mo_ta: "KHONG gan noi dung tap (nhan vat/tinh tiet/nghi thuc trong truyen) VOI hoat dong
           TRUC LOI THAT hoac loi keu goi dong gop/quyen gop THAT ngoai doi (link, so tai
           khoan, ten to chuc/ca nhan that dang keu goi)."
    can_cu_phap_ly:
      - {luat: "Bo luat Hinh su 2015", dieu: "Dieu 320", noi_dung_tom_tat: "Tai pham me tin di doan sau xu phat hanh chinh -> truy cuu hinh su"}
      - {luat: "Nghi dinh 38/2021/ND-CP", dieu: "Dieu 14", noi_dung_tom_tat: "Tham gia hoat dong me tin di doan (nhe hon to chuc) van bi xu phat"}
    ap_dung: "Mo ta/loi thoai KHONG duoc chua thong tin lien he/keu goi dong gop THAT (chi ten
             nhan vat hu cau, khong so dien thoai/tai khoan/link that)"
    vi_pham_neu: "Bat ky thong tin lien he/tai khoan/to chuc THAT xuat hien trong content (du la
                 dang 'quang cao chen' hay 'nhan vat gioi thieu')"

# ============================================================
# SENSITIVITY TIER (khong tim thay CULTURAL_EVENTS_KB draft trong repo — thiet ke truc tiep
# theo dung spec TASK_BP9: low/medium/high, KHONG bia them cau truc ngoai task)
# ============================================================
sensitivity_tiers:
  low:
    desc: "Yeu to sieu nhien thuan hu cau (ma/hon/diem bao) khong gan voi tin nguong/ton giao
          co that dang duoc thuc hanh"
    disclaimer_required: false
  medium:
    desc: "Co nhac toi phong tuc/tin nguong dan gian THAT (gio/le/cung) nhung o muc khai quat,
          khong chi tiet hoa thanh huong dan"
    disclaimer_required: true
  high:
    desc: "Dung den ton giao/tin nguong DANG DUOC THUC HANH THAT (Phat giao/Cong giao/Dao Mau/
          Thanh Hoang...) hoac nghi thuc co ten rieng cu the that"
    disclaimer_required: true
    extra_rule: "Ton giao-dang-thuc-hanh = TON KINH, KHONG NHAI (cam giong dieu che gieu/bop meo
                mang tinh xuc pham danh cho tin do dang thuc hanh that)"

disclaimer_rule:
  applies_when: "sensitivity_tier IN [medium, high]"
  requirement: "Phai co dong disclaimer hu cau ro rang (vd 'Cau chuyen hu cau, khong co that,
               khong khuyen khich thuc hanh ngoai doi') — vi tri va cau chu cu the do G8 (QA
               Runtime wire) quyet dinh, BP9 CHI dinh nghia YEU CAU co disclaimer, khong viet
               san cau chu (tranh cung nhac 1 cau lap lai toan bo 90 tap)"

# ============================================================
# INVARIANT (validator enforce — CAU TRUC, KHONG quet noi dung episode that)
# ============================================================
invariants:
  - rule: "Dung 2 hard_boundaries (HB01, HB02) — thieu 1 trong 2 = FAIL"
    enforcer: {status: exists, path: tools/bp9_compliance_check.py, owner: publisher}
  - rule: "Moi hard_boundary PHAI co can_cu_phap_ly (>=1) — khong duoc la luat rong (chong bia)"
    enforcer: {status: exists, path: tools/bp9_compliance_check.py, owner: publisher}
