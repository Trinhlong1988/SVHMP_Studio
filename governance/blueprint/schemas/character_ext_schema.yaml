# CHARACTER EXT SCHEMA — 4 facet của BP2 domain character (knowledge / reveal_permission /
# continuity_risk / entity_class). SoT chính thức tại governance/blueprint/bp2/domain_specs.yaml
# (sot.status: exists, path: file này, key: <facet_id> — flip planned->exists
# per Mr.Long authorization 2026-07-03, RFC lane amendment bp2_domain locked).
# =====================================================================
# STATUS: SIGNED. Ký bởi Mr.Long 2026-07-03 (khung — pool/nội dung cụ thể theo
# G2 B3 fill, không thuộc phạm vi schema này). Nội dung đồng bộ bible/37
# v2.1 (g2_extension) — 2 nơi PHẢI khớp nhau (registry_check + bp2_domain_check
# xác minh path/key resolve thật; nội dung field giữ nguyên khi bible cập nhật).
# Soạn 2026-07-03 theo TASK_G2_CHARACTER B1. KHÔNG bịa field vô căn cứ: mọi field
# đều truy về facet desc đã đóng ở BP2 (bp2-domain-v1.0) hoặc R210.
# AMENDMENT 1 (2026-07-05, per Mr.Long authorization): + facet entity_class, theo
# TASK_G5_SUPERNATURAL.md D2 — cung co che RFC lane amendment nhu G2 extension, KHONG
# mo lai facet list dong cho domain khac, CHI them 1 facet moi vao character.
# TU CHINH 2026-07-10 (per Mr.Long authorization, DEBT-011 + G5-3 TASK_AUDIT_HIGH_
# G2_G8.md, dong bo voi bible/37 v2.2 da doi field): facet entity_class doi tham
# chieu alive_status/ghost -> life_status/linh_hon (khop DUNG field/enum THAT trong
# runtime/passenger_roster_100.yaml, khong doi cau truc/facet_id/values khac).
# validate_entity_class_life_status() nay DA thuc thi that trong story_consistency_
# validator.py (truoc do dong "doi chieu 2 chieu, lech = FAIL" la claim chua co ham).
# =====================================================================

meta:
  version: 1.1
  status: SIGNED
  signed_by: mr_long
  signed_date: 2026-07-03
  amendment_1:
    signed_by: mr_long
    signed_date: 2026-07-05
    drafted_by: KIEM_DUYET
    reason: "TASK_G5_SUPERNATURAL.md D2 — them entity_class de phan biet nguoi/linh_hon/thuc_the_sieu_nhien/nhan_vat_lich_su.
            RFC lane amendment bp2_domain locked, giong het co che G2 extension da lam 2026-07-03."
    added_facet: entity_class
  source_facets: [knowledge, reveal_permission, continuity_risk, entity_class]  # dung facet_id bp2/domain_specs.yaml
  mirrors: bible/37_character_schema.yaml v2.2 (g2_extension + g5_extension section) — 2 file 1 noi dung

# ---------------------------------------------------------------
# FACET 1: knowledge — "Nhân vật BIẾT gì" (QUAN TRỌNG NHẤT truyện dài tập)
# Chống know-the-script: CẤM nhân vật biết bí mật chưa reveal.
# ---------------------------------------------------------------
knowledge:
  data_type: list
  per_character: true
  item_fields:
    fact_id:        {type: str,  required: true,  desc: "ID sự kiện/bí mật (ref story_memory.su_kien)"}
    desc:           {type: str,  required: true,  desc: "Nội dung nhân vật biết"}
    learned_ep:     {type: int,  required: true,  desc: "Biết từ tập nào (0 = trước series)"}
    source_evidence: {type: str, required: true,  desc: "Căn cứ trong truyện (ep:line) — KHÔNG bịa"}
    secrecy:        {type: enum, values: [public, private, secret], required: true}
  invariant: "dialog tập N chỉ được dùng fact có learned_ep <= N (validator enforce)"
  reconcile: "mở rộng modules_v2.story_memory (ai_biet/ai_chua_biet) xuống mức per-character per-fact"

# ---------------------------------------------------------------
# FACET 2: reveal_permission — PERMISSION lộ bí mật (character OWN)
# TIMING lộ tập nào = story_planner reveal_curve — 2 chữ CẤM gộp (phán xử BP2b).
# ---------------------------------------------------------------
reveal_permission:
  data_type: mapping
  per_character: true
  entry_fields:
    fact_id:    {type: str, required: true, desc: "ref knowledge.fact_id"}
    permission: {type: enum, values: [never, after_story_reveal, always], required: true}
    note:       {type: str, required: false, desc: "vd: chỉ hé lộ gián tiếp qua vật/ám hiệu"}
  invariant: "mọi fact secrecy=secret PHẢI có entry reveal_permission (validator: reveal↔knowledge nhất quán)"
  forbidden: "KHÔNG chứa timing (tập nào lộ) — đó là reveal_curve của story_planner (bp6 decision_engine)"

# ---------------------------------------------------------------
# FACET 3: continuity_risk — cờ rủi ro continuity (qa_runtime đọc)
# ---------------------------------------------------------------
continuity_risk:
  data_type: flags
  per_character: true
  fields:
    flags:
      type: list
      allowed_values:
        - da_chet_xuat_hien_lai   # chết/mất trong tập N nhưng xuất hiện tập M>N
        - mat_tich                 # mất tích chưa rõ số phận
        - doi_ten                  # tên trong episode lệch roster
        - bi_nhap                  # bị nhập/chiếm hồn (đổi hành vi)
        - biet_bi_mat              # giữ secret chưa reveal (ưu tiên fill cao)
        - recurring_cross_ep       # xuất hiện >1 tập (chỉ hợp lệ với recurring bible/03)
        - roster_drift_no_pas_id   # tập dùng nhân vật KHÔNG có PAS_ id (phát hiện G2 mining 3/7)
    level: {type: enum, values: [low, medium, high], desc: "high = fill trước (TASK G2 B3 thứ tự)"}
    evidence: {type: list, desc: "mỗi flag kèm (ep:line) căn cứ — KHÔNG suy luận"}
  invariant: "flag chỉ được set kèm evidence; máy đề xuất (roster_backfill_miner) — người duyệt"

# ---------------------------------------------------------------
# FACET 4: entity_class — phân loại bản chất nhân vật (người/linh_hồn/thực_thể_siêu_nhiên/
# nhân_vật_lịch_sử). Đọc TỪ supernatural domain (BP3 dependency: character <- supernatural,
# character là nơi "gắn" kết quả phân loại, KHÔNG tự định nghĩa luật siêu nhiên — luật thật
# nằm ở governance/proposals/supernatural_typology_proposal.yaml của G5).
# ---------------------------------------------------------------
entity_class:
  data_type: scalar
  per_character: true
  field:
    entity_class: {type: enum, values: [nguoi, linh_hon, thuc_the_sieu_nhien, nhan_vat_lich_su],
                   required: false, default: nguoi,
                   desc: "nguoi = con song binh thuong; linh_hon = vong/ma (map life_status=linh_hon);
                         thuc_the_sieu_nhien = thuc the co quyen nang rieng (KHONG phai vong nguoi
                         chet); nhan_vat_lich_su = nhan vat co that lich su (du phong da an HSV,
                         KHONG dung cho HDK hien tai)"}
  invariant: "entity_class=linh_hon PHAI khop life_status=linh_hon (tier_1_mandatory.core_id) —
             validator: story_consistency_validator.py doi chieu 2 chieu, lech = FAIL (G5-3 10/7:
             thuc thi that qua validate_entity_class_life_status(), truoc do la claim chua co ham)"
  reconcile: "KHONG tu dinh nghia quyen nang/gioi han o day — entity_class CHI la nhan phan loai,
             chi tiet typology doc tu governance/proposals/supernatural_typology_proposal.yaml (G5)"

# ---------------------------------------------------------------
# BẢN GHI ÁP DỤNG vào bible/37 v2.1 (Mr.Long ký 2026-07-03)
# ---------------------------------------------------------------
applied_bible37_v21_patch:
  added_section: g2_extension
  content_summary: |
    g2_extension:
      knowledge: [fact_id, desc, learned_ep, source_evidence, secrecy]
      reveal_permission: [fact_id, permission, note]   # PERMISSION only — timing = story_planner
      continuity_risk: [flags, level, evidence]
    meta.version: 2.0 -> 2.1 ; note "G2 extension (Mr.Long ký 2026-07-03)"
  untouched: [tier_1_mandatory, critical_groups, modules_v2, balance_targets]  # KHÔNG đụng lock

# ---------------------------------------------------------------
# BẢN GHI ÁP DỤNG vào bible/37 v2.2 (Mr.Long ký 2026-07-05, amendment_1)
# ---------------------------------------------------------------
applied_bible37_v22_patch:
  added_section: g5_extension
  content_summary: |
    g5_extension:
      entity_class: {values: [nguoi, linh_hon, thuc_the_sieu_nhien, nhan_vat_lich_su], default: nguoi}
    meta.version: 2.1 -> 2.2 ; note "G5 extension entity_class (Mr.Long ký 2026-07-05)"
  untouched: [tier_1_mandatory, critical_groups, modules_v2, balance_targets, g2_extension]  # KHÔNG đụng lock
