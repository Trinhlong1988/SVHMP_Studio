# NAMING EXTENSION RULES — 4 facet naming của BP2 domain character (naming_region /
# naming_generation / naming_culture / naming_vietnamese). SoT chính thức tại
# governance/blueprint/bp2/domain_specs.yaml (sot.status: exists, path: file này,
# key: RULES.rule_0N_* — flip planned->exists per Mr.Long authorization 2026-07-03,
# RFC lane amendment bp2_domain locked).
# =====================================================================
# STATUS: SIGNED (khung). Ký bởi Mr.Long 2026-07-03. bible/23 IMMUTABLE, writer =
# mr_long — rule_06..09 ghi vào bible/23 v1.1 (supersedes v1.0, KHÔNG sửa đè
# rule_01..05 đã lock 27/6, giữ nguyên văn). Soạn 2026-07-03 theo TASK_G2_CHARACTER B1.
# Nguyên tắc "tên gần quê" mirror "giọng gần quê" (R206).
# LƯU Ý: pool tên CỤ THỂ theo vùng (danh sách syllable dùng được) CHƯA ký — đó là
# nội dung riêng "hybrid classification / pool wave" do executor đề xuất (PING),
# đang chờ Mr.Long duyệt riêng. File này CHỈ chứa KHUNG rule (style mô tả), không
# chứa pool cụ thể → roster_validator C4 kiểm tra ở mức KHUNG (structural), không
# kiểm content-pool cho tới khi pool được ký.
# =====================================================================

meta:
  version: 1.0
  status: SIGNED_FRAMEWORK
  signed_by: mr_long
  signed_date: 2026-07-03
  drafted_by: CMD_BUILD
  extends: bible/23_passenger_naming.yaml (v1.0 — rule_01..05 giữ nguyên)
  source_facets: [naming_region, naming_generation, naming_culture, naming_vietnamese]
  forbidden_words_source: data/vietnamese_names_extended.yaml#forbidden_words  # 15 từ Mr.Long — single source, KHÔNG chép lại
  mirrors: bible/23_passenger_naming.yaml v1.1 (RULES.rule_06..09) — 2 file 1 nội dung

RULES:

  rule_06_region_match:   # facet naming_region
    description: "TÊN GẦN QUÊ: tên phải hợp vùng quê nhân vật (mirror 'giọng gần quê' R206)."
    style_by_region:
      bac:   "cổ điển Bắc: Hạ/Nguyệt/Tường/Hoàng + âm Hán-Việt trang nhã"
      trung: "Huế/Trung: Diệu/Tôn Nữ/Như/Đoan — nữ tính cung đình; nam: Bảo/Vĩnh/Hữu"
      nam:   "Nam bộ: thứ danh Út/Tư/Sáu chấp nhận trong xưng gọi (KHÔNG làm char_name chính vì vướng rule_01 2-âm-tiết); tên mộc: Kiều/Diễm/Phụng"
    enforcement: "roster_validator C4 — kiểm KHUNG (region dùng trong roster phải có style_by_region khai). Pool cụ thể chưa ký = không kiểm content-pool."
    note: "Pool cụ thể theo vùng do Mr.Long duyệt riêng (hybrid classification pool wave, PING) — chưa gộp vào bản này."

  rule_07_generation_match:   # facet naming_generation
    description: "TUỔI ↔ THỜI TÊN: nhân vật 58 tuổi (sinh ~196x) mang tên thời đó; CẤM tên trend trẻ cho người già."
    era_style:
      "sinh <=1970":  "tên mộc/Hán-Việt cũ: Hảo/Liên/Hồng/Văn/Hữu/Trọng"
      "sinh 1970-1995": "tên phổ thông: Tuấn/Hằng/Minh/Ngọc"
      "sinh >=1995":  "tên trẻ hiện đại: Nhi/Khả/Bảo (vẫn thuần Việt rule_09)"
    enforcement: "roster_validator C4 — PENDING_CONTENT: roster hiện chưa có birth_year field để đối chiếu; kiểm khi field đó có (B3 fill)."

  rule_08_culture_belief:   # facet naming_culture
    description: "TÔN GIÁO/TÍN NGƯỠNG ảnh hưởng tên: Phật tử pháp danh Diệu/Minh; Công giáo thêm tên thánh (chỉ trong thoại xưng gọi, char_name vẫn thuần Việt)."
    link_facet: belief (tier_2 religion)
    enforcement: "roster_validator C4 — PENDING_CONTENT: roster hiện chưa có religion field; kiểm khi field đó có (B3 fill)."

  rule_09_vietnamese_purity:   # facet naming_vietnamese
    description: "Giữ chuẩn thuần Việt đẹp (rule_01 sẵn) + CẤM tên lai (Jenny Trần), tên game/phi thực (Dragon, Zed), teencode."
    enforcement: "đã phủ một phần bởi C1 (rule_01/02/forbidden trong tools/roster_validator.py); regex charset đầy đủ hoãn tới khi có bộ test chống false-positive trên roster LOCK."

