proposed_bible23_v11_patch:
  version: 1.0 -> 1.1
  supersedes: v1.0 (rule_01..05 GIỮ NGUYÊN nguyên văn)
  add: [rule_06_region_match, rule_07_generation_match, rule_08_culture_belief, rule_09_vietnamese_purity]
  add_pools: "pool tên theo vùng (bac/trung/nam) — Mr.Long duyệt danh sách cụ thể lúc ký"
  validation_hooks_add: "pre_gen: region/generation/culture check qua roster_validator"
