    audit_hook: "audit_rule blueprint: xung ho SAI vung/tuoi/vai ve = VIOLATION — facet nay CO the enforce du canon latent (khac gio/dinh/kieng-ky trong)"
    sensitivity: low
  cuoi_hoi_tap_tuc:
    density: "MO NHAT (chi 1 cau mang mau tap tuc)"
