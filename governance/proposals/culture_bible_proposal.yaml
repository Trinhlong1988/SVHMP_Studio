      - ao_ba_ba_mien: ["ep_46: 'Ao ba ba xam...', ep_19: 'Ao ba ba den...' (trang phuc truyen thong thuong nhat/mien)"]
    sensitivity: low
    boundary_note: "Da so 'ao dai mau X' la attire cua HON khi hien -> supernatural, khong gom. Chi cau 'ao me van mac dip le' moi la culture."
  cho_muu_sinh_doi_thuong:
    density: "VUA — cho nhu thiet che sinh hoat/muu sinh"
    sub:
      - ["ep_07: 'Me nuoi con va em bang nghe ban bun o cho huyen.'", "ep_14: 'Moi sang em di cho Long Bien mua do ve nau trua.'", "ep_28: 'anh di cho Kham Thien... mua ca loc tuoi — ve kho.'"]
    sensitivity: low
  xung_ho_ngam:
    density: "PERVASIVE nhung NGAM (khong duoc dien giai nhu tap tuc)"
    facet_map: "xung_ho_convention — CO canon (he bac/con/em/chu/cu) nhung latent trong thoai"
    citations:
