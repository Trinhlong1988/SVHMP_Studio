      - li_xi_phong_bao: ["ep_04: 'Me tu viet phong bao li xi cho cac chau... Dinh ngay mung mot, con phat cho cac chau.'", "ep_07: 'ba muoi Tet con ve, dua me phong li xi co tien luong dau.'"]
      - giao_thua_mung_mot: ["ep_03: 'Vao dem ba muoi thang Chap.'", "ep_02: 'Den nha luc bon gio sang mung mot.'"]
