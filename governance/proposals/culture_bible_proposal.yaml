    boundary_note: "ep_43 'cuoi ma / ban cuoi voi Mai' = am hon/supernatural, KHONG gom. ruoc dau/an hoi/dam ngo/thach cuoi/nap tai = 0 canon."
    sensitivity: low
  tang_ma_su_kien:
    density: "NHIEU lan nhac nhung MO NHAT ve tap tuc (gan nhu chi la moc su kien)"
    citations:
      - "ep_34: 'Dam tang xa lang to chuc — vai nguoi hang xom — khong gia dinh.' (to chuc tang cong dong)"
    boundary_note: "khan tang/de tang/chiu tang/dua tang/phat tang/cai tang/boc mo = 0 canon. 'chon theo nghi le' (ep_28/36/48) la nghi le Cong giao -> ritual/ton giao, khong phai phong tuc dan gian Viet."
