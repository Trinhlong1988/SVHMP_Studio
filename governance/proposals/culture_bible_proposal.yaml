# NHUNG mine 50 tap:
#   - "gio/dam gio/ngay gio/mam co" = 0 canon; "dinh lang/hoi lang/thanh hoang/mieu" = 0
#     ("dinh" chi la dia danh My Dinh); "le hoi" phan lon la ghep nham "nghi le"+"hoi".
#   - kieng_ky_daily: "kieng/ky/via/dot via/diem go/dai ky" = 0 canon HOAN TOAN.
#   - Nguoc lai: PHONG TUC TET (banh chung, li xi, giao thua/mung mot) = RAT NHIEU (dam nhat).
# => Cai facet NEU (gio/dinh/kieng ky) gan nhu TRONG; cai canon THAT co (Tet, trang phuc le, cho)
#    lai chua co ten facet rieng ro (Tet co the xem la 1 'le' duoi le_gio_custom). Can Mr.Long chot:
#    ghi theo canon THAT (Tet la trung tam) hay giu khung facet rong (mo slot gio/dinh/kieng-ky).
#    -> day la truc A/B, mirror dung tinh than belief_bible_proposal PHAT HIEN #1.

# ------------------------------------------------------------
# PHAT HIEN #2 — RANH GIOI culture vs supernatural manifestation (cam nuot)
# ------------------------------------------------------------
# Moi phong tuc Tet trong truyen deu gan hinh anh HON hien ve (me/ba ngoi goi banh, viet li xi,
# khong quay dau). Phan "hon hien" = supernatural manifestation, KHONG gom vao culture. Culture chi
# ghi TAP TUC (goi banh/viet li xi/chia hang xom/phat mung mot). Tuong tu ao dai: "ao me van mac dip
# le Tet" = culture (dress-code le); "ao dai xanh cua hon khi hien" = supernatural attire. Taxonomy
# PHAI tach 2 lop nay ro (non_responsibility blueprint: "cam nuot nhau").

# ------------------------------------------------------------
# CANON DA CO (mine — mat do that)
# ------------------------------------------------------------
canon_evidence:
  phong_tuc_tet:
