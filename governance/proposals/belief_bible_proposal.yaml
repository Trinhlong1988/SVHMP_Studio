    density: "VUA (tap trung ep_28/36/46, dam trong cac tap do)"
    la_gi: "nhan vat Cong giao TIN khong trao truc tiep cho nguoi khuat, phai gui/xin QUA CHUA (trung gian)"
    citations:
      - "ep_36: 'Em theo dao Cong giao... gui anh cho Chua thay vi giu rieng.'"
      - "ep_28: 'noi voi Chua thay vi voi em: Chua oi xin Chua truyen loi em...'"
      - "ep_46: 'em theo dao Cong giao... em se xin Chua cho em — qua nha tho — qua Chua.'"
    sensitivity: high   # Cong giao dang thuc hanh that -> TON KINH, KHONG NHAI + disclaimer (bp9 high.extra_rule)
  phat_giao_o_chua:
    density: "MO NHAT (chi ep_16)"
    la_gi: "belief cung duong vat cho chua -> nguoi mat 'o chua' cung minh"
    citations:
      - "ep_16: 'Con cung chau cho me — de me o chua tung — cung me.'"
    sensitivity: high   # Phat giao that -> ton kinh + disclaimer
  nguoi_chet_van_hien_dien:
    density: "RAT MO (1 cau ban chinh)"
    citations:
      - "ep_11: 'Chi ve ben em ngay con em chao doi nhe.' (em gai noi voi chi da mat)"
    sensitivity: low
  linh_tinh_bao_truoc:
