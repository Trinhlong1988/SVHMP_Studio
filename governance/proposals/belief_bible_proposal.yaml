      - "Giu NEVER.villain_ghost: KHONG canon-hoa 'ma bao oan' la su that; neu dung chi la belief SAI (PHAT HIEN #3)."

  phuong_an_A_canon_fit_hep:
    ten: "belief bible chi ghi 3 truc CO CANON THAT (trung thuc, hep)"
    mo_ta: "Ghi dung 3 truc mine ra: (1) chuoc-loi-tuong-trung [low], (2) duc tin Cong giao qua-Chua
