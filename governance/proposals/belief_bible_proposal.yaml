    density: "NHIEU NHAT (gan pho quat) — cong thuc 'khong the chuoc... chi co the...'"
    la_gi: "belief dao-duc-tam-ly: khong cuu lai duoc nguoi chet, nhung lam viec thien thay the /
           dem vat tra ve dung cho -> 'coi nhu' loi hua dang do da hoan thanh / nguoi khuat da nhan"
    citations:
      - "ep_14: 'Em khong the chuoc lai ba cu — em chi co the nho — song can than hon ba muoi nam.'"
      - "ep_43: 'khong the chuoc em — em chi co the dem giay em chua nhan ve dai tuong niem — coi em da nhan.'"
      - "ep_39: 'khong the chuoc ba — em chi co the dem com cho ba cu khac tam nam — va dem to cuoi ve cho ba mat.'"
    sensitivity: low   # dao duc/tam ly, khong gan ton giao co ten -> low (bp9)
    ambiguous_flag: "PHAT HIEN #2 — co the la belief tinh co dung (co che truyen xac nhan). Tach mat phat-ngon vs co-che."
