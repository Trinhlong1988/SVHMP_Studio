           khung tin nguong dan gian ma canon chua viet."
    uu: "Trung thuc tuyet doi voi canon; giam rui ro nhay cam ton giao (chi ghi cai da co, khong bia);
        khop chu dinh 'truyen tranh he thuat ngu tin nguong kinh dien'."
    nhuoc: "Neu Mr.Long muon 90 tap mo sang vung mien (mien Trung Dao Mau, lang Thanh Hoang) thi
           A phai mo RFC bo sung tung truc."
  phuong_an_B_khung_rong_planned:
    ten: "Giu khung facet bp7 day du (tin_nguong_he + am_duong_quan_niem rong) — danh dau co canon vs trong"
    mo_ta: "Ngoai 3 truc co canon, GIU cac slot Dao Mau/Thanh Hoang/Tho Cong (tin_nguong_he) +
           am duong/diem bao/nghiep bao/oan hon (am_duong_quan_niem) o trang thai PLANNED-EMPTY co
           cau truc san, de generator/story_planner 90 tap co the mo rong theo vung mien ma khong
           can lam lai schema. Moi slot ton giao that van gan high-sensitivity + disclaimer."
    uu: "Linh hoat cho series dai + da vung mien; khung san khop bp7 facet."
    nhuoc: "Rui ro nhay cam cao hon (mo san slot ton giao chua co canon de bi generator lam day bang
           noi dung bia); can rule chat 'slot empty CHI Mr.Long moi duoc dien, generator KHONG tu sinh'."
    van_CHUNG: "Ca A va B deu: (1) tach belief-phat-ngon vs supernatural-co-che; (2) high-sensitivity
                + ton kinh cho Cong giao/Phat; (3) khong canon-hoa ma-bao-oan."
  ghi_chu_lua_chon_thu_3:
