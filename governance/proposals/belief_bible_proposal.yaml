      - "sensitivity: Cong giao + Phat = high -> TON KINH, KHONG NHAI, disclaimer bat buoc (bp9 high.extra_rule + disclaimer_rule). chuoc-loi-tuong-trung/hien-dien/linh-tinh = low."
