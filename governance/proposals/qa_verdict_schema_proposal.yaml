# ------------------------------------------------------------
# 3 FORMAT VERDICT THAT (da co — hop nhat, khong sang tac)
# ------------------------------------------------------------
existing_formats:
  format_1_orchestrator:
    file: tools/qa_skeptic_orchestrator.py
    output_path: "runtime/final_verdict_ep_{N}.json"
    verdict_field: final_verdict
    enum: [PASS, PASS_WITH_WARNING, REGEN, REVIEW_REQUIRED]   # next_action map :222-227
    enum_produced_by_decision_tree: [PASS, REGEN, REVIEW_REQUIRED]   # :174-201 — PASS_WITH_WARNING CHUA thay gan (xem CHUA DOC HET)
    rich_fields: [qa_verdict, vnqa_verdict, skeptic_verdict, final_reasoning, skeptic_missed_count, next_action, ts]
    note: "Verdict TONG HOP cuoi cung (dung Claude QA + VNQA + Skeptic). Day la verdict co tham quyen cao nhat trong 3."
  format_2_vnqa:
    file: tools/vnqa/pipeline.py
    output_path: "runtime/vnqa_ep_{N}.json"
    verdict_field: verdict
    enum: [PASS, WARN, FAIL]   # :391-398 (critical->FAIL, warning>=5 hoac warning>=1||minor>=3 ->WARN, else PASS)
    rich_fields: ["issues[]", "issues_count_by_severity{critical,warning,minor}", stats, phase_h_version]
    note: "1 tang con (library check H1-H10). phase_h_version tra 'H1-H7 v1.0' = NHAN STALE (code chay H1-H10, xem D1 report). Verdict nay duoc orchestrator TICH HOP (VNQA FAIL -> escalate REGEN)."
  format_3_preflight:
    file: tools/svhmp_preflight_qa.py
    output_path: "(khong co JSON)"
    verdict_field: "(chi exit code)"
    enum: {exit_0: pass, exit_1: block_render, exit_2: early_error_or_usage}
    rich_fields: []
    gap: "KHONG phat JSON verdict — chi exit code. Day la TIEN DE PHAI SUA truoc khi hop nhat duoc (xem prerequisite)."

