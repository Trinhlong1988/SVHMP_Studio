# ------------------------------------------------------------
# SCHEMA DRAFT — 2 PHUONG AN
# ------------------------------------------------------------
schema_draft:

  shared:
    canonical_verdict_enum_proposed: [PASS, PASS_WITH_WARNING, REGEN, REVIEW_REQUIRED]
    rationale: "Lay enum orchestrator (4 trang thai, day du nhat + co tham quyen cao nhat) lam CHUAN.
               VNQA 3-enum va preflight exit-code MAP VAO chuan nay."
    mapping_proposed:
      from_vnqa:   {PASS: PASS, WARN: PASS_WITH_WARNING, FAIL: REGEN}
      # exit_2 XAC MINH 9/7 (R9, doc svhmp_preflight_qa.py:31-32): USAGE-ERROR (thieu arg spec.json),
      # KHONG phai content verdict. => KHONG map vao verdict enum; surface la tooling_error rieng.
      from_preflight: {exit_0: PASS, exit_1: REGEN}
      from_preflight_non_verdict: {exit_2: TOOLING_ERROR}   # usage error, khong phai QA verdict tap
    common_envelope_fields:
      - verdict: {type: enum, values: [PASS, PASS_WITH_WARNING, REGEN, REVIEW_REQUIRED], required: true}
      - source: {type: enum, values: [orchestrator, vnqa, preflight], required: true, desc: "verdict den tu tang nao"}
      - issues: {type: list, required: false, item: "{check, severity:critical|warning|minor, evidence, suggestion}"}
      - severity_counts: {type: object, fields: {critical: int, warning: int, minor: int}}
      - reasoning: {type: string, required: false}
      - ep_number: {type: int, required: true}
      - ts: {type: string, required: true, desc: "ISO8601 UTC"}

  phuong_an_A_canonical_unify:
    ten: "1 schema CHUAN duy nhat — 3 tang deu EMIT dung common_envelope (verdict da map ve 4-enum)"
    mo_ta: "Field-hoa qa_verdict_schema.yaml theo canonical enum + common_envelope. Sua 3 tool de moi
           tool output dung envelope nay (VNQA/preflight map verdict ve 4-enum; orchestrator gan nhu da dung).
           Consumer (generator/gate D7) chi doc 1 schema."
    uu: "Dong nhat tuyet doi; consumer don gian; de enforce (D7 gate kiem 1 schema)."
    nhuoc: "Sua ca 3 tool (nhieu diem cham, nhat la VNQA/preflight) — rui ro pha caller cu; can regression day du.
           preflight can nang JSON (prerequisite) truoc."
  phuong_an_B_thin_wrapper:
    ten: "Giu 3 format native — them 1 schema 'verdict_envelope' MONG lam lop chung, 1 adapter map moi format vao"
    mo_ta: "Khong sua sau 3 tool. Dinh nghia qa_verdict_schema.yaml = envelope + 1 ham adapter
           (vd qa_verdict_adapter.py) doc 3 file native -> tra envelope chuan cho consumer. 3 tool giu nguyen output."
    uu: "It xam pham (khong dong vao logic 3 tool); rui ro regression thap; lam nhanh."
    nhuoc: "Ton tai 2 tang (native + envelope) — phai giu adapter dong bo khi 3 tool doi output; consumer
           phai qua adapter. Van can preflight JSON (prerequisite) de adapter doc duoc."
    van_CHUNG: "Ca A va B deu can prerequisite (preflight phat JSON) + dung canonical 4-enum + mapping tren."

