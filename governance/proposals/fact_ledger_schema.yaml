# ============================================================
# CAU TRUC 1 FACT ENTRY
# ============================================================
fact_entry_schema:
  fact_id:
    type: str
    desc: "Dinh danh duy nhat (vd FACT_DONGHO_XALU_001)"
  nguon:
    type: list
    item: "ep:line (vd 'ep_01:78')"
    required: true
    desc: "KHONG duoc trong — moi fact PHAI co it nhat 1 nguon that trong episode.md"
  cap_do_tin:
    type: enum
    values: [canon, dan_loi_nhan_vat, tin_don]
    desc: |
      canon = su that xac nhan boi narrator/bien co da xay ra that trong truyen
      dan_loi_nhan_vat = nhan vat TU KE (co the sai/thien vi — khong phai canon
        tuyet doi, vd hoi tuong chu quan)
      tin_don = nhan vat khac don doan/nghe noi lai (do tin thap nhat)
  trang_thai_theo_thoi_gian:
    type: mapping
    desc: "Trang thai fact tai 1 THOI DIEM cu the (vd 'dong ho vo xa cu dang o
          tay ai tai tap N') — cho phep fact THAY DOI hop le theo tap, khac
          bible/27 tinh (immutable). Key = ep_number, value = mo ta trang thai."
    example: {2: "trong tay Khai Phong", 15: "khong lien quan (fact khac nhan vat)"}
  lien_quan_nhan_vat:
    type: list
    item: "character_id hoac PAS_id"
  lien_quan_do_vat:
    type: list
    item: "OBJ_ id (bible/12)"

