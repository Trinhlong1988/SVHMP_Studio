#
# KHONG co muc "tam chap nhan" cho phan schema_draft chinh (episode_frontmatter/episode_sections)
# - build tools/episode_generator.py khi con PENDING = FAIL build-ahead, dung tinh than G6-1/G6-5.
# ------------------------------------------------------------

decision_request:
  question: "Format tren co dung y muon cho cau truc du lieu 1 tap khong?"
  options:
    A_approve_as_is: "Duyet nguyen van draft - CMD_BUILD field-hoa thanh governance/blueprint/schemas/episode_schema.yaml"
    B_approve_with_changes: "Giu huong nhung sua 1 vai cho - Mr.Long ghi ro truoc khi field-hoa"
    C_reject_redesign: "Khong dung huong - thiet ke lai"
  note: "Truoc khi build enforcer that, CMD_BUILD PHAI doc post_render_gate.py + svhmp_preflight_qa.py toan bo de tranh nhan doi R211 (xem PHAN BIEN #2) - khong phu thuoc vao lua chon A/B/C."
