    - "cast_count moi episode_plan PHAI trong [5,8]"
    - "characters_present moi scene PHAI resolve that trong roster (khong PAS_id bia)"
    - "driver_clue.weight PHAI thuoc {1,2,5,10,30} dung clue_weight_taxonomy"

