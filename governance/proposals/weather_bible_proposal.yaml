           PHA vong lap 5-khuon (PHAT HIEN #1), nhung khong gia vo day la canon da co."
    uu: "Them dinh dang da dang cho cau mo canh (chong lap tot hon A); trung thuc danh dau expansion."
    nhuoc: "Nhanh sky con mong -> generator neu dung nhieu se sang tac, can Mr.Long cho huong."
    van_LOAI_TRU: "Ca A va B deu KHONG dua sam/chop/bao vao (di nguoc tong truyen) — day la diem
