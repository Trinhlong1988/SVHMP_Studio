      cross_ref: "bible/22_anti_slop_vi.yaml AP7 (section-break crutch) + AP8 (paragraph uniformity)"
    continuity_invariant:
      desc: "Thoi tiet NHAT QUAN trong 1 canh — mua dang roi KHONG tu tanh giua cau khong ly do (audit_rule blueprint_domains weather). Chuyen thoi tiet PHAI co beat (vd 'mua ngot dan' moi duoc chuyen)."

  phuong_an_A_minimalist:
    ten: "Chi 4 truc co canon day — KHONG them nhanh trong"
    mo_ta: "Taxonomy dong lai o 4 truc xuong song (mua/suong/gio/nhiet_am) + mat_nuoc_phang la bo
           tro. KHONG dua trang/sao/may va KHONG dua sam/chop/bao vao canon. Ly do: 2 nhanh do
           text hien gan nhu trong (trang: 1 cau; sam/chop/bao: co y vang) — dua vao = generator
           se PHAI sang tac tu dau, de lech DNA 'u am am i' hien co."
    uu: "Trung thanh tuyet doi voi canon da co; 0 rui ro lech tong; de enforce."
    nhuoc: "Cau mo canh de kem da dang neu chi xoay 4 truc; can anti_formula_rule ganh chong lap."

  phuong_an_B_backbone_plus_optional_sky:
    ten: "4 truc chinh + mo nhanh 'bau troi dem' (trang/sao/may) danh dau EXPANSION"
    mo_ta: "Giu 4 truc xuong song, THEM 1 nhanh 'bau_troi_dem' (trang khuyet/sao/may sau mua) o
