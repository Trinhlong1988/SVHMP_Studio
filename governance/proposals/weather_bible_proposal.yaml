      - nhiet_am: {sub: [dong_ret, am_mat_thang_tu, nong_am_nam_bo, vat_lanh_buot_cham], canon: medium, cross_ref: "gan season/region — story_planner/event quyet mua+vung, weather chi ta trang thai"}
    anti_formula_rule:
      desc: "CAM tai su dung NGUYEN VAN 1 khuon cau mo-canh / dong-canh thoi tiet trong pham vi N tap lien tiep (chong lap 5-khuon da lo o ep_12-50)."
